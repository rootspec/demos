# =============================================================================
# USER STORY: Meta-Banner Visibility
# =============================================================================
# @spec_version: 7.3.7
# @phase: MVP
# @journey: FIRST_VISIT
# @systems: [LAYOUT_SYSTEM, CONTENT_SYSTEM, PRESENTATION_SYSTEM]
# @last_updated: 2026-04-23T00:00:00Z

id: US-001
title: Meta-banner is the first visible element on every page load

acceptance_criteria:
  - id: AC-001-1
    title: Meta-banner appears above all content on desktop
    narrative: |
      Given I visit the site on a desktop browser
      When the page loads
      Then I see the meta-banner before the header and hero section
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-001-2
    title: Meta-banner contains spec link and seed link
    narrative: |
      Given I visit the site
      When the page loads
      Then I see two links in the meta-banner pointing to GitHub
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner] [data-test=spec-link]' }
      - shouldExist: { selector: '[data-test=meta-banner] [data-test=seed-link]' }

  - id: AC-001-3
    title: Meta-banner links are absolute GitHub URLs
    narrative: |
      Given I view the meta-banner
      When I inspect the spec and seed links
      Then they point to absolute GitHub URLs containing github.com/rootspec/demos
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldContain: { selector: '[data-test=spec-link]', text: 'spec' }
      - shouldContain: { selector: '[data-test=seed-link]', text: 'seed' }

