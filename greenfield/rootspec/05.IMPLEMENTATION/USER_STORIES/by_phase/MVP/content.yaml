# =============================================================================
# USER STORY: View meta banner
# =============================================================================

id: US-001
title: View the meta banner explaining the site is a RootSpec demo

acceptance_criteria:
  - id: AC-001-1
    title: Meta banner is visible above the fold
    narrative: |
      Given I visit the RootSpec marketing site
      When the page loads
      Then I see a banner that explains the site was generated from a product description
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-001-2
    title: Meta banner contains a link to the seed file
    narrative: |
      Given I visit the site
      When I look at the meta banner
      Then I see a link to the SEED.md file on GitHub
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner-seed-link]' }

  - id: AC-001-3
    title: Meta banner contains a link to the spec files
    narrative: |
      Given I visit the site
      When I look at the meta banner
      Then I see a link to the spec files on GitHub
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner-spec-link]' }

