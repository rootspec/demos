# =============================================================================
# USER STORY: Hero Section Content
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: LANDING
# @systems: [LAYOUT_SYSTEM, CONTENT_SYSTEM]
# @last_updated: 2026-04-25T00:00:00Z

id: US-002
title: Hero section displays tagline, explanation, and version badge

acceptance_criteria:
  - id: AC-002-1
    title: Hero section is present
    narrative: |
      Given I visit the site
      When I view the hero section
      Then I should see a tagline and version badge
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hero]' }
      - shouldExist: { selector: '[data-test=version-badge]' }

  - id: AC-002-2
    title: Version badge displays a version string
    narrative: |
      Given I visit the site
      When I view the version badge
      Then I should see a version number (e.g., v7.x.x)
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldContain: { selector: '[data-test=version-badge]', text: 'v' }

