# =============================================================================
# LEVEL 5: USER STORIES — Content & Presentation
# =============================================================================
# @phase: MVP
# @systems: [CONTENT_SYSTEM, PRESENTATION_SYSTEM]

---

id: US-101
title: Visitor sees meta banner explaining this is a RootSpec demo

acceptance_criteria:
  - id: AC-101-1
    title: Meta banner is visible on page load without scrolling
    narrative: |
      Given I open the site on any viewport width
      When the page finishes loading
      Then I see the meta banner before I scroll
    given:
      - visit: '/'
    when:
      - pageLoad: {}
    then:
      - shouldBeVisible: { selector: '[data-test=meta-banner]' }

  - id: AC-101-2
    title: Meta banner contains links to spec and seed
    narrative: |
      Given I see the meta banner
      When I inspect its links
      Then I see links to "View the spec" and "View the seed"
    given:
      - visit: '/'
    when:
      - pageLoad: {}
    then:
      - shouldExist: { selector: '[data-test=meta-banner] a[data-test=link-spec]' }
      - shouldExist: { selector: '[data-test=meta-banner] a[data-test=link-seed]' }

  - id: AC-101-3
    title: Meta banner links open in new tab
    narrative: |
      Given I see the spec link in the meta banner
      When I inspect the link
      Then it has target="_blank"
    given:
      - visit: '/'
    when:
      - pageLoad: {}
    then:
      - shouldHaveAttr: { selector: '[data-test=link-spec]', attr: 'target', value: '_blank' }
      - shouldHaveAttr: { selector: '[data-test=link-seed]', attr: 'target', value: '_blank' }

---

id: US-102
title: Visitor sees version badge with current RootSpec version

acceptance_criteria:
  - id: AC-102-1
    title: Version badge is visible in hero section
    narrative: |
      Given I visit the site
      When the page loads
      Then I see the version badge in the hero section
    given:
      - visit: '/'
    when:
      - pageLoad: {}
    then:
      - shouldBeVisible: { selector: '[data-test=version-badge]' }

  - id: AC-102-2
    title: Version badge displays a non-empty version string
    narrative: |
      Given I see the version badge
      When I read its text
      Then it shows a version like "v7.2.4" (starts with "v" followed by digits)
    given:
      - visit: '/'
    when:
      - pageLoad: {}
    then:
      - shouldMatch: { selector: '[data-test=version-badge]', pattern: 'v\\d+\\.\\d+\\.\\d+' }

---

id: US-103
title: Visitor reads the hero section and understands what RootSpec is

acceptance_criteria:
  - id: AC-103-1
    title: Hero section has a headline and one-sentence explanation
    narrative: |
      Given I visit the site
      When I look at the hero section
      Then I see a prominent headline and a brief explanation below it
    given:
      - visit: '/'
    when:
      - pageLoad: {}
    then:
      - shouldBeVisible: { selector: '[data-test=hero-headline]' }
      - shouldBeVisible: { selector: '[data-test=hero-subheadline]' }

  - id: AC-103-2
    title: Hero section has a primary CTA linking to GitHub
    narrative: |
      Given I see the hero section
      When I look for an action
      Then I see a button or link pointing to the RootSpec GitHub repo
    given:
      - visit: '/'
    when:
      - pageLoad: {}
    then:
      - shouldBeVisible: { selector: '[data-test=hero-cta]' }
      - shouldHaveAttr: { selector: '[data-test=hero-cta]', attr: 'href', value: 'https://github.com/rootspec/rootspec' }

---

id: US-104
title: Visitor reads the problem section and recognizes their pain

acceptance_criteria:
  - id: AC-104-1
    title: Problem section exists and has at least 3 pain points
    narrative: |
      Given I scroll to the problem section
      When I look at the content
      Then I see at least 3 distinct pain points with headings
    given:
      - visit: '/'
    when:
      - scrollTo: { selector: '[data-test=problem-section]' }
    then:
      - shouldExist: { selector: '[data-test=problem-section] [data-test=pain-point]', minCount: 3 }

---

id: US-105
title: Visitor sees the four-step workflow and understands the process

acceptance_criteria:
  - id: AC-105-1
    title: Workflow section shows all four commands
    narrative: |
      Given I scroll to the how-it-works section
      When I read the steps
      Then I see all four commands: rs-init, rs-spec, rs-impl, rs-validate
    given:
      - visit: '/'
    when:
      - scrollTo: { selector: '[data-test=workflow-section]' }
    then:
      - shouldContain: { selector: '[data-test=workflow-section]', text: 'rs-init' }
      - shouldContain: { selector: '[data-test=workflow-section]', text: 'rs-spec' }
      - shouldContain: { selector: '[data-test=workflow-section]', text: 'rs-impl' }
      - shouldContain: { selector: '[data-test=workflow-section]', text: 'rs-validate' }

---

id: US-106
title: Visitor sees footer with builder attribution and build date

acceptance_criteria:
  - id: AC-106-1
    title: Footer shows builder name and build date
    narrative: |
      Given I scroll to the bottom of the page
      When I read the footer
      Then I see who built the site and when
    given:
      - visit: '/'
    when:
      - scrollTo: { selector: '[data-test=footer]' }
    then:
      - shouldBeVisible: { selector: '[data-test=footer-attribution]' }
      - shouldContain: { selector: '[data-test=footer-attribution]', text: 'Claude' }
