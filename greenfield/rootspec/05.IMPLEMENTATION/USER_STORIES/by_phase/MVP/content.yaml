# =============================================================================
# USER STORY: Meta Banner Visibility
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FIRST_VISIT
# @systems: [PRESENTATION_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-23T00:00:00Z

id: US-101
title: Visitor reads the meta banner before any other content

acceptance_criteria:
  - id: AC-101-1
    title: Meta banner appears above the fold before hero content
    narrative: |
      Given I visit the site for the first time
      When the page loads
      Then I see a banner explaining this is a RootSpec demo before reaching the hero
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }
      - shouldContain: { selector: '[data-test=meta-banner]', text: 'RootSpec' }

  - id: AC-101-2
    title: Meta banner contains links to spec and seed files
    narrative: |
      Given I am viewing the meta banner
      When I look at the banner
      Then I see links to view the spec and view the seed on GitHub
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner] a[href*="github.com"]' }

