# =============================================================================
# USER STORY: Meta Banner Visibility
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: LANDING
# @systems: [LAYOUT_SYSTEM, CONTENT_SYSTEM]
# @last_updated: 2026-04-25T00:00:00Z

id: US-001
title: Meta banner is visible above the fold on page load

acceptance_criteria:
  - id: AC-001-1
    title: Meta banner is present in the page
    narrative: |
      Given I visit the site
      When the page loads
      Then I should see the meta banner before any other content section
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-001-2
    title: Meta banner contains links to spec and seed files
    narrative: |
      Given I visit the site
      When the page loads
      Then I should see links to the spec and seed files in the meta banner
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner] a[href*="github.com"]' }

