---
id: US-101
title: See meta banner explaining the site is a RootSpec demo

acceptance_criteria:
  - id: AC-101-1
    title: Meta banner is visible on page load
    narrative: |
      Given I visit the site homepage
      When the page loads
      Then I see a banner explaining the site was built using RootSpec
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }
      - shouldContain: { selector: '[data-test=meta-banner]', text: 'RootSpec' }

  - id: AC-101-2
    title: Meta banner contains link to spec files
    narrative: |
      Given I visit the site homepage
      When I look at the meta banner
      Then I see a link to the spec or seed files on GitHub
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner] a[href*="github.com"]' }

