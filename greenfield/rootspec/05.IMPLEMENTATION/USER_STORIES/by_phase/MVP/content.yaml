# =============================================================================
# @spec_version: 7.2.1
# @phase: MVP
# @journey: DISCOVERY
# @systems: [CONTENT_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-13T17:12:20Z

id: US-101
title: Visitor understands what RootSpec is from the hero

acceptance_criteria:
  - id: AC-101-1
    title: Hero headline and subheadline are visible above the fold
    narrative: |
      Given I visit the site on a desktop browser
      When the page loads
      Then I see a headline and a one-sentence explanation of RootSpec without scrolling
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hero-headline]' }
      - shouldExist: { selector: '[data-test=hero-subheadline]' }

  - id: AC-101-2
    title: Version badge displays current version
    narrative: |
      Given I visit the site
      When the page loads
      Then I see the RootSpec version number displayed prominently
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=version-badge]' }

