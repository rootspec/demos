---

id: US-201
title: Visitor sees meta-banner explaining the site is a RootSpec demo

acceptance_criteria:
  - id: AC-201-1
    title: Meta-banner is visible on page load
    narrative: |
      Given I visit the site
      When the page loads
      Then I should see the meta-banner with the demo explanation
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-201-2
    title: Meta-banner contains link to the spec files
    narrative: |
      Given I am viewing the meta-banner
      When I look at its contents
      Then I should see a link to view the spec
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner] [data-test=view-spec-link]' }

  - id: AC-201-3
    title: Meta-banner contains link to the seed file
    narrative: |
      Given I am viewing the meta-banner
      When I look at its contents
      Then I should see a link to view the seed
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner] [data-test=view-seed-link]' }

