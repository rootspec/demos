---
id: US-101
title: See the version of RootSpec this site was built with

acceptance_criteria:
  - id: AC-101-1
    title: Version badge visible in hero section
    narrative: |
      Given I am visiting the site
      When the hero section loads
      Then I see the RootSpec version displayed in the hero area
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=version-badge]' }

  - id: AC-101-2
    title: Version badge shows a real version string
    narrative: |
      Given I am viewing the hero section
      When I look at the version badge
      Then it contains a version number in the format vX.Y.Z
    given:
      - visit: '/'
    when: []
    then:
      - shouldContain: { selector: '[data-test=version-badge]', text: 'v7' }

