# =============================================================================
# USER STORY: Understand RootSpec from Hero
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FIRST_VISIT
# @systems: [CONTENT_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-02T00:00:00Z

id: US-101
title: Understand what RootSpec is from the hero section

acceptance_criteria:
  - id: AC-101-1
    title: Hero displays tagline and explanation
    narrative: |
      Given I am a developer visiting the site for the first time
      When the page loads
      Then I should see a clear tagline and one-sentence explanation of RootSpec
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hero-tagline]' }
      - shouldExist: { selector: '[data-test=hero-description]' }

  - id: AC-101-2
    title: Version badge is visible
    narrative: |
      Given I am viewing the hero section
      When the page loads
      Then I should see the current RootSpec version displayed
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=version-badge]' }

