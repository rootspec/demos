id: US-002
title: Version badge displays current RootSpec version

acceptance_criteria:
  - id: AC-002-1
    title: Version badge is visible in the hero section
    narrative: |
      Given I visit the site
      When the page loads
      Then I see a version badge in the hero section showing the RootSpec version number
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=version-badge]' }

  - id: AC-002-2
    title: Version badge contains a semver string
    narrative: |
      Given I view the hero section
      When I read the version badge
      Then it displays a version number in the format X.Y.Z
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=version-badge]' }
