# =============================================================================
# USER STORY: Meta Banner Visibility
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: READER
# @systems: [CONTENT_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-25T00:00:00Z

id: US-101
title: Visitor sees the meta banner immediately on page load

acceptance_criteria:
  - id: AC-101-1
    title: Meta banner is visible above the fold
    narrative: |
      Given I visit the home page
      When the page loads
      Then I should see a banner explaining this site is a RootSpec demo
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-101-2
    title: Meta banner contains a link to the seed file
    narrative: |
      Given I visit the home page
      When the page loads
      Then I should see a link to the SEED.md file in the meta banner
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner] a[href*="SEED.md"]' }

