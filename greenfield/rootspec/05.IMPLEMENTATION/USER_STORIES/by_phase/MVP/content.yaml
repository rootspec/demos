id: US-003
title: Author's Notes section is present with verbatim text

acceptance_criteria:
  - id: AC-003-1
    title: Author's Notes section is present on the page
    narrative: |
      Given I visit the site home page
      When I scroll to the author's notes section
      Then I see the section with verbatim content from the seed
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=authors-notes]' }

  - id: AC-003-2
    title: Author's Notes contains key opening paragraph text
    narrative: |
      Given I visit the site home page
      When I view the author's notes section
      Then I see text about the central problem of software development
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldContain: { selector: '[data-test=authors-notes]', text: 'capturing human intent' }

