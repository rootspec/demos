# =============================================================================
# USER STORY: View before/after comparison
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FIRST_VISIT
# @systems: [INTERACTIVE_SYSTEM, CONTENT_SYSTEM, THEME_SYSTEM]
# @last_updated: 2026-04-07T23:11:36Z

id: US-202
title: View before/after comparison
requirement_id: R-202

acceptance_criteria:
  - id: AC-202-1
    title: Can toggle between without/with RootSpec views
    narrative: |
      Given I want to understand the difference RootSpec makes
      When I interact with the comparison toggle
      Then I should see contrasting approaches to specification
    given:
      - visit: '/'
      - scrollTo: { selector: '[data-test=comparison-section]' }
    when:
      - click: { selector: '[data-test=comparison-toggle]' }
    then:
      - shouldHaveClass: { selector: '[data-test=comparison-panel]', class: 'with-rootspec' }
      - shouldContain: { selector: '[data-test=comparison-content]', text: 'structured hierarchy' }

  - id: AC-202-2
    title: Both panels address same product concept
    narrative: |
      Given I am comparing approaches
      When I view both panels
      Then they should describe the same product with different specification styles
    given:
      - visit: '/'
      - scrollTo: { selector: '[data-test=comparison-section]' }
    when:
      - ensureVisible: { selector: '[data-test=comparison-without]' }
    then:
      - shouldContain: { selector: '[data-test=comparison-without]', text: 'task management' }
      - shouldContain: { selector: '[data-test=comparison-with]', text: 'task management' }
      - shouldContain: { selector: '[data-test=comparison-without]', text: 'vague' }
      - shouldContain: { selector: '[data-test=comparison-with]', text: 'testable' }