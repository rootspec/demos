id: US-102
title: Understand this site is itself a RootSpec demo via the meta banner

acceptance_criteria:
  - id: AC-102-1
    title: Meta banner is visible on page load
    narrative: |
      Given I visit the site
      When the page loads
      Then I see the meta banner explaining this is a demo
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-102-2
    title: Meta banner contains a link to the spec
    narrative: |
      Given I am viewing the meta banner
      When I look for spec links
      Then I see a link labeled to view the spec
    given:
      - visit: '/'
    when: []
    then:
