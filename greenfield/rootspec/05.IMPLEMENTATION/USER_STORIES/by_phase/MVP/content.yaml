id: US-102
title: Visitor understands what RootSpec is from the hero

acceptance_criteria:
  - id: AC-102-1
    title: Hero displays tagline and version badge
    narrative: |
      Given I visit the site
      When the page loads
      Then I see a hero section with a tagline and the RootSpec version displayed
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hero]' }
      - shouldExist: { selector: '[data-test=version-badge]' }

  - id: AC-102-2
    title: Version badge shows a version number
    narrative: |
      Given I am viewing the hero section
      When I look at the version badge
      Then I see a version number starting with v
    given:
      - visit: '/'
    when: []
    then:
      - shouldContain: { selector: '[data-test=version-badge]', text: 'v' }

