  - id: AC-102-3
    title: Meta banner contains a link to the seed
    narrative: |
      Given I am viewing the meta banner
      When I look for seed links
      Then I see a link labeled to view the seed
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner-seed-link]' }

