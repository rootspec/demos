id: US-102
title: See that the site is itself a RootSpec demo

acceptance_criteria:
  - id: AC-102-1
    title: Meta banner explains the site is a demo
    narrative: |
      Given I am viewing the site
      When I look at the meta banner
      Then I should see an explanation that this site was built with RootSpec
      And I should see links to the spec and seed files
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }
      - shouldExist: { selector: '[data-test=meta-banner-spec-link]' }
      - shouldExist: { selector: '[data-test=meta-banner-seed-link]' }

