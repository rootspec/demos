id: US-104
title: Visitor understands the four-skill workflow

acceptance_criteria:
  - id: AC-104-1
    title: How It Works section shows the four skills
    narrative: |
      Given I visit the site
      When I scroll to the how-it-works section
      Then I see the four skills init, spec, impl, and validate
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=how-it-works]' }
      - shouldContain: { selector: '[data-test=how-it-works]', text: 'rs-init' }
      - shouldContain: { selector: '[data-test=how-it-works]', text: 'rs-spec' }
      - shouldContain: { selector: '[data-test=how-it-works]', text: 'rs-impl' }
      - shouldContain: { selector: '[data-test=how-it-works]', text: 'rs-validate' }
