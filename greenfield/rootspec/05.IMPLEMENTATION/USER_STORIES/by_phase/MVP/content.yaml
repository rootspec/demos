id: US-102
title: Visitor sees version badge showing the RootSpec version used to build the site

acceptance_criteria:
  - id: AC-102-1
    title: Version badge is present in the hero section
    narrative: |
      Given I visit the RootSpec marketing site
      When the page loads
      Then I see a version badge in the hero section
      And the badge shows a version number (not empty or placeholder)
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=version-badge]' }

  - id: AC-102-2
    title: Version badge contains a version string
    narrative: |
      Given I visit the RootSpec marketing site
      When the page loads
      Then the version badge contains text with "v" followed by version numbers
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=version-badge]' }

