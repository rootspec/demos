# =============================================================================
# USER STORY: View meta banner
# =============================================================================

id: US-001
title: Understand the site is a RootSpec demo before reading anything else

acceptance_criteria:
  - id: AC-001-1
    title: Meta banner is visible without scrolling
    narrative: |
      Given I land on the page
      When the page loads
      Then I see a banner explaining this site was built with RootSpec
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-001-2
    title: Meta banner contains link to spec files
    narrative: |
      Given I am viewing the meta banner
      When I look at the banner
      Then I see a link to the spec files on GitHub
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner-spec-link]' }

  - id: AC-001-3
    title: Meta banner contains link to SEED.md
    narrative: |
      Given I am viewing the meta banner
      When I look at the banner
      Then I see a link to the SEED.md file
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner-seed-link]' }

