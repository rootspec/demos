# =============================================================================
# USER STORY: View Meta Banner
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: LANDING
# @systems: [CONTENT_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-12T00:00:00Z

id: US-001
title: Visitor understands the demo context from the meta banner
requirement_id: R-001

acceptance_criteria:
  - id: AC-001-1
    title: Meta banner is visible on page load
    narrative: |
      Given I visit the homepage
      When the page loads
      Then I should see the meta banner with demo context text
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }
      - shouldContain: { selector: '[data-test=meta-banner]', text: 'RootSpec pipeline' }

  - id: AC-001-2
    title: Meta banner contains link to seed file
    narrative: |
      Given I visit the homepage
      When the page loads
      Then I should see a link to the SEED.md file in the meta banner
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner-seed-link]' }

  - id: AC-001-3
    title: Meta banner contains link to spec files
    narrative: |
      Given I visit the homepage
      When the page loads
      Then I should see a link to the spec files in the meta banner
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner-spec-link]' }

