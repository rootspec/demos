# =============================================================================
# USER STORY: Meta Banner Visible and Linked
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FIRST_TIME_ARRIVAL
# @systems: [CONTENT_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-16T00:00:00Z

id: US-101
title: Meta banner explains demo context with working GitHub links
requirement_id: R-101

acceptance_criteria:
  - id: AC-101-1
    title: Meta banner is visible on page load
    narrative: |
      Given I visit the site homepage
      When the page loads
      Then I should see the meta banner with demo framing text
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }
      - shouldContain: { selector: '[data-test=meta-banner]', text: 'RootSpec' }

  - id: AC-101-2
    title: Meta banner links to spec files on GitHub
    narrative: |
      Given I visit the site homepage
      When the page loads
      Then I should see links to the spec and seed in the meta banner
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner-spec-link]' }
      - shouldExist: { selector: '[data-test=meta-banner-seed-link]' }

