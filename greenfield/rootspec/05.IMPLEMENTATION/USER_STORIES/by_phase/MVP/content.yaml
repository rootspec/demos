# =============================================================================
# USER STORY: Meta Banner Display
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FIRST_ARRIVAL
# @systems: [CONTENT_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-24T10:48:33Z

id: US-001
title: Meta banner is visible above the fold

acceptance_criteria:
  - id: AC-001-1
    title: Meta banner appears before any marketing content
    narrative: |
      Given I visit the site home page
      When the page loads
      Then I see the meta banner before any hero or section content
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-001-2
    title: Meta banner contains links to seed and spec files
    narrative: |
      Given I visit the site home page
      When the page loads
      Then I see links to the seed file and spec files in the meta banner
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner] [data-test=seed-link]' }
      - shouldExist: { selector: '[data-test=meta-banner] [data-test=spec-link]' }

