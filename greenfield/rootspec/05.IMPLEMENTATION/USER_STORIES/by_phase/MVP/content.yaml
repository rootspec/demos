id: US-101
title: Visitor sees meta-banner explaining the site is a RootSpec demo

acceptance_criteria:
  - id: AC-101-1
    title: Meta banner is visible on page load without scrolling
    narrative: |
      Given I visit the RootSpec marketing site
      When the page loads
      Then I see a banner explaining this site was generated from a sparse seed
      And the banner contains a link to view the spec
      And the banner contains a link to view the seed
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }
      - shouldContain: { selector: '[data-test=meta-banner]', text: 'generated' }
      - shouldExist: { selector: '[data-test=meta-banner-spec-link]' }
      - shouldExist: { selector: '[data-test=meta-banner-seed-link]' }

