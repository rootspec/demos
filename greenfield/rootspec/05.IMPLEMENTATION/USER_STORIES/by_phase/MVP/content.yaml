# =============================================================================
# USER STORY: Meta Banner Visibility
# =============================================================================

id: US-001
title: See the meta banner above all content

acceptance_criteria:
  - id: AC-001-1
    title: Meta banner is visible without scrolling
    narrative: |
      Given I visit the site
      When the page loads
      Then I see the meta banner before any other content
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-001-2
    title: Meta banner contains link to the spec
    narrative: |
      Given I visit the site
      When the page loads
      Then I see a link to the spec in the meta banner
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner] [data-test=spec-link]' }

  - id: AC-001-3
    title: Meta banner contains link to the seed
    narrative: |
      Given I visit the site
      When the page loads
      Then I see a link to the SEED.md in the meta banner
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner] [data-test=seed-link]' }

