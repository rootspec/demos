  - id: AC-002-1
    title: Hero tagline and subhead are visible
    narrative: |
      Given I visit the homepage
      When the page loads
      Then I should see the hero tagline and a one-sentence explanation
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hero-tagline]' }
      - shouldExist: { selector: '[data-test=hero-subhead]' }

  - id: AC-002-2
    title: Version badge is visible in or near the hero
    narrative: |
      Given I visit the homepage
      When the page loads
      Then I should see the RootSpec version badge
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=version-badge]' }
      - shouldContain: { selector: '[data-test=version-badge]', text: 'v' }

