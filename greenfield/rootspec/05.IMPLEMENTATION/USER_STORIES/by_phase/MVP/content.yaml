# =============================================================================
# USER STORY: Author's Notes Verbatim Content
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: READING
# @systems: [CONTENT_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-25T00:00:00Z

id: US-003
title: Author's Notes section renders the full verbatim text

acceptance_criteria:
  - id: AC-003-1
    title: Author's Notes section exists with a heading
    narrative: |
      Given I visit the site
      When I scroll to the Author's Notes section
      Then I should see the section with an appropriate heading
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=authors-notes]' }

  - id: AC-003-2
    title: Author's Notes contains the opening sentence of the author's text
    narrative: |
      Given I visit the site
      When I read the Author's Notes section
      Then I should see the opening sentence verbatim
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldContain: { selector: '[data-test=authors-notes]', text: 'This page explains why I built Rootspec.' }

  - id: AC-003-3
    title: Author's Notes contains the replicator metaphor
    narrative: |
      Given I visit the site
      When I read the Author's Notes section
      Then I should see the replicator from Star Trek reference
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldContain: { selector: '[data-test=authors-notes]', text: 'replicator from Star Trek' }
