# =============================================================================
# USER STORY: Meta Banner Disclosure
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: LANDING
# @systems: [CONTENT_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-17T03:47:13Z

id: US-101
title: Visitor sees honest meta banner about how the site was built

acceptance_criteria:
  - id: AC-101-1
    title: Meta banner is visible on page load
    narrative: |
      Given I visit the site
      When the page loads
      Then I see a banner explaining this site was generated from a product description using the RootSpec pipeline
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }
      - shouldContain: { selector: '[data-test=meta-banner]', text: 'RootSpec' }

  - id: AC-101-2
    title: Meta banner contains link to spec files
    narrative: |
      Given I visit the site
      When the page loads
      Then I see a link to view the spec in the meta banner
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner] a[href*="github.com"]' }

