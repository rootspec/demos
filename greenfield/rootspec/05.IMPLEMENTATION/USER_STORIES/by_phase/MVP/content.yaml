# =============================================================================
# USER STORY: Read how it works
# =============================================================================

id: US-004
title: Understand the four-skill workflow

acceptance_criteria:
  - id: AC-004-1
    title: How it works section shows four skills
    narrative: |
      Given I scroll to the how it works section
      When I view the section
      Then I see all four skills described
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=how-it-works]' }
      - shouldContain: { selector: '[data-test=how-it-works]', text: 'rs-init' }
      - shouldContain: { selector: '[data-test=how-it-works]', text: 'rs-spec' }
      - shouldContain: { selector: '[data-test=how-it-works]', text: 'rs-impl' }
      - shouldContain: { selector: '[data-test=how-it-works]', text: 'rs-validate' }

