# =============================================================================
# USER STORY: Display Hero Section with Clear Value Proposition
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FIRST_VISIT
# @systems: [CONTENT_SYSTEM, THEME_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-08T00:59:00Z

id: US-101
title: Display hero section with RootSpec tagline and explanation
requirement_id: R-101

acceptance_criteria:
  - id: AC-101-1
    title: Hero section clearly explains what RootSpec is
    narrative: |
      Given I am a developer visiting the RootSpec marketing site
      When I arrive at the landing page
      Then I should immediately understand what RootSpec is
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hero-section]' }
      - shouldContain: { selector: '[data-test=hero-tagline]', text: 'RootSpec' }
      - shouldContain: { selector: '[data-test=hero-description]', text: 'specification language' }

  - id: AC-101-2
    title: Version number displayed prominently
    narrative: |
      Given I am viewing the hero section
      When I look for version information
      Then I should see the current RootSpec version clearly displayed
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=version-display]' }
      - shouldContain: { selector: '[data-test=version-display]', text: 'v6.2.0' }

