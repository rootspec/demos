---

id: US-101
title: Understand what RootSpec is from the hero

acceptance_criteria:
  - id: AC-101-1
    title: Hero communicates the product in one sentence
    narrative: |
      Given I am a visitor landing on the RootSpec site for the first time
      When I view the page without scrolling
      Then I should see a tagline and a one-sentence explanation of what RootSpec is
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hero-tagline]' }

---

id: US-102
title: See the meta banner explaining the site is a RootSpec demo

acceptance_criteria:
  - id: AC-102-1
    title: Meta banner is visible above the fold
    narrative: |
      Given I am a visitor landing on the RootSpec site
      When I view the page without scrolling
      Then I should see a banner explaining this site was generated from a sparse product description
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-102-2
    title: Meta banner contains links to SEED.md and spec files
    narrative: |
      Given I am viewing the meta banner
      When I look at its contents
      Then I should see links to the SEED.md and spec files in the GitHub repo
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner] a[data-test=seed-link]' }
      - shouldExist: { selector: '[data-test=meta-banner] a[data-test=spec-link]' }

---

id: US-103
title: See the current RootSpec version displayed prominently

acceptance_criteria:
  - id: AC-103-1
    title: Version badge shows the version from .rootspec.json
    narrative: |
      Given I am viewing the RootSpec site
      When I look at the header or hero area
      Then I should see the RootSpec version number displayed
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=version-badge]' }
      - shouldContain: { selector: '[data-test=version-badge]', text: '7.2.0' }

---

id: US-104
title: Find the GitHub repo and getting started instructions

acceptance_criteria:
  - id: AC-104-1
    title: CTA section contains GitHub link
    narrative: |
      Given I am a visitor who wants to start using RootSpec
      When I scroll to the open source CTA section
      Then I should see a link to the GitHub repository
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=cta-github]' }

---

id: US-105
title: Read the before/after comparison with real content

acceptance_criteria:
  - id: AC-105-1
    title: Before panel contains a without-spec example
    narrative: |
      Given I am viewing the before/after comparison section
      When I look at the before panel
      Then I should see real content showing a poorly-structured requirement
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=before-panel]' }

  - id: AC-105-2
    title: After panel contains a with-RootSpec example
    narrative: |
      Given I am viewing the before/after comparison section
      When I look at the after panel
      Then I should see real content showing the same feature structured with RootSpec
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=after-panel]' }
