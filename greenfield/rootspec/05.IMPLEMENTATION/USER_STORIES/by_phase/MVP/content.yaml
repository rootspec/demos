id: US-102
title: Visitor sees meta-banner explaining site was generated by RootSpec pipeline

acceptance_criteria:
  - id: AC-102-1
    title: Meta banner is visible on page load
    narrative: |
      Given I visit the site
      When the page loads
      Then I see a persistent banner explaining the site was built via the RootSpec pipeline
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-102-2
    title: Meta banner contains links to spec and seed files
    narrative: |
      Given I see the meta banner
      When I inspect it
      Then I see links to view the spec and the seed file on GitHub
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner] a[data-test=view-spec-link]' }
      - shouldExist: { selector: '[data-test=meta-banner] a[data-test=view-seed-link]' }

