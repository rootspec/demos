# =============================================================================
# USER STORY: Meta Banner Visibility
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FIRST_VISIT
# @systems: [CONTENT_SYSTEM, LAYOUT_SYSTEM, PRESENTATION_SYSTEM]
# @last_updated: 2026-04-23T00:00:00Z

id: US-101
title: Visitor sees the demo context banner before any other content

acceptance_criteria:
  - id: AC-101-1
    title: Meta banner is visible above the fold on load
    narrative: |
      Given I arrive at the site
      When the page loads
      Then I see the meta banner before scrolling
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-101-2
    title: Meta banner contains a link to the SEED.md file
    narrative: |
      Given I arrive at the site
      When the page loads
      Then I can see a link to the SEED.md on GitHub
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner] a[href*="SEED.md"]' }

  - id: AC-101-3
    title: Meta banner contains a link to the spec directory
    narrative: |
      Given I arrive at the site
      When the page loads
      Then I can see a link to the spec files on GitHub
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner] a[href*="rootspec"]' }

