# =============================================================================
# USER STORY: Meta Banner Transparency
# =============================================================================

id: US-001
title: View site generation transparency banner
requirement_id: R-001

acceptance_criteria:
  - id: AC-001-1
    title: Meta banner visible on page load
    narrative: |
      Given I am a first-time visitor to the RootSpec marketing site
      When I load the homepage
      Then I should see a prominent banner explaining this site was generated from ~100-line description
    given:
      - visit: '/'
    when:
      - waitFor: { selector: '[data-test=meta-banner]' }
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }
      - shouldContain: { selector: '[data-test=meta-banner]', text: '~100-line' }
      - shouldContain: { selector: '[data-test=meta-banner]', text: 'RootSpec pipeline' }

  - id: AC-001-2
    title: Links to spec and seed files work
    narrative: |
      Given I see the meta banner
      When I click the "View the spec" link
      Then I should be taken to the GitHub repository spec files
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=meta-banner-spec-link]' }
    then:
      - shouldRedirect: { pattern: 'github.com.*rootspec.*\.md' }

  - id: AC-001-3
    title: Seed file link accessible
    narrative: |
      Given I see the meta banner
      When I click the "View the seed" link
      Then I should be taken to the SEED.md file
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=meta-banner-seed-link]' }
    then:
      - shouldRedirect: { pattern: 'SEED\.md' }

# =============================================================================
# USER STORY: Hero Section Display
# =============================================================================

id: US-002
title: Understand RootSpec value proposition immediately
requirement_id: R-002

acceptance_criteria:
  - id: AC-002-1
    title: Clear tagline and description visible
    narrative: |
      Given I am a developer seeking specification tools
      When I arrive at the homepage
      Then I should immediately understand what RootSpec is and why it matters
    given:
      - visit: '/'
    when:
      - waitFor: { selector: '[data-test=hero-section]' }
    then:
      - shouldExist: { selector: '[data-test=hero-tagline]' }
      - shouldExist: { selector: '[data-test=hero-description]' }
      - shouldContain: { selector: '[data-test=hero-section]', text: 'specification' }

  - id: AC-002-2
    title: Version badge displays current framework version
    narrative: |
      Given I am evaluating RootSpec for my project
      When I view the hero section
      Then I should see the current framework version prominently displayed
    given:
      - visit: '/'
    when:
      - waitFor: { selector: '[data-test=version-badge]' }
    then:
      - shouldExist: { selector: '[data-test=version-badge]' }
      - shouldContain: { selector: '[data-test=version-badge]', text: 'v' }
      - shouldMatch: { selector: '[data-test=version-badge]', pattern: 'v\d+\.\d+\.\d+' }

# =============================================================================
# USER STORY: Problem Recognition
