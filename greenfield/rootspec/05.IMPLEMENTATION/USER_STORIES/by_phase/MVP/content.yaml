# =============================================================================
# USER STORY: Site Attribution
# =============================================================================

id: US-006
title: View site builder attribution
requirement_id: R-006

acceptance_criteria:
  - id: AC-006-1
    title: Footer contains builder attribution
    narrative: |
      Given I want to know who built this demonstration site
      When I scroll to the footer
      Then I should see attribution with builder name and build date
    given:
      - visit: '/'
      - scrollTo: { selector: '[data-test=footer]' }
    when:
      - waitFor: { selector: '[data-test=footer]' }
    then:
      - shouldExist: { selector: '[data-test=builder-attribution]' }
      - shouldContain: { selector: '[data-test=builder-attribution]', text: '2026' }
      - shouldMatch: { selector: '[data-test=builder-attribution]', pattern: 'built.*by' }