# =============================================================================
# USER STORY: Read the how-it-works section
# =============================================================================

id: US-004
title: Understand the four RootSpec skills

acceptance_criteria:
  - id: AC-004-1
    title: How It Works section lists all four skills
    narrative: |
      Given I visit the site
      When I scroll to the how-it-works section
      Then I see all four skills listed
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=how-it-works-section]' }
      - shouldContain: { selector: '[data-test=how-it-works-section]', text: 'rs-init' }
      - shouldContain: { selector: '[data-test=how-it-works-section]', text: 'rs-spec' }
      - shouldContain: { selector: '[data-test=how-it-works-section]', text: 'rs-impl' }
      - shouldContain: { selector: '[data-test=how-it-works-section]', text: 'rs-validate' }

