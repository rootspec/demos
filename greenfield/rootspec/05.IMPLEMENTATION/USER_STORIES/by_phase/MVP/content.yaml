# =============================================================================
# USER STORY: Access GitHub repository and spec files
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FIRST_VISIT
# @systems: [CONTENT_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-07T23:11:36Z

id: US-201
title: Access GitHub repository and spec files
requirement_id: R-201

acceptance_criteria:
  - id: AC-201-1
    title: Meta-banner links to spec and seed files
    narrative: |
      Given I want to see how this site was specified
      When I click links in the meta-banner
      Then I should navigate to the GitHub repository files
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=meta-link-spec]' }
    then:
      - shouldNavigateToUrl: { pattern: 'github.com/.*rootspec.*' }

  - id: AC-201-2
    title: Footer contains GitHub repository link
    narrative: |
      Given I want to explore RootSpec further
      When I scroll to the footer
      Then I should see a link to the GitHub repository
    given:
      - visit: '/'
    when:
      - scrollTo: { selector: '[data-test=footer]' }
    then:
      - shouldExist: { selector: '[data-test=github-link]' }
      - shouldHaveAttribute: { selector: '[data-test=github-link]', attribute: 'href', pattern: 'github.com' }

  - id: AC-201-3
    title: Getting started section provides next steps
    narrative: |
      Given I understand RootSpec and want to try it
      When I look for next steps
      Then I should see clear getting started instructions
    given:
      - visit: '/'
    when:
      - scrollTo: { selector: '[data-test=getting-started]' }
    then:
      - shouldExist: { selector: '[data-test=getting-started]' }
      - shouldContain: { selector: '[data-test=getting-started]', text: 'rs-init' }
      - shouldContain: { selector: '[data-test=getting-started]', text: 'rs-spec' }

