id: US-104
title: Understand the four RootSpec skills

acceptance_criteria:
  - id: AC-104-1
    title: How It Works section displays all four skills
    narrative: |
      Given I visit the site
      When I view the How It Works section
      Then I see descriptions for all four skills (init, spec, impl, validate)
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=how-it-works-section]' }
      - shouldExist: { selector: '[data-test=skill-init]' }
      - shouldExist: { selector: '[data-test=skill-spec]' }
      - shouldExist: { selector: '[data-test=skill-impl]' }
      - shouldExist: { selector: '[data-test=skill-validate]' }

