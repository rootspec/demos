id: US-201
title: See meta-banner explaining the demo nature of the site

acceptance_criteria:
  - id: AC-201-1
    title: Meta-banner is visible on page load
    narrative: |
      Given I am a first-time visitor
      When I visit the site
      Then I see a banner explaining this site was built using the RootSpec pipeline
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-201-2
    title: Meta-banner contains link to view the spec
    narrative: |
      Given I am viewing the meta-banner
      When I look at its contents
      Then I see a link to view the spec files
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner-spec-link]' }

  - id: AC-201-3
    title: Meta-banner contains link to view the seed
    narrative: |
      Given I am viewing the meta-banner
      When I look at its contents
      Then I see a link to view the seed file
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner-seed-link]' }

