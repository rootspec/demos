---

id: US-101
title: Read what RootSpec is on arrival

acceptance_criteria:
  - id: AC-101-1
    title: Hero section renders with tagline and explanation
    narrative: |
      Given I visit the site homepage
      When the page loads
      Then I see a headline and a one-sentence explanation of RootSpec
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hero-heading]' }
      - shouldExist: { selector: '[data-test=hero-subheading]' }

  - id: AC-101-2
    title: Meta banner is visible with links to spec artifacts
    narrative: |
      Given I visit the site homepage
      When the page loads
      Then I see the meta banner explaining this is a RootSpec demo
      And I see links to the SEED.md and spec files on GitHub
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }
      - shouldExist: { selector: '[data-test=meta-banner-seed-link]' }
      - shouldExist: { selector: '[data-test=meta-banner-spec-link]' }

