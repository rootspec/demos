id: US-401
title: View the page without horizontal scrolling on mobile

acceptance_criteria:
  - id: AC-401-1
    title: Page content fits within mobile viewport
    narrative: |
      Given I visit the site on a mobile-sized viewport
      When I view any section
      Then no horizontal scrollbar appears and all content is readable
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=page-root]' }

---

id: US-402
title: Navigate interactive components using keyboard only

acceptance_criteria:
  - id: AC-402-1
    title: Theme toggle is keyboard accessible
    narrative: |
      Given I am navigating the page with keyboard only
      When I tab to the theme toggle
      Then I can activate it using the Enter or Space key
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-402-2
    title: Spec wizard is keyboard accessible
    narrative: |
      Given I am navigating the spec wizard with keyboard
      When I reach a text input
      Then I can fill it in and proceed to the next step
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=wizard-mission-input]', value: 'Test product' }
    then:
      - shouldExist: { selector: '[data-test=wizard-next-btn]' }
