id: US-008
title: User can navigate the full page and reach the CTA

acceptance_criteria:
  - id: AC-008-1
    title: All major sections are present on the page
    narrative: |
      Given I visit the site
      When I scroll through the full page
      Then I see the hero, problem, how-it-works, hierarchy, wizard, comparison, and CTA sections
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hero]' }
      - shouldExist: { selector: '[data-test=problem-section]' }
      - shouldExist: { selector: '[data-test=how-it-works]' }
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }
      - shouldExist: { selector: '[data-test=spec-wizard]' }
      - shouldExist: { selector: '[data-test=comparison-section]' }
      - shouldExist: { selector: '[data-test=cta-section]' }

  - id: AC-008-2
    title: CTA section links to the GitHub repository
    narrative: |
      Given I scroll to the CTA section
      When I view the primary link
      Then it points to the RootSpec GitHub repository
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=cta-section] [data-test=github-link]' }

  - id: AC-008-3
    title: Footer shows attribution
    narrative: |
      Given I scroll to the bottom of the page
      When I read the footer
      Then I see the builder attribution and build date
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=footer]' }
      - shouldExist: { selector: '[data-test=footer-attribution]' }
