# =============================================================================
# USER STORY: Use site on mobile
# =============================================================================

id: US-030
title: Access all content and interactive features on a mobile device

acceptance_criteria:
  - id: AC-030-1
    title: Page renders all sections on mobile viewport
    narrative: |
      Given I visit the page on a mobile device
      When the page loads
      Then I can see all major sections without horizontal scrolling
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hero-tagline]' }
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-030-2
    title: Hierarchy explorer is usable on mobile
    narrative: |
      Given I am on mobile and scroll to the hierarchy explorer
      When I tap a hierarchy level
      Then it expands with its content visible
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1-content]' }

---

# =============================================================================
# USER STORY: Keyboard navigation of interactive elements
# =============================================================================

id: US-031
title: Navigate all interactive elements without a mouse

acceptance_criteria:
  - id: AC-031-1
    title: Theme toggle is keyboard accessible
    narrative: |
      Given I am using keyboard navigation
      When I tab to the theme toggle and press Enter
      Then the theme changes
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-031-2
    title: Hierarchy explorer levels have visible focus states
    narrative: |
      Given I am using keyboard navigation
      When I tab to a hierarchy level
      Then I see a visible focus indicator
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1]' }
