# =============================================================================
# USER STORY: Keyboard Accessibility
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: ACCESSIBILITY
# @systems: [INTERACTIVE_SYSTEM, LAYOUT_SYSTEM, THEME_SYSTEM]
# @last_updated: 2026-04-23T00:00:00Z

id: US-302
title: Visitor navigates interactive elements by keyboard

acceptance_criteria:
  - id: AC-302-1
    title: Theme toggle is keyboard accessible
    narrative: |
      Given I visit the site
      When I look at the theme toggle
      Then it is a focusable element operable by keyboard
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]:not([disabled])' }

  - id: AC-302-2
    title: Wizard next button is keyboard accessible
    narrative: |
      Given I am viewing the spec wizard
      When I look at the next button
      Then it is a focusable button element
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=wizard-next]' }

---
# =============================================================================
# USER STORY: Theme Persistence
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: RETURN_VISIT
# @systems: [THEME_SYSTEM]
# @last_updated: 2026-04-23T00:00:00Z

id: US-303
title: Theme preference persists across page reloads

acceptance_criteria:
  - id: AC-303-1
    title: Dark mode preference is remembered after page reload
    narrative: |
      Given I have switched to dark mode by clicking the theme toggle
      When I reload the page
      Then the page loads in dark mode
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
      - visit: '/'
    then:
      - shouldExist: { selector: 'html[data-theme="dark"], html.dark' }
