---

id: US-401
title: Site renders correctly on mobile viewport

acceptance_criteria:
  - id: AC-401-1
    title: Page is usable on a narrow viewport
    narrative: |
      Given I visit the site on a mobile device
      When the page loads
      Then all major sections should be visible without horizontal scrolling
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }
      - shouldExist: { selector: '[data-test=hero-section]' }
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }

---

id: US-402
title: Site is navigable without JavaScript

acceptance_criteria:
  - id: AC-402-1
    title: Core content is visible without JavaScript
    narrative: |
      Given JavaScript is unavailable
      When I visit the site
      Then I should still see the meta-banner, hero, problem, and CTA sections
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }
      - shouldExist: { selector: '[data-test=hero-section]' }
      - shouldExist: { selector: '[data-test=cta-section]' }
