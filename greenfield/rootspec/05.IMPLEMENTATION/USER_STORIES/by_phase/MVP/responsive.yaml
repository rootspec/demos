# =============================================================================
# USER STORY: View site on mobile
# =============================================================================

id: US-011
title: Access the full site content on a mobile device

acceptance_criteria:
  - id: AC-011-1
    title: All key sections are present on narrow viewports
    narrative: |
      Given I visit the site on a narrow viewport
      When the page loads
      Then I see the meta banner, hero, and main sections
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }
      - shouldExist: { selector: '[data-test=hero-tagline]' }
      - shouldExist: { selector: '[data-test=how-it-works-section]' }

---

# =============================================================================
# USER STORY: Use interactive features on mobile
# =============================================================================

id: US-012
title: Interact with the hierarchy explorer on touch devices

acceptance_criteria:
  - id: AC-012-1
    title: Hierarchy explorer tap interaction works
    narrative: |
      Given I see the hierarchy explorer on a narrow viewport
      When I tap on a level
      Then the level expands to show content
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1-content]' }
