# =============================================================================
# USER STORY: Keyboard Navigation - Hierarchy Explorer
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: ACCESSIBILITY
# @systems: [INTERACTIVE_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-12T00:00:00Z

id: US-301
title: Keyboard user can navigate the hierarchy explorer without a mouse
requirement_id: R-301

acceptance_criteria:
  - id: AC-301-1
    title: Hierarchy level items are focusable via keyboard
    narrative: |
      Given I visit the homepage
      When I tab to the hierarchy explorer
      Then the level items should be keyboard focusable
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1][tabindex]' }

---
# =============================================================================
# USER STORY: No External Network Requests
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: PERFORMANCE
# @systems: [FRAMEWORK_INTEGRATION, INTERACTIVE_SYSTEM]
# @last_updated: 2026-04-12T00:00:00Z

id: US-302
title: The page functions fully without external network requests after load
requirement_id: R-302

acceptance_criteria:
  - id: AC-302-1
    title: Page renders key content without any dynamic data fetching
    narrative: |
      Given I visit the homepage
      When the page loads completely
      Then all interactive sections should be present without requiring API calls
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }
      - shouldExist: { selector: '[data-test=spec-wizard]' }
      - shouldExist: { selector: '[data-test=before-after-section]' }
