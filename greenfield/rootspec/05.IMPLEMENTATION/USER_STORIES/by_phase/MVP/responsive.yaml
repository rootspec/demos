id: US-301
title: Visitor on mobile can read all content without horizontal scrolling

acceptance_criteria:
  - id: AC-301-1
    title: Page loads without horizontal overflow on mobile viewport
    narrative: |
      Given I visit the home page on a mobile viewport
      When the page loads
      Then the main content areas should be visible without horizontal scrolling
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hero-section]' }
      - shouldExist: { selector: '[data-test=meta-banner]' }

