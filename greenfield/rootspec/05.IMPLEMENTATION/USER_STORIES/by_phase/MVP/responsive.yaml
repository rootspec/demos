id: US-302
title: Visitor can navigate the hierarchy explorer with keyboard

acceptance_criteria:
  - id: AC-302-1
    title: Hierarchy Explorer levels are keyboard focusable
    narrative: |
      Given I visit the home page
      When I tab to the hierarchy explorer
      Then the level items should be focusable and activatable
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level][tabindex]' }
