---

id: US-401
title: Navigate the site on a mobile viewport

acceptance_criteria:
  - id: AC-401-1
    title: Meta banner is visible on mobile without horizontal scrolling
    narrative: |
      Given I am viewing the site on a narrow viewport
      When I look at the meta banner
      Then it should display without causing horizontal overflow
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-401-2
    title: Wizard is usable on mobile
    narrative: |
      Given I am on a narrow viewport
      When I interact with the Spec Your Idea wizard
      Then I should be able to complete each step with touch inputs
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=wizard-idea-input]', value: 'A meal planning tool' }
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-step-1]' }
