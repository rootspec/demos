---

id: US-401
title: Use the site on a mobile device

acceptance_criteria:
  - id: AC-401-1
    title: Page renders correctly at mobile viewport width
    narrative: |
      Given I visit the site on a mobile device
      When the page loads at a narrow viewport
      Then the content is readable and not clipped or overflowing
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hero-heading]' }
      - shouldExist: { selector: '[data-test=meta-banner]' }
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }

  - id: AC-401-2
    title: Spec Wizard is usable on mobile
    narrative: |
      Given I am on a mobile device
      When I interact with the Spec Wizard
      Then I can advance through steps and see the output
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=wizard-idea-input]', value: 'A habit tracker for developers' }
      - click: { selector: '[data-test=wizard-mission-option]:first-child' }
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-step-2]' }
