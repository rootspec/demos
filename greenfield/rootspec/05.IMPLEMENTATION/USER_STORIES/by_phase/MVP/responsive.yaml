id: US-401
title: Visitor on a mobile device sees a usable layout

acceptance_criteria:
  - id: AC-401-1
    title: Page renders without horizontal scrolling on mobile viewport
    narrative: |
      Given I am viewing the site on a mobile device
      When the page loads
      Then no horizontal scrollbar is present and all content fits within the viewport
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }
      - shouldExist: { selector: '[data-test=hero]' }

  - id: AC-401-2
    title: Hierarchy explorer is usable on mobile
    narrative: |
      Given I am viewing the site on a mobile device
      When I tap a hierarchy level
      Then the level expands to show its content
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1][aria-expanded="true"]' }

  - id: AC-401-3
    title: Spec wizard is usable on mobile
    narrative: |
      Given I am viewing the site on a mobile device
      When I navigate to the wizard section
      Then I can interact with the wizard inputs
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-wizard]' }
      - shouldExist: { selector: '[data-test=wizard-idea-input]' }
