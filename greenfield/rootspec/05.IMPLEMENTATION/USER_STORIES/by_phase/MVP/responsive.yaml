id: US-007
title: Core page sections are readable and usable on mobile viewports

acceptance_criteria:
  - id: AC-007-1
    title: Meta banner is visible on mobile without horizontal scrolling
    narrative: |
      Given I visit the site on a mobile viewport
      When the page loads
      Then the meta banner should be fully visible without horizontal scrolling
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-007-2
    title: Hero section is present and readable on mobile
    narrative: |
      Given I visit the site on a mobile viewport
      When I view the hero section
      Then the tagline and version badge should be visible
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hero]' }
      - shouldExist: { selector: '[data-test=version-badge]' }
