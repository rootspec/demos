# =============================================================================
# USER STORY: Keyboard Accessibility
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: ACCESSIBILITY
# @systems: [LAYOUT_SYSTEM, INTERACTIVE_SYSTEM, THEME_SYSTEM]
# @last_updated: 2026-04-08T00:59:00Z

id: US-402
title: Complete keyboard navigation support
requirement_id: R-402

acceptance_criteria:
  - id: AC-402-1
    title: Tab order follows logical content flow
    narrative: |
      Given I am using keyboard-only navigation
      When I tab through the page elements
      Then I should move through content in a logical order
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hero-section]' }
    then:
      - shouldExist: { selector: '[data-test=hero-section]:focus-within' }

  - id: AC-402-2
    title: All interactive elements keyboard accessible
    narrative: |
      Given I am using keyboard navigation
      When I encounter interactive elements
      Then I should be able to activate them with keyboard
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-explorer]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]:focus-within' }

  - id: AC-402-3
    title: Skip links available for screen readers
    narrative: |
      Given I am using assistive technology
      When I navigate the page
      Then I should have skip links to main content areas
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: 'main' }

