id: US-301
title: Page is usable at mobile viewport width

acceptance_criteria:
  - id: AC-301-1
    title: Meta banner is visible at mobile width
    narrative: |
      Given I visit the site on a mobile-sized viewport
      When the page loads
      Then I see the meta banner without horizontal overflow
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-301-2
    title: Hero section is readable at mobile width
    narrative: |
      Given I visit the site on a mobile-sized viewport
      When the page loads
      Then I see the hero section content without overflow
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hero-section]' }
