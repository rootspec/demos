# =============================================================================
# USER STORY: Page Navigation
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FIRST_VISIT
# @systems: [LAYOUT_SYSTEM, CONTENT_SYSTEM]
# @last_updated: 2026-04-23T00:00:00Z

id: US-301
title: Visitor navigates the page and reaches the footer

acceptance_criteria:
  - id: AC-301-1
    title: Footer is present with attribution
    narrative: |
      Given I visit the site
      When I scroll to the bottom of the page
      Then I see a footer with attribution to the site builder
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=footer]' }
      - shouldContain: { selector: '[data-test=footer]', text: 'Claude' }

