---
id: US-401
title: Use the site comfortably on a mobile device

acceptance_criteria:
  - id: AC-401-1
    title: Page is readable on mobile viewport
    narrative: |
      Given I visit the site on a mobile-sized viewport
      When the page loads
      Then content is readable without horizontal scrolling
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hero]' }
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-401-2
    title: Hierarchy Explorer shows accordion on mobile
    narrative: |
      Given I visit the site on a mobile-sized viewport
      When I scroll to the hierarchy explorer
      Then I see an accordion-style layout rather than a diagram
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }

  - id: AC-401-3
    title: Spec Wizard is usable on mobile
    narrative: |
      Given I visit the site on a mobile-sized viewport
      When I scroll to the spec wizard
      Then I can interact with each step using touch-sized targets
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-wizard]' }
