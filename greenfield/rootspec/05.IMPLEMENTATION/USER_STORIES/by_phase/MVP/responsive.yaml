id: US-204
title: View the methodology diagram on mobile without overflow

acceptance_criteria:
  - id: AC-204-1
    title: Diagram is present and contained on mobile
    narrative: |
      Given I visit the site on a mobile viewport
      When I scroll to the methodology diagram
      Then I see the diagram without horizontal overflow
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=methodology-diagram]' }
