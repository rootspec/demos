---
id: US-401
title: Use the site on a mobile device without layout breakage

acceptance_criteria:
  - id: AC-401-1
    title: Hero section visible on mobile viewport
    narrative: |
      Given I am viewing the site on a mobile viewport
      When the hero section loads
      Then it is visible without horizontal scrolling
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hero-section]' }

  - id: AC-401-2
    title: Spec wizard is usable on mobile viewport
    narrative: |
      Given I am on a mobile viewport
      When I interact with the spec wizard
      Then the wizard step input is accessible
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-wizard]' }

---
id: US-402
title: Navigate interactive components via keyboard

acceptance_criteria:
  - id: AC-402-1
    title: Hierarchy explorer levels are keyboard accessible
    narrative: |
      Given I am using keyboard navigation
      When I focus the hierarchy explorer
      Then the level items are focusable
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1][tabindex]' }

  - id: AC-402-2
    title: Theme toggle is keyboard accessible
    narrative: |
      Given I am using keyboard navigation
      When I look at the theme toggle
      Then it is a focusable button element
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }
