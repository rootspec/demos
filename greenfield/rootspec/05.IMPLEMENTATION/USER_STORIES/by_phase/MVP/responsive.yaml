id: US-401
title: All interactive elements are keyboard accessible

acceptance_criteria:
  - id: AC-401-1
    title: Theme toggle is keyboard accessible
    narrative: |
      Given I visit the site
      When I navigate to the theme toggle using the keyboard
      Then I can activate it with Enter or Space
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle][tabindex], [data-test=theme-toggle]:not([tabindex="-1"])' }

  - id: AC-401-2
    title: Hierarchy Explorer levels are keyboard accessible
    narrative: |
      Given I visit the hierarchy explorer
      When I focus a level using keyboard navigation
      Then the level has a visible focus indicator and can be expanded with Enter or Space
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1][tabindex], button[data-test=hierarchy-level-1]' }
