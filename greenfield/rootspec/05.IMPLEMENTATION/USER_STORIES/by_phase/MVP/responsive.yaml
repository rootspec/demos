id: US-401
title: Site renders correctly and is usable on mobile devices
requirement_id: R-401

acceptance_criteria:
  - id: AC-401-1
    title: Page renders without horizontal scroll on mobile
    narrative: |
      Given I am viewing the site on a mobile device
      When the page loads
      Then I should see the page without horizontal overflow
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hero-section]' }
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-401-2
    title: Hierarchy Explorer is usable on mobile
    narrative: |
      Given I am viewing the hierarchy explorer on mobile
      When I tap a level node
      Then I should see the level content expand
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=hierarchy-level]:first-child' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-content]' }
