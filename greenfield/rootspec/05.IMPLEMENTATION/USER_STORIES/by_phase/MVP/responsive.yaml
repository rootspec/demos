# =============================================================================
# USER STORY: Mobile-Responsive Layout
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: ACCESSIBILITY
# @systems: [LAYOUT_SYSTEM, THEME_SYSTEM, CONTENT_SYSTEM]
# @last_updated: 2026-04-08T00:59:00Z

id: US-401
title: Site adapts to mobile viewport sizes
requirement_id: R-401

acceptance_criteria:
  - id: AC-401-1
    title: Content readable on mobile screens
    narrative: |
      Given I am viewing the site on a mobile device
      When I read the content
      Then I should see properly sized text and layouts
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hero-section]' }
      - shouldContain: { selector: '[data-test=hero-description]', text: 'specification' }

  - id: AC-401-2
    title: Interactive elements are touch-friendly
    narrative: |
      Given I am using touch interaction
      When I tap interactive elements
      Then I should have appropriately sized touch targets
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-401-3
    title: Navigation works on small screens
    narrative: |
      Given I am viewing the site on mobile
      When I navigate through sections
      Then I should be able to access all functionality
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=spec-wizard-start]' }
    then:
      - shouldExist: { selector: '[data-test=product-idea-input]' }

