id: US-401
title: Visitor on mobile can access all core content

acceptance_criteria:
  - id: AC-401-1
    title: Core sections are accessible on narrow viewport
    narrative: |
      Given I visit the RootSpec marketing site on a mobile-width viewport
      When the page loads
      Then I can see the meta banner, hero, and navigation sections
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }
      - shouldExist: { selector: '[data-test=hero]' }

---

id: US-402
title: Visitor on mobile can use the wizard with touch-friendly controls

acceptance_criteria:
  - id: AC-402-1
    title: Wizard is functional on mobile viewport
    narrative: |
      Given I visit the RootSpec marketing site on a mobile viewport
      When I interact with the wizard
      Then the wizard controls are accessible and usable
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-wizard]' }
      - shouldExist: { selector: '[data-test=wizard-idea-input]' }

---

id: US-403
title: Visitor can navigate the site using keyboard only

acceptance_criteria:
  - id: AC-403-1
    title: Theme toggle is keyboard accessible
    narrative: |
      Given I visit the RootSpec marketing site
      When I navigate to the theme toggle using Tab
      Then I can activate it with Enter or Space
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-403-2
    title: Hierarchy explorer levels are keyboard accessible
    narrative: |
      Given I visit the RootSpec marketing site
      When I navigate to the hierarchy explorer using Tab
      Then I can expand levels using Enter or Space
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer-level]' }
