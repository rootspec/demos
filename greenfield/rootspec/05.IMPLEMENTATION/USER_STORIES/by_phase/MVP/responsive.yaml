id: US-401
title: Visitor on mobile can access all content and interactive features

acceptance_criteria:
  - id: AC-401-1
    title: Page layout is usable on mobile viewport
    narrative: |
      Given I visit the site on a mobile device
      When the page loads
      Then the content is readable and the meta banner is visible
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }
      - shouldExist: { selector: '[data-test=hero]' }

  - id: AC-401-2
    title: Hierarchy Explorer is usable on mobile
    narrative: |
      Given I visit the site on a mobile device
      When I tap on a hierarchy level
      Then the level expands to show content
    given:
      - visit: '/'
      - click: { selector: '[data-test=hierarchy-level-1]' }
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1-content]' }

  - id: AC-401-3
    title: Spec Wizard is usable on mobile
    narrative: |
      Given I visit the site on a mobile device
      When I interact with the spec wizard
      Then I can enter text and navigate between steps
    given:
      - visit: '/'
      - fill: { selector: '[data-test=product-idea-input]', value: 'My product idea' }
      - click: { selector: '[data-test=wizard-next]' }
    when: []
    then:
      - shouldExist: { selector: '[data-test=wizard-step-2]' }
