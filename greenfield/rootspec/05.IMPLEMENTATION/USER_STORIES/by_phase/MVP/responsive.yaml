# =============================================================================
# USER STORY: No Horizontal Scroll on Mobile
# =============================================================================

id: US-201
title: Browse the site on mobile without horizontal scrolling

acceptance_criteria:
  - id: AC-201-1
    title: Page does not overflow horizontally at mobile width
    narrative: |
      Given I visit the site on a mobile viewport
      When the page loads
      Then I do not see any horizontal scrollbar or overflow
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: 'body' }

---

# =============================================================================
# USER STORY: Mobile Navigation
# =============================================================================

id: US-202
title: Access navigation on mobile

acceptance_criteria:
  - id: AC-202-1
    title: Mobile navigation control is present
    narrative: |
      Given I visit the site on a mobile viewport
      When the page loads
      Then I see a navigation control (hamburger or compact nav)
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=nav]' }

---

# =============================================================================
# USER STORY: Hierarchy Explorer Mobile Usability
# =============================================================================

id: US-203
title: Use the hierarchy explorer on mobile

acceptance_criteria:
  - id: AC-203-1
    title: Hierarchy explorer is usable on mobile
    narrative: |
      Given I visit the site on a mobile viewport
      When I tap a level in the hierarchy explorer
      Then the level expands and shows content
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=level-1-trigger]' }
    then:
      - shouldExist: { selector: '[data-test=level-1-content]' }

