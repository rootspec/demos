# =============================================================================
# USER STORY: Navigate Site on Mobile Device
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FIRST_VISIT
# @systems: [LAYOUT_SYSTEM, INTERACTIVE_SYSTEM, THEME_SYSTEM]
# @last_updated: 2026-04-06T19:06:23Z

id: US-008
title: Use all interactive features on mobile device
narrative: |
  As a developer browsing on mobile
  I want all interactive features to work with touch input
  So that I can fully explore RootSpec regardless of device

acceptance_criteria:
  - id: AC-008-1
    title: Theme toggle works on mobile
    given:
      - setViewport: { width: 375, height: 667 }
      - visit: '/'
    when:
      - tap: { selector: '[data-test="theme-toggle"]' }
    then:
      - shouldHaveClass: { selector: 'html', className: 'dark' }

  - id: AC-008-2
    title: Hierarchy explorer is touch-friendly
    given:
      - setViewport: { width: 375, height: 667 }
      - visit: '/'
      - scrollTo: { selector: '[data-test="hierarchy-explorer"]' }
    when:
      - tap: { selector: '[data-test="level-2"]' }
    then:
      - shouldBeVisible: { selector: '[data-test="level-2-content"]' }

  - id: AC-008-3
    title: Spec wizard works with touch input
    given:
      - setViewport: { width: 375, height: 667 }
      - visit: '/'
      - scrollTo: { selector: '[data-test="spec-wizard"]' }
    when:
      - tap: { selector: '[data-test="product-idea-input"]' }
      - type: { selector: '[data-test="product-idea-input"]', text: 'Mobile app' }
      - tap: { selector: '[data-test="wizard-next"]' }
    then:
      - shouldBeVisible: { selector: '[data-test="mission-step"]' }

  - id: AC-008-4
    title: Comparison slider supports touch gestures
    given:
      - setViewport: { width: 375, height: 667 }
      - visit: '/'
      - scrollTo: { selector: '[data-test="before-after-comparison"]' }
    when:
      - swipe: { selector: '[data-test="comparison-slider"]', direction: 'right' }
    then:
      - shouldBeVisible: { selector: '[data-test="with-spec-content"]' }