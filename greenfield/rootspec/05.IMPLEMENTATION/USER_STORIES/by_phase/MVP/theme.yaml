id: US-006
title: Visitor can toggle between light and dark mode

acceptance_criteria:
  - id: AC-006-1
    title: Theme toggle control is present in the header
    narrative: |
      Given I visit the site
      When I view the header
      Then I should see a theme toggle control
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-006-2
    title: Clicking the theme toggle changes the active theme
    narrative: |
      Given I visit the site in light mode
      When I click the theme toggle
      Then the page should switch to dark mode
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: 'html[data-theme="dark"], html.dark' }
