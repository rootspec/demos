---

id: US-101
title: Page loads in correct theme based on system preference

acceptance_criteria:
  - id: AC-101-1
    title: Dark mode applied when system prefers dark
    narrative: |
      Given my system is set to dark mode
      When I visit the site
      Then the page should have the dark theme applied
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-theme="dark"], html.dark, body.dark' }

  - id: AC-101-2
    title: Theme toggle is visible in the header
    narrative: |
      Given I visit the site
      When the page loads
      Then I should see a theme toggle control in the header
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

---

id: US-102
title: Toggle switches between dark and light theme

acceptance_criteria:
  - id: AC-102-1
    title: Clicking theme toggle changes the theme
    narrative: |
      Given I am viewing the site
      When I click the theme toggle
      Then the page theme should change
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: 'html.light, html[data-theme="light"], body.light' }
