# =============================================================================
# USER STORY: Dark/Light Theme Toggle
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: ACCESSIBILITY
# @systems: [THEME_SYSTEM, INTERACTIVE_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-08T00:59:00Z

id: US-301
title: Switch between dark and light themes
requirement_id: R-301

acceptance_criteria:
  - id: AC-301-1
    title: Theme toggle changes visual appearance
    narrative: |
      Given I am viewing the site in light theme
      When I click the theme toggle
      Then I should see the site switch to dark theme
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-301-2
    title: System preference detected on first visit
    narrative: |
      Given I have not previously set a theme preference
      When I visit the site for the first time
      Then I should see the theme that matches my system preference
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: 'body' }

  - id: AC-301-3
    title: Theme preference persists across sessions
    narrative: |
      Given I have manually selected a theme
      When I refresh the page or return later
      Then I should see my preferred theme maintained
    given:
      - visit: '/'
      - click: { selector: '[data-test=theme-toggle]' }
    when:
      - visit: '/'
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-301-4
    title: Smooth transition between themes
    narrative: |
      Given I am switching between themes
      When the theme change occurs
      Then I should see a smooth visual transition without flashing
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

