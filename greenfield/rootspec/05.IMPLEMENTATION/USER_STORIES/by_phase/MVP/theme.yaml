---
id: US-301
title: Toggle between dark and light themes

acceptance_criteria:
  - id: AC-301-1
    title: Theme toggle button is present
    narrative: |
      Given I visit the site
      When the page loads
      Then I see a theme toggle button
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-301-2
    title: Clicking the theme toggle changes the active theme
    narrative: |
      Given I can see the theme toggle
      When I click the theme toggle
      Then the page theme changes
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }
