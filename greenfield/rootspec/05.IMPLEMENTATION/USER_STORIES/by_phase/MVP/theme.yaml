id: US-201
title: Site defaults to light mode without system preference

acceptance_criteria:
  - id: AC-201-1
    title: Page renders in light mode when no preference is set
    narrative: |
      Given I visit the site with no stored theme preference
      When the page loads
      Then the page is rendered in light mode
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: 'html[data-theme=light], body[data-theme=light], :root[data-theme=light], [data-theme=light]' }
