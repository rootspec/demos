id: US-201
title: Visitor can toggle between dark and light themes

acceptance_criteria:
  - id: AC-201-1
    title: Theme toggle is present and visible
    narrative: |
      Given I visit the RootSpec marketing site
      When the page loads
      Then I see a theme toggle control
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-201-2
    title: Clicking theme toggle switches the theme
    narrative: |
      Given I visit the RootSpec marketing site
      When I click the theme toggle
      Then the page theme changes (dark to light or light to dark)
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-theme]' }

---

id: US-202
title: Visitor theme preference persists across page refresh

acceptance_criteria:
  - id: AC-202-1
    title: Theme preference is stored and restored on reload
    narrative: |
      Given I visit the RootSpec marketing site and toggle the theme
      When I reload the page
      Then the theme I selected is still active
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
      - visit: '/'
    then:
      - shouldExist: { selector: '[data-theme]' }
