# =============================================================================
# USER STORY: Theme Toggle - System Preference Default
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: THEME
# @systems: [THEME_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-12T00:00:00Z

id: US-101
title: Visitor sees the correct theme on first visit based on system preference
requirement_id: R-101

acceptance_criteria:
  - id: AC-101-1
    title: Theme toggle control is visible in the header
    narrative: |
      Given I visit the homepage
      When the page loads
      Then I should see the theme toggle control in the header
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

---
# =============================================================================
# USER STORY: Theme Toggle - Manual Override
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: THEME
# @systems: [THEME_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-12T00:00:00Z

id: US-102
title: Visitor can toggle between dark and light themes
requirement_id: R-102

acceptance_criteria:
  - id: AC-102-1
    title: Clicking the theme toggle changes the active theme attribute
    narrative: |
      Given I visit the homepage
      When I click the theme toggle
      Then the page should reflect a changed theme state
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-theme]' }
