id: US-301
title: Visitor toggles between light and dark mode

acceptance_criteria:
  - id: AC-301-1
    title: Page loads in light mode by default
    narrative: |
      Given I have no stored theme preference
      When the page loads
      Then the page is in light mode
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: 'html[data-theme="light"], body[data-theme="light"], :root[data-theme="light"]' }

  - id: AC-301-2
    title: Theme toggle button is visible in the header
    narrative: |
      Given I arrive at the site
      When the page loads
      Then I can see a theme toggle button in the header
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-301-3
    title: Clicking the toggle switches to dark mode
    narrative: |
      Given the page is in light mode
      When I click the theme toggle
      Then the page switches to dark mode
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: 'html[data-theme="dark"], body[data-theme="dark"]' }

  - id: AC-301-4
    title: Clicking the toggle again switches back to light mode
    narrative: |
      Given the page is in dark mode
      When I click the theme toggle
      Then the page switches back to light mode
    given:
      - visit: '/demos/greenfield/'
      - click: { selector: '[data-test=theme-toggle]' }
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: 'html[data-theme="light"], body[data-theme="light"]' }
