# =============================================================================
# USER STORY: Light Mode Default
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: READER
# @systems: [THEME_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-25T00:00:00Z

id: US-401
title: Visitor experiences light mode as the default theme

acceptance_criteria:
  - id: AC-401-1
    title: Page loads in light mode by default
    narrative: |
      Given I visit the home page with no prior theme preference
      When the page loads
      Then the page should display in light mode
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-theme=light]' }

---
# =============================================================================
# USER STORY: Dark Mode Toggle
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: READER
# @systems: [THEME_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-25T00:00:00Z

id: US-402
title: Visitor can switch to dark mode using the theme toggle

acceptance_criteria:
  - id: AC-402-1
    title: Clicking the theme toggle switches to dark mode from light mode
    narrative: |
      Given I am viewing the site in light mode
      When I click the theme toggle
      Then the page should switch to dark mode
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-theme=dark]' }

  - id: AC-402-2
    title: Clicking the toggle again returns to light mode
    narrative: |
      Given I have switched to dark mode
      When I click the theme toggle again
      Then the page should return to light mode
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-theme=light]' }
