id: US-301
title: Switch between dark and light themes

acceptance_criteria:
  - id: AC-301-1
    title: Toggle switches theme
    narrative: |
      Given I am viewing the site in light mode
      When I click the theme toggle
      Then the site switches to dark mode
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-theme=dark]' }

  - id: AC-301-2
    title: Theme persists on reload
    narrative: |
      Given I have toggled to dark mode
      When I reload the page
      Then the site should still be in dark mode
    given:
      - visit: '/'
      - click: { selector: '[data-test=theme-toggle]' }
    when:
      - visit: '/'
    then:
      - shouldExist: { selector: '[data-theme=dark]' }
