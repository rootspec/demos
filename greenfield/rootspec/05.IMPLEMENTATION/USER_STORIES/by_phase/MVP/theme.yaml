# =============================================================================
# USER STORY: Toggle dark/light theme
# =============================================================================

id: US-010
title: Toggle between dark and light theme

acceptance_criteria:
  - id: AC-010-1
    title: Theme toggle button is visible in the header
    narrative: |
      Given I visit the site
      When the page loads
      Then I see a theme toggle button in the header
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-010-2
    title: Clicking the theme toggle changes the theme
    narrative: |
      Given I see the theme toggle
      When I click it
      Then the page theme changes
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }
