# =============================================================================
# USER STORY: Theme Toggle
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: LANDING
# @systems: [THEME_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-17T03:47:13Z

id: US-301
title: Visitor can switch between dark and light themes

acceptance_criteria:
  - id: AC-301-1
    title: Theme toggle is visible on the page
    narrative: |
      Given I visit the site
      When the page loads
      Then I see a theme toggle control in the header
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-301-2
    title: Clicking theme toggle switches the visual mode
    narrative: |
      Given I see the site in its default mode
      When I click the theme toggle
      Then the page switches to the alternate theme mode
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

