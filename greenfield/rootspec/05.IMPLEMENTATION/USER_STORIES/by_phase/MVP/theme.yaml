id: US-302
title: Visitor can find the GitHub repository to get started

acceptance_criteria:
  - id: AC-302-1
    title: CTA section is present with GitHub link
    narrative: |
      Given I visit the site
      When I scroll to the CTA section
      Then I see a link to the RootSpec GitHub repository
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=cta-section]' }
      - shouldExist: { selector: '[data-test=cta-section] a[href*="github.com/rootspec"]' }

