---

id: US-301
title: Toggle between dark and light mode

acceptance_criteria:
  - id: AC-301-1
    title: Theme toggle switches the active theme
    narrative: |
      Given I am viewing the site in its default theme
      When I click the theme toggle button
      Then the page should switch to the other theme
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-theme=dark]' }

  - id: AC-301-2
    title: Theme toggle button is visible in the header
    narrative: |
      Given I am viewing any page
      When I look at the header
      Then I should see the theme toggle button
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: 'header [data-test=theme-toggle]' }
