id: US-301
title: User toggles between dark and light theme
requirement_id: R-301

acceptance_criteria:
  - id: AC-301-1
    title: Theme toggle button is present in the header
    narrative: |
      Given I visit the site homepage
      When the page loads
      Then I should see a theme toggle button in the header
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-301-2
    title: Clicking theme toggle changes the theme
    narrative: |
      Given I am viewing the site
      When I click the theme toggle button
      Then the page theme should change
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }
