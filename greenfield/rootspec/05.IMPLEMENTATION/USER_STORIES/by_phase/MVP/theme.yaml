id: US-003
title: User can toggle between light and dark mode

acceptance_criteria:
  - id: AC-003-1
    title: Theme toggle button is present in the header
    narrative: |
      Given I visit the site
      When the page loads
      Then I see a theme toggle button in the header
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-003-2
    title: Clicking the toggle switches from light to dark mode
    narrative: |
      Given the page is in light mode
      When I click the theme toggle
      Then the page switches to dark mode
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: 'html[data-theme="dark"]' }

  - id: AC-003-3
    title: Clicking the toggle again returns to light mode
    narrative: |
      Given the page is in dark mode after one toggle click
      When I click the theme toggle again
      Then the page returns to light mode
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: 'html[data-theme="light"]' }

  - id: AC-003-4
    title: Default theme is light mode
    narrative: |
      Given I visit the site for the first time with no saved preference
      When the page loads
      Then the page is in light mode by default
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: 'html[data-theme="light"]' }
