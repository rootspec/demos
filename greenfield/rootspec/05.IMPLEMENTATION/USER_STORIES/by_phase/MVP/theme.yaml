---

id: US-201
title: Toggle between dark and light themes

acceptance_criteria:
  - id: AC-201-1
    title: Theme toggle button is present in the header
    narrative: |
      Given I visit the site
      When the page loads
      Then I see a theme toggle button in the header
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-201-2
    title: Clicking the theme toggle changes the active theme
    narrative: |
      Given the page is loaded in dark mode
      When I click the theme toggle button
      Then the page switches to light mode
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-theme=light]' }

  - id: AC-201-3
    title: Clicking the theme toggle again reverts to dark mode
    narrative: |
      Given the page is in light mode after a toggle
      When I click the theme toggle button again
      Then the page returns to dark mode
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-theme=dark]' }
