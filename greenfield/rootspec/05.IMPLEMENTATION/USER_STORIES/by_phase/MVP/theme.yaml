# =============================================================================
# USER STORY: Theme Toggle
# =============================================================================
# @spec_version: 7.2.1
# @phase: MVP
# @journey: DISCOVERY
# @systems: [THEME_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-13T17:12:20Z

id: US-201
title: Visitor can toggle between dark and light themes

acceptance_criteria:
  - id: AC-201-1
    title: Theme toggle button is visible in header
    narrative: |
      Given I visit the site
      When the page loads
      Then I see a theme toggle button in the header
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-201-2
    title: Clicking theme toggle changes the theme
    narrative: |
      Given I visit the site
      When I click the theme toggle button
      Then the page theme switches between dark and light
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: 'html.dark, html.light' }

---
# =============================================================================
# USER STORY: Theme Persistence
# =============================================================================
# @spec_version: 7.2.1
# @phase: MVP
# @journey: DISCOVERY
# @systems: [THEME_SYSTEM]
# @last_updated: 2026-04-13T17:12:20Z

id: US-202
title: Theme preference persists across page reloads

acceptance_criteria:
  - id: AC-202-1
    title: Dark theme persists after page reload
    narrative: |
      Given I have switched to dark theme
      When I reload the page
      Then the page still shows dark theme
    given:
      - visit: '/'
      - click: { selector: '[data-test=theme-toggle]' }
    when:
      - visit: '/'
    then:
      - shouldExist: { selector: 'html.dark' }
