id: US-401
title: Site loads in light mode by default with editorial typography

acceptance_criteria:
  - id: AC-401-1
    title: Page defaults to light mode on first visit
    narrative: |
      Given a visitor has no stored theme preference
      When they visit the site for the first time
      Then the page renders in light mode
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: 'html:not([data-theme="dark"]):not(.dark), html[data-theme="light"], html.light' }

  - id: AC-401-2
    title: Body text is rendered in a serif typeface
    narrative: |
      Given I visit the site
      When the page loads
      Then the body text area uses a serif font family
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=body-content]' }

  - id: AC-401-3
    title: Skill names are rendered in monospace
    narrative: |
      Given I visit the site and view the how it works section
      When I look at the skill names
      Then rs-init and other skill names are in monospace styling
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=how-it-works] code, [data-test=how-it-works] [data-test=skill-name]' }

