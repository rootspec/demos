# =============================================================================
# USER STORY: Theme-Aware Component Styling
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: ACCESSIBILITY
# @systems: [THEME_SYSTEM, CONTENT_SYSTEM, INTERACTIVE_SYSTEM]
# @last_updated: 2026-04-08T00:59:00Z

id: US-302
title: All components respect current theme selection
requirement_id: R-302

acceptance_criteria:
  - id: AC-302-1
    title: Interactive elements styled for current theme
    narrative: |
      Given I am using dark theme
      When I interact with buttons and controls
      Then I should see appropriate contrast and visibility
    given:
      - visit: '/'
      - click: { selector: '[data-test=theme-toggle]' }
    when:
      - click: { selector: '[data-test=spec-wizard-start]' }
    then:
      - shouldExist: { selector: '[data-test=spec-wizard-start]' }

  - id: AC-302-2
    title: Focus indicators visible in both themes
    narrative: |
      Given I am using keyboard navigation
      When I tab through elements in either theme
      Then I should see clear focus indicators
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-explorer]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]:focus-within' }

  - id: AC-302-3
    title: Text remains readable in both themes
    narrative: |
      Given I switch between light and dark themes
      When I read content throughout the site
      Then I should have appropriate contrast ratios
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-test=hero-description]' }
      - shouldContain: { selector: '[data-test=hero-description]', text: 'specification' }