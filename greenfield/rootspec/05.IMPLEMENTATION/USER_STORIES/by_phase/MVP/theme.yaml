id: US-402
title: Visitor sees the RootSpec methodology diagram

acceptance_criteria:
  - id: AC-402-1
    title: Methodology diagram is present on the page
    narrative: |
      Given I visit the site
      When the page loads
      Then I see an SVG diagram depicting the RootSpec methodology
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=methodology-diagram]' }

  - id: AC-402-2
    title: Diagram is an SVG element
    narrative: |
      Given I visit the site
      When the page loads
      Then the methodology diagram is rendered as an SVG
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=methodology-diagram] svg, svg[data-test=methodology-diagram]' }
