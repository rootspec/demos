# =============================================================================
# USER STORY: System preference detected on first load
# =============================================================================

id: US-020
title: See correct theme on first visit without manual configuration

acceptance_criteria:
  - id: AC-020-1
    title: Page renders without flash of incorrect theme
    narrative: |
      Given I have a system dark mode preference
      When I visit the page for the first time
      Then the page loads in dark mode without a visible flash
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: 'html' }

---

# =============================================================================
# USER STORY: Theme persists across navigation
# =============================================================================

id: US-021
title: Have my theme preference remembered when I return

acceptance_criteria:
  - id: AC-021-1
    title: Theme toggle is present and functional
    narrative: |
      Given I visit the page
      When I click the theme toggle
      Then the visual theme changes
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }
