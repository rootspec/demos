---
id: US-301
title: Toggle between dark and light mode

acceptance_criteria:
  - id: AC-301-1
    title: Theme toggle button is present in the header
    narrative: |
      Given I visit the site homepage
      When the page loads
      Then I see a theme toggle button in the header
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-301-2
    title: Clicking theme toggle switches the active theme
    narrative: |
      Given I see the theme toggle button
      When I click it
      Then the page switches to the opposite theme
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-theme]' }
