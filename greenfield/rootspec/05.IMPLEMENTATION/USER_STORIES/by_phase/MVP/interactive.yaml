# USER STORY: Spec Wizard
# =============================================================================
# @spec_version: 7.2.1
# @phase: MVP
# @journey: EXPLORATION
# @systems: [INTERACTIVE_SYSTEM]
# @last_updated: 2026-04-13T17:12:20Z

id: US-302
title: Visitor walks through Spec Wizard and generates a skeleton spec

acceptance_criteria:
  - id: AC-302-1
    title: Spec Wizard renders with first step visible
    narrative: |
      Given I visit the site
      When I scroll to the spec wizard section
      Then I see the wizard at Step 1 with a product idea input
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-wizard]' }
      - shouldExist: { selector: '[data-test=wizard-step-1]' }

  - id: AC-302-2
    title: Visitor can complete all wizard steps and see skeleton output
    narrative: |
      Given I am viewing the spec wizard
      When I enter a product idea and navigate through all three steps
      Then I see a skeleton spec output showing L1-L3 structure
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=wizard-product-input]', value: 'A tool for tracking reading habits' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-output]' }

  - id: AC-302-3
    title: Back button is available on all steps after step 1
    narrative: |
      Given I am on step 2 of the spec wizard
      When I see the navigation controls
      Then I see a back button to return to step 1
    given:
      - visit: '/'
      - click: { selector: '[data-test=wizard-next]' }
    when: []
    then:
      - shouldExist: { selector: '[data-test=wizard-back]' }

