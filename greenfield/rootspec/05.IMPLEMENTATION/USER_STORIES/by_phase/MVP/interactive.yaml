id: US-303
title: Compare requirements with and without RootSpec structure

acceptance_criteria:
  - id: AC-303-1
    title: Before/after comparison renders both panels
    narrative: |
      Given I scroll to the comparison section
      When the component renders
      Then I see the comparison component with a toggle or panels
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=comparison-component]' }

  - id: AC-303-2
    title: Toggling shows the With RootSpec panel
    narrative: |
      Given I am viewing the comparison component in the "Without" state
      When I click the toggle to switch to "With RootSpec"
      Then the With RootSpec panel content is displayed
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=comparison-toggle-with]' }
    then:
      - shouldExist: { selector: '[data-test=comparison-panel-with]' }
