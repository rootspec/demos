id: US-203
title: Toggle between before and after views on mobile

acceptance_criteria:
  - id: AC-203-1
    title: Before/after toggle switches the visible panel
    narrative: |
      Given I am viewing the before/after comparison section
      When I click the toggle to switch to the after view
      Then I should see the with-RootSpec panel
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=comparison-toggle]' }
    then:
      - shouldExist: { selector: '[data-test=after-panel]' }
