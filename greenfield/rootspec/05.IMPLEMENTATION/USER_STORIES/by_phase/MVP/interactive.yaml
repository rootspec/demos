- id: US-101
  title: Explore RootSpec hierarchy interactively
  requirement_id: R-101

  acceptance_criteria:
    - id: AC-101-1
      title: Hierarchy explorer is visible and accessible
      narrative: |
        Given I want to understand RootSpec levels
        When I find the hierarchy explorer section
        Then I should see all five levels available for interaction
      given:
        - visit: '/'
      when:
        - click: { selector: '[data-test=hierarchy-explorer]' }
      then:
        - shouldExist: { selector: '[data-test=level-1]' }
        - shouldExist: { selector: '[data-test=level-2]' }
        - shouldExist: { selector: '[data-test=level-3]' }
        - shouldExist: { selector: '[data-test=level-4]' }
        - shouldExist: { selector: '[data-test=level-5]' }

    - id: AC-101-2
      title: Level selection reveals content and connections
      narrative: |
        Given I am viewing the hierarchy explorer
        When I click on Level 1 Philosophy
        Then I should see level content and reference connections
      given:
        - visit: '/'
        - click: { selector: '[data-test=hierarchy-explorer]' }
      when:
        - click: { selector: '[data-test=level-1]' }
      then:
        - shouldExist: { selector: '[data-test=level-1-content]' }
        - shouldContain: { selector: '[data-test=level-1-content]', text: 'Philosophy' }

    - id: AC-101-3
      title: Reference highlighting shows permitted connections
      narrative: |
        Given I have selected a level in the hierarchy
        When the level content is displayed
        Then I should see which other levels it can reference
      given:
        - visit: '/'
        - click: { selector: '[data-test=hierarchy-explorer]' }
        - click: { selector: '[data-test=level-3]' }
      when: []
      then:
        - shouldExist: { selector: '[data-test=reference-highlight]' }

    - id: AC-101-4
      title: Keyboard navigation works through hierarchy
      narrative: |
        Given I want to navigate the hierarchy with keyboard
        When I use tab and enter keys
        Then I should be able to explore all levels
      given:
        - visit: '/'
        - click: { selector: '[data-test=hierarchy-explorer]' }
      when:
        - click: { selector: '[data-test=level-2]' }
      then:
        - shouldExist: { selector: '[data-test=level-2-content]' }

- id: US-102
  title: Complete Spec Your Idea wizard
  requirement_id: R-102

  acceptance_criteria:
    - id: AC-102-1
      title: Wizard is accessible and starts properly
      narrative: |
        Given I want to experience RootSpec methodology firsthand
        When I find and start the Spec Your Idea wizard
        Then I should see the first step with clear instructions
      given:
        - visit: '/'
      when:
        - click: { selector: '[data-test=spec-wizard]' }
      then:
        - shouldExist: { selector: '[data-test=wizard-step-1]' }
        - shouldContain: { selector: '[data-test=wizard-step-1]', text: "mission" }

    - id: AC-102-2
      title: Mission selection step works
      narrative: |
        Given I am in the Spec Your Idea wizard
        When I enter or select a mission statement
        Then I should be able to proceed to the next step
      given:
        - visit: '/'
        - click: { selector: '[data-test=spec-wizard]' }
      when:
        - click: { selector: '[data-test=mission-template]' }
        - click: { selector: '[data-test=wizard-next]' }
      then:
        - shouldExist: { selector: '[data-test=wizard-step-2]' }
        - shouldContain: { selector: '[data-test=wizard-step-2]', text: 'design pillars' }

    - id: AC-102-3
      title: Design pillars selection works
      narrative: |
        Given I am on step 2 of the wizard
        When I select design pillars from suggestions
        Then I should be able to continue to the interaction step
      given:
        - visit: '/'
        - click: { selector: '[data-test=spec-wizard]' }
        - click: { selector: '[data-test=mission-template]' }
        - click: { selector: '[data-test=wizard-next]' }
      when:
        - click: { selector: '[data-test=pillar-suggestion]' }
        - click: { selector: '[data-test=wizard-next]' }
      then:
        - shouldExist: { selector: '[data-test=wizard-step-3]' }
        - shouldContain: { selector: '[data-test=wizard-step-3]', text: 'interaction' }

    - id: AC-102-4
      title: Wizard completion generates skeleton spec
      narrative: |
        Given I have completed all wizard steps
        When I finish the interaction description
        Then I should see a generated skeleton spec showing my inputs
      given:
        - visit: '/'
        - click: { selector: '[data-test=spec-wizard]' }
        - click: { selector: '[data-test=mission-template]' }
        - click: { selector: '[data-test=wizard-next]' }
        - click: { selector: '[data-test=pillar-suggestion]' }
        - click: { selector: '[data-test=wizard-next]' }
      when:
        - fill: { selector: '[data-test=interaction-input]', value: 'User clicks button to see results' }
        - click: { selector: '[data-test=wizard-complete]' }
      then:
        - shouldExist: { selector: '[data-test=generated-spec]' }
        - shouldContain: { selector: '[data-test=generated-spec]', text: 'L1' }

    - id: AC-102-5
      title: Wizard validation prevents incomplete submission
      narrative: |
        Given I am in the wizard with incomplete information
        When I try to proceed to the next step
        Then I should see validation messages
      given:
        - visit: '/'
        - click: { selector: '[data-test=spec-wizard]' }
      when:
        - click: { selector: '[data-test=wizard-next]' }
      then:
        - shouldExist: { selector: '[data-test=validation-message]' }

- id: US-103
  title: Compare traditional vs RootSpec approaches
  requirement_id: R-103

  acceptance_criteria:
    - id: AC-103-1
      title: Comparison interface is accessible
      narrative: |
        Given I want to see RootSpec benefits
        When I find the before/after comparison section
        Then I should see comparison controls
      given:
        - visit: '/'
      when:
        - click: { selector: '[data-test=comparison-section]' }
      then:
        - shouldExist: { selector: '[data-test=comparison-toggle]' }

    - id: AC-103-2
      title: Toggle between before and after views
      narrative: |
        Given I am viewing the comparison section
        When I toggle between traditional and RootSpec approaches
        Then I should see different content for each approach
      given:
        - visit: '/'
        - click: { selector: '[data-test=comparison-section]' }
      when:
        - click: { selector: '[data-test=comparison-toggle]' }
      then:
        - shouldExist: { selector: '[data-test=rootspec-approach]' }
        - shouldContain: { selector: '[data-test=rootspec-approach]', text: 'structured hierarchy' }

    - id: AC-103-3
      title: Comparison content is substantive, not placeholder
      narrative: |
        Given I am viewing either side of the comparison
        When I read the content
        Then I should see realistic examples, not lorem ipsum
      given:
        - visit: '/'
        - click: { selector: '[data-test=comparison-section]' }
      when: []
      then:
        - shouldExist: { selector: '[data-test=traditional-approach]' }
        - shouldContain: { selector: '[data-test=traditional-approach]', text: 'requirements' }