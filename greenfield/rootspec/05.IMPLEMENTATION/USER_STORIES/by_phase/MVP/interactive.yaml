id: US-204
title: Visitor toggles between light and dark mode

acceptance_criteria:
  - id: AC-204-1
    title: Theme toggle button is present in the header
    narrative: |
      Given I visit the site
      When the page loads
      Then I see a theme toggle button in the header
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-204-2
    title: Clicking theme toggle changes the page theme
    narrative: |
      Given I am viewing the site in light mode
      When I click the theme toggle
      Then the page switches to dark mode
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: 'html[data-theme="dark"], html.dark' }
