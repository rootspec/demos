id: US-302
title: Visitor uses the Spec Your Idea wizard to generate a skeleton spec

acceptance_criteria:
  - id: AC-302-1
    title: Wizard section is present on the page
    narrative: |
      Given I visit the RootSpec marketing site
      When the page loads
      Then I see the Spec Your Idea wizard section
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-wizard]' }

  - id: AC-302-2
    title: Wizard step 1 accepts a product idea
    narrative: |
      Given I am on wizard step 1
      When I type a product idea into the input field
      Then the input accepts my text
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=wizard-idea-input]', value: 'A tool for tracking reading habits' }
    then:
      - shouldExist: { selector: '[data-test=wizard-idea-input]' }

  - id: AC-302-3
    title: Wizard next button is disabled until required input is provided
    narrative: |
      Given I am on wizard step 1 with an empty input
      When I view the next button
      Then the next button is disabled
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=wizard-next][disabled]' }

  - id: AC-302-4
    title: Wizard produces output after completing all steps
    narrative: |
      Given I complete all wizard steps with valid input
      When I finish the wizard
      Then I see a skeleton spec output
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=wizard-idea-input]', value: 'A tool for tracking reading habits' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=wizard-mission-option]:first-child' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=wizard-pillar-option]:nth-child(1)' }
      - click: { selector: '[data-test=wizard-pillar-option]:nth-child(2)' }
      - click: { selector: '[data-test=wizard-pillar-option]:nth-child(3)' }
      - click: { selector: '[data-test=wizard-next]' }
      - fill: { selector: '[data-test=wizard-interaction-input]', value: 'User logs a book they finished reading' }
      - click: { selector: '[data-test=wizard-generate]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-output]' }

