id: US-303
title: View the before/after comparison of specs vs. no specs

acceptance_criteria:
  - id: AC-303-1
    title: Comparison section renders with both panels accessible
    narrative: |
      Given I visit the site
      When I view the Before/After Comparison section
      Then I see a toggle or slider to switch between the two panels
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=comparison-section]' }
      - shouldExist: { selector: '[data-test=comparison-toggle]' }

  - id: AC-303-2
    title: Toggling the comparison shows the RootSpec panel
    narrative: |
      Given the comparison section defaults to the without-spec panel
      When I click the toggle to switch to the with-rootspec panel
      Then I see the RootSpec-structured content
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=comparison-toggle-rootspec]' }
    then:
      - shouldExist: { selector: '[data-test=comparison-panel-rootspec][data-active=true]' }
