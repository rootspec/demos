# =============================================================================
# USER STORY: Spec Wizard - Completion
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: METHODOLOGY_EXPLORATION
# @systems: [INTERACTIVE_SYSTEM]
# @last_updated: 2026-04-24T10:48:33Z

id: US-102
title: Visitor can complete the spec wizard and see output

acceptance_criteria:
  - id: AC-102-1
    title: Spec wizard is present on the page
    narrative: |
      Given I visit the site home page
      When I scroll to the spec wizard section
      Then I see the spec your idea wizard
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-wizard]' }

  - id: AC-102-2
    title: Entering a product idea enables advancing to step 2
    narrative: |
      Given I can see the spec wizard
      When I fill in the product idea field and fill in a mission
      Then I can advance to step 2
    given:
      - visit: '/demos/greenfield/'
    when:
      - fill: { selector: '[data-test=wizard-product-idea]', value: 'A tool for tracking reading habits' }
      - click: { selector: '[data-test=wizard-mission-option-0]' }
      - click: { selector: '[data-test=wizard-next-step]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-step-2]' }

  - id: AC-102-3
    title: Completing all steps produces a spec output
    narrative: |
      Given I have completed all three wizard steps
      When I view the output
      Then I see a skeleton spec with L1 L2 and L3 sections
    given:
      - visit: '/demos/greenfield/'
    when:
      - fill: { selector: '[data-test=wizard-product-idea]', value: 'A tool for tracking reading habits' }
      - click: { selector: '[data-test=wizard-mission-option-0]' }
      - click: { selector: '[data-test=wizard-next-step]' }
      - click: { selector: '[data-test=wizard-pillar-0]' }
      - click: { selector: '[data-test=wizard-pillar-1]' }
      - click: { selector: '[data-test=wizard-pillar-2]' }
      - click: { selector: '[data-test=wizard-next-step]' }
      - fill: { selector: '[data-test=wizard-key-interaction]', value: 'User logs a book they just finished' }
      - click: { selector: '[data-test=wizard-next-step]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-output]' }

