# =============================================================================
# USER STORY: Hierarchy Explorer - Expand a Level
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: EXPLORING
# @systems: [INTERACTIVE_SYSTEM, PRESENTATION_SYSTEM]
# @last_updated: 2026-04-25T00:00:00Z

id: US-004
title: Visitor expands a hierarchy level to see its purpose and example content

acceptance_criteria:
  - id: AC-004-1
    title: Hierarchy Explorer is present on the page
    narrative: |
      Given I visit the site
      When I scroll to the Hierarchy Explorer section
      Then I should see the five hierarchy levels
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }

  - id: AC-004-2
    title: Clicking a level reveals expanded content
    narrative: |
      Given I am viewing the Hierarchy Explorer
      When I click on Level 1
      Then I should see the expanded content for Level 1
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1-expanded]' }

  - id: AC-004-3
    title: Expanding a different level collapses the previous
    narrative: |
      Given I have expanded Level 1 in the Hierarchy Explorer
      When I click on Level 2
      Then Level 2 should be expanded and Level 1 should be collapsed
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
      - click: { selector: '[data-test=hierarchy-level-2]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-2-expanded]' }

---
# =============================================================================
# USER STORY: Spec Wizard - Complete All Steps
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: EXPLORING
# @systems: [INTERACTIVE_SYSTEM, CONTENT_SYSTEM]
# @last_updated: 2026-04-25T00:00:00Z

id: US-005
title: Visitor completes the Spec Wizard and receives a skeleton spec output

acceptance_criteria:
  - id: AC-005-1
    title: Spec Wizard is present on the page
    narrative: |
      Given I visit the site
      When I scroll to the Spec Wizard section
      Then I should see the wizard with Step 1 active
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-wizard]' }
      - shouldExist: { selector: '[data-test=wizard-step-1]' }

  - id: AC-005-2
    title: Entering a product idea and advancing shows Step 2
    narrative: |
      Given I am on Step 1 of the Spec Wizard
      When I enter a product idea and click Next
      Then I should see Step 2
    given:
      - visit: '/demos/greenfield/'
    when:
      - fill: { selector: '[data-test=wizard-product-idea]', value: 'A tool for tracking reading habits' }
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-step-2]' }

  - id: AC-005-3
    title: Empty product idea prevents advancing
    narrative: |
      Given I am on Step 1 of the Spec Wizard
      When I click Next without entering a product idea
      Then I should see a validation error
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-error]' }
