# =============================================================================
# USER STORY: Use the spec wizard
# =============================================================================

id: US-011
title: Generate a skeleton spec from my own product idea

acceptance_criteria:
  - id: AC-011-1
    title: Wizard is visible on the page
    narrative: |
      Given I scroll to the wizard section
      When I view the section
      Then I see the spec wizard with a step 1 input
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-wizard]' }
      - shouldExist: { selector: '[data-test=wizard-step-1]' }

  - id: AC-011-2
    title: Entering a product idea advances to step 2
    narrative: |
      Given I see the spec wizard
      When I enter a product idea and click next
      Then I see step 2 of the wizard
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=wizard-idea-input]', value: 'A tool for tracking reading habits' }
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-step-2]' }

  - id: AC-011-3
    title: Completing the wizard shows a skeleton spec
    narrative: |
      Given I have completed all wizard steps
      When I finish the wizard
      Then I see a skeleton spec output showing L1-L3 structure
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=wizard-idea-input]', value: 'A tool for tracking reading habits' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=wizard-mission-option]' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=wizard-pillar-option]' }
      - click: { selector: '[data-test=wizard-next]' }
      - fill: { selector: '[data-test=wizard-interaction-input]', value: 'Mark a book as finished' }
      - click: { selector: '[data-test=wizard-finish]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-output]' }

