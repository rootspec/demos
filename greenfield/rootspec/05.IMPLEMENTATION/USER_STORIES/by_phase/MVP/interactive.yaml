# =============================================================================
# USER STORY: Hierarchy Explorer - Level Expansion
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: INTERACTIVE_EXPLORATION
# @systems: [INTERACTIVE_SYSTEM]
# @last_updated: 2026-04-16T00:00:00Z

id: US-201
title: User clicks a hierarchy level to expand and view example content
requirement_id: R-201

acceptance_criteria:
  - id: AC-201-1
    title: Hierarchy Explorer is visible on page
    narrative: |
      Given I visit the site homepage
      When I scroll to the hierarchy explorer section
      Then I should see the five RootSpec levels displayed
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }
      - shouldExist: { selector: '[data-test=hierarchy-level]' }

  - id: AC-201-2
    title: Clicking a level shows expanded content
    narrative: |
      Given I am viewing the hierarchy explorer
      When I click on a level node
      Then I should see the expanded content for that level
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=hierarchy-level]:first-child' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-content]' }

