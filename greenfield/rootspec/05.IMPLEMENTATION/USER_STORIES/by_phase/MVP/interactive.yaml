# =============================================================================
# USER STORY: Hierarchy Explorer - Basic Interaction
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: METHODOLOGY_EXPLORATION
# @systems: [INTERACTIVE_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-24T10:48:33Z

id: US-101
title: Visitor can expand a level in the hierarchy explorer

acceptance_criteria:
  - id: AC-101-1
    title: Hierarchy explorer is present on the page
    narrative: |
      Given I visit the site home page
      When I scroll to the hierarchy explorer section
      Then I see the interactive hierarchy explorer
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }

  - id: AC-101-2
    title: Clicking a level expands it to show content
    narrative: |
      Given I can see the hierarchy explorer
      When I click on the Level 1 Philosophy item
      Then I see expanded content for that level
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1-content]' }

  - id: AC-101-3
    title: All five levels are present in the explorer
    narrative: |
      Given I visit the site home page
      When I view the hierarchy explorer
      Then I see all five levels listed
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-2]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-3]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-4]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-5]' }

