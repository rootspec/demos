# =============================================================================
# USER STORY: Spec Wizard Flow
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: PARTICIPATION
# @systems: [INTERACTIVE_SYSTEM, CONTENT_SYSTEM]
# @last_updated: 2026-04-17T03:47:13Z

id: US-202
title: Visitor creates a skeleton spec for their own idea

acceptance_criteria:
  - id: AC-202-1
    title: Spec Wizard is present on the page
    narrative: |
      Given I visit the site
      When I scroll to the spec wizard section
      Then I see the spec wizard with step 1 active
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-wizard]' }
      - shouldExist: { selector: '[data-test=wizard-step-1]' }

  - id: AC-202-2
    title: Visitor can enter a product idea and proceed to step 2
    narrative: |
      Given I see the spec wizard at step 1
      When I enter a product idea and click next
      Then I see step 2 with mission options
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=product-idea-input]', value: 'A task manager for developers' }
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-step-2]' }

  - id: AC-202-3
    title: Visitor cannot proceed from step 1 without entering an idea
    narrative: |
      Given I see the spec wizard at step 1 with empty input
      When I click next without entering anything
      Then I remain on step 1
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-step-1]' }

  - id: AC-202-4
    title: Completed wizard produces skeleton spec output
    narrative: |
      Given I have completed all three wizard steps
      When I reach the output panel
      Then I see a skeleton spec with my input mapped to spec levels
    given:
      - visit: '/'
      - fill: { selector: '[data-test=product-idea-input]', value: 'A task manager for developers' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=mission-option-1]' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=pillar-option-1]' }
      - click: { selector: '[data-test=pillar-option-2]' }
      - click: { selector: '[data-test=pillar-option-3]' }
      - click: { selector: '[data-test=wizard-next]' }
    when: []
    then:
      - shouldExist: { selector: '[data-test=wizard-output]' }

