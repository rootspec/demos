# -----------------------------------------------------------------------------
# Hierarchy Explorer - Core Concept Demonstration
# -----------------------------------------------------------------------------

- id: US-101
  title: Explore RootSpec five-level hierarchy interactively
  requirement_id: R-101

  acceptance_criteria:
    - id: AC-101-1
      title: Levels expand to show example content
      narrative: |
        Given I want to understand the RootSpec hierarchy
        When I click on a level in the hierarchy explorer
        Then I should see example content for that level
      given:
        - visit: '/'
        - scrollTo: { selector: '[data-test=hierarchy-explorer]' }
      when:
        - click: { selector: '[data-test=level-1]' }
      then:
        - shouldExist: { selector: '[data-test=level-1-content]' }
        - shouldContain: { selector: '[data-test=level-1-content]', text: 'Philosophy' }

    - id: AC-101-2
      title: Reference relationships highlighted on hover
      narrative: |
        Given I am exploring level relationships
        When I hover over a level in the hierarchy
        Then I should see visual indicators of which levels it can reference
      given:
        - visit: '/'
        - scrollTo: { selector: '[data-test=hierarchy-explorer]' }
      when:
        - hover: { selector: '[data-test=level-3]' }
      then:
        - shouldExist: { selector: '[data-test=reference-arrows]' }
        - shouldHaveClass: { selector: '[data-test=level-1]', class: 'highlighted' }
        - shouldHaveClass: { selector: '[data-test=level-2]', class: 'highlighted' }

    - id: AC-101-3
      title: Keyboard navigation supports accessibility
      narrative: |
        Given I am using keyboard navigation
        When I tab through the hierarchy explorer
        Then I should be able to expand levels using Enter key
      given:
        - visit: '/'
        - scrollTo: { selector: '[data-test=hierarchy-explorer]' }
      when:
        - keyPress: { key: 'Tab' }
        - keyPress: { key: 'Enter' }
      then:
        - shouldHaveFocus: { selector: '[data-test=level-1]' }
        - shouldExist: { selector: '[data-test=level-1-content]' }

# -----------------------------------------------------------------------------
# Spec Wizard - Hands-on Experience
# -----------------------------------------------------------------------------

- id: US-102
  title: Create skeleton specification through guided wizard
  requirement_id: R-102

  acceptance_criteria:
    - id: AC-102-1
      title: Three-step wizard guides user through methodology
      narrative: |
        Given I want to experience creating a RootSpec
        When I use the spec wizard
        Then I should progress through mission, pillars, and interaction steps
      given:
        - visit: '/'
        - scrollTo: { selector: '[data-test=spec-wizard]' }
      when:
        - fill: { selector: '[data-test=mission-input]', value: 'Help developers build better software' }
        - click: { selector: '[data-test=next-step]' }
      then:
        - shouldExist: { selector: '[data-test=step-2]' }
        - shouldContain: { selector: '[data-test=step-indicator]', text: '2' }

    - id: AC-102-2
      title: Template selection provides helpful examples
      narrative: |
        Given I am in the mission step of the wizard
        When I view template options
        Then I should see helpful mission examples I can select or customize
      given:
        - visit: '/'
        - scrollTo: { selector: '[data-test=spec-wizard]' }
      when:
        - click: { selector: '[data-test=template-select]' }
      then:
        - shouldExist: { selector: '[data-test=mission-template-1]' }
        - shouldExist: { selector: '[data-test=mission-template-2]' }
        - shouldExist: { selector: '[data-test=custom-option]' }

    - id: AC-102-3
      title: Live preview shows RootSpec structure
      narrative: |
        Given I have completed all wizard steps
        When I view the output preview
        Then I should see my inputs formatted as a skeleton RootSpec
      given:
        - visit: '/'
        - scrollTo: { selector: '[data-test=spec-wizard]' }
        - fill: { selector: '[data-test=mission-input]', value: 'Test mission' }
        - click: { selector: '[data-test=next-step]' }
        - selectMultiple: { selector: '[data-test=pillar-suggestions]', values: ['Clarity', 'Simplicity'] }
        - click: { selector: '[data-test=next-step]' }
        - fill: { selector: '[data-test=interaction-input]', value: 'User clicks and sees result' }
      when:
        - click: { selector: '[data-test=generate-preview]' }
      then:
        - shouldExist: { selector: '[data-test=spec-preview]' }
        - shouldContain: { selector: '[data-test=spec-preview]', text: 'L1: Philosophy' }
        - shouldContain: { selector: '[data-test=spec-preview]', text: 'Test mission' }

# -----------------------------------------------------------------------------
# Input Validation - Secure and Helpful
# -----------------------------------------------------------------------------

- id: US-103
  title: Validate user inputs with helpful feedback
  requirement_id: R-103

  acceptance_criteria:
    - id: AC-103-1
      title: Real-time validation provides immediate feedback
      narrative: |
        Given I am entering text in the spec wizard
        When I exceed character limits or enter invalid content
        Then I should see immediate validation feedback
      given:
        - visit: '/'
        - scrollTo: { selector: '[data-test=spec-wizard]' }
      when:
        - fill: { selector: '[data-test=mission-input]', value: 'A'.repeat(250) }
      then:
        - shouldExist: { selector: '[data-test=validation-error]' }
        - shouldContain: { selector: '[data-test=character-count]', text: '250/200' }

    - id: AC-103-2
      title: HTML content sanitized for security
      narrative: |
        Given I enter HTML tags in wizard inputs
        When I view the preview output
        Then HTML tags should be stripped for security
      given:
        - visit: '/'
        - scrollTo: { selector: '[data-test=spec-wizard]' }
      when:
        - fill: { selector: '[data-test=mission-input]', value: 'Test <script>alert("xss")</script> mission' }
        - click: { selector: '[data-test=generate-preview]' }
      then:
        - shouldContain: { selector: '[data-test=spec-preview]', text: 'Test  mission' }
        - shouldNotContain: { selector: '[data-test=spec-preview]', text: '<script>' }

# -----------------------------------------------------------------------------
# Before/After Comparison - Value Demonstration
# -----------------------------------------------------------------------------

- id: US-104
  title: Compare traditional requirements with RootSpec approach
  requirement_id: R-104

  acceptance_criteria:
    - id: AC-104-1
      title: Side-by-side comparison with toggle or slider
      narrative: |
        Given I want to understand RootSpec benefits
        When I interact with the before/after comparison
        Then I should see clear differences between approaches
      given:
        - visit: '/'
        - scrollTo: { selector: '[data-test=comparison-section]' }
      when:
        - click: { selector: '[data-test=comparison-toggle]' }
      then:
        - shouldExist: { selector: '[data-test=before-content]' }
        - shouldExist: { selector: '[data-test=after-content]' }
        - shouldContain: { selector: '[data-test=before-content]', text: 'vague requirements' }
        - shouldContain: { selector: '[data-test=after-content]', text: 'structured hierarchy' }

    - id: AC-104-2
      title: Real content demonstrates concrete improvements
      narrative: |
        Given I am evaluating RootSpec methodology
        When I examine both sides of the comparison
        Then I should see realistic, not lorem ipsum, examples
      given:
        - visit: '/'
        - scrollTo: { selector: '[data-test=comparison-section]' }
      when: []
      then:
        - shouldNotContain: { selector: '[data-test=comparison-section]', text: 'lorem ipsum' }
        - shouldNotContain: { selector: '[data-test=comparison-section]', text: 'placeholder' }

# -----------------------------------------------------------------------------
# State Management - Persistent Experience
# -----------------------------------------------------------------------------

- id: US-105
  title: Maintain component state across user interactions
  requirement_id: R-105

  acceptance_criteria:
    - id: AC-105-1
      title: Wizard progress persisted during session
      narrative: |
        Given I am partway through the spec wizard
        When I scroll away and return to the wizard
        Then my progress should be preserved
      given:
        - visit: '/'
        - scrollTo: { selector: '[data-test=spec-wizard]' }
        - fill: { selector: '[data-test=mission-input]', value: 'My test mission' }
        - click: { selector: '[data-test=next-step]' }
      when:
        - scrollTo: { selector: '[data-test=hero]' }
        - scrollTo: { selector: '[data-test=spec-wizard]' }
      then:
        - shouldHaveValue: { selector: '[data-test=mission-input]', value: 'My test mission' }
        - shouldContain: { selector: '[data-test=step-indicator]', text: '2' }

    - id: AC-105-2
      title: Explorer state resets appropriately
      narrative: |
        Given I have expanded levels in the hierarchy explorer
        When I interact with other components
        Then the explorer state should remain independent
      given:
        - visit: '/'
        - scrollTo: { selector: '[data-test=hierarchy-explorer]' }
        - click: { selector: '[data-test=level-1]' }
        - click: { selector: '[data-test=level-2]' }
      when:
        - scrollTo: { selector: '[data-test=spec-wizard]' }
        - scrollTo: { selector: '[data-test=hierarchy-explorer]' }
      then:
        - shouldExist: { selector: '[data-test=level-1-content]' }
        - shouldExist: { selector: '[data-test=level-2-content]' }