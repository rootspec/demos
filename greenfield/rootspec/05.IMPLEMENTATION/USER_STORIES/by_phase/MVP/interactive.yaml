id: US-302
title: Use the Spec Wizard to map a product idea to RootSpec

acceptance_criteria:
  - id: AC-302-1
    title: Spec Wizard section is present on the page
    narrative: |
      Given I visit the site
      When the page loads
      Then I see the Spec Wizard section with a step-one input
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-wizard]' }
      - shouldExist: { selector: '[data-test=wizard-step-1]' }

  - id: AC-302-2
    title: Entering a product idea and selecting a mission advances the wizard
    narrative: |
      Given I am on step 1 of the Spec Wizard
      When I fill in a product idea and select a mission template
      And I click the advance button
      Then I see step 2 of the wizard
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=wizard-idea-input]', value: 'A tool for tracking learning goals' }
      - click: { selector: '[data-test=wizard-mission-option]:first-child' }
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-step-2]' }

  - id: AC-302-3
    title: Completing the wizard generates a spec skeleton
    narrative: |
      Given I have completed all three wizard steps
      When the wizard reaches the completion state
      Then I see a generated spec skeleton displayed below the wizard
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=wizard-idea-input]', value: 'A tool for tracking learning goals' }
      - click: { selector: '[data-test=wizard-mission-option]:first-child' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=wizard-pillar-option]:first-child' }
      - click: { selector: '[data-test=wizard-pillar-option]:nth-child(2)' }
      - click: { selector: '[data-test=wizard-pillar-option]:nth-child(3)' }
      - click: { selector: '[data-test=wizard-next]' }
      - fill: { selector: '[data-test=wizard-interaction-input]', value: 'User marks a goal complete' }
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-output]' }

