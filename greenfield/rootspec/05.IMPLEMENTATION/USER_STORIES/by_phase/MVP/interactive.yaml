# =============================================================================
# USER STORY: Explore the Hierarchy
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FIRST_VISIT
# @systems: [INTERACTIVE_SYSTEM, ACCESSIBILITY_SYSTEM]
# @last_updated: 2026-04-02T00:00:00Z

id: US-201
title: Explore the five-level specification hierarchy interactively

acceptance_criteria:
  - id: AC-201-1
    title: Click a level to expand it
    narrative: |
      Given I am viewing the hierarchy explorer
      When I click on a level
      Then that level expands to show example content
      And any previously expanded level collapses
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1-content]' }

  - id: AC-201-2
    title: Hover a level to see its references
    narrative: |
      Given I am viewing the hierarchy explorer
      When I hover over a level
      Then I should see its allowed reference connections highlighted
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-level-3]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-3][aria-expanded=true]' }

  - id: AC-201-3
    title: Navigate hierarchy with keyboard
    narrative: |
      Given I am focused on the hierarchy explorer
      When I use arrow keys to move between levels and Enter to expand
      Then I should be able to explore the hierarchy without a mouse
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1][aria-expanded=true]' }

