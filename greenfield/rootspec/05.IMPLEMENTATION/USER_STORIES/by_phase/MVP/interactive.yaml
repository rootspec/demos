---
id: US-201
title: Explore the RootSpec five-level hierarchy interactively

acceptance_criteria:
  - id: AC-201-1
    title: Hierarchy explorer is present on the page
    narrative: |
      Given I visit the site
      When I scroll to the hierarchy section
      Then I see the hierarchy explorer component
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }

  - id: AC-201-2
    title: All five levels are listed
    narrative: |
      Given I can see the hierarchy explorer
      When I look at the level list
      Then I see all five levels displayed
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-2]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-3]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-4]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-5]' }

  - id: AC-201-3
    title: Clicking a level expands it to show content
    narrative: |
      Given I see the hierarchy explorer
      When I click on Level 1
      Then the content for Level 1 is visible
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1-content]' }

  - id: AC-201-4
    title: Clicking an expanded level collapses it
    narrative: |
      Given Level 1 is expanded
      When I click on Level 1 again
      Then the Level 1 content is no longer visible
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }

