# =============================================================================
# USER STORY: Spec Wizard Completion
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: EXPLORER
# @systems: [SPEC_WIZARD, THEME_SYSTEM]
# @last_updated: 2026-04-25T00:00:00Z

id: US-202
title: Visitor completes the Spec Your Idea wizard and sees skeleton spec output

acceptance_criteria:
  - id: AC-202-1
    title: Wizard renders initial step with input
    narrative: |
      Given I visit the home page
      When I scroll to the spec wizard section
      Then I should see the first step of the wizard
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-wizard]' }
      - shouldExist: { selector: '[data-test=wizard-step-1]' }

  - id: AC-202-2
    title: Wizard advances to step 2 after entering a product idea
    narrative: |
      Given I am on step 1 of the spec wizard
      When I enter a product idea and click Next
      Then I should see step 2 of the wizard
    given:
      - visit: '/demos/greenfield/'
    when:
      - fill: { selector: '[data-test=product-idea-input]', value: 'A tool for tracking personal goals' }
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-step-2]' }

  - id: AC-202-3
    title: Next button is disabled without input on step 1
    narrative: |
      Given I am on step 1 of the spec wizard
      When I have not entered a product idea
      Then the Next button should be disabled
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=wizard-next][disabled]' }

