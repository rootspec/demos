acceptance_criteria:
  - id: AC-203-1
    title: Before/After comparison section is present
    narrative: |
      Given I visit the homepage
      When I scroll to the comparison section
      Then I should see both before and after panels
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=before-after-section]' }

  - id: AC-203-2
    title: Toggle switches between before and after panels
    narrative: |
      Given I can see the before/after comparison
      When I click the toggle to switch panels
      Then I should see the other panel become active
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=before-after-toggle]' }
    then:
      - shouldExist: { selector: '[data-test=before-after-section]' }

