---

id: US-301
title: Visitor can expand hierarchy levels in the explorer

acceptance_criteria:
  - id: AC-301-1
    title: Hierarchy explorer section is present
    narrative: |
      Given I visit the site
      When I scroll to the hierarchy explorer section
      Then I should see the five-level hierarchy displayed
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }

  - id: AC-301-2
    title: Clicking a level card expands it
    narrative: |
      Given I can see the hierarchy explorer
      When I click on a level card
      Then that level card should expand to show more content
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1][aria-expanded="true"]' }

  - id: AC-301-3
    title: Expanded level shows example content
    narrative: |
      Given I can see the hierarchy explorer
      When I click on level 1 (Philosophy)
      Then I should see example content for that level
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1-content]' }

---

id: US-302
title: Visitor can complete the Spec Your Idea Wizard

acceptance_criteria:
  - id: AC-302-1
    title: Wizard section is present on the page
    narrative: |
      Given I visit the site
      When I scroll to the wizard section
      Then I should see the Spec Your Idea wizard
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-wizard]' }

  - id: AC-302-2
    title: Wizard shows step 1 with a product idea input
    narrative: |
      Given I am viewing the wizard
      When the wizard loads
      Then I should see step 1 with an input for my product idea
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=wizard-step-1]' }
      - shouldExist: { selector: '[data-test=product-idea-input]' }

  - id: AC-302-3
    title: Wizard advances to step 2 after entering a product idea
    narrative: |
      Given I am on wizard step 1
      When I enter a product idea and click Next
      Then I should see step 2
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=product-idea-input]', value: 'A tool for tracking daily habits' }
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-step-2]' }

  - id: AC-302-4
    title: Completing the wizard shows a spec skeleton output
    narrative: |
      Given I have completed all wizard steps
      When I submit the wizard
      Then I should see a generated spec skeleton
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=product-idea-input]', value: 'A tool for tracking daily habits' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=mission-template-0]' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=pillar-option-0]' }
      - click: { selector: '[data-test=pillar-option-1]' }
      - click: { selector: '[data-test=pillar-option-2]' }
      - fill: { selector: '[data-test=key-interaction-input]', value: 'User marks a habit as complete' }
      - click: { selector: '[data-test=wizard-generate]' }
    then:
      - shouldExist: { selector: '[data-test=spec-output]' }

