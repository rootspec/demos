# =============================================================================
# USER STORY: Hierarchy Explorer - Expand a Level
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: EXPLORE
# @systems: [INTERACTIVE_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-12T00:00:00Z

id: US-201
title: Visitor expands a hierarchy level to see example content
requirement_id: R-201

acceptance_criteria:
  - id: AC-201-1
    title: Hierarchy explorer is present on the page
    narrative: |
      Given I visit the homepage
      When I scroll to the hierarchy explorer section
      Then I should see the hierarchy explorer with all five levels listed
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-1]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-5]' }

  - id: AC-201-2
    title: Clicking a level expands its content
    narrative: |
      Given I visit the homepage and see the hierarchy explorer
      When I click on level 1
      Then I should see the expanded content for level 1
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1-content]' }

  - id: AC-201-3
    title: Clicking an expanded level collapses it
    narrative: |
      Given I have expanded level 1 in the hierarchy explorer
      When I click level 1 again
      Then the expanded content should no longer be visible
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }

