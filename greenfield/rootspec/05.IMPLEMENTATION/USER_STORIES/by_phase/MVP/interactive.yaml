# =============================================================================
# USER STORY: Hierarchy Explorer Interaction
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: PROOF
# @systems: [INTERACTIVE_SYSTEM, CONTENT_SYSTEM, PRESENTATION_SYSTEM]
# @last_updated: 2026-04-17T03:47:13Z

id: US-201
title: Visitor explores the five-level hierarchy interactively

acceptance_criteria:
  - id: AC-201-1
    title: Hierarchy Explorer is present on the page
    narrative: |
      Given I visit the site
      When I scroll to the hierarchy section
      Then I see the hierarchy explorer with five levels
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }

  - id: AC-201-2
    title: Clicking a level expands it to show content
    narrative: |
      Given I see the hierarchy explorer
      When I click on Level 1 Philosophy
      Then I see expanded content for that level
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1-content]' }

  - id: AC-201-3
    title: Clicking an expanded level collapses it
    narrative: |
      Given I have expanded Level 1 in the hierarchy explorer
      When I click on Level 1 again
      Then the level content collapses
    given:
      - visit: '/'
      - click: { selector: '[data-test=hierarchy-level-1]' }
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }

