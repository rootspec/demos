id: US-201
title: Explore the five-level hierarchy interactively

acceptance_criteria:
  - id: AC-201-1
    title: Clicking a level expands it to show example content
    narrative: |
      Given I am viewing the Hierarchy Explorer section
      When I click on a level
      Then that level should expand and show example content
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1][aria-expanded=true]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-1-content]' }

  - id: AC-201-2
    title: Clicking an expanded level collapses it
    narrative: |
      Given I have expanded a hierarchy level
      When I click it again
      Then it should collapse
    given:
      - visit: '/'
      - click: { selector: '[data-test=hierarchy-level-1]' }
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1][aria-expanded=false]' }

  - id: AC-201-3
    title: All five levels are visible in the explorer
    narrative: |
      Given I am viewing the Hierarchy Explorer section
      When I look at the explorer
      Then I should see all five levels listed
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-2]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-3]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-4]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-5]' }

