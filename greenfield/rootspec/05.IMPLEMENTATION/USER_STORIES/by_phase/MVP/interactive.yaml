---
id: US-201
title: Explore the five spec levels using the Hierarchy Explorer

acceptance_criteria:
  - id: AC-201-1
    title: Hierarchy Explorer renders all five levels
    narrative: |
      Given I visit the site homepage
      When I scroll to the hierarchy explorer section
      Then I see five level cards for L1 through L5
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }
      - shouldExist: { selector: '[data-test=level-card-1]' }
      - shouldExist: { selector: '[data-test=level-card-5]' }

  - id: AC-201-2
    title: Clicking a level card expands it with example content
    narrative: |
      Given I see the hierarchy explorer
      When I click a level card
      Then that level expands to show example content
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=level-card-1]' }
    then:
      - shouldExist: { selector: '[data-test=level-detail-1]' }

---
id: US-202
title: Complete the Spec Wizard with a product idea

acceptance_criteria:
  - id: AC-202-1
    title: Spec Wizard renders on page
    narrative: |
      Given I visit the site homepage
      When I scroll to the spec wizard section
      Then I see the wizard with a step indicator
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-wizard]' }
      - shouldExist: { selector: '[data-test=wizard-step-indicator]' }

  - id: AC-202-2
    title: Wizard advances to step 2 after entering a mission
    narrative: |
      Given I see the spec wizard on step 1
      When I fill in the product idea and click Next
      Then I advance to step 2
    given:
      - visit: '/demos/greenfield/'
    when:
      - fill: { selector: '[data-test=wizard-mission-input]', value: 'A tool for focused writing without distractions' }
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-step-2]' }

  - id: AC-202-3
    title: Wizard blocks advance when mission is empty
    narrative: |
      Given I see the spec wizard on step 1
      When I click Next without entering a mission
      Then I see a validation message and remain on step 1
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-validation-message]' }
      - shouldExist: { selector: '[data-test=wizard-step-1]' }

  - id: AC-202-4
    title: Completed wizard shows spec output fragment
    narrative: |
      Given I complete all three steps of the wizard
      When the wizard finishes
      Then I see a skeleton spec output showing my inputs mapped to L1-L3
    given:
      - visit: '/demos/greenfield/'
    when:
      - fill: { selector: '[data-test=wizard-mission-input]', value: 'A tool for focused writing' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=pillar-option]:first-child' }
      - click: { selector: '[data-test=wizard-next]' }
      - fill: { selector: '[data-test=wizard-interaction-input]', value: 'User opens app and starts writing immediately' }
      - click: { selector: '[data-test=wizard-finish]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-output]' }

