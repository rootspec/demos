# =============================================================================
# USER STORY: Interactive Hierarchy Explorer
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: METHODOLOGY_DISCOVERY
# @systems: [INTERACTIVE_SYSTEM, THEME_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-08T00:59:00Z

id: US-201
title: Explore RootSpec hierarchy interactively
requirement_id: R-201

acceptance_criteria:
  - id: AC-201-1
    title: Hierarchy levels expand to show example content
    narrative: |
      Given I am viewing the hierarchy explorer
      When I click on a hierarchy level
      Then I should see example content for that level
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=level-content]' }
      - shouldContain: { selector: '[data-test=level-content]', text: 'Philosophy' }

  - id: AC-201-2
    title: Visual connections show upward-only references
    narrative: |
      Given I am exploring the hierarchy
      When I hover over a level
      Then I should see visual connections to levels it can reference
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-level-3]' }
    then:
      - shouldExist: { selector: '[data-test=reference-connection]' }

  - id: AC-201-3
    title: Hierarchy explorer is keyboard accessible
    narrative: |
      Given I am using keyboard navigation
      When I tab through the hierarchy explorer
      Then I should be able to expand levels using keyboard
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-explorer]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]:focus-within' }

---

# =============================================================================
# USER STORY: Spec Your Idea Wizard
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: HANDS_ON_EXPERIENCE
# @systems: [INTERACTIVE_SYSTEM, CONTENT_SYSTEM, THEME_SYSTEM]
# @last_updated: 2026-04-08T00:59:00Z

id: US-202
title: Walk through mini specification wizard
requirement_id: R-202

acceptance_criteria:
  - id: AC-202-1
    title: Wizard collects product idea input
    narrative: |
      Given I want to try the RootSpec methodology
      When I start the spec wizard
      Then I should be able to enter a product idea
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=spec-wizard-start]' }
      - fill: { selector: '[data-test=product-idea-input]', value: 'Task management app' }
    then:
      - shouldContain: { selector: '[data-test=product-idea-input]', text: 'Task management app' }

  - id: AC-202-2
    title: Mission template selection available
    narrative: |
      Given I have entered a product idea
      When I proceed to the mission step
      Then I should see mission templates to choose from
    given:
      - visit: '/'
      - click: { selector: '[data-test=spec-wizard-start]' }
      - fill: { selector: '[data-test=product-idea-input]', value: 'Task app' }
    when:
      - click: { selector: '[data-test=next-step]' }
    then:
      - shouldExist: { selector: '[data-test=mission-templates]' }

  - id: AC-202-3
    title: Design pillars selection from suggestions
    narrative: |
      Given I have selected a mission
      When I reach the design pillars step
      Then I should be able to pick design pillars from suggestions
    given:
      - visit: '/'
      - click: { selector: '[data-test=spec-wizard-start]' }
      - fill: { selector: '[data-test=product-idea-input]', value: 'Task app' }
      - click: { selector: '[data-test=next-step]' }
    when:
      - click: { selector: '[data-test=next-step]' }
    then:
      - shouldExist: { selector: '[data-test=design-pillars]' }

  - id: AC-202-4
    title: Wizard generates skeleton spec output
    narrative: |
      Given I have completed the wizard steps
      When I finish the wizard
      Then I should see a skeleton spec showing my input mapped to L1-L3
    given:
      - visit: '/'
      - click: { selector: '[data-test=spec-wizard-start]' }
      - fill: { selector: '[data-test=product-idea-input]', value: 'Task app' }
      - click: { selector: '[data-test=next-step]' }
      - click: { selector: '[data-test=next-step]' }
    when:
      - click: { selector: '[data-test=finish-wizard]' }
    then:
      - shouldExist: { selector: '[data-test=spec-output]' }
      - shouldContain: { selector: '[data-test=spec-output]', text: 'L1' }

---

# =============================================================================
# USER STORY: Before/After Comparison Toggle
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: VALIDATION_PROOF
# @systems: [INTERACTIVE_SYSTEM, CONTENT_SYSTEM, THEME_SYSTEM]
# @last_updated: 2026-04-08T00:59:00Z

id: US-203
title: Compare development with and without RootSpec
requirement_id: R-203

acceptance_criteria:
  - id: AC-203-1
    title: Toggle between without and with RootSpec views
    narrative: |
      Given I want to see the value of RootSpec
      When I interact with the before/after comparison
      Then I should be able to toggle between the two states
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=comparison-toggle]' }
    then:
      - shouldExist: { selector: '[data-test=comparison-content]' }

  - id: AC-203-2
    title: Without spec shows vague requirements
    narrative: |
      Given I am viewing the before/after comparison
      When I view the "without spec" state
      Then I should see examples of vague, ambiguous requirements
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=without-spec]' }
    then:
      - shouldExist: { selector: '[data-test=vague-requirements]' }
      - shouldContain: { selector: '[data-test=vague-requirements]', text: 'vague' }

  - id: AC-203-3
    title: With RootSpec shows structured hierarchy
    narrative: |
      Given I am viewing the before/after comparison
      When I view the "with RootSpec" state
      Then I should see structured, traceable requirements
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=with-rootspec]' }
    then:
      - shouldExist: { selector: '[data-test=structured-hierarchy]' }
      - shouldContain: { selector: '[data-test=structured-hierarchy]', text: 'design pillar' }