# =============================================================================
# USER STORY: Complete the spec wizard
# =============================================================================

id: US-008
title: Walk through the spec wizard and see a skeleton spec

acceptance_criteria:
  - id: AC-008-1
    title: Spec Wizard is visible on the page
    narrative: |
      Given I visit the site
      When I scroll to the spec wizard section
      Then I see the wizard with a product idea input
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-wizard]' }
      - shouldExist: { selector: '[data-test=wizard-step-1]' }

  - id: AC-008-2
    title: Completing Step 1 advances to Step 2
    narrative: |
      Given I see the spec wizard
      When I fill in a product idea and click next
      Then I see Step 2 with design pillar choices
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=wizard-product-idea]', value: 'A tool for tracking reading habits' }
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-step-2]' }

  - id: AC-008-3
    title: Completing all steps shows the skeleton spec
    narrative: |
      Given I have completed all three wizard steps
      When I submit the final step
      Then I see a skeleton spec preview
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=wizard-product-idea]', value: 'A tool for tracking reading habits' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=wizard-pillar-option-0]' }
      - click: { selector: '[data-test=wizard-next]' }
      - fill: { selector: '[data-test=wizard-key-interaction]', value: 'User logs a book they finished' }
      - click: { selector: '[data-test=wizard-submit]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-output]' }

