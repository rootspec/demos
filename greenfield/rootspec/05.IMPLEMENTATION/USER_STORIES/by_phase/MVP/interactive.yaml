# =============================================================================
# USER STORY: Hierarchy Explorer
# =============================================================================
# @spec_version: 7.3.7
# @phase: MVP
# @journey: EXPLORATION
# @systems: [INTERACTIVE_SYSTEM, PRESENTATION_SYSTEM, CONTENT_SYSTEM]
# @last_updated: 2026-04-23T00:00:00Z

id: US-004
title: User can explore the five-level hierarchy interactively

acceptance_criteria:
  - id: AC-004-1
    title: All five hierarchy levels are visible
    narrative: |
      Given I visit the site and scroll to the hierarchy section
      When the section loads
      Then I see five level cards for L1 through L5
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-1]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-2]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-3]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-4]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-5]' }

  - id: AC-004-2
    title: Clicking a level card expands it to show content
    narrative: |
      Given I see the hierarchy explorer with all five levels collapsed
      When I click on Level 1
      Then Level 1 expands to show its description and example content
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1][aria-expanded="true"]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-1-content]' }

  - id: AC-004-3
    title: Clicking an expanded level collapses it
    narrative: |
      Given Level 1 is expanded in the hierarchy explorer
      When I click Level 1 again
      Then Level 1 collapses and its content is hidden
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1][aria-expanded="false"]' }

---
# =============================================================================
# USER STORY: Spec Wizard
# =============================================================================
# @spec_version: 7.3.7
# @phase: MVP
# @journey: EXPLORATION
# @systems: [INTERACTIVE_SYSTEM, PRESENTATION_SYSTEM, CONTENT_SYSTEM]
# @last_updated: 2026-04-23T00:00:00Z

id: US-005
title: User can generate a skeleton spec from a one-line product idea

acceptance_criteria:
  - id: AC-005-1
    title: Wizard is present and shows Step 1 on load
    narrative: |
      Given I visit the site and scroll to the wizard section
      When the section loads
      Then I see the spec wizard showing Step 1 with a product idea input
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-wizard]' }
      - shouldExist: { selector: '[data-test=wizard-step-1]' }
      - shouldExist: { selector: '[data-test=wizard-idea-input]' }

  - id: AC-005-2
    title: User can advance through all three steps
    narrative: |
      Given I am on Step 1 of the wizard
      When I enter a product idea and click Next
      Then I see Step 2 for mission selection
    given:
      - visit: '/demos/greenfield/'
    when:
      - fill: { selector: '[data-test=wizard-idea-input]', value: 'A tool to help developers write better commit messages' }
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-step-2]' }

  - id: AC-005-3
    title: Completing all steps generates a skeleton spec
    narrative: |
      Given I have completed all three wizard steps
      When the wizard reaches the result step
      Then I see a skeleton spec showing L1 through L3 populated with my inputs
    given:
      - visit: '/demos/greenfield/'
    when:
      - fill: { selector: '[data-test=wizard-idea-input]', value: 'A tool to help teams avoid scope drift' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=wizard-mission-option]' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=wizard-pillar-option]' }
      - click: { selector: '[data-test=wizard-pillar-option]' }
      - click: { selector: '[data-test=wizard-pillar-option]' }
      - click: { selector: '[data-test=wizard-next]' }
      - fill: { selector: '[data-test=wizard-interaction-input]', value: 'User runs /rs-spec and answers interview questions' }
      - click: { selector: '[data-test=wizard-generate]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-result]' }
      - shouldExist: { selector: '[data-test=wizard-result-l1]' }

