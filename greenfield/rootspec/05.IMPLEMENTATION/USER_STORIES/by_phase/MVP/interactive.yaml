# =============================================================================
# USER STORY: Spec Wizard - Complete Flow
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: EXPLORE
# @systems: [INTERACTIVE_SYSTEM, CONTENT_SYSTEM]
# @last_updated: 2026-04-23T00:00:00Z

id: US-203
title: Visitor completes the spec wizard and sees skeleton spec output

acceptance_criteria:
  - id: AC-203-1
    title: Wizard is visible on the page
    narrative: |
      Given I arrive at the site
      When I scroll to the wizard section
      Then I see the spec wizard with a prompt to enter a product idea
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-wizard]' }

  - id: AC-203-2
    title: Next button is disabled when idea field is empty
    narrative: |
      Given I am on step 1 of the wizard
      When the idea input is empty
      Then the Next button is disabled
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=wizard-step-1]' }
      - shouldExist: { selector: '[data-test=wizard-next][disabled]' }

  - id: AC-203-3
    title: Visitor can advance through all wizard steps
    narrative: |
      Given I am on step 1 of the wizard with a valid idea
      When I fill in the idea and advance through all steps
      Then I reach the output screen showing a skeleton spec
    given:
      - visit: '/demos/greenfield/'
    when:
      - fill: { selector: '[data-test=wizard-idea-input]', value: 'A task manager for remote teams' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=wizard-mission-option]:first-child' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=wizard-pillar-chip]:nth-child(1)' }
      - click: { selector: '[data-test=wizard-pillar-chip]:nth-child(2)' }
      - click: { selector: '[data-test=wizard-pillar-chip]:nth-child(3)' }
      - click: { selector: '[data-test=wizard-next]' }
      - fill: { selector: '[data-test=wizard-interaction-input]', value: 'User creates a task and assigns it to a teammate' }
      - click: { selector: '[data-test=wizard-generate]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-output]' }

  - id: AC-203-4
    title: Visitor can go back and change an answer
    narrative: |
      Given I have advanced past step 1
      When I click the Back button
      Then I return to step 1 with my previous answer preserved
    given:
      - visit: '/demos/greenfield/'
      - fill: { selector: '[data-test=wizard-idea-input]', value: 'A recipe app' }
      - click: { selector: '[data-test=wizard-next]' }
    when:
      - click: { selector: '[data-test=wizard-back]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-step-1]' }
      - shouldContain: { selector: '[data-test=wizard-idea-input]', text: 'A recipe app' }

