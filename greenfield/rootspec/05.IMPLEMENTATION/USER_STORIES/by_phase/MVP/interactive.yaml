# =============================================================================
# USER STORY: Spec Wizard - Complete Flow
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: EXPLORATION
# @systems: [INTERACTIVE_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-23T00:00:00Z

id: US-202
title: Visitor completes the Spec Your Idea wizard

acceptance_criteria:
  - id: AC-202-1
    title: Wizard section is present on the page
    narrative: |
      Given I visit the site
      When I scroll to the wizard section
      Then I see the Spec Your Idea wizard
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-wizard]' }

  - id: AC-202-2
    title: Wizard step 1 accepts product idea input
    narrative: |
      Given I am viewing the spec wizard at step 1
      When I enter a product idea and click next
      Then I advance to step 2
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=wizard-idea-input]', value: 'A tool for tracking personal goals' }
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-step-2]' }

  - id: AC-202-3
    title: Wizard prevents advancing with empty input
    narrative: |
      Given I am viewing the spec wizard at step 1 with no input
      When I click next without entering anything
      Then I remain on step 1 and see a validation message
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-step-1]' }

  - id: AC-202-4
    title: Wizard produces a skeleton spec output
    narrative: |
      Given I have completed all wizard steps
      When I finish the wizard
      Then I see a skeleton spec output
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=wizard-idea-input]', value: 'A tool for tracking personal goals' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=wizard-mission-option]:first-child' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=wizard-pillar-option]:nth-child(1)' }
      - click: { selector: '[data-test=wizard-pillar-option]:nth-child(2)' }
      - click: { selector: '[data-test=wizard-pillar-option]:nth-child(3)' }
      - click: { selector: '[data-test=wizard-finish]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-output]' }

