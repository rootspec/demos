id: US-301
title: Explore a RootSpec hierarchy level by clicking it

acceptance_criteria:
  - id: AC-301-1
    title: Hierarchy explorer renders all five levels
    narrative: |
      Given I have scrolled to the hierarchy explorer section
      When the component renders
      Then I see five level items displayed
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-L1]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-L5]' }

  - id: AC-301-2
    title: Clicking a level expands its description
    narrative: |
      Given I am viewing the hierarchy explorer
      When I click on Level 1
      Then I see expanded content describing Level 1
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-level-L1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-L1-content]' }

  - id: AC-301-3
    title: Clicking an expanded level collapses it
    narrative: |
      Given I have expanded Level 1 in the hierarchy explorer
      When I click Level 1 again
      Then the expanded content collapses
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-level-L1]' }
      - click: { selector: '[data-test=hierarchy-level-L1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }

