# =============================================================================
# USER STORY: Spec Wizard - Complete the Wizard
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: WIZARD
# @systems: [INTERACTIVE_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-12T00:00:00Z

id: US-202
title: Visitor completes the spec wizard and sees a skeleton spec output
requirement_id: R-202

acceptance_criteria:
  - id: AC-202-1
    title: Spec wizard section is present on the page
    narrative: |
      Given I visit the homepage
      When I scroll to the spec wizard section
      Then I should see the wizard with a product idea input
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-wizard]' }
      - shouldExist: { selector: '[data-test=wizard-idea-input]' }

  - id: AC-202-2
    title: Wizard Next button is disabled when product idea is empty
    narrative: |
      Given I visit the homepage and see the wizard
      When I have not entered any product idea text
      Then the Next button should be disabled
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=wizard-next-btn][disabled]' }

  - id: AC-202-3
    title: Wizard advances to step 2 after entering a product idea and clicking Next
    narrative: |
      Given I visit the homepage and see the wizard
      When I fill in the product idea and click Next
      Then I should see step 2 of the wizard
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=wizard-idea-input]', value: 'A tool that helps teams write better specs' }
      - click: { selector: '[data-test=wizard-next-btn]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-step-2]' }

  - id: AC-202-4
    title: Wizard produces skeleton spec output after completing all steps
    narrative: |
      Given I have completed all three wizard steps
      When the wizard shows the output
      Then I should see a skeleton spec with my inputs reflected in it
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=wizard-idea-input]', value: 'A tool that helps teams write better specs' }
      - click: { selector: '[data-test=wizard-next-btn]' }
      - click: { selector: '[data-test=wizard-mission-option-1]' }
      - click: { selector: '[data-test=wizard-next-btn]' }
      - click: { selector: '[data-test=wizard-pillar-1]' }
      - click: { selector: '[data-test=wizard-pillar-2]' }
      - click: { selector: '[data-test=wizard-pillar-3]' }
      - fill: { selector: '[data-test=wizard-interaction-input]', value: 'User types a product idea and sees a spec skeleton' }
      - click: { selector: '[data-test=wizard-next-btn]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-output]' }
      - shouldContain: { selector: '[data-test=wizard-output]', text: 'A tool that helps teams write better specs' }

