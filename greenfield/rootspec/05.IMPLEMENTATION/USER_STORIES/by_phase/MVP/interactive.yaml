# =============================================================================
# LEVEL 5: USER STORIES — Interactive Features
# =============================================================================
# @phase: MVP
# @systems: [INTERACTIVE_SYSTEM, CONTENT_SYSTEM]

---

id: US-201
title: Visitor explores the hierarchy by clicking levels in the Hierarchy Explorer

acceptance_criteria:
  - id: AC-201-1
    title: Hierarchy Explorer renders all five levels
    narrative: |
      Given I scroll to the Hierarchy Explorer section
      When the component loads
      Then I see five level cards
    given:
      - visit: '/'
    when:
      - scrollTo: { selector: '[data-test=hierarchy-explorer]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level]', count: 5 }

  - id: AC-201-2
    title: Clicking a level expands it to show more content
    narrative: |
      Given I see the Hierarchy Explorer
      When I click on a level card
      Then it expands to show detailed content
    given:
      - visit: '/'
      - scrollTo: { selector: '[data-test=hierarchy-explorer]' }
    when:
      - click: { selector: '[data-test=hierarchy-level]:first-child' }
    then:
      - shouldHaveClass: { selector: '[data-test=hierarchy-level]:first-child', class: 'expanded' }
      - shouldBeVisible: { selector: '[data-test=hierarchy-level]:first-child [data-test=level-detail]' }

  - id: AC-201-3
    title: Clicking an expanded level collapses it
    narrative: |
      Given I have expanded a level
      When I click it again
      Then it collapses back to summary view
    given:
      - visit: '/'
      - scrollTo: { selector: '[data-test=hierarchy-explorer]' }
      - click: { selector: '[data-test=hierarchy-level]:first-child' }
    when:
      - click: { selector: '[data-test=hierarchy-level]:first-child' }
    then:
      - shouldNotHaveClass: { selector: '[data-test=hierarchy-level]:first-child', class: 'expanded' }

  - id: AC-201-4
    title: Hierarchy Explorer is keyboard navigable
    narrative: |
      Given I focus the Hierarchy Explorer
      When I press Tab and Enter
      Then I can expand a level without a mouse
    given:
      - visit: '/'
      - scrollTo: { selector: '[data-test=hierarchy-explorer]' }
    when:
      - focus: { selector: '[data-test=hierarchy-level]:first-child' }
      - keyPress: { key: 'Enter' }
    then:
      - shouldHaveClass: { selector: '[data-test=hierarchy-level]:first-child', class: 'expanded' }

---

id: US-202
title: Visitor uses the Spec Wizard to generate a skeleton spec from their idea

acceptance_criteria:
  - id: AC-202-1
    title: Wizard renders step 1 with a text input
    narrative: |
      Given I scroll to the Spec Wizard section
      When the component loads
      Then I see step 1 with a text input for my product idea
    given:
      - visit: '/'
      - scrollTo: { selector: '[data-test=spec-wizard]' }
    when:
      - pageLoad: {}
    then:
      - shouldBeVisible: { selector: '[data-test=wizard-step-1]' }
      - shouldBeVisible: { selector: '[data-test=wizard-idea-input]' }

  - id: AC-202-2
    title: Next button is disabled when step 1 input is empty
    narrative: |
      Given I see step 1 of the wizard with an empty input
      When I look at the Next button
      Then it is disabled
    given:
      - visit: '/'
      - scrollTo: { selector: '[data-test=spec-wizard]' }
    when:
      - pageLoad: {}
    then:
      - shouldBeDisabled: { selector: '[data-test=wizard-next]' }

  - id: AC-202-3
    title: Visitor can advance through all steps and see output
    narrative: |
      Given I enter a product idea, select a mission, and choose pillars
      When I complete step 3
      Then I see a generated skeleton spec
    given:
      - visit: '/'
      - scrollTo: { selector: '[data-test=spec-wizard]' }
    when:
      - type: { selector: '[data-test=wizard-idea-input]', text: 'A tool for remote teams to stay aligned' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=mission-option]:first-child' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=pillar-option]:nth-child(1)' }
      - click: { selector: '[data-test=pillar-option]:nth-child(2)' }
      - click: { selector: '[data-test=pillar-option]:nth-child(3)' }
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldBeVisible: { selector: '[data-test=wizard-output]' }
      - shouldContain: { selector: '[data-test=wizard-output]', text: 'Mission' }

  - id: AC-202-4
    title: Start Over resets the wizard to step 1
    narrative: |
      Given I have completed the wizard and see output
      When I click "Start Over"
      Then the wizard resets to step 1 with empty inputs
    given:
      - visit: '/'
      - scrollTo: { selector: '[data-test=spec-wizard]' }
      - type: { selector: '[data-test=wizard-idea-input]', text: 'Test idea' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=mission-option]:first-child' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=pillar-option]:nth-child(1)' }
      - click: { selector: '[data-test=pillar-option]:nth-child(2)' }
      - click: { selector: '[data-test=pillar-option]:nth-child(3)' }
      - click: { selector: '[data-test=wizard-next]' }
    when:
      - click: { selector: '[data-test=wizard-reset]' }
    then:
      - shouldBeVisible: { selector: '[data-test=wizard-step-1]' }
      - shouldHaveValue: { selector: '[data-test=wizard-idea-input]', value: '' }

---

id: US-203
title: Visitor sees Before/After comparison of spec vs. no spec

acceptance_criteria:
  - id: AC-203-1
    title: Before/After section renders two panels with real content
    narrative: |
      Given I scroll to the Before/After section
      When the component loads
      Then I see two panels: "Without RootSpec" and "With RootSpec"
    given:
      - visit: '/'
      - scrollTo: { selector: '[data-test=comparison-section]' }
    when:
      - pageLoad: {}
    then:
      - shouldBeVisible: { selector: '[data-test=panel-before]' }
      - shouldBeVisible: { selector: '[data-test=panel-after]' }
      - shouldContain: { selector: '[data-test=panel-before]', text: 'Without' }
      - shouldContain: { selector: '[data-test=panel-after]', text: 'With RootSpec' }
