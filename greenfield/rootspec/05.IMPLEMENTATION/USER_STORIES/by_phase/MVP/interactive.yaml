# =============================================================================
# USER STORY: Explore the hierarchy
# =============================================================================

id: US-010
title: Explore the five spec levels interactively

acceptance_criteria:
  - id: AC-010-1
    title: Hierarchy explorer is visible on the page
    narrative: |
      Given I scroll to the hierarchy section
      When I view the section
      Then I see the hierarchy explorer with five levels
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }

  - id: AC-010-2
    title: Clicking a level expands it
    narrative: |
      Given I see the hierarchy explorer
      When I click on a level
      Then I see expanded content for that level
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1-content]' }

  - id: AC-010-3
    title: Clicking the same level again collapses it
    narrative: |
      Given I have expanded a hierarchy level
      When I click the same level again
      Then the expanded content collapses
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }

