id: US-202
title: Complete the Spec Your Idea wizard with a product idea

acceptance_criteria:
  - id: AC-202-1
    title: Wizard accepts a product idea and advances to step 1
    narrative: |
      Given I am viewing the Spec Your Idea wizard
      When I enter a product idea and click to proceed
      Then I should see step 1 of the wizard
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=wizard-idea-input]', value: 'A tool for tracking personal reading habits' }
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-step-1]' }

  - id: AC-202-2
    title: Empty product idea is rejected
    narrative: |
      Given I am viewing the Spec Your Idea wizard
      When I try to proceed without entering a product idea
      Then I should see a validation message and remain on the input step
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-idea-error]' }

  - id: AC-202-3
    title: Completing all wizard steps shows a skeleton spec output
    narrative: |
      Given I have entered a product idea and selected a mission and pillars
      When I complete the final step
      Then I should see a generated skeleton spec
    given:
      - visit: '/'
      - fill: { selector: '[data-test=wizard-idea-input]', value: 'A tool for tracking personal reading habits' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=wizard-mission-0]' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=wizard-pillar-0]' }
      - click: { selector: '[data-test=wizard-pillar-1]' }
      - click: { selector: '[data-test=wizard-pillar-2]' }
      - click: { selector: '[data-test=wizard-next]' }
      - fill: { selector: '[data-test=wizard-interaction-input]', value: 'User marks a book as finished' }
      - click: { selector: '[data-test=wizard-next]' }
    when: []
    then:
      - shouldExist: { selector: '[data-test=wizard-output]' }

