id: US-203
title: User sees the before/after comparison of specs with and without RootSpec
requirement_id: R-203

acceptance_criteria:
  - id: AC-203-1
    title: Comparison section is visible with both panels
    narrative: |
      Given I visit the site homepage
      When I scroll to the comparison section
      Then I should see both the without-spec and with-spec panels
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=comparison-section]' }
      - shouldExist: { selector: '[data-test=comparison-before]' }
      - shouldExist: { selector: '[data-test=comparison-after]' }
