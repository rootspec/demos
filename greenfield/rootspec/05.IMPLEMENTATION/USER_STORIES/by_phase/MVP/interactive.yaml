# =============================================================================
# USER STORY: Hierarchy Explorer
# =============================================================================
# @spec_version: 7.2.1
# @phase: MVP
# @journey: EXPLORATION
# @systems: [INTERACTIVE_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-13T17:12:20Z

id: US-301
title: Visitor explores the five-level RootSpec hierarchy

acceptance_criteria:
  - id: AC-301-1
    title: Hierarchy Explorer renders all five levels
    narrative: |
      Given I visit the site
      When I scroll to the hierarchy explorer section
      Then I see all five levels of the RootSpec hierarchy displayed
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-1]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-2]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-3]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-4]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-5]' }

  - id: AC-301-2
    title: Clicking a level expands its detail content
    narrative: |
      Given I see the hierarchy explorer
      When I click on Level 1
      Then I see the expanded content for Level 1
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1-content]' }

  - id: AC-301-3
    title: Clicking an expanded level collapses it
    narrative: |
      Given Level 1 is expanded in the hierarchy explorer
      When I click on Level 1 again
      Then Level 1 collapses and its detail content is hidden
    given:
      - visit: '/'
      - click: { selector: '[data-test=hierarchy-level-1]' }
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1][aria-expanded=false]' }

