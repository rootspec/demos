id: US-301
title: Explore the RootSpec hierarchy levels

acceptance_criteria:
  - id: AC-301-1
    title: Hierarchy Explorer section renders with all five levels
    narrative: |
      Given I visit the site
      When I view the Hierarchy Explorer section
      Then I see five level cards representing each RootSpec level
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }
      - shouldExist: { selector: '[data-test=level-1]' }
      - shouldExist: { selector: '[data-test=level-2]' }
      - shouldExist: { selector: '[data-test=level-3]' }
      - shouldExist: { selector: '[data-test=level-4]' }
      - shouldExist: { selector: '[data-test=level-5]' }

  - id: AC-301-2
    title: Clicking a level reveals its example content
    narrative: |
      Given the Hierarchy Explorer is displayed
      When I click on level 1
      Then I see the expanded content for level 1
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=level-1]' }
    then:
      - shouldExist: { selector: '[data-test=level-1-content]' }

  - id: AC-301-3
    title: Clicking the active level collapses it
    narrative: |
      Given level 1 is expanded in the Hierarchy Explorer
      When I click on level 1 again
      Then the level 1 content collapses
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=level-1]' }
      - click: { selector: '[data-test=level-1]' }
    then:
      - shouldExist: { selector: '[data-test=level-1][aria-expanded=false]' }

