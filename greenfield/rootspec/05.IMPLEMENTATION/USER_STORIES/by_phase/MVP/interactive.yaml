# =============================================================================
# USER STORY: Spec Wizard - Complete Flow
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: SPEC_WIZARD
# @systems: [INTERACTIVE_SYSTEM]
# @last_updated: 2026-04-16T00:00:00Z

id: US-202
title: User completes the Spec Wizard and sees a skeleton spec output
requirement_id: R-202

acceptance_criteria:
  - id: AC-202-1
    title: Spec Wizard is visible and shows step 1
    narrative: |
      Given I visit the site homepage
      When I scroll to the spec wizard section
      Then I should see the wizard with the first step active
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-wizard]' }
      - shouldExist: { selector: '[data-test=wizard-step-1]' }

  - id: AC-202-2
    title: Wizard advance requires mission input
    narrative: |
      Given I am on the Spec Wizard step 1
      When I click next without entering a mission
      Then I should see a validation error and not advance
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-step-1]' }

  - id: AC-202-3
    title: Completing the wizard shows skeleton spec output
    narrative: |
      Given I am on the Spec Wizard
      When I fill in the mission, select pillars, and describe an interaction
      Then I should see the skeleton spec output
    given:
      - visit: '/demos/greenfield/'
    when:
      - fill: { selector: '[data-test=wizard-mission-input]', value: 'A tool to help teams write better specs' }
      - click: { selector: '[data-test=wizard-next]' }
      - click: { selector: '[data-test=wizard-pillar-option]:first-child' }
      - click: { selector: '[data-test=wizard-pillar-option]:nth-child(2)' }
      - click: { selector: '[data-test=wizard-pillar-option]:nth-child(3)' }
      - click: { selector: '[data-test=wizard-next]' }
      - fill: { selector: '[data-test=wizard-interaction-input]', value: 'User clicks a level to expand example content' }
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-output]' }

