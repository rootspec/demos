id: US-203
title: See the difference RootSpec makes through a side-by-side comparison

acceptance_criteria:
  - id: AC-203-1
    title: Toggle between without and with views
    narrative: |
      Given I am viewing the before/after comparison
      When I toggle to the "With RootSpec" view
      Then I should see structured, traceable content replacing the vague version
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=comparison-toggle-with]' }
    then:
      - shouldExist: { selector: '[data-test=comparison-with-panel]' }
