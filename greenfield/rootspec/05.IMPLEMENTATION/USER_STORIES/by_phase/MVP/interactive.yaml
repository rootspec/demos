id: US-301
title: Visitor explores the five-level hierarchy interactively

acceptance_criteria:
  - id: AC-301-1
    title: Hierarchy explorer section is present on the page
    narrative: |
      Given I visit the RootSpec marketing site
      When the page loads
      Then I see the hierarchy explorer section
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }

  - id: AC-301-2
    title: Clicking a level in the explorer expands it
    narrative: |
      Given I am viewing the hierarchy explorer
      When I click on a level
      Then that level expands to show its description and example content
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=hierarchy-explorer-level]:first-child' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer-level-content]' }

  - id: AC-301-3
    title: All five levels are represented in the explorer
    narrative: |
      Given I am viewing the hierarchy explorer
      When the page loads
      Then I can see five distinct level items
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer-level]' }

