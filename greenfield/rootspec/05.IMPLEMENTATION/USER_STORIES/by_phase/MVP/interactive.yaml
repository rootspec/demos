# =============================================================================
# USER STORY: Hierarchy Explorer - Basic Interaction
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: EXPLORATION
# @systems: [INTERACTIVE_SYSTEM, LAYOUT_SYSTEM, THEME_SYSTEM]
# @last_updated: 2026-04-23T00:00:00Z

id: US-201
title: Visitor explores the five RootSpec levels in the hierarchy explorer

acceptance_criteria:
  - id: AC-201-1
    title: Hierarchy explorer shows all five levels
    narrative: |
      Given I visit the site
      When I scroll to the hierarchy explorer
      Then I see all five levels displayed
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }
      - shouldExist: { selector: '[data-test=level-L1]' }
      - shouldExist: { selector: '[data-test=level-L2]' }
      - shouldExist: { selector: '[data-test=level-L3]' }
      - shouldExist: { selector: '[data-test=level-L4]' }
      - shouldExist: { selector: '[data-test=level-L5]' }

  - id: AC-201-2
    title: Clicking a level expands its content
    narrative: |
      Given I am viewing the hierarchy explorer with all levels collapsed
      When I click on level L1
      Then I see expanded content for that level
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=level-L1]' }
    then:
      - shouldExist: { selector: '[data-test=level-L1-content]' }

  - id: AC-201-3
    title: Clicking an expanded level collapses it
    narrative: |
      Given I have clicked on level L1 and it is expanded
      When I click on level L1 again
      Then the level content collapses
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=level-L1]' }
      - click: { selector: '[data-test=level-L1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }

