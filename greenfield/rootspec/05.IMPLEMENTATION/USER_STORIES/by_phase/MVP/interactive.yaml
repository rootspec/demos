# =============================================================================
# USER STORY: Hierarchy Explorer - Expand Level
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: EXPLORE
# @systems: [INTERACTIVE_SYSTEM, CONTENT_SYSTEM]
# @last_updated: 2026-04-23T00:00:00Z

id: US-201
title: Visitor expands a hierarchy level to see example content

acceptance_criteria:
  - id: AC-201-1
    title: Clicking a level card expands it to show example content
    narrative: |
      Given I am viewing the hierarchy explorer section
      When I click on a hierarchy level card
      Then I see expanded content for that level
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1][aria-expanded="true"]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-1-content]' }

  - id: AC-201-2
    title: Clicking an expanded level collapses it
    narrative: |
      Given I have expanded a hierarchy level
      When I click it again
      Then the level collapses
    given:
      - visit: '/demos/greenfield/'
      - click: { selector: '[data-test=hierarchy-level-1]' }
    when:
      - click: { selector: '[data-test=hierarchy-level-1]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1][aria-expanded="false"]' }

  - id: AC-201-3
    title: Only one level is expanded at a time
    narrative: |
      Given I have expanded level 1
      When I click on level 2
      Then level 2 is expanded and level 1 is collapsed
    given:
      - visit: '/demos/greenfield/'
      - click: { selector: '[data-test=hierarchy-level-1]' }
    when:
      - click: { selector: '[data-test=hierarchy-level-2]' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-1][aria-expanded="false"]' }
      - shouldExist: { selector: '[data-test=hierarchy-level-2][aria-expanded="true"]' }

