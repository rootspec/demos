id: US-302
title: Walk through the spec wizard with a product idea

acceptance_criteria:
  - id: AC-302-1
    title: Spec wizard renders Step 1
    narrative: |
      Given I scroll to the spec wizard section
      When the component renders
      Then I see Step 1 asking for a product idea
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-wizard]' }
      - shouldExist: { selector: '[data-test=wizard-step-1]' }

  - id: AC-302-2
    title: Entering text in Step 1 enables the Next button
    narrative: |
      Given I am on Step 1 of the spec wizard
      When I type a product idea into the input
      Then the Next button becomes enabled
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=wizard-mission-input]', value: 'Help developers write better specs' }
    then:
      - shouldExist: { selector: '[data-test=wizard-next-btn]' }

  - id: AC-302-3
    title: Completing all steps shows the spec output
    narrative: |
      Given I have entered values in all three wizard steps
      When I click Generate Spec
      Then I see a skeleton spec output with my inputs reflected
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=wizard-mission-input]', value: 'Help developers write better specs' }
      - click: { selector: '[data-test=wizard-next-btn]' }
      - click: { selector: '[data-test=wizard-pillar-chip-0]' }
      - click: { selector: '[data-test=wizard-next-btn]' }
      - fill: { selector: '[data-test=wizard-interaction-input]', value: 'Users create a spec from a one-line idea' }
      - click: { selector: '[data-test=wizard-generate-btn]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-output]' }

