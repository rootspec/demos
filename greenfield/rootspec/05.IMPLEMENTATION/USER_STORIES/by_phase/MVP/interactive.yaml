id: US-103
title: Toggle between before and after views of a spec

acceptance_criteria:
  - id: AC-103-1
    title: Before/after comparison is present on the page
    narrative: |
      Given I visit the site
      When I scroll to the comparison section
      Then I see the before/after comparison
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=before-after]' }

  - id: AC-103-2
    title: Both without-spec and with-spec content are accessible
    narrative: |
      Given I see the before/after comparison
      When the component loads
      Then I can see or toggle to the "Without RootSpec" panel
    given:
      - visit: '/demos/greenfield/'
