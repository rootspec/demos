# =============================================================================
# USER STORY: Hierarchy Explorer Interaction
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: EXPLORER
# @systems: [HIERARCHY_EXPLORER, THEME_SYSTEM]
# @last_updated: 2026-04-25T00:00:00Z

id: US-201
title: Visitor explores the five-level RootSpec hierarchy interactively

acceptance_criteria:
  - id: AC-201-1
    title: Hierarchy Explorer renders five levels
    narrative: |
      Given I visit the home page
      When I scroll to the hierarchy explorer section
      Then I should see five level items
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }
      - shouldExist: { selector: '[data-test=hierarchy-level]' }

  - id: AC-201-2
    title: Clicking a level expands its content
    narrative: |
      Given I am viewing the hierarchy explorer
      When I click on a level
      Then I should see the expanded content for that level
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=hierarchy-level]:first-child' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-level-content]' }

  - id: AC-201-3
    title: Clicking the same level again collapses it
    narrative: |
      Given I have expanded a level in the hierarchy explorer
      When I click the same level again
      Then the expanded content should be hidden
    given:
      - visit: '/demos/greenfield/'
    when:
      - click: { selector: '[data-test=hierarchy-level]:first-child' }
      - click: { selector: '[data-test=hierarchy-level]:first-child' }
    then:
      - shouldExist: { selector: '[data-test=hierarchy-explorer]' }

