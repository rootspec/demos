id: US-202
title: Walk through the Spec Wizard with a product idea

acceptance_criteria:
  - id: AC-202-1
    title: Spec wizard is present on the page
    narrative: |
      Given I visit the site
      When I scroll to the wizard section
      Then I see the spec wizard component
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-wizard]' }

  - id: AC-202-2
    title: Step 1 mission input is available
    narrative: |
      Given I see the spec wizard
      When the wizard is in step 1
      Then I see a mission input field
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=wizard-step-1]' }

  - id: AC-202-3
    title: Completing all three steps shows output skeleton
    narrative: |
      Given I am in the spec wizard
      When I fill in the mission, select pillars, and describe an interaction
      Then I see a spec skeleton output
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=wizard-mission-input]', value: 'Help developers write better specs' }
      - click: { selector: '[data-test=wizard-next-step]' }
      - click: { selector: '[data-test=wizard-pillar-0]' }
      - click: { selector: '[data-test=wizard-pillar-1]' }
      - click: { selector: '[data-test=wizard-pillar-2]' }
      - click: { selector: '[data-test=wizard-next-step]' }
      - fill: { selector: '[data-test=wizard-interaction-input]', value: 'User clicks a button and sees the spec' }
      - click: { selector: '[data-test=wizard-next-step]' }
    then:
      - shouldExist: { selector: '[data-test=wizard-output]' }

