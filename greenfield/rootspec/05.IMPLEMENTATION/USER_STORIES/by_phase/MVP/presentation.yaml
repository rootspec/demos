id: US-501
title: RootSpec methodology diagram is visible on the page
requirement_id: R-501

acceptance_criteria:
  - id: AC-501-1
    title: Methodology diagram renders in the page
    narrative: |
      Given I visit the site homepage
      When the page loads
      Then I should see the RootSpec methodology diagram
    given:
      - visit: '/demos/greenfield/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=methodology-diagram]' }

