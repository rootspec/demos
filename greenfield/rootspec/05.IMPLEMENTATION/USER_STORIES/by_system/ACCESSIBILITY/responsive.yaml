# =============================================================================
# USER STORY: Use site with screen reader
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FIRST_VISIT
# @systems: [ACCESSIBILITY_SYSTEM, CONTENT_SYSTEM, INTERACTIVE_SYSTEM]
# @last_updated: 2026-04-07T23:11:36Z

id: US-302
title: Use site with screen reader
requirement_id: R-302

acceptance_criteria:
  - id: AC-302-1
    title: Proper heading hierarchy for navigation
    narrative: |
      Given I am using a screen reader
      When I navigate by headings
      Then I should find a logical hierarchy that helps me understand page structure
    given:
      - visit: '/'
      - enableScreenReader: true
    when:
      - navigateByHeadings: true
    then:
      - shouldHaveHeading: { level: 1, text: 'RootSpec' }
      - shouldHaveHeading: { level: 2, text: 'Problem' }
      - shouldHaveHeading: { level: 2, text: 'How It Works' }
      - shouldHaveLogicalHeadingOrder: true

  - id: AC-302-2
    title: Interactive components have proper ARIA labels
    narrative: |
      Given I am using a screen reader
      When I encounter interactive components
      Then they should be properly labeled and announce their purpose
    given:
      - visit: '/'
      - enableScreenReader: true
      - scrollTo: { selector: '[data-test=hierarchy-explorer]' }
    when:
      - focus: { selector: '[data-test=level-1]' }
    then:
      - shouldHaveAriaLabel: { selector: '[data-test=level-1]', text: 'Philosophy level' }
      - shouldAnnounce: { text: 'Philosophy level, button, collapsed' }

  - id: AC-302-3
    title: Dynamic content changes are announced
    narrative: |
      Given I am using a screen reader
      When interactive content changes (wizard progress, explorer expansion)
      Then changes should be announced via live regions
    given:
      - visit: '/'
      - enableScreenReader: true
      - scrollTo: { selector: '[data-test=spec-wizard]' }
    when:
      - fill: { selector: '[data-test=wizard-product-input]', value: 'Test app' }
      - click: { selector: '[data-test=wizard-next]' }
    then:
      - shouldAnnounce: { text: 'Step 2 of 3' }
      - shouldHaveLiveRegion: { selector: '[data-test=wizard-progress]' }