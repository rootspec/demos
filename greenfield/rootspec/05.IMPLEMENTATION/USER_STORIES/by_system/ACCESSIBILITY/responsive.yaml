# =============================================================================
# USER STORY: Navigate site with keyboard only
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FIRST_VISIT
# @systems: [ACCESSIBILITY_SYSTEM, INTERACTIVE_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-07T23:11:36Z

id: US-301
title: Navigate site with keyboard only
requirement_id: R-301

acceptance_criteria:
  - id: AC-301-1
    title: Can reach all interactive elements via Tab
    narrative: |
      Given I am navigating with keyboard only
      When I press Tab repeatedly
      Then I should be able to reach all interactive elements in logical order
    given:
      - visit: '/'
    when:
      - keyPress: 'Tab'
      - keyPress: 'Tab'
      - keyPress: 'Tab'
    then:
      - shouldHaveFocus: { selector: '[data-test=theme-toggle], [data-test=skip-link], [data-test=hierarchy-explorer] [role=button]:first-child' }

  - id: AC-301-2
    title: Focus indicators are clearly visible
    narrative: |
      Given I am navigating with keyboard
      When I focus on interactive elements
      Then focus indicators should be clearly visible with sufficient contrast
    given:
      - visit: '/'
    when:
      - focus: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldHaveVisibleFocus: { selector: '[data-test=theme-toggle]' }
      - shouldHaveAccessibleFocus: true

  - id: AC-301-3
    title: Can operate hierarchy explorer with keyboard
    narrative: |
      Given I am using keyboard navigation
      When I focus the hierarchy explorer and use arrow keys
      Then I should be able to explore levels and see content
    given:
      - visit: '/'
      - scrollTo: { selector: '[data-test=hierarchy-explorer]' }
    when:
      - focus: { selector: '[data-test=level-1]' }
      - keyPress: 'Enter'
    then:
      - shouldHaveClass: { selector: '[data-test=level-1]', class: 'expanded' }
      - shouldExist: { selector: '[data-test=level-1-content]' }

  - id: AC-301-4
    title: Can complete spec wizard with keyboard
    narrative: |
      Given I am using keyboard navigation
      When I focus the wizard and navigate through steps
      Then I should be able to complete the entire flow
    given:
      - visit: '/'
      - scrollTo: { selector: '[data-test=spec-wizard]' }
    when:
      - focus: { selector: '[data-test=wizard-product-input]' }
      - type: { text: 'Keyboard accessible app' }
      - keyPress: 'Tab'
      - keyPress: 'Enter'
    then:
      - shouldExist: { selector: '[data-test=wizard-step-2]' }

