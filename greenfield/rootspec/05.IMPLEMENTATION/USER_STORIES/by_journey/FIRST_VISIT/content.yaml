# @systems: [CONTENT_SYSTEM, LAYOUT_SYSTEM]
# @last_updated: 2026-04-07T23:11:36Z

id: US-102
title: Recognize problems from experience
requirement_id: R-102

acceptance_criteria:
  - id: AC-102-1
    title: Problem section lists familiar pain points
    narrative: |
      Given I am a developer who has experienced spec drift
      When I read the problem section
      Then I should recognize pain points from my own experience
    given:
      - visit: '/'
    when:
      - scrollTo: { selector: '[data-test=problem-section]' }
    then:
      - shouldExist: { selector: '[data-test=problem-section]' }
      - shouldContain: { selector: '[data-test=problem-section]', text: 'spec drift' }
      - shouldContain: { selector: '[data-test=problem-section]', text: 'Google Docs' }
      - shouldContain: { selector: '[data-test=problem-section]', text: 'unreliable AI' }