# Interactive System Fine-Tuning Parameters

## Animation Timing
animation_duration_fast: 150ms
  # Used for: Button hover states, focus indicators
  # Rationale: Quick enough to feel responsive, slow enough to be perceived

animation_duration_standard: 250ms
  # Used for: Component state transitions, theme toggle
  # Rationale: Standard web animation duration that feels smooth but not sluggish

animation_duration_slow: 400ms
  # Used for: Section transitions, hierarchy explorer expand/collapse
  # Rationale: Complex state changes need time to be comprehensible

animation_easing: ease-out
  # Used for: All animations
  # Rationale: Feels more natural than linear, starts fast and settles

## Touch Interaction
min_touch_target_size: 44px
  # Used for: All interactive elements on mobile
  # Rationale: Apple HIG and Android guidelines minimum for reliable touch

touch_feedback_duration: 100ms
  # Used for: Visual feedback on mobile taps
  # Rationale: Immediate feedback without interfering with subsequent interactions

## Keyboard Navigation
focus_trap_escape_delay: 200ms
  # Used for: Delay before focus returns to trigger after Escape key
  # Rationale: Allows animation to complete before focus jump

skip_link_offset: 10px
  # Used for: Distance skip links move into view when focused
  # Rationale: Enough to be clearly visible without jarring layout shift

## Interactive Component Timing
hierarchy_level_expand_delay: 50ms
  # Used for: Stagger animation when multiple levels expand
  # Rationale: Creates smooth cascade effect without feeling slow

wizard_step_transition: 300ms
  # Used for: Moving between wizard steps
  # Rationale: Long enough for user to follow content changes

debounce_input_delay: 300ms
  # Used for: User input processing in wizard
  # Rationale: Prevents excessive processing while allowing responsive feel

## State Management
theme_preference_key: "rootspec-theme"
  # Used for: localStorage key for theme preference
  # Rationale: Namespaced to avoid conflicts with other sites

wizard_state_key: "rootspec-wizard-draft"
  # Used for: localStorage key for wizard draft state
  # Rationale: Allows recovery of work if user navigates away

state_persistence_delay: 500ms
  # Used for: Delay before saving state to localStorage
  # Rationale: Prevents excessive writes during rapid interactions