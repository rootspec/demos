# =============================================================================
# FINE-TUNING: Interactive System Timing
# =============================================================================
# @spec_version: 1.0.0
# @spec_source: 04.SYSTEMS/INTERACTIVE_SYSTEM.md
# @last_updated: 2026-04-25T17:37:48Z

expand_collapse_duration:
  value: 200
  # @unit: milliseconds
  # @rationale: Quick enough to feel responsive, long enough to feel intentional. 150-250ms range per design spec.
  # @constraint: min=100, max=300

theme_transition_duration:
  value: 150
  # @unit: milliseconds
  # @rationale: Theme switches should feel instant but not jarring. Color-only transition; no layout shift.
  # @constraint: min=50, max=250

wizard_pillar_min:
  value: 3
  # @unit: count
  # @rationale: Three pillars is the minimum for a meaningful design philosophy; fewer produces degenerate output.
  # @constraint: min=2, max=3

wizard_pillar_max:
  value: 5
  # @unit: count
  # @rationale: Five pillars is the maximum before the philosophy becomes unfocused. Enforces constraint from INTERACTIVE_SYSTEM.
  # @constraint: min=5, max=7

hover_highlight_delay:
  value: 0
  # @unit: milliseconds
  # @rationale: Reference highlighting in the hierarchy explorer should be immediate — delay creates confusion about which level is active.
  # @constraint: min=0, max=100

copy_button_revert_delay:
  value: 2000
  # @unit: milliseconds
  # @rationale: "Copied!" confirmation should persist long enough to read but not so long it becomes stale.
  # @constraint: min=1000, max=3000

mobile_tap_target_size:
  value: 44
  # @unit: pixels
  # @rationale: WCAG 2.5.8 minimum touch target size. Apple HIG and Material Design both recommend 44px minimum.
  # @constraint: min=44, max=60
  # @inviolable: true
