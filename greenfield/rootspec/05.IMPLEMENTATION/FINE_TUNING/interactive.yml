# =============================================================================
# FINE-TUNING: Interactive System
# =============================================================================
# @spec_version: 1.0.0
# @spec_source: 04.SYSTEMS/INTERACTIVE_SYSTEM.md
# @last_updated: 2026-04-07T23:11:36Z

hierarchy_explorer:
  expansion_duration:
    value: 300
    # @unit: milliseconds
    # @rationale: Fast enough to feel responsive, slow enough to follow visually
    # @constraint: min=150, max=500

  reference_highlight_delay:
    value: 100
    # @unit: milliseconds
    # @rationale: Brief delay prevents flicker on rapid hover movements
    # @constraint: min=50, max=200

  max_expanded_levels:
    value: 3
    # @unit: count
    # @rationale: Prevents overwhelming information display, maintains usability
    # @constraint: min=1, max=5

spec_wizard:
  steps_total:
    value: 3
    # @unit: count
    # @rationale: Enough to demonstrate methodology without overwhelming users
    # @constraint: min=2, max=5
    # @inviolable: true

  input_validation_delay:
    value: 500
    # @unit: milliseconds
    # @rationale: Allows users to finish typing before showing validation feedback
    # @constraint: min=300, max=1000

  progress_animation_duration:
    value: 400
    # @unit: milliseconds
    # @rationale: Clear progress indication without feeling sluggish
    # @constraint: min=200, max=600

  template_suggestions_count:
    value: 5
    # @unit: count
    # @rationale: Enough variety without choice paralysis
    # @constraint: min=3, max=8

comparison_toggle:
  transition_duration:
    value: 350
    # @unit: milliseconds
    # @rationale: Smooth enough to follow content changes, quick enough to feel responsive
    # @constraint: min=200, max=500

  panel_fade_duration:
    value: 200
    # @unit: milliseconds
    # @rationale: Quick content swap maintains user attention
    # @constraint: min=100, max=400

scroll_behavior:
  smooth_scroll_duration:
    value: 800
    # @unit: milliseconds
    # @rationale: Comfortable pace for anchor navigation without feeling slow
    # @constraint: min=500, max=1200

  section_offset:
    value: 80
    # @unit: pixels
    # @rationale: Accounts for fixed header, provides breathing room
    # @constraint: min=60, max=120