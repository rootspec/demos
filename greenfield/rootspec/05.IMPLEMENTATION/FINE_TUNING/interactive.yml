# -----------------------------------------------------------------------------
# Spec Wizard
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/INTERACTIVE_SYSTEM.md

spec_wizard:
  steps: 3
  # @rationale: Three steps (idea, mission, pillars) provides enough depth
  #   without overwhelming a casual visitor
  # @constraints: min=2, max=5, type=integer

  mission_templates: 6
  # @rationale: Enough variety to cover common product types without
  #   overwhelming choice; fewer than 10 to prevent decision paralysis
  # @constraints: min=4, max=10, type=integer
  # @review_date: 2026-07-01

  pillar_suggestions: 20
  # @rationale: Wide enough to cover most product categories;
  #   visitors rarely see all options before finding relevant ones
  # @constraints: min=12, max=30, type=integer

  pillars_min: 3
  # @rationale: Three pillars is the minimum for meaningful spec structure;
  #   fewer doesn't provide enough constraints on the product identity
  # @spec_source: 01.PHILOSOPHY.md - Design Pillars section
  # @constraints: min=2, max=5, type=integer

  pillars_max: 5
  # @rationale: Five pillars is the framework recommended maximum;
  #   more than five dilutes focus per 01.PHILOSOPHY.md guidelines
  # @inviolable: true
  # @spec_source: 01.PHILOSOPHY.md - Design Pillars section
  # @constraints: min=3, max=8, type=integer
