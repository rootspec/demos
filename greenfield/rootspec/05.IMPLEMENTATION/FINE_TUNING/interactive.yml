hierarchy_explorer:
  expand_animation_duration:
    value: 250
    # @unit: milliseconds
    # @rationale: Responsive enough to feel direct, long enough to orient the user to what expanded
    # @constraint: min=150, max=500

wizard:
  minimum_pillars:
    value: 1
    # @unit: count
    # @rationale: At least one pillar required to produce meaningful output; keeps barrier low
    # @constraint: min=1, max=3

  maximum_pillars:
    value: 5
    # @unit: count
    # @rationale: Matches L1 spec guidance (3-5 pillars); caps selection to match methodology
    # @constraint: min=3, max=7

  output_animation_duration:
    value: 300
    # @unit: milliseconds
    # @rationale: Output appears with enough motion to signal completion without delaying the user
    # @constraint: min=150, max=600
