hierarchy_explorer:
  expand_duration:
    value: 250
    # @unit: milliseconds
    # @rationale: Long enough to see content appearing, short enough not to feel slow
    # @constraint: min=150, max=500, type=integer

wizard:
  min_pillars:
    value: 3
    # @rationale: Fewer than 3 pillars produces a spec without meaningful differentiation
    # @constraint: min=2, max=3, type=integer

  max_pillars:
    value: 5
    # @rationale: More than 5 pillars creates decision paralysis and dilutes focus
    # @constraint: min=5, max=7, type=integer

  step_transition_duration:
    value: 200
    # @unit: milliseconds
    # @rationale: Consistent with theme transition; fast enough to feel responsive
    # @constraint: min=100, max=400, type=integer

comparison:
  panel_transition_duration:
    value: 150
    # @unit: milliseconds
    # @rationale: Mobile toggle should feel snappy; content change is the focus, not the animation
    # @constraint: min=100, max=300, type=integer
