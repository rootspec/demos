# -----------------------------------------------------------------------------
# Hierarchy Explorer
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/INTERACTIVE_SYSTEM.md

hierarchy_explorer:
  transition_duration_ms: 200
  # @rationale: Quick and functional; consistent with theme transition timing
  # @constraints: min=100, max=300, type=integer
  # @unit: milliseconds

  min_tap_target_px: 44
  # @rationale: WCAG 2.5.5 (Level AAA) recommends 44x44px minimum; Apple HIG requires same
  # @reference: https://www.w3.org/WAI/WCAG21/Understanding/target-size.html
  # @constraints: min=44, type=integer
  # @unit: pixels

  default_expanded_levels: 0
  # @rationale: All levels start collapsed; visitor interaction reveals content progressively
  # @constraints: min=0, max=5, type=integer
  # @alternatives: [1]

# -----------------------------------------------------------------------------
# Spec Wizard
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/INTERACTIVE_SYSTEM.md

spec_wizard:
  min_pillars_required: 3
  # @rationale: RootSpec recommends 3-5 design pillars; requiring 3 enforces the methodology minimum
  # @spec_source: 01.PHILOSOPHY.md
  # @constraints: min=1, max=5, type=integer

  max_pillars_allowed: 5
  # @rationale: More than 5 pillars dilutes focus per L1 guidance
  # @inviolable: true
  # @spec_source: 01.PHILOSOPHY.md
  # @constraints: min=3, max=8, type=integer

  mission_template_count: 6
  # @rationale: Enough variety to cover common product types without overwhelming the visitor
  # @constraints: min=3, max=12, type=integer

  pillar_suggestion_count: 12
  # @rationale: Rich enough to cover diverse product types; manageable in a grid layout
  # @constraints: min=6, max=20, type=integer

# -----------------------------------------------------------------------------
# Layout Breakpoints
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/LAYOUT_SYSTEM.md

breakpoints:
  narrow_max_px: 767
  # @rationale: Standard mobile breakpoint consistent with Tailwind sm (640px) and md (768px)
  # @constraints: type=integer
  # @unit: pixels

  medium_min_px: 768
  # @constraints: type=integer
  # @unit: pixels

  wide_min_px: 1024
  # @rationale: At this width comparison panels can sit comfortably side-by-side
  # @constraints: type=integer
  # @unit: pixels
