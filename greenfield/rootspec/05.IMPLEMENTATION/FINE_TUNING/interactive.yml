# -----------------------------------------------------------------------------
# Hierarchy Explorer
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/INTERACTIVE_SYSTEM.md

hierarchy_explorer:
  expand_duration_ms: 200
  # @rationale: Quick enough to feel mechanical, not playful; matches editorial feel
  # @constraints: min=100, max=400, type=integer
  # @spec_source: 03.INTERACTIONS.md — "mechanical, not magical" motion principle

  collapse_duration_ms: 150
  # @rationale: Collapse is faster than expand — disappearance should not linger
  # @constraints: min=80, max=300, type=integer

  max_expanded: 1
  # @rationale: Only one level expanded at a time; forces deliberate navigation
  # @inviolable: true
  # @spec_source: 04.SYSTEMS/INTERACTIVE_SYSTEM.md

# -----------------------------------------------------------------------------
# Spec Wizard
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/INTERACTIVE_SYSTEM.md

spec_wizard:
  total_steps: 4
  # @rationale: Mission + pillars + key interaction = three substantive inputs
  #   plus the output review step; four total is the minimum for meaningful output
  # @inviolable: true

  min_pillars: 3
  # @rationale: Fewer than 3 pillars does not demonstrate the hierarchy concept
  # @constraints: min=2, max=3, type=integer

  max_pillars: 5
  # @rationale: More than 5 dilutes focus; matches L1 Philosophy pillar guidance
  # @constraints: min=4, max=8, type=integer
  # @spec_source: 01.PHILOSOPHY.md — Design Pillars section

  pillar_suggestions_count: 12
  # @rationale: Enough variety to feel useful without overwhelming; visitor picks 3-5
  # @constraints: min=8, max=20, type=integer

  mission_templates_count: 5
  # @rationale: Enough to illustrate variety; not so many that choice is paralysing
  # @constraints: min=3, max=10, type=integer
