# -----------------------------------------------------------------------------
# Spec Wizard Input Limits
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/INTERACTIVE_SYSTEM.md

wizard:
  idea_max_chars: 200
  # @rationale: Long enough for a clear one-liner; short enough to force clarity
  # @constraints: min=50, max=500, type=integer

  mission_max_chars: 300
  # @rationale: Mission statements should be concise; one to two sentences max
  # @constraints: min=100, max=1000, type=integer

  min_pillars: 3
  # @rationale: Fewer than 3 pillars suggests insufficient differentiation
  # @constraints: min=1, max=5, type=integer

  max_pillars: 5
  # @rationale: More than 5 pillars indicates lack of focus (per L1 inviolable principles)
  # @reference: 01.PHILOSOPHY.md - Design Pillars guidance (3-5 recommended)
  # @constraints: min=3, max=8, type=integer

  pillar_max_chars: 100
  # @rationale: Each pillar should be a short phrase, not a paragraph
  # @constraints: min=10, max=300, type=integer

  interaction_max_chars: 500
  # @rationale: Key interaction description; enough for specificity without design docs
  # @constraints: min=50, max=2000, type=integer
