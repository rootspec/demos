# =============================================================================
# FINE-TUNING: Interactive System
# =============================================================================
# @spec_version: 1.0.0
# @spec_source: 04.SYSTEMS/INTERACTIVE_SYSTEM.md
# @last_updated: 2026-04-14T00:00:00Z

hierarchy_explorer:
  expand_animation_duration:
    value: 250
    # @unit: milliseconds
    # @rationale: Feels snappy without jarring; gives user time to notice the expansion
    # @constraint: min=150, max=500

  reference_highlight_delay:
    value: 80
    # @unit: milliseconds
    # @rationale: Slight delay prevents highlights from flickering during fast mouse movement
    # @constraint: min=0, max=200

spec_wizard:
  product_idea_max_length:
    value: 200
    # @unit: characters
    # @rationale: Long enough for a complete sentence; short enough to keep focus

  pillar_count_min:
    value: 1
    # @unit: count
    # @rationale: Must select at least one pillar to produce meaningful output

  pillar_count_max:
    value: 5
    # @unit: count
    # @rationale: Matches L1 spec guidance; more than 5 pillars dilutes focus

layout:
  scroll_animation_duration:
    value: 400
    # @unit: milliseconds
    # @rationale: Smooth but not slow; matches common scroll reveal patterns
    # @constraint: min=200, max=600

  min_viewport_width:
    value: 320
    # @unit: pixels
    # @rationale: Minimum width to support without horizontal scroll (iPhone SE)
