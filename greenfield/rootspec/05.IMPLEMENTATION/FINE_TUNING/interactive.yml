# -----------------------------------------------------------------------------
# Hierarchy Explorer Animations
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/INTERACTIVE_SYSTEM.md

hierarchy_explorer:
  expand_duration: 250
  # @rationale: Accordion open feels responsive without being jarring
  # @constraints: min=100, max=500, type=integer, unit=ms
  # @alternatives: [150, 200, 300]

  collapse_duration: 200
  # @rationale: Slightly faster than expand — closing feels crisper
  # @constraints: min=100, max=400, type=integer, unit=ms

# -----------------------------------------------------------------------------
# Wizard
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/INTERACTIVE_SYSTEM.md

wizard:
  min_pillars: 3
  # @rationale: Fewer than 3 pillars doesn't give meaningful output; matches L1 guidance
  # @constraints: min=1, max=5, type=integer
  # @inviolable: false

  max_pillars: 5
  # @rationale: Matches L1 recommendation of 3-5 design pillars; enforces discipline
  # @constraints: min=3, max=8, type=integer
  # @spec_source: 01.PHILOSOPHY.md

  product_idea_max_chars: 200
  # @rationale: Forces concise framing; long inputs produce poor skeleton output
  # @constraints: min=50, max=500, type=integer

  copy_confirmation_duration: 2000
  # @rationale: Long enough to notice "Copied!" label; short enough to reset cleanly
  # @constraints: min=1000, max=4000, type=integer, unit=ms

# -----------------------------------------------------------------------------
# Section Entry Animations
# -----------------------------------------------------------------------------
# @spec_source: 03.INTERACTIONS.md

section_animations:
  entry_duration: 400
  # @rationale: Smooth but not slow; keeps reading flow intact
  # @constraints: min=200, max=800, type=integer, unit=ms
  # @alternatives: [300, 500]

  entry_offset_px: 20
  # @rationale: Subtle upward slide; noticeable without being theatrical
  # @constraints: min=0, max=60, type=integer, unit=px

  intersection_threshold: 0.15
  # @rationale: Animation triggers when 15% of section is visible — early enough to feel natural
  # @constraints: min=0.05, max=0.5, type=float
