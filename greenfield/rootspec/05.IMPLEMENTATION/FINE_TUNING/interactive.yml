hierarchy_expand_duration:
  value: 250
  # @unit: milliseconds
  # @rationale: Smooth but not sluggish; allows user to perceive the expansion without waiting
  # @constraint: min=150, max=400

wizard_step_transition_duration:
  value: 200
  # @unit: milliseconds
  # @rationale: Snappy step transitions keep momentum; too long feels sluggish
  # @constraint: min=100, max=350

wizard_min_pillars:
  value: 3
  # @unit: count
  # @rationale: Three pillars is the minimum to produce meaningful spec output; matches L1 guidance
  # @constraint: min=2, max=3

wizard_max_pillars:
  value: 5
  # @unit: count
  # @rationale: Five is the L1-specified maximum for design pillars; keeps output focused
  # @constraint: max=5

wizard_mission_template_count:
  value: 4
  # @unit: count
  # @rationale: Enough variety to cover common product types; not so many that choice is paralyzing
  # @constraint: min=3, max=6

comparison_panel_transition_duration:
  value: 180
  # @unit: milliseconds
  # @rationale: Slightly faster than expand — comparison is a simple toggle, not a reveal
  # @constraint: min=100, max=300
