# @spec_version: 1.0.0
# @spec_source: 04.SYSTEMS/INTERACTIVE_SYSTEM.md
# @last_updated: 2026-04-12T00:00:00Z

wizard_idea_max_chars:
  value: 200
  # @unit: characters
  # @rationale: Long enough to express a real idea; short enough to force concision
  # @constraint: min=100, max=500

wizard_min_pillars:
  value: 3
  # @unit: count
  # @rationale: Three pillars is the minimum for meaningful design differentiation
  # @constraint: min=2, max=3

wizard_max_pillars:
  value: 5
  # @unit: count
  # @rationale: Five pillars is the RootSpec recommended maximum before pillars become noise
  # @constraint: max=7

hierarchy_animation_duration:
  value: 250
  # @unit: milliseconds
  # @rationale: Expansion should feel physical but not slow; 250ms is the sweet spot for expand/collapse
  # @constraint: min=150, max=500

before_after_mobile_breakpoint:
  value: 768
  # @unit: pixels (viewport width)
  # @rationale: Below this width, slider mode is hidden and toggle mode is used exclusively
  # @constraint: min=480, max=1024
