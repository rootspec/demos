# @spec_source: 04.SYSTEMS/INTERACTIVE_SYSTEM.md
# @last_updated: 2026-04-14T03:28:25Z

hierarchy_explorer:
  expand_animation_duration:
    value: 200
    # @unit: milliseconds
    # @rationale: Fast enough to feel snappy, slow enough to be noticeable as intentional
    # @constraint: min=100, max=500, type=integer

  reference_highlight_opacity_dim:
    value: 0.3
    # @unit: ratio (0.0–1.0)
    # @rationale: Dims non-referenced levels enough to emphasize referenced ones without hiding them
    # @constraint: min=0.1, max=0.6, type=float

spec_wizard:
  min_pillars_recommended:
    value: 3
    # @unit: count
    # @rationale: Matches RootSpec guidance that 3–5 design pillars provides sufficient coverage without dilution
    # @constraint: min=1, max=5, type=integer

  max_pillars_recommended:
    value: 5
    # @unit: count
    # @rationale: More than 5 pillars typically indicates unclear priorities; wizard signals this to the user
    # @constraint: min=3, max=10, type=integer

  suggestion_chips_count:
    value: 10
    # @unit: count
    # @rationale: Enough options to feel like a real choice; too many overwhelms and undermines approachability
    # @constraint: min=6, max=15, type=integer

comparison:
  toggle_crossfade_duration:
    value: 150
    # @unit: milliseconds
    # @rationale: Crossfade communicates panel switch without being distracting
    # @constraint: min=50, max=400, type=integer

  slider_step_size:
    value: 5
    # @unit: percent
    # @rationale: Arrow key step of 5% gives fine control without requiring too many keypresses to traverse
    # @constraint: min=1, max=20, type=integer
