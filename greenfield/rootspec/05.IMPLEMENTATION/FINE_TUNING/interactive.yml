# -----------------------------------------------------------------------------
# Hierarchy Explorer
# -----------------------------------------------------------------------------

hierarchy_explorer:
  expand_duration: 250
  # @rationale: Fast expand for exploratory UI; should feel snappy
  # @constraints: min=100, max=500, type=integer, unit=ms

  levels_count: 5
  # @rationale: Fixed by RootSpec methodology; not a tunable parameter
  # @inviolable: true
  # @spec_source: 01.PHILOSOPHY.md - The five-level hierarchy is the core mechanism

# -----------------------------------------------------------------------------
# Spec Wizard
# -----------------------------------------------------------------------------

wizard:
  steps_count: 3
  # @rationale: Three steps balances completeness with approachability
  # @inviolable: false
  # @constraints: min=2, max=5, type=integer

  mission_template_count: 5
  # @rationale: Enough variety to cover main product categories without overwhelming
  # @constraints: min=3, max=10, type=integer

  pillar_suggestion_count: 12
  # @rationale: Grid of suggestions; visitor selects 3-5; enough variety to feel personal
  # @constraints: min=6, max=20, type=integer

  pillar_min_selection: 3
  # @rationale: Three pillars minimum to demonstrate the multi-pillar concept
  # @constraints: min=1, max=3, type=integer

  pillar_max_selection: 5
  # @rationale: Five pillars maximum per L1 specification guidelines
  # @inviolable: true
  # @spec_source: 01.PHILOSOPHY.md - Design Pillars (3-5 core experiences)
