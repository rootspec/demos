# -----------------------------------------------------------------------------
# Spec Wizard Configuration
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/INTERACTIVE_SYSTEM.md

wizard:
  min_pillars: 3
  # @rationale: Three pillars is the minimum to demonstrate the concept meaningfully
  # @spec_source: 04.SYSTEMS/INTERACTIVE_SYSTEM.md
  # @constraints: min=2, max=3, type=integer

  max_pillars: 5
  # @rationale: Five pillars matches the RootSpec L1 recommendation; more dilutes focus
  # @spec_source: 01.PHILOSOPHY.md, 04.SYSTEMS/INTERACTIVE_SYSTEM.md
  # @constraints: min=4, max=8, type=integer

  mission_template_count: 6
  # @rationale: Enough variety for common product types without overwhelming choice
  # @constraints: min=4, max=10, type=integer

  pillar_suggestion_count: 12
  # @rationale: Rich enough for visitors to find resonant options; scan-friendly at this count
  # @constraints: min=8, max=20, type=integer

# -----------------------------------------------------------------------------
# Touch Targets
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/INTERACTIVE_SYSTEM.md

touch:
  min_target_size_px: 44
  # @rationale: Apple HIG and WCAG 2.5.5 recommend 44x44px minimum for touch targets
  # @reference: https://developer.apple.com/design/human-interface-guidelines/accessibility
  # @constraints: min=44, max=64, type=integer
  # @inviolable: true
