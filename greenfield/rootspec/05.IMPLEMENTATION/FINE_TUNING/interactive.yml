# -----------------------------------------------------------------------------
# Hierarchy Explorer
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/INTERACTIVE_SYSTEM.md

hierarchy_explorer:
  animation_duration_ms: 200
  # @rationale: Short enough to feel snappy, long enough for the expand animation to be perceptible
  # @constraints: min=100, max=500, type=integer
  # @unit: milliseconds

# -----------------------------------------------------------------------------
# Spec Your Idea Wizard
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/INTERACTIVE_SYSTEM.md

wizard:
  min_pillars: 3
  # @rationale: RootSpec philosophy requires 3-5 design pillars; fewer than 3 is too narrow to be meaningful
  # @spec_source: 01.PHILOSOPHY.md (Design Pillars guidance)
  # @constraints: min=2, max=3, type=integer

  max_pillars: 5
  # @rationale: More than 5 design pillars dilutes focus; the framework guidance recommends 3-5
  # @spec_source: 01.PHILOSOPHY.md (Design Pillars guidance), 00.FRAMEWORK.md
  # @constraints: min=5, max=8, type=integer

  step_count: 4
  # @rationale: Three input steps (mission, pillars, interaction) plus one output step = 4 total
  # @constraints: type=integer
  # @inviolable: true

# -----------------------------------------------------------------------------
# Before/After Comparison
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/INTERACTIVE_SYSTEM.md

before_after:
  slider_default_position: 0.5
  # @rationale: Center is the neutral starting point; neither panel is privileged
  # @constraints: min=0.1, max=0.9, type=float

  slider_keyboard_step: 0.1
  # @rationale: 10% increments allow fine control without requiring too many keystrokes to traverse
  # @constraints: min=0.05, max=0.25, type=float
