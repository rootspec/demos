# Timing values in milliseconds
interaction_timing:
  theme_transition: 200          # Rationale: Smooth but not distractingly slow
  hierarchy_expand: 300          # Rationale: Allows content to flow naturally
  wizard_step_transition: 250    # Rationale: Maintains flow between steps
  comparison_slider: 150         # Rationale: Responsive drag feedback

# Touch targets in pixels (minimum for accessibility)
touch_targets:
  minimum_size: 44              # Rationale: WCAG AA compliance for mobile
  button_padding: 12            # Rationale: Comfortable spacing around interactive elements
  slider_handle: 48             # Rationale: Easy to grab on mobile devices

# Wizard flow parameters
wizard_config:
  max_pillars: 5                # Rationale: Prevents overwhelming choice paralysis
  min_pillars: 3                # Rationale: Ensures meaningful design foundation
  idea_max_length: 100          # Rationale: Forces concise problem statement
  interaction_max_length: 200   # Rationale: Detailed enough for meaningful spec

# Hierarchy explorer parameters
hierarchy_config:
  max_expanded_levels: 2        # Rationale: Prevents cognitive overload
  reference_highlight_delay: 100 # Rationale: Immediate visual feedback
  content_preview_lines: 3      # Rationale: Enough to understand without overwhelming

# Animation easing and curves
animation_config:
  easing_function: 'ease-out'   # Rationale: Natural feeling motion
  stagger_delay: 50             # Rationale: Smooth sequential animations
  hover_response: 100           # Rationale: Immediate visual feedback