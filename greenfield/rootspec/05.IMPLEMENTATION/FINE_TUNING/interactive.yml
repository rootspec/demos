wizard:
  min_pillars:
    value: 3
    # @unit: count
    # @rationale: Fewer than 3 pillars produces a spec too sparse to be meaningful
    # @constraint: min=2, max=5, type=integer

  max_pillars:
    value: 5
    # @unit: count
    # @rationale: More than 5 pillars dilutes the design focus; 3-5 is RootSpec convention
    # @constraint: min=3, max=7, type=integer

  mission_templates_count:
    value: 6
    # @unit: count
    # @rationale: Enough variety for a developer audience without overwhelming choice
    # @constraint: min=4, max=12, type=integer

  pillar_suggestions_count:
    value: 12
    # @unit: count
    # @rationale: Large enough pool to feel responsive to diverse product ideas; small enough to scan quickly
    # @constraint: min=8, max=20, type=integer
