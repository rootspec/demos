wizard_mission_max_chars:
  value: 200
  # @unit: characters
  # @rationale: Long enough for a sentence; short enough to keep the wizard focused
  # @constraint: min=50, max=500

wizard_pillars_min:
  value: 3
  # @unit: count
  # @rationale: Fewer than 3 pillars produces a sparse spec; matches L1 philosophy minimum

wizard_pillars_max:
  value: 5
  # @unit: count
  # @rationale: More than 5 pillars becomes hard to prioritize; matches L1 philosophy maximum

wizard_interaction_max_chars:
  value: 300
  # @unit: characters
  # @rationale: Enough to describe one interaction in detail; prevents essay-length input
  # @constraint: min=50, max=1000

comparison_slider_default_position:
  value: 50
  # @unit: percent
  # @rationale: Start centered so both panels are equally visible on load
  # @constraint: min=0, max=100
