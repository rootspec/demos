# -----------------------------------------------------------------------------
# Hierarchy Explorer
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/HIERARCHY_EXPLORER.md

hierarchy_explorer:
  expand_duration: 200
  # @unit: milliseconds
  # @rationale: Quick enough to feel responsive; long enough to be clearly intentional
  # @constraints: min=100, max=300, type=integer

  collapse_duration: 150
  # @unit: milliseconds
  # @rationale: Slightly faster than expand — closing is a secondary action
  # @constraints: min=100, max=250, type=integer

  highlight_duration: 100
  # @unit: milliseconds
  # @rationale: Hover highlight should be nearly instant — feedback to micro-interaction
  # @constraints: min=50, max=200, type=integer

  max_expanded_levels: 1
  # @rationale: Only one level expanded at a time to avoid visual clutter and maintain focus
  # @inviolable: true
  # @constraints: type=integer, value=1

# -----------------------------------------------------------------------------
# Spec Wizard
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/SPEC_WIZARD.md

spec_wizard:
  step_transition_duration: 200
  # @unit: milliseconds
  # @rationale: Step transitions should feel purposeful; too fast feels broken, too slow feels sluggish
  # @constraints: min=150, max=350, type=integer

  output_appear_duration: 250
  # @unit: milliseconds
  # @rationale: Output appearing is a reward moment — slightly more prominent than navigation transitions
  # @constraints: min=150, max=400, type=integer

  total_steps: 3
  # @rationale: Three steps captures the key elements of a spec foundation (mission, pillars, interaction) without becoming a survey
  # @inviolable: true
  # @constraints: type=integer, value=3
