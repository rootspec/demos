# @status: production
# @spec_source: 04.SYSTEMS/INTERACTIVE_SYSTEM.md

hierarchy_explorer:
  level_count: 5
  # @rationale: Fixed — RootSpec has exactly five levels, this is not configurable
  # @constraints: type=integer, fixed=true

  max_expanded: 1
  # @rationale: Only one level open at a time; prevents cognitive overload and keeps layout stable
  # @alternatives: [1, 3, 5]
  # @constraints: min=1, max=5, type=integer

spec_wizard:
  step_count: 3
  # @rationale: Three steps (idea → mission → pillars) maps cleanly to L1 without overwhelming
  # @constraints: type=integer, fixed=true

  min_pillars: 3
  # @rationale: Minimum needed to reflect genuine design thinking; fewer feels trivial
  # @constraints: min=1, max=5, type=integer

  max_pillars: 5
  # @rationale: Matches the RootSpec design pillar recommendation of 3-5
  # @reference: 00.FRAMEWORK.md — "Design Pillars: 3-5 core experiences"
  # @constraints: min=3, max=7, type=integer

  mission_template_count: 4
  # @rationale: Enough variety to feel useful without overwhelming; covers common archetypes
  # @constraints: min=3, max=6, type=integer

  pillar_suggestion_count: 12
  # @rationale: Large enough set for diverse needs; small enough to scan in one pass
  # @constraints: min=8, max=20, type=integer

section_transitions:
  scroll_threshold: 0.15
  # @rationale: Section becomes "visible" when 15% enters viewport; triggers early enough to feel smooth
  # @constraints: min=0.0, max=0.5, type=float
  # @reference: IntersectionObserver threshold

  fade_offset_px: 20
  # @rationale: Subtle translateY offset; enough to imply motion without being distracting
  # @alternatives: [10, 20, 40]
  # @constraints: min=5, max=60, type=integer, unit=px
