# -----------------------------------------------------------------------------
# Motion / Transition Timing
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/THEME_SYSTEM.md

transitions:
  quick: 150
  # @unit: milliseconds
  # @rationale: Fast enough to feel responsive, visible enough to feel intentional
  # @constraints: min=100, max=250, type=integer
  # @spec_source: 03.INTERACTIONS.md

  standard: 250
  # @unit: milliseconds
  # @rationale: Standard ease-out for component state changes; mechanical not magical
  # @alternatives: [200, 300]
  # @constraints: min=150, max=350, type=integer

  theme_switch: 200
  # @unit: milliseconds
  # @rationale: Theme changes should be perceptible but not distracting
  # @constraints: min=100, max=300, type=integer

easing: "ease-out"
# @rationale: Quick start, smooth stop — tool-like, not playful
# @alternatives: ["linear", "ease-in-out"]
# @inviolable: true
# @spec_source: 04.SYSTEMS/THEME_SYSTEM.md

# -----------------------------------------------------------------------------
# Typography Scale
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/THEME_SYSTEM.md

typography:
  prose_max_width: 72
  # @unit: characters (ch)
  # @rationale: Comfortable reading line length for long-form prose; editorial standard
  # @reference: https://practicaltypography.com/line-length.html
  # @constraints: min=60, max=85, type=integer

  touch_target_min: 44
  # @unit: pixels
  # @rationale: WCAG 2.5.5 recommended minimum touch target size
  # @reference: https://www.w3.org/WAI/WCAG21/Understanding/target-size.html
  # @inviolable: true
  # @constraints: min=44, type=integer

# -----------------------------------------------------------------------------
# Wizard Parameters
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/SPEC_WIZARD.md

wizard:
  pillar_min_count: 3
  # @rationale: Three pillars is the philosophical minimum for a coherent product identity; matches L1 spec guidance
  # @constraints: min=2, max=4, type=integer

  pillar_max_count: 5
  # @rationale: More than five pillars dilutes focus; matches L1 spec guidance (3-5 pillars)
  # @constraints: min=4, max=8, type=integer

  pillar_suggestion_count: 12
  # @rationale: Enough variety to cover common product types without overwhelming the interface
  # @constraints: min=8, max=20, type=integer

  product_idea_min_length: 10
  # @unit: characters
  # @rationale: Minimum viable product description; filters out accidental clicks
  # @constraints: min=5, max=30, type=integer

  key_interaction_min_length: 20
  # @unit: characters
  # @rationale: Long enough to describe a meaningful interaction; short enough to not be intimidating
  # @constraints: min=10, max=50, type=integer
