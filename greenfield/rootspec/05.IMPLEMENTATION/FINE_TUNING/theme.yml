# -----------------------------------------------------------------------------
# Transition Timing
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/THEME_SYSTEM.md

transitions:
  theme_switch_duration_ms: 200
  # @rationale: Fast enough to feel immediate, slow enough to be visible as intentional
  # @reference: Nielsen Norman Group - Response Times (perceptible at 100ms, comfortable up to 250ms)
  # @constraints: min=100, max=300, type=integer
  # @unit: milliseconds

  element_transition_duration_ms: 150
  # @rationale: Functional transitions for hover and focus states; not decorative
  # @constraints: min=50, max=250, type=integer
  # @unit: milliseconds

# -----------------------------------------------------------------------------
# Default Theme
# -----------------------------------------------------------------------------

defaults:
  preferred_mode: "light"
  # @rationale: Editorial sites read better in light mode per L1/L2 aesthetic principles
  # @inviolable: true
  # @spec_source: 01.PHILOSOPHY.md, 02.TRUTHS.md

  storage_key: "rootspec-theme"
  # @rationale: Namespaced to avoid localStorage collisions with other sites on same origin
