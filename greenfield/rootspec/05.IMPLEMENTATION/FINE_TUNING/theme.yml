# -----------------------------------------------------------------------------
# Light Mode Color Tokens
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/PRESENTATION_SYSTEM.md

light:
  background: "#FAFAF8"
  # @rationale: Near-white with slight warmth; not pure white which feels clinical
  # @constraints: type=hex_color

  surface: "#FFFFFF"
  # @rationale: Pure white for card surfaces that need to lift off background
  # @constraints: type=hex_color

  text_primary: "#1A1A18"
  # @rationale: Near-black with slight warmth; not pure black which is harsh on near-white bg
  # @constraints: type=hex_color

  text_secondary: "#5C5C56"
  # @rationale: Muted for secondary text; sufficient contrast on both bg and surface
  # @constraints: type=hex_color

  border: "#E2E2DC"
  # @rationale: Subtle border that separates without competing
  # @constraints: type=hex_color

  accent: "#2D6A4F"
  # @rationale: Muted green; signals "this works, this validates" — connected to the methodology's validation-first philosophy
  # @reference: L1 Design Pillar "Proof Over Plausibility"
  # @constraints: type=hex_color
  # @alternatives: ["#2563EB (blue)", "#7C3AED (purple)", "#B45309 (amber)"]

# -----------------------------------------------------------------------------
# Dark Mode Color Tokens
# -----------------------------------------------------------------------------

dark:
  background: "#141414"
  # @rationale: Dark neutral; not pure black
  # @constraints: type=hex_color

  surface: "#1E1E1E"
  # @rationale: Slightly lighter than background for surface elevation
  # @constraints: type=hex_color

  text_primary: "#F0F0EC"
  # @rationale: Near-white with warmth to match light mode philosophy
  # @constraints: type=hex_color

  text_secondary: "#9E9E96"
  # @rationale: Muted but readable on dark background
  # @constraints: type=hex_color

  border: "#2A2A28"
  # @rationale: Subtle dark border
  # @constraints: type=hex_color

  accent: "#52B788"
  # @rationale: Lighter green for dark mode; maintains meaning, improves contrast
  # @constraints: type=hex_color
