# -----------------------------------------------------------------------------
# Transition
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/THEME_SYSTEM.md

transition:
  duration_ms: 200
  # @rationale: Fast enough that the theme change feels instant, slow enough that CSS custom property
  #   transitions animate smoothly rather than snapping
  # @constraints: min=0, max=400, type=integer
  # @unit: milliseconds

# -----------------------------------------------------------------------------
# Default Theme
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/THEME_SYSTEM.md, 02.TRUTHS.md

defaults:
  fallback_theme: light
  # @rationale: Light is the conventional default; dark is applied only when explicitly requested
  #   (system preference or user toggle). Prevents jarring dark flash for users without a preference.
  # @inviolable: false
  # @constraints: enum=[light, dark]
