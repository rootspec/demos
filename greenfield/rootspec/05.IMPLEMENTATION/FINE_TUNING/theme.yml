# -----------------------------------------------------------------------------
# Theme Transition
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/THEME_SYSTEM.md

transition:
  duration_ms: 200
  # @rationale: Fast enough to feel instant, slow enough to avoid jarring flash
  # @reference: Nielsen Norman Group - Response Times
  # @alternatives: [100, 200, 300]
  # @constraints: min=100, max=400, type=integer

  easing: ease-in-out
  # @rationale: Symmetric easing feels natural for bidirectional mode switching
  # @constraints: type=string, values=[linear, ease, ease-in, ease-out, ease-in-out]

# -----------------------------------------------------------------------------
# Storage
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/THEME_SYSTEM.md

storage:
  key: rootspec-theme-preference
  # @rationale: Stable, namespaced key prevents collision with other localStorage entries
  # @constraints: type=string
