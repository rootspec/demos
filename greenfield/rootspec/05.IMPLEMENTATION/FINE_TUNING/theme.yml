# -----------------------------------------------------------------------------
# Theme Transition
# -----------------------------------------------------------------------------

transitions:
  duration: 200
  # @rationale: Fast enough to feel responsive, long enough to perceive as smooth
  # @constraints: min=100, max=400, type=integer
  # @reference: Nielsen Norman Group - Response Time Limits

  easing: ease-in-out
  # @rationale: Symmetric easing appropriate for toggle (not directional)
