# @status: production

theme:
  transition_duration:
    value: 200
    # @unit: milliseconds
    # @rationale: Fast enough to feel instant, slow enough to avoid harsh flicker on toggle
    # @constraint: min=100, max=400, type=integer

  section_reveal_duration:
    value: 400
    # @unit: milliseconds
    # @rationale: Standard ease-out reveal; slow enough to feel intentional, fast enough to not frustrate repeat visitors
    # @constraint: min=200, max=600, type=integer

  expand_collapse_duration:
    value: 250
    # @unit: milliseconds
    # @rationale: Hierarchy Explorer expand/collapse; matches perceived content weight of a short panel
    # @constraint: min=150, max=400, type=integer
