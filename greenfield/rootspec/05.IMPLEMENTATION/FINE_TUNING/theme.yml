# -----------------------------------------------------------------------------
# Theme Defaults
# -----------------------------------------------------------------------------

theme:
  default: 'light'
  # @rationale: Editorial sites read better in light mode; dark mode as default
  #   is a tell that the site was AI-generated from training-data defaults
  # @inviolable: true
  # @spec_source: 02.TRUTHS.md — Light mode default commitment

  storage_key: 'rootspec-theme'
  # @rationale: Stable key for localStorage persistence across sessions
  # @constraints: type=string

  switch_transition_ms: 0
  # @rationale: No animation on theme switch; jarring color shifts are worse
  #   than an instant change
  # @inviolable: true
  # @spec_source: 04.SYSTEMS/THEME_SYSTEM.md

# -----------------------------------------------------------------------------
# Motion
# -----------------------------------------------------------------------------

motion:
  transition_duration_ms: 200
  # @rationale: Quick and functional; ease-out reads as mechanical, not playful
  # @constraints: min=100, max=350, type=integer
  # @spec_source: 03.INTERACTIONS.md — "mechanical, not magical" motion principle

  easing: 'ease-out'
  # @rationale: Quick start, gentle stop; matches functional mechanical feel
  # @constraints: type=string
