# =============================================================================
# FINE-TUNING: Theme System
# =============================================================================
# @spec_version: 1.0.0
# @spec_source: 04.SYSTEMS/THEME_SYSTEM.md
# @last_updated: 2026-04-14T03:28:25Z

transitions:
  theme_transition_duration:
    value: 200
    # @unit: milliseconds
    # @rationale: Fast enough to feel responsive, slow enough for the color shift to be smooth and intentional
    # @constraint: min=50, max=500, type=integer

  theme_transition_properties:
    value: "background-color, color, border-color"
    # @unit: CSS property list
    # @rationale: Animate only color-related properties to avoid performance issues with layout transitions

storage:
  localStorage_key:
    value: "rootspec-theme"
    # @rationale: Namespaced to avoid collisions with other localStorage keys on the same domain
    # @inviolable: true — changing this key name loses saved preferences for existing users
