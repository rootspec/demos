# -----------------------------------------------------------------------------
# Transition Timing
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/THEME_SYSTEM.md

transitions:
  theme_switch_ms: 200
  # @rationale: Fast enough to feel immediate, noticeable enough to register
  # @reference: 03.INTERACTIONS.md - "150-250ms ease-out" for all transitions
  # @constraints: min=0, max=500, type=integer
  # @inviolable: false

  interactive_state_ms: 150
  # @rationale: Hover/focus state changes should feel snappy, not delayed
  # @spec_source: 03.INTERACTIONS.md
  # @constraints: min=0, max=300, type=integer

  expand_collapse_ms: 200
  # @rationale: Expand/collapse for hierarchy explorer; slightly longer to convey content appearing
  # @spec_source: 03.INTERACTIONS.md
  # @constraints: min=100, max=400, type=integer
