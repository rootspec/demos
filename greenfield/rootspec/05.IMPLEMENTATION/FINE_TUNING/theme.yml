# -----------------------------------------------------------------------------
# Theme Transition
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/THEME_SYSTEM.md

transitions:
  theme_switch_duration: 150
  # @rationale: Fast enough to feel instantaneous; slow enough to avoid jarring flash
  # @constraints: min=0, max=300, type=integer, unit=ms
  # @alternatives: [0, 100, 200]

  css_property: color
  # @rationale: Only color values transition; layout is instant to avoid reflow flicker
