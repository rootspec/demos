# =============================================================================
# FINE-TUNING: Theme System
# =============================================================================
# @spec_version: 1.0.0
# @spec_source: 04.SYSTEMS/THEME_SYSTEM.md
# @last_updated: 2026-04-12T00:00:00Z

theme_transition_duration:
  value: 200
  # @unit: milliseconds
  # @rationale: Fast enough to feel responsive, slow enough to be perceptible as intentional
  # @constraint: min=100, max=400

default_theme_fallback:
  value: "dark"
  # @unit: string enum (light | dark)
  # @rationale: Dark mode is preferred by the target developer audience; also reduces FOIT on initial load
  # @inviolable: false

localstorage_key:
  value: "rootspec-theme"
  # @rationale: Namespaced key avoids collision with other tools on the same origin
