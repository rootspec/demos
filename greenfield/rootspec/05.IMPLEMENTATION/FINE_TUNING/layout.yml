# -----------------------------------------------------------------------------
# Responsive Breakpoints
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/LAYOUT_SYSTEM.md

breakpoints:
  mobile_min: 320
  # @rationale: Minimum supported mobile width; covers virtually all smartphones
  # @constraints: min=320, max=480, type=integer, unit=px

  tablet_min: 768
  # @rationale: Standard tablet breakpoint; matches common CSS frameworks
  # @constraints: min=640, max=900, type=integer, unit=px

  desktop_min: 1024
  # @rationale: Standard desktop breakpoint; side-by-side layout becomes viable
  # @constraints: min=960, max=1280, type=integer, unit=px

# -----------------------------------------------------------------------------
# Spacing Scale
# -----------------------------------------------------------------------------

spacing:
  base: 4
  # @rationale: 4px base gives a clean 4/8/16/24/32/48/64 scale
  # @constraints: min=4, max=8, type=integer, unit=px

  section_vertical_padding: 80
  # @rationale: Enough breathing room between sections for visual separation
  # @constraints: min=48, max=120, type=integer, unit=px
  # @alternatives: [64, 96]

  content_max_width: 1200
  # @rationale: Wide enough for side-by-side content; narrow enough to read comfortably
  # @constraints: min=900, max=1440, type=integer, unit=px

# -----------------------------------------------------------------------------
# Sticky Header
# -----------------------------------------------------------------------------

sticky_header:
  scroll_threshold: 100
  # @rationale: Appears after user has scrolled past the top hero content
  # @constraints: min=50, max=300, type=integer, unit=px

  height: 56
  # @rationale: Compact enough to not consume too much vertical space on scroll
  # @constraints: min=40, max=80, type=integer, unit=px
