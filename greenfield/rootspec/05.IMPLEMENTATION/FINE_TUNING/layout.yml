# =============================================================================
# FINE-TUNING: Layout System
# =============================================================================
# @spec_version: 1.0.0
# @spec_source: 04.SYSTEMS/LAYOUT_SYSTEM.md
# @last_updated: 2026-04-25T17:37:48Z

mobile_breakpoint:
  value: 768
  # @unit: pixels
  # @rationale: Standard tablet/mobile breakpoint. Below this, single-column layout and collapsed nav apply.
  # @constraint: min=640, max=1024

minimum_supported_width:
  value: 320
  # @unit: pixels
  # @rationale: Smallest viewport that must support no horizontal scroll. Covers older iPhones and small Android devices.
  # @constraint: min=320, max=375
  # @inviolable: true

prose_max_width:
  value: 72
  # @unit: ch (character units)
  # @rationale: Editorial reading width. ~65-75ch is the classic optimal line length for long-form reading.
  # @constraint: min=60, max=80

content_max_width:
  value: 1200
  # @unit: pixels
  # @rationale: Prevents content from becoming too wide on very large screens while allowing generous desktop layout.
  # @constraint: min=960, max=1440

section_vertical_spacing:
  value: 96
  # @unit: pixels
  # @rationale: Generous whitespace between sections signals editorial quality. Breathing room is a design signal.
  # @constraint: min=64, max=128

nav_z_index:
  value: 100
  # @unit: integer
  # @rationale: Navigation must sit above all content including sticky diagram and interactive components.
  # @constraint: min=50, max=200

meta_banner_z_index:
  value: 200
  # @unit: integer
  # @rationale: Meta banner must sit above navigation — it is the most important element on the page.
  # @constraint: min=100, max=500
  # @inviolable: true
