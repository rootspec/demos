# =============================================================================
# FINE TUNING: Layout System
# =============================================================================
# @spec_version: 1.0.0
# @spec_source: 04.SYSTEMS/LAYOUT_SYSTEM.md
# @last_updated: 2026-04-16T00:00:00Z

breakpoints:
  mobile_max:
    value: 640
    # @unit: px
    # @rationale: Standard small-viewport breakpoint; below this, single-column layouts apply
    # @constraint: min=480, max=768

  tablet_max:
    value: 1024
    # @unit: px
    # @rationale: Mid-range breakpoint; two-column layouts become appropriate above mobile
    # @constraint: min=768, max=1280

scroll_behavior:
  anchor_scroll_duration:
    value: 400
    # @unit: milliseconds
    # @rationale: Smooth scroll fast enough to feel responsive, long enough to orient the user
    # @constraint: min=200, max=800

base_path:
  value: "/demos/greenfield/"
  # @rationale: GitHub Pages deployment subpath — all asset URLs and internal links must resolve relative to this
  # @inviolable: true
