# =============================================================================
# FINE-TUNING: Layout System
# =============================================================================
# @spec_version: 1.0.0
# @spec_source: 04.SYSTEMS/LAYOUT_SYSTEM.md
# @last_updated: 2026-04-14T00:00:00Z

responsive:
  mobile_breakpoint:
    value: 640
    # @unit: pixels
    # @rationale: Tailwind 'sm' breakpoint — aligns with framework defaults

  tablet_breakpoint:
    value: 768
    # @unit: pixels
    # @rationale: Tailwind 'md' breakpoint — two-column layout activates here

  max_content_width:
    value: 1280
    # @unit: pixels
    # @rationale: Wide enough for desktop readers; narrows to avoid overly long lines

section:
  vertical_padding:
    value: 96
    # @unit: pixels
    # @rationale: Generous spacing makes sections feel distinct and readable

  section_gap:
    value: 64
    # @unit: pixels
    # @rationale: Consistent rhythm between sections
