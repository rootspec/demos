# =============================================================================
# FINE-TUNING: Layout System
# =============================================================================
# @spec_version: 7.3.2
# @spec_source: 04.SYSTEMS/LAYOUT_SYSTEM.md
# @last_updated: 2026-04-16T00:00:00Z

section_entry_animation_duration:
  value: 400
  # @unit: milliseconds
  # @rationale: Long enough to feel polished; short enough not to delay content consumption
  # @constraint: min=200, max=600

section_entry_offset:
  value: 24
  # @unit: pixels
  # @rationale: Subtle upward travel on entry; enough to notice, not enough to feel like a jump
  # @constraint: min=8, max=48

mobile_breakpoint:
  value: 640
  # @unit: pixels
  # @rationale: Standard small-screen breakpoint; matches Tailwind's sm breakpoint
  # @constraint: min=480, max=768

tablet_breakpoint:
  value: 1024
  # @unit: pixels
  # @rationale: Standard medium-screen breakpoint; matches Tailwind's lg breakpoint
  # @constraint: min=768, max=1280

scroll_trigger_threshold:
  value: 0.15
  # @unit: ratio (0-1, fraction of element visible)
  # @rationale: Trigger animation when 15% of the section is visible; avoids premature firing
  # @constraint: min=0.05, max=0.4
