# -----------------------------------------------------------------------------
# Content Width
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/LAYOUT_SYSTEM.md

content:
  prose_max_width_px: 720
  # @unit: pixels
  # @rationale: Supports editorial line lengths (~70-80ch at 16px base); comfortable for long-form reading
  # @alternatives: [640, 768, 800]
  # @constraints: min=600, max=900, type=integer

  section_max_width_px: 1100
  # @unit: pixels
  # @rationale: Wide enough for side-by-side comparisons and the hierarchy explorer; constrained to avoid over-stretched layouts on large displays
  # @constraints: min=900, max=1400, type=integer

# -----------------------------------------------------------------------------
# Responsive Breakpoints
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/LAYOUT_SYSTEM.md

breakpoints:
  mobile_max_px: 640
  # @unit: pixels
  # @rationale: Below this width, single-column layout; interactive elements get touch-optimized variants
  # @constraints: min=360, max=768, type=integer

  tablet_max_px: 1024
  # @unit: pixels
  # @rationale: Between mobile and desktop; slightly wider columns, but still simplified interactive elements
  # @constraints: min=640, max=1280, type=integer

# -----------------------------------------------------------------------------
# Spacing Scale
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/LAYOUT_SYSTEM.md

spacing:
  section_vertical_padding_px: 96
  # @unit: pixels
  # @rationale: Generous whitespace between sections; the page should breathe; editorial standard
  # @alternatives: [64, 80, 128]
  # @constraints: min=48, max=160, type=integer

  section_horizontal_padding_px: 24
  # @unit: pixels
  # @rationale: Minimum safe margin from viewport edges on mobile; scales up on wider viewports
  # @constraints: min=16, max=48, type=integer
