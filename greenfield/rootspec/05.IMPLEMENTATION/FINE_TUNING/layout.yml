# -----------------------------------------------------------------------------
# Base Path
# -----------------------------------------------------------------------------

base_path: '/demos/greenfield/'
# @rationale: Canonical deployment path on GitHub Pages; same in all environments
# @inviolable: true
# @spec_source: 02.TRUTHS.md — Base path consistency commitment

# -----------------------------------------------------------------------------
# Breakpoints
# -----------------------------------------------------------------------------

breakpoints:
  mobile_max_px: 767
  # @rationale: Standard md breakpoint; below this navigation collapses and
  #   comparison panels stack vertically
  # @constraints: min=640, max=900, type=integer

  desktop_min_px: 768
  # @rationale: Paired with mobile_max_px; at this width two-column layouts activate
  # @constraints: min=641, max=901, type=integer
