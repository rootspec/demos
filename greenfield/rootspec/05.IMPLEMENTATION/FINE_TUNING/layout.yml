# =============================================================================
# FINE-TUNING: Layout System
# =============================================================================
# @spec_version: 1.0.0
# @spec_source: 04.SYSTEMS/LAYOUT_SYSTEM.md
# @last_updated: 2026-04-12T00:00:00Z

section_transition_duration:
  value: 300
  # @unit: milliseconds
  # @rationale: Smooth enough to signal section entry without slowing the reader
  # @constraint: min=150, max=600

section_transition_translate_y:
  value: 12
  # @unit: pixels
  # @rationale: Subtle vertical shift reinforces content entering from below; too large feels theatrical
  # @constraint: min=4, max=32

mobile_breakpoint:
  value: 768
  # @unit: pixels (viewport width)
  # @rationale: Standard tablet/mobile boundary; aligns with interactive system breakpoint
  # @constraint: min=640, max=960

desktop_breakpoint:
  value: 1200
  # @unit: pixels (viewport width)
  # @rationale: Wide enough for two-column layouts in comparison and explorer sections
  # @constraint: min=1024, max=1440

max_content_width:
  value: 1140
  # @unit: pixels
  # @rationale: Keeps line lengths readable and layout centered on wide monitors
  # @constraint: min=900, max=1400

nav_height:
  value: 56
  # @unit: pixels
  # @rationale: Compact enough to not compete with content; tall enough for comfortable tap targets
  # @constraint: min=48, max=80
