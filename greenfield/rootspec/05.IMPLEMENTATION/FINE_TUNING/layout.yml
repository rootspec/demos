# -----------------------------------------------------------------------------
# Typography Scale
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/LAYOUT_SYSTEM.md

typography:
  body_font_size_px: 18
  # @rationale: Editorial sites use slightly larger body text for comfortable long-form reading
  # @reference: Optimal web typography reading size per typographic research (16-20px)
  # @constraints: min=16, max=20, type=integer
  # @unit: pixels

  body_line_height: 1.75
  # @rationale: Generous line height for long-form prose; supports easy tracking across wide lines
  # @constraints: min=1.5, max=2.0, type=float

  prose_max_width_ch: 70
  # @rationale: 65-75 characters per line is the accepted range for comfortable prose reading
  # @reference: Bringhurst, The Elements of Typographic Style
  # @constraints: min=55, max=80, type=integer
  # @unit: characters

# -----------------------------------------------------------------------------
# Spacing Scale
# -----------------------------------------------------------------------------

spacing:
  base_unit_px: 8
  # @rationale: 8px base unit aligns with most design systems and screen pixel densities
  # @constraints: min=4, max=16, type=integer
  # @unit: pixels

  section_gap_px: 96
  # @rationale: Generous section breathing room per L2 editorial aesthetic truth (12 × base)
  # @constraints: min=48, max=128, type=integer
  # @unit: pixels

  section_internal_gap_px: 32
  # @rationale: Between section heading and body content (4 × base)
  # @constraints: min=16, max=48, type=integer
  # @unit: pixels

  horizontal_page_padding_px: 24
  # @rationale: Minimum padding preventing content from touching viewport edges at any width
  # @constraints: min=16, max=48, type=integer
  # @unit: pixels

# -----------------------------------------------------------------------------
# Content Width
# -----------------------------------------------------------------------------

content_width:
  max_page_width_px: 1200
  # @rationale: Comfortable reading and interaction at common desktop widths; prevents excessive stretching
  # @constraints: min=960, max=1440, type=integer
  # @unit: pixels
