# =============================================================================
# FINE-TUNING: Layout System
# =============================================================================
# @spec_version: 1.0.0
# @spec_source: 04.SYSTEMS/LAYOUT_SYSTEM.md
# @last_updated: 2026-04-16T00:00:00Z

animation_duration_fast:
  value: 150
  # @unit: milliseconds
  # @rationale: Fast enough to feel immediate for hover states; slow enough to register
  # @constraint: min=50, max=300

animation_duration_standard:
  value: 300
  # @unit: milliseconds
  # @rationale: Standard transition time for section entrances and interactive expand/collapse
  # @constraint: min=150, max=600

animation_delay_stagger:
  value: 75
  # @unit: milliseconds
  # @rationale: Small offset between successive entrance animations creates sequential flow without feeling slow
  # @constraint: min=25, max=200

page_load_target:
  value: 3
  # @unit: seconds
  # @rationale: 3s is the threshold where bounce rate increases significantly; static site should be well under this
  # @constraint: max=5

max_content_width:
  value: 1280
  # @unit: pixels
  # @rationale: Wide enough for desktop side-by-side layouts; matches Tailwind's xl breakpoint
