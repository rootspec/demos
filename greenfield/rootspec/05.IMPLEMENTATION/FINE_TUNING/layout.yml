# =============================================================================
# FINE-TUNING: Layout System
# =============================================================================
# @spec_version: 1.0.0
# @spec_source: 04.SYSTEMS/LAYOUT_SYSTEM.md
# @last_updated: 2026-04-07T23:11:36Z

breakpoints:
  mobile_max:
    value: 768
    # @unit: pixels
    # @rationale: Standard mobile breakpoint, accommodates most phones in landscape
    # @constraint: min=600, max=800
    # @inviolable: true

  tablet_max:
    value: 1024
    # @unit: pixels
    # @rationale: Standard tablet breakpoint, covers iPad and similar devices
    # @constraint: min=900, max=1200

  desktop_min:
    value: 1025
    # @unit: pixels
    # @rationale: Desktop starts where tablet ends, ensures no gaps
    # @constraint: min=1024, max=1280

containers:
  max_width:
    value: 1200
    # @unit: pixels
    # @rationale: Optimal line length for readability, accommodates most content
    # @constraint: min=1000, max=1400

  padding_mobile:
    value: 20
    # @unit: pixels
    # @rationale: Sufficient breathing room on small screens without wasting space
    # @constraint: min=16, max=32

  padding_desktop:
    value: 40
    # @unit: pixels
    # @rationale: Generous spacing on larger screens improves visual hierarchy
    # @constraint: min=24, max=60

typography:
  base_font_size:
    value: 16
    # @unit: pixels
    # @rationale: Browser default, optimal for accessibility and readability
    # @constraint: min=14, max=18
    # @inviolable: true

  line_height_body:
    value: 1.6
    # @unit: ratio
    # @rationale: Excellent readability for body text, accessibility compliant
    # @constraint: min=1.4, max=1.8

  line_height_headings:
    value: 1.2
    # @unit: ratio
    # @rationale: Tighter spacing for headings improves visual impact
    # @constraint: min=1.1, max=1.4

  max_line_length:
    value: 65
    # @unit: characters
    # @rationale: Optimal reading comfort, prevents eye strain on wide screens
    # @constraint: min=55, max=75

spacing:
  section_gap_mobile:
    value: 60
    # @unit: pixels
    # @rationale: Clear section separation on mobile without excessive scrolling
    # @constraint: min=40, max=80

  section_gap_desktop:
    value: 120
    # @unit: pixels
    # @rationale: Generous white space improves visual hierarchy on large screens
    # @constraint: min=80, max=160

  component_gap:
    value: 24
    # @unit: pixels
    # @rationale: Consistent spacing between related components
    # @constraint: min=16, max=32

touch_targets:
  minimum_size:
    value: 44
    # @unit: pixels
    # @rationale: WCAG AAA compliance for touch accessibility
    # @constraint: min=44, max=60
    # @inviolable: true

  minimum_spacing:
    value: 8
    # @unit: pixels
    # @rationale: Prevents accidental touches between interactive elements
    # @constraint: min=8, max=16