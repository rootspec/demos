breakpoints:
  small: 640
  # @unit: pixels
  # @rationale: Standard mobile/tablet breakpoint; below this is single-column
  # @constraints: min=320, max=768, type=integer

  large: 1024
  # @unit: pixels
  # @rationale: Tablet/desktop breakpoint; above this gets full layout with side-by-side elements
  # @constraints: min=768, max=1280, type=integer

max_content_width: 1200
# @unit: pixels
# @rationale: Readable line lengths on wide screens; prevents content from stretching too wide
# @constraints: min=960, max=1440, type=integer

section_animation:
  duration: 400
  # @unit: milliseconds
  # @rationale: Fast enough to feel responsive, slow enough to be noticed as a transition
  # @constraints: min=200, max=800, type=integer

  threshold: 0.15
  # @unit: ratio (intersection observer)
  # @rationale: Trigger animation when 15% of section is visible; early enough to feel seamless
  # @constraints: min=0.05, max=0.5, type=float
