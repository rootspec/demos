# =============================================================================
# FINE TUNING: Layout System
# =============================================================================
# @spec_version: 1.0.0
# @spec_source: 04.SYSTEMS/LAYOUT_SYSTEM.md
# @last_updated: 2026-04-14T00:00:00Z

content_max_width:
  value: 1200
  # @unit: pixels
  # @rationale: Wide enough for desktop reading; narrow enough to avoid overly long line lengths
  # @constraint: min=960, max=1440

content_padding_horizontal:
  value: 24
  # @unit: pixels
  # @rationale: Provides breathing room on mobile (min padding); scales up on wider viewports

breakpoints:
  mobile:
    value: 640
    # @unit: pixels
    # @rationale: Standard small screen breakpoint; below this, single-column layout applies
  tablet:
    value: 768
    # @unit: pixels
    # @rationale: iPad portrait and similar; two-column layouts may apply
  desktop:
    value: 1024
    # @unit: pixels
    # @rationale: Desktop-first layouts activate; full interactive component widths apply

section_vertical_spacing:
  value: 96
  # @unit: pixels
  # @rationale: Generous spacing between sections creates visual breathing room and separates conceptual areas
  # @constraint: min=64, max=128

meta_banner_z_index:
  value: 50
  # @unit: z-index
  # @rationale: Above page content, below any modal overlays; ensures banner is always readable

header_z_index:
  value: 40
  # @unit: z-index
  # @rationale: Sticky header stays above page content; below meta banner when both visible
