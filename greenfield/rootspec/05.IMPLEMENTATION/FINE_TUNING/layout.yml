# -----------------------------------------------------------------------------
# Responsive Breakpoints
# -----------------------------------------------------------------------------

breakpoints:
  sm: 640
  # @rationale: Mobile breakpoint following Tailwind defaults
  # @constraints: type=integer, unit=px

  md: 768
  # @rationale: Tablet breakpoint; two-column layouts enabled above this
  # @constraints: type=integer, unit=px

  lg: 1024
  # @rationale: Desktop breakpoint; full layout with max-width container
  # @constraints: type=integer, unit=px

# -----------------------------------------------------------------------------
# Content Constraints
# -----------------------------------------------------------------------------

content:
  max_width: 1200
  # @rationale: Prevents excessively wide line lengths on large monitors
  # @reference: WCAG 2.1 - Reflow; optimal line length for reading
  # @constraints: min=800, max=1600, type=integer, unit=px

  header_height: 64
  # @rationale: Standard header height; sufficient for logo + nav + toggle
  # @constraints: min=48, max=96, type=integer, unit=px

# -----------------------------------------------------------------------------
# Section Spacing
# -----------------------------------------------------------------------------

sections:
  vertical_padding: 80
  # @rationale: Generous whitespace between sections for visual clarity
  # @constraints: min=40, max=160, type=integer, unit=px

# -----------------------------------------------------------------------------
# Animation
# -----------------------------------------------------------------------------

animation:
  duration: 400
  # @rationale: Scroll-triggered animations; visible but not slow
  # @reference: Material Design motion guidance
  # @constraints: min=200, max=800, type=integer, unit=ms

  reduced_motion_duration: 0
  # @rationale: Respect prefers-reduced-motion; disable animations entirely
  # @inviolable: false
  # @spec_source: 01.PHILOSOPHY.md - Approachable Without Being Simple pillar
