breakpoints:
  mobile_max:
    value: 768
    # @unit: pixels
    # @rationale: Standard mobile breakpoint; covers phones and small tablets in portrait
    # @constraint: min=640, max=900, type=integer

  tablet_max:
    value: 1024
    # @unit: pixels
    # @rationale: Covers tablets in landscape and small laptops
    # @constraint: min=900, max=1200, type=integer

scroll:
  section_entry_threshold:
    value: 15
    # @unit: percent visibility (0-100)
    # @rationale: Triggers animation early enough to feel natural without triggering off-screen
    # @constraint: min=5, max=30, type=integer

  section_entry_stagger:
    value: 80
    # @unit: milliseconds per element
    # @rationale: Visible stagger without feeling slow for sections with multiple animating elements
    # @constraint: min=40, max=150, type=integer

section_entry_duration:
  value: 400
  # @unit: milliseconds
  # @rationale: Section fade+slide is more substantial than component transitions; needs more time
  # @constraint: min=200, max=600, type=integer

explorer_label_truncate_mobile:
  value: 20
  # @unit: characters
  # @rationale: Fits level names on small screens without wrapping; long names are truncated with ellipsis
  # @constraint: min=15, max=30, type=integer
