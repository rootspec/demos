# -----------------------------------------------------------------------------
# Responsive Breakpoints
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/LAYOUT_SYSTEM.md

breakpoints:
  mobile_max_px: 767
  # @rationale: 767px covers all phone-sized viewports; 768px and above gets the mid/desktop layout
  # @constraints: min=480, max=1023, type=integer
  # @unit: pixels

  desktop_min_px: 1024
  # @rationale: 1024px is the conventional tablet-landscape / small-desktop boundary;
  #   before/after slider activates at this width
  # @constraints: min=768, max=1280, type=integer
  # @unit: pixels

# -----------------------------------------------------------------------------
# Content Column
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/LAYOUT_SYSTEM.md

content_column:
  max_width_px: 900
  # @rationale: ~900px provides a comfortable reading line length (~80 chars at 16px base font)
  #   without content appearing too narrow on large monitors
  # @reference: Baymard Institute — Optimal Line Length for Reading (50-75 chars)
  # @constraints: min=640, max=1200, type=integer
  # @unit: pixels

# -----------------------------------------------------------------------------
# Section Spacing
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/LAYOUT_SYSTEM.md

section_spacing:
  vertical_gap_px: 80
  # @rationale: Generous spacing ensures sections feel distinct and gives the eye room to rest
  #   between concept-dense sections
  # @constraints: min=40, max=160, type=integer
  # @unit: pixels
