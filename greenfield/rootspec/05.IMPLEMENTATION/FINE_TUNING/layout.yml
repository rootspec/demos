breakpoints:
  mobile_max:
    value: 767
    # @unit: pixels
    # @rationale: Below this width, single-column layout and stacked interactive variants apply
    # @constraint: min=480, max=900, type=integer

  tablet_max:
    value: 1023
    # @unit: pixels
    # @rationale: Standard tablet breakpoint; two-column layouts activate above mobile_max
    # @constraint: min=768, max=1200, type=integer
