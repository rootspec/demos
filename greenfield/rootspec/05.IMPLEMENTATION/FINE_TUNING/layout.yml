# Page structure parameters
layout:
  header_height: 64             # Rationale: Standard height for branding and navigation
  footer_height: 200            # Rationale: Space for attribution and links
  hero_min_height: 500          # Rationale: Above-fold impact without overwhelming
  section_min_height: 400       # Rationale: Comfortable reading blocks

# Content sizing
content:
  max_prose_width: 65           # Rationale: Optimal characters per line for reading
  sidebar_width: 320            # Rationale: Enough for meaningful secondary content
  grid_gap: 24                  # Rationale: Breathing room between components
  card_padding: 32              # Rationale: Comfortable internal spacing

# Interactive elements
interactive:
  wizard_width: 600             # Rationale: Wide enough for form fields, narrow enough for focus
  hierarchy_width: 800          # Rationale: Space for visual connections between levels
  comparison_height: 400        # Rationale: Enough vertical space for meaningful content
  slider_track_height: 6        # Rationale: Visible but not overwhelming

# Scroll and navigation
navigation:
  scroll_offset: 80             # Rationale: Account for fixed header when linking sections
  smooth_scroll_duration: 800   # Rationale: Fast enough to feel responsive, slow enough to follow
  sticky_threshold: 100         # Rationale: Header becomes sticky after initial scroll

# Mobile optimizations
mobile:
  side_margin: 16               # Rationale: Minimum comfortable edge spacing
  touch_spacing: 8              # Rationale: Extra space around touch targets
  wizard_padding: 20            # Rationale: Reduced padding for smaller screens
  section_padding: 48           # Rationale: Compressed but still readable sections

# Performance thresholds
performance:
  lazy_load_offset: 200         # Rationale: Start loading images before they enter viewport
  intersection_threshold: 0.1   # Rationale: Trigger animations when 10% visible
  debounce_scroll: 16           # Rationale: 60fps throttling for scroll events