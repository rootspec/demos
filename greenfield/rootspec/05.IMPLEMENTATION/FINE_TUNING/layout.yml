# =============================================================================
# LEVEL 5: FINE TUNING - Layout & Spacing
# =============================================================================
# @spec_version: 7.2.4
# @system: LAYOUT_SYSTEM
# @last_updated: 2026-04-14T00:00:00Z
# @status: production
# @spec_source: 04.SYSTEMS/LAYOUT_SYSTEM.md

breakpoints:
  sm: 640
  # @rationale: Tailwind sm default; covers small phones in landscape
  # @constraints: type=integer, unit=px

  md: 768
  # @rationale: Tablets and large phones; two-column layouts begin here
  # @constraints: type=integer, unit=px

  lg: 1024
  # @rationale: Desktop threshold; multi-column sections activate
  # @constraints: type=integer, unit=px

  xl: 1280
  # @rationale: Wide desktop; max-width container kicks in
  # @constraints: type=integer, unit=px

container:
  max_width: 1200
  # @rationale: Comfortable reading width with room for side-by-side content
  # @alternatives: [960, 1100, 1280]
  # @constraints: type=integer, unit=px

  padding_mobile: 16
  # @rationale: Minimum comfortable mobile margin; 1rem standard
  # @constraints: min=12, max=24, type=integer, unit=px

  padding_desktop: 32
  # @rationale: More breathing room on larger screens
  # @constraints: min=24, max=64, type=integer, unit=px

spacing:
  base_unit: 4
  # @rationale: 4px base unit; standard for Tailwind and most design systems
  # @constraints: type=integer, unit=px
  # @scale: 1=4, 2=8, 3=12, 4=16, 6=24, 8=32, 12=48

typography:
  base_size: 16
  # @rationale: Browser default; ensures accessibility for system font scaling
  # @constraints: min=14, max=18, type=integer, unit=px

  line_height_body: 1.5
  # @rationale: Optimal readability for long-form copy per typography research
  # @constraints: min=1.4, max=1.8, type=float

  line_height_headings: 1.2
  # @rationale: Tighter leading for display text; standard for headings
  # @constraints: min=1.1, max=1.4, type=float
