# -----------------------------------------------------------------------------
# Search Behavior
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/LOCATION_SYSTEM.md

search_min_chars: 2
# @rationale: Single characters produce too many irrelevant results; 2 chars is
#   the minimum meaningful prefix for city name matching
# @constraints: min=1, max=5, type=integer

search_debounce_ms: 300
# @rationale: 300ms strikes a balance between responsiveness and avoiding
#   excessive API calls while the user is still typing
# @reference: Common debounce convention for typeahead search UIs
# @constraints: min=100, max=1000, type=integer

search_max_results: 5
# @rationale: 5 results fit comfortably in a compact dropdown without scrolling
# @constraints: min=3, max=10, type=integer

# -----------------------------------------------------------------------------
# Forecast Range
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/WEATHER_SYSTEM.md

forecast_days: 7
# @rationale: 7-day forecast covers a planning week; the Open-Meteo free tier
#   supports up to 16 days
# @constraints: min=1, max=16, type=integer

hourly_forecast_hours: 24
# @rationale: 24 hours covers a full day from the current hour; longer ranges
#   add visual complexity without proportional value
# @constraints: min=12, max=48, type=integer

# -----------------------------------------------------------------------------
# Dashboard Thresholds
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/VIEW_SYSTEM.md

min_favorites_for_dashboard: 1
# @rationale: Dashboard view is useful even with a single saved location as it
#   provides a different layout; toggle visible when any favorites exist
# @constraints: min=1, max=3, type=integer

min_favorites_for_compare: 2
# @rationale: Comparison requires at least 2 cities by definition
# @inviolable: true
# @constraints: min=2, max=2, type=integer

min_compare_cities: 2
# @rationale: Side-by-side comparison is meaningless with fewer than 2 cities
# @inviolable: true
# @constraints: min=2, max=2, type=integer

max_compare_cities: 3
# @rationale: 3 columns is the maximum that fits comfortably in a 1024px wide
#   layout; 4+ would require horizontal scrolling
# @constraints: min=2, max=4, type=integer

# -----------------------------------------------------------------------------
# Weather Alert Thresholds
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/WEATHER_SYSTEM.md

uv_moderate_threshold: 3
# @rationale: WHO UV index classification: moderate = 3-5
# @reference: World Health Organization UV Index classification
# @constraints: min=1, max=5, type=integer

uv_high_threshold: 6
# @rationale: WHO UV index classification: high = 6-7
# @reference: World Health Organization UV Index classification
# @constraints: min=6, max=7, type=integer

uv_very_high_threshold: 8
# @rationale: WHO UV index classification: very high = 8-10
# @reference: World Health Organization UV Index classification
# @constraints: min=8, max=10, type=integer

wind_breezy_threshold: 25
# @rationale: Beaufort scale 5 (fresh breeze) begins around 29 km/h;
#   25 km/h is a practical threshold for noticeable wind
# @reference: Beaufort Wind Scale
# @constraints: min=15, max=35, type=integer

wind_strong_threshold: 40
# @rationale: Beaufort scale 6 (strong breeze) begins at 39 km/h;
#   40 km/h rounds to the nearest practical threshold
# @reference: Beaufort Wind Scale
# @constraints: min=35, max=50, type=integer

wind_storm_threshold: 60
# @rationale: Beaufort scale 8 (gale) begins at 62 km/h; 60 km/h is the
#   practical threshold for storm-force alert
# @reference: Beaufort Wind Scale
# @constraints: min=50, max=75, type=integer

humidity_high_threshold: 85
# @rationale: 85% relative humidity is widely accepted as the threshold for
#   "very humid" conditions that feel uncomfortable
# @constraints: min=75, max=95, type=integer

temp_freezing_threshold: 0
# @rationale: 0°C is the physical freezing point of water; ice and frost risk begin
# @inviolable: true
# @constraints: min=0, max=0, type=integer

temp_extreme_cold_threshold: -10
# @rationale: -10°C represents extreme cold with significant frostbite risk
# @constraints: min=-20, max=-5, type=integer

temp_extreme_heat_threshold: 35
# @rationale: 35°C is the threshold for extreme heat and significant health risk
# @reference: WHO heat-health guidance
# @constraints: min=30, max=40, type=integer
