# =============================================================================
# FINE-TUNING: Weather System
# =============================================================================
# @spec_version: 1.0.0
# @spec_source: 04.SYSTEMS/WEATHER_SYSTEM.md
# @last_updated: 2026-04-18T00:00:00Z

search_debounce_ms:
  value: 300
  # @unit: milliseconds
  # @rationale: Fast enough to feel responsive; slow enough to avoid excessive geocoding API calls per keystroke
  # @constraint: min=200, max=500

search_min_chars:
  value: 2
  # @unit: characters
  # @rationale: Single-character queries return too many irrelevant results; 2 chars is the minimum for meaningful city disambiguation

geocoding_result_limit:
  value: 5
  # @unit: results
  # @rationale: 5 results fit a compact dropdown without scrolling; covers most disambiguation needs

forecast_days:
  value: 7
  # @unit: days
  # @rationale: One week is the standard expectation for a weather forecast; beyond 7 days accuracy degrades significantly

hourly_hours_shown:
  value: 24
  # @unit: hours
  # @rationale: 24 hours is one full day cycle — the most actionable planning horizon for daily decisions

compare_city_max:
  value: 3
  # @unit: cities
  # @rationale: Side-by-side readability degrades beyond 3 columns on most screens; 2-3 is the common comparison use case

alert_thresholds:
  uv_very_high:
    value: 8
    # @unit: UV index
    # @rationale: WHO defines UV index 8+ as "Very High" requiring sun protection
  uv_high:
    value: 6
    # @unit: UV index
    # @rationale: WHO defines UV index 6-7 as "High"
  uv_moderate:
    value: 3
    # @unit: UV index
    # @rationale: WHO defines UV index 3-5 as "Moderate"
  wind_storm:
    value: 60
    # @unit: km/h
    # @rationale: Beaufort scale 10+ (storm force); structural damage risk
  wind_strong:
    value: 40
    # @unit: km/h
    # @rationale: Beaufort scale 6-7 (strong breeze/near gale); significant outdoor impact
  wind_breezy:
    value: 25
    # @unit: km/h
    # @rationale: Beaufort scale 4-5 (moderate to fresh breeze); worth noting for outdoor activities
  humidity_very_high:
    value: 85
    # @unit: percent
    # @rationale: Above 85% relative humidity is generally uncomfortable and can impair heat dissipation
  temp_extreme_heat:
    value: 35
    # @unit: degrees Celsius
    # @rationale: 35°C is a widely recognized threshold for dangerous heat stress risk
  temp_extreme_cold:
    value: -10
    # @unit: degrees Celsius
    # @rationale: -10°C is a threshold for significant frostbite risk and outdoor activity impact
  temp_freezing:
    value: 0
    # @unit: degrees Celsius
    # @rationale: 0°C marks the freezing point — ice risk on roads and surfaces
