# =============================================================================
# USER STORY: Empty state guidance
# =============================================================================
# @spec_version: 1.0.0
# @phase: baseline
# @journey: Check Weather
# @systems: [VIEW_SYSTEM]
# @last_updated: 2026-04-04T00:00:00Z

id: US-114
title: See a prompt to search when no city is selected

acceptance_criteria:
  - id: AC-114-1
    title: Empty state message shows on first load
    narrative: |
      Given I visit the app with no default city
      When the page loads
      Then I should see a message prompting me to search for a city
    given: []
    when:
      - visit: "/"
    then:
      - shouldContain: { selector: ".empty", text: "Search for a city" }
