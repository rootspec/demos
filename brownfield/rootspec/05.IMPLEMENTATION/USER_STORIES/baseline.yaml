# =============================================================================
# USER STORY: Save a favorite location
# =============================================================================
# @spec_version: 1.0.0
# @phase: baseline
# @journey: Manage Locations
# @systems: [LOCATION_SYSTEM, VIEW_SYSTEM]
# @last_updated: 2026-04-04T00:00:00Z

id: US-106
title: Save a city as a favorite location

acceptance_criteria:
  - id: AC-106-1
    title: Save Location button appears for unsaved cities
    narrative: |
      Given I have selected a city that is not in my favorites
      When the weather view loads
      Then I should see a "Save Location" button
    given:
      - visit: "/"
      - fill: { selector: "input[placeholder*='Search']", value: "Sydney" }
      - waitFor: { selector: "ul li" }
      - click: { selector: "ul li:first-child" }
    when:
      - waitFor: { selector: "[class*='card']" }
    then:
      - shouldExist: { selector: ".save-btn" }

  - id: AC-106-2
    title: Clicking save adds the city to favorites chips
    narrative: |
      Given I see the Save Location button
      When I click it
      Then the city should appear as a chip in the favorites bar
      And the Save Location button should disappear
    given:
      - visit: "/"
      - fill: { selector: "input[placeholder*='Search']", value: "Sydney" }
      - waitFor: { selector: "ul li" }
      - click: { selector: "ul li:first-child" }
      - waitFor: { selector: ".save-btn" }
    when:
      - click: { selector: ".save-btn" }
    then:
      - shouldContain: { selector: "body", text: "Saved Locations" }
      - shouldNotExist: { selector: ".save-btn" }

# =============================================================================
# USER STORY: Switch between favorite locations
# =============================================================================
# @spec_version: 1.0.0
# @phase: baseline
# @journey: Manage Locations
# @systems: [LOCATION_SYSTEM, VIEW_SYSTEM, WEATHER_SYSTEM]
# @last_updated: 2026-04-04T00:00:00Z

id: US-107
title: Click a favorite chip to view its weather

acceptance_criteria:
  - id: AC-107-1
    title: Clicking a favorite chip loads that city's weather
    narrative: |
      Given I have at least one saved favorite
      When I click on a favorite chip
      Then the weather view should update to show that city
    given:
      - visit: "/"
      - fill: { selector: "input[placeholder*='Search']", value: "Rome" }
      - waitFor: { selector: "ul li" }
      - click: { selector: "ul li:first-child" }
      - waitFor: { selector: ".save-btn" }
      - click: { selector: ".save-btn" }
    when:
      - click: { selector: "button[class*='Chip'], [class*='chip']" }
    then:
      - shouldExist: { selector: "[class*='card']" }

# =============================================================================
# USER STORY: Remove a favorite location
# =============================================================================
# @spec_version: 1.0.0
# @phase: baseline
# @journey: Manage Locations
# @systems: [LOCATION_SYSTEM, VIEW_SYSTEM]
# @last_updated: 2026-04-04T00:00:00Z

id: US-108
title: Remove a city from favorites

acceptance_criteria:
  - id: AC-108-1
    title: Clicking the remove button on a chip removes the favorite
    narrative: |
      Given I have a saved favorite
      When I click the remove button on its chip
      Then the chip should disappear from the favorites bar
    given:
      - visit: "/"
      - fill: { selector: "input[placeholder*='Search']", value: "Madrid" }
      - waitFor: { selector: "ul li" }
      - click: { selector: "ul li:first-child" }
      - waitFor: { selector: ".save-btn" }
      - click: { selector: ".save-btn" }
      - waitFor: { selector: "[class*='Remove'], [class*='remove']" }
    when:
      - click: { selector: "[class*='Remove'], [class*='remove']" }
    then:
      - shouldNotContain: { selector: "body", text: "Saved Locations" }

# =============================================================================
# USER STORY: View multi-location dashboard
# =============================================================================
# @spec_version: 1.0.0
# @phase: baseline
# @journey: Compare Locations
# @systems: [LOCATION_SYSTEM, WEATHER_SYSTEM, VIEW_SYSTEM]
# @last_updated: 2026-04-04T00:00:00Z

id: US-109
title: View all saved locations on the dashboard

acceptance_criteria:
  - id: AC-109-1
    title: Dashboard view toggle appears when favorites exist
    narrative: |
      Given I have at least one saved favorite
      When I look at the header
      Then I should see Weather and Dashboard toggle buttons
    given:
      - visit: "/"
      - fill: { selector: "input[placeholder*='Search']", value: "Oslo" }
      - waitFor: { selector: "ul li" }
      - click: { selector: "ul li:first-child" }
      - waitFor: { selector: ".save-btn" }
      - click: { selector: ".save-btn" }
    when:
      - waitFor: { selector: ".view-toggle" }
    then:
      - shouldExist: { selector: ".view-btn" }

  - id: AC-109-2
    title: Switching to dashboard shows all locations with current weather
    narrative: |
      Given I have saved favorites and see the view toggle
      When I click the Dashboard button
      Then I should see a grid of location cards with weather data
    given:
      - visit: "/"
      - fill: { selector: "input[placeholder*='Search']", value: "Oslo" }
      - waitFor: { selector: "ul li" }
      - click: { selector: "ul li:first-child" }
      - waitFor: { selector: ".save-btn" }
      - click: { selector: ".save-btn" }
      - waitFor: { selector: ".view-toggle" }
    when:
      - click: { selector: ".view-btn:last-child" }
    then:
      - shouldContain: { selector: "body", text: "All Locations" }

