# =============================================================================
# USER STORIES: RootWeather — Baseline Coverage
# =============================================================================
# All stories cover existing functionality. Phase "baseline" distinguishes
# these from future feature work.

# =============================================================================
# USER STORY: Search for a city
# =============================================================================
# @spec_version: 1.0.0
# @phase: baseline
# @journey: Check Weather
# @systems: [LOCATION_SYSTEM, VIEW_SYSTEM]
# @last_updated: 2026-04-04T00:00:00Z

id: US-101
title: Search for a city by name and select it

acceptance_criteria:
  - id: AC-101-1
    title: Autocomplete dropdown appears after typing
    narrative: |
      Given I am on the main page
      When I type a city name of at least 2 characters into the search bar
      Then I should see a dropdown with matching city results
    given:
      - visit: "/"
    when:
      - fill: { selector: "input[placeholder*='Search']", value: "Berlin" }
    then:
      - shouldExist: { selector: "ul li" }

  - id: AC-101-2
    title: Selecting a city loads its weather
    narrative: |
      Given I see search results for a city
      When I click on a result
      Then the weather view should display that city's current conditions
    given:
      - visit: "/"
      - fill: { selector: "input[placeholder*='Search']", value: "Berlin" }
      - waitFor: { selector: "ul li" }
    when:
      - click: { selector: "ul li:first-child" }
    then:
      - shouldContain: { selector: "h2", text: "Berlin" }

# =============================================================================
# USER STORY: View current weather conditions
# =============================================================================
# @spec_version: 1.0.0
# @phase: baseline
# @journey: Check Weather
# @systems: [WEATHER_SYSTEM, VIEW_SYSTEM]
# @last_updated: 2026-04-04T00:00:00Z

id: US-102
title: View current weather conditions for a selected city

acceptance_criteria:
  - id: AC-102-1
    title: Current conditions card shows temperature, humidity, wind, and UV
    narrative: |
      Given I have selected a city
      When the weather data loads
      Then I should see a card with temperature, humidity percentage, wind speed, and UV index
    given:
      - visit: "/"
      - fill: { selector: "input[placeholder*='Search']", value: "London" }
      - waitFor: { selector: "ul li" }
      - click: { selector: "ul li:first-child" }
    when:
      - waitFor: { selector: "[class*='card']" }
    then:
      - shouldContain: { selector: "[class*='details']", text: "%" }
      - shouldContain: { selector: "[class*='details']", text: "km/h" }
      - shouldContain: { selector: "[class*='details']", text: "UV" }

# =============================================================================
# USER STORY: View condition-based alerts
# =============================================================================
# @spec_version: 1.0.0
# @phase: baseline
# @journey: Check Weather
# @systems: [WEATHER_SYSTEM, VIEW_SYSTEM]
# @last_updated: 2026-04-04T00:00:00Z

id: US-103
title: See weather alerts when conditions meet thresholds

acceptance_criteria:
  - id: AC-103-1
    title: Alerts appear for notable conditions
    narrative: |
      Given I am viewing weather for a city with notable conditions
      When alerts are generated from current readings
      Then I should see colored alert badges above the weather card
    given:
      - visit: "/"
      - fill: { selector: "input[placeholder*='Search']", value: "Dubai" }
      - waitFor: { selector: "ul li" }
      - click: { selector: "ul li:first-child" }
    when:
      - waitFor: { selector: "[class*='card']" }
    then:
      - shouldExist: { selector: "[class*='Alert']" }

# =============================================================================
# USER STORY: View hourly forecast
# =============================================================================
# @spec_version: 1.0.0
# @phase: baseline
# @journey: Check Weather
# @systems: [WEATHER_SYSTEM, VIEW_SYSTEM]
# @last_updated: 2026-04-04T00:00:00Z

id: US-104
title: View hourly forecast for the next 24 hours

acceptance_criteria:
  - id: AC-104-1
    title: Hourly forecast strip displays after selecting a city
    narrative: |
      Given I have selected a city
      When the weather data loads
      Then I should see a scrollable hourly forecast section
    given:
      - visit: "/"
      - fill: { selector: "input[placeholder*='Search']", value: "Tokyo" }
      - waitFor: { selector: "ul li" }
      - click: { selector: "ul li:first-child" }
    when:
      - waitFor: { selector: "[class*='container']" }
    then:
      - shouldExist: { selector: "[class*='hourCard'], [class*='hour']" }

  - id: AC-104-2
    title: Scroll arrows navigate the hourly strip
    narrative: |
      Given I see the hourly forecast section
      When I click the right arrow button
      Then the hourly strip should scroll to reveal more hours
    given:
      - visit: "/"
      - fill: { selector: "input[placeholder*='Search']", value: "Tokyo" }
      - waitFor: { selector: "ul li" }
      - click: { selector: "ul li:first-child" }
      - waitFor: { selector: "[class*='arrow']" }
    when:
      - click: { selector: "[class*='arrow']:last-child" }
    then:
      - shouldExist: { selector: "[class*='scroll']" }

