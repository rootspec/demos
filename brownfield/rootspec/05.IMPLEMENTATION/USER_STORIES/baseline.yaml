id: US-110
title: Switch between Celsius and Fahrenheit

acceptance_criteria:
  - id: AC-110-1
    title: Changing temperature unit updates displayed temperatures
    narrative: |
      Given I have a city selected and weather is showing
      When I open settings and switch to Fahrenheit
      Then all temperatures should display in Fahrenheit
    given:
      - visit: "/"
      - fill: { selector: "input[placeholder*='Search']", value: "New York" }
      - waitFor: { selector: "ul li" }
      - click: { selector: "ul li:first-child" }
      - waitFor: { selector: "[class*='card']" }
    when:
      - click: { selector: "[class*='toggle']" }
      - click: { selector: "button", text: "°F" }
    then:
      - shouldContain: { selector: "[class*='temp']", text: "°F" }

