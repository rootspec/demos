# =============================================================================
# USER STORIES: RootWeather — Comparison View
# =============================================================================
# Side-by-side comparison of 2-3 saved locations showing current conditions,
# hourly forecast, and 7-day forecast in columns.

# =============================================================================
# USER STORY: Enter comparison mode from dashboard
# =============================================================================
# @spec_version: 1.0.0
# @phase: comparison
# @journey: Compare Locations
# @systems: [VIEW_SYSTEM, LOCATION_SYSTEM]
# @last_updated: 2026-04-04T00:00:00Z

id: US-201
title: Enter comparison mode from dashboard

acceptance_criteria:
  - id: AC-201-1
    title: Compare button appears on dashboard when 2+ favorites exist
    narrative: |
      Given I have at least 2 saved favorites
      When I switch to the Dashboard view
      Then I should see a "Compare" button
    given:
      - visit: "/"
      - fill: { selector: "input[placeholder*='Search']", value: "London" }
      - waitFor: { selector: "ul li" }
      - click: { selector: "ul li:first-child" }
      - waitFor: { selector: ".save-btn" }
      - click: { selector: ".save-btn" }
      - fill: { selector: "input[placeholder*='Search']", value: "Paris" }
      - waitFor: { selector: "ul li" }
      - click: { selector: "ul li:first-child" }
      - waitFor: { selector: ".save-btn" }
      - click: { selector: ".save-btn" }
      - waitFor: { selector: ".view-toggle" }
      - click: { selector: ".view-btn:last-child" }
    when:
      - waitFor: { selector: ".compare-btn" }
    then:
      - shouldExist: { selector: ".compare-btn" }

  - id: AC-201-2
    title: Compare button is hidden when fewer than 2 favorites exist
    narrative: |
      Given I have only 1 saved favorite
      When I switch to the Dashboard view
      Then I should not see a "Compare" button
    given:
      - visit: "/"
      - fill: { selector: "input[placeholder*='Search']", value: "London" }
      - waitFor: { selector: "ul li" }
      - click: { selector: "ul li:first-child" }
      - waitFor: { selector: ".save-btn" }
      - click: { selector: ".save-btn" }
      - waitFor: { selector: ".view-toggle" }
    when:
      - click: { selector: ".view-btn:last-child" }
    then:
      - shouldNotExist: { selector: ".compare-btn" }

# =============================================================================
# USER STORY: Select cities for comparison
# =============================================================================
# @spec_version: 1.0.0
# @phase: comparison
# @journey: Compare Locations
# @systems: [VIEW_SYSTEM, LOCATION_SYSTEM]
# @last_updated: 2026-04-04T00:00:00Z

id: US-202
title: Select cities for side-by-side comparison

acceptance_criteria:
  - id: AC-202-1
    title: Clicking Compare enters selection mode with selectable cards
    narrative: |
      Given I am on the Dashboard with 2+ favorites
      When I click the Compare button
      Then the dashboard cards should become selectable
      And I should see a prompt to select cities
    given:
      - visit: "/"
      - fill: { selector: "input[placeholder*='Search']", value: "London" }
      - waitFor: { selector: "ul li" }
      - click: { selector: "ul li:first-child" }
      - waitFor: { selector: ".save-btn" }
      - click: { selector: ".save-btn" }
      - fill: { selector: "input[placeholder*='Search']", value: "Paris" }
      - waitFor: { selector: "ul li" }
      - click: { selector: "ul li:first-child" }
      - waitFor: { selector: ".save-btn" }
      - click: { selector: ".save-btn" }
      - waitFor: { selector: ".view-toggle" }
      - click: { selector: ".view-btn:last-child" }
      - waitFor: { selector: ".compare-btn" }
    when:
      - click: { selector: ".compare-btn" }
    then:
      - shouldContain: { selector: "body", text: "Select" }

  - id: AC-202-2
    title: Selecting 2 cities shows comparison view
    narrative: |
      Given I am in comparison selection mode
      When I click on 2 city cards
      Then I should see a side-by-side comparison view with 2 columns
    given:
      - visit: "/"
      - fill: { selector: "input[placeholder*='Search']", value: "London" }
      - waitFor: { selector: "ul li" }
      - click: { selector: "ul li:first-child" }
      - waitFor: { selector: ".save-btn" }
      - click: { selector: ".save-btn" }
      - fill: { selector: "input[placeholder*='Search']", value: "Paris" }
      - waitFor: { selector: "ul li" }
      - click: { selector: "ul li:first-child" }
      - waitFor: { selector: ".save-btn" }
      - click: { selector: ".save-btn" }
      - waitFor: { selector: ".view-toggle" }
      - click: { selector: ".view-btn:last-child" }
      - waitFor: { selector: ".compare-btn" }
      - click: { selector: ".compare-btn" }
    when:
      - click: { selector: "[data-testid='compare-card']:nth-child(1)" }
      - click: { selector: "[data-testid='compare-card']:nth-child(2)" }
    then:
      - shouldExist: { selector: ".comparison-view" }
      - shouldExist: { selector: "[data-testid='comparison-column']" }

# =============================================================================
# USER STORY: View side-by-side comparison
# =============================================================================
# @spec_version: 1.0.0
# @phase: comparison
# @journey: Compare Locations
# @systems: [VIEW_SYSTEM, WEATHER_SYSTEM]
# @last_updated: 2026-04-04T00:00:00Z

id: US-203
title: View comparison with current conditions, hourly, and 7-day forecast

acceptance_criteria:
  - id: AC-203-1
    title: Each comparison column shows full weather details
    narrative: |
      Given I have selected 2 cities for comparison
      When the comparison view loads
      Then each column should show current conditions, hourly forecast, and 7-day forecast
    given:
      - visit: "/"
      - fill: { selector: "input[placeholder*='Search']", value: "London" }
      - waitFor: { selector: "ul li" }
      - click: { selector: "ul li:first-child" }
      - waitFor: { selector: ".save-btn" }
      - click: { selector: ".save-btn" }
      - fill: { selector: "input[placeholder*='Search']", value: "Paris" }
      - waitFor: { selector: "ul li" }
      - click: { selector: "ul li:first-child" }
      - waitFor: { selector: ".save-btn" }
      - click: { selector: ".save-btn" }
      - waitFor: { selector: ".view-toggle" }
      - click: { selector: ".view-btn:last-child" }
      - waitFor: { selector: ".compare-btn" }
      - click: { selector: ".compare-btn" }
      - click: { selector: "[data-testid='compare-card']:nth-child(1)" }
      - click: { selector: "[data-testid='compare-card']:nth-child(2)" }
    when:
      - waitFor: { selector: ".comparison-view" }
    then:
      - shouldContain: { selector: ".comparison-view", text: "London" }
      - shouldContain: { selector: ".comparison-view", text: "Paris" }
      - shouldContain: { selector: ".comparison-view", text: "7-Day Forecast" }

# =============================================================================
# USER STORY: Deselect a city from comparison
# =============================================================================
# @spec_version: 1.0.0
# @phase: comparison
# @journey: Compare Locations
# @systems: [VIEW_SYSTEM]
# @last_updated: 2026-04-04T00:00:00Z

id: US-204
title: Deselect a city from comparison

acceptance_criteria:
  - id: AC-204-1
    title: Clicking a column header removes that city and exits to dashboard
    narrative: |
      Given I am viewing a 2-city comparison
      When I click the remove/deselect button on one column
      Then the comparison should exit to the dashboard since fewer than 2 cities remain
    given:
      - visit: "/"
      - fill: { selector: "input[placeholder*='Search']", value: "London" }
      - waitFor: { selector: "ul li" }
      - click: { selector: "ul li:first-child" }
      - waitFor: { selector: ".save-btn" }
      - click: { selector: ".save-btn" }
      - fill: { selector: "input[placeholder*='Search']", value: "Paris" }
      - waitFor: { selector: "ul li" }
      - click: { selector: "ul li:first-child" }
      - waitFor: { selector: ".save-btn" }
      - click: { selector: ".save-btn" }
      - waitFor: { selector: ".view-toggle" }
      - click: { selector: ".view-btn:last-child" }
      - waitFor: { selector: ".compare-btn" }
      - click: { selector: ".compare-btn" }
      - click: { selector: "[data-testid='compare-card']:nth-child(1)" }
      - click: { selector: "[data-testid='compare-card']:nth-child(2)" }
      - waitFor: { selector: ".comparison-view" }
    when:
      - click: { selector: "[data-testid='comparison-remove']:first-child" }
    then:
      - shouldNotExist: { selector: ".comparison-view" }
      - shouldContain: { selector: "body", text: "All Locations" }

