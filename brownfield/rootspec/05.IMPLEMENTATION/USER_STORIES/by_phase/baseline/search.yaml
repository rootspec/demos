# =============================================================================
# USER STORY: Search for a city and see weather
# =============================================================================
# @spec_version: 1.0.0
# @phase: baseline
# @journey: SEARCH_AND_DISCOVER
# @systems: [LOCATION_SYSTEM, WEATHER_SYSTEM]
# @last_updated: 2026-04-18T00:00:00Z

id: US-001
title: Search for a city and see weather

acceptance_criteria:
  - id: AC-001-1
    title: Search input is visible on load
    narrative: |
      Given I open the app
      When the page loads
      Then I should see the search input with placeholder "Search for a city..."
    given:
      - visit: '/demos/brownfield/'
    when: []
    then:
      - shouldExist: { selector: 'input[placeholder="Search for a city..."]' }

  - id: AC-001-2
    title: Typing a city name shows dropdown results
    narrative: |
      Given I am on the app
      When I type at least 2 characters into the search bar
      Then I should see a dropdown list of city suggestions
    given:
      - visit: '/demos/brownfield/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'London' }
    then:
      - shouldExist: { selector: 'ul li' }

  - id: AC-001-3
    title: Selecting a city shows weather
    narrative: |
      Given I have typed a city name and see results
      When I click the first result
      Then I should see the city name displayed in the weather card
    given:
      - visit: '/demos/brownfield/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Paris' }
      - click: { selector: 'ul li:first-child' }
    then:
      - shouldExist: { selector: '.card' }

  - id: AC-001-4
    title: Empty state shown before any city is selected
    narrative: |
      Given I open the app and have no favorites or default city
      When I view the main area
      Then I should see the empty prompt text
    given:
      - visit: '/demos/brownfield/'
    when: []
    then:
      - shouldContain: { selector: '.empty', text: 'Search for a city to see the weather forecast' }
