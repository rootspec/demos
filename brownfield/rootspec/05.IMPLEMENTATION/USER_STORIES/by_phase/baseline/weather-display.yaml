id: US-008
title: See condition alerts

acceptance_criteria:
  - id: AC-008-1
    title: Alert badges container is present in the DOM when weather loads
    narrative: |
      Given I have selected a city
      When weather data loads and conditions warrant alerts
      Then alert badges appear above the current weather card
    given:
      - visit: '/demos/brownfield/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Dubai' }
      - click: { selector: 'ul li:first-child' }
    then:
      - shouldExist: { selector: '.weather-alerts' }
