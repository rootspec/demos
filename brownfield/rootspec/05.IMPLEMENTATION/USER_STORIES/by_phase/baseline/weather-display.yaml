id: US-005
title: See current conditions

acceptance_criteria:
  - id: AC-005-1
    title: Current weather card shows city name and temperature
    narrative: |
      Given I have selected a city
      When the weather data loads
      Then I should see the city name and a temperature value
    given:
      - visit: '/demos/brownfield/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Sydney' }
      - click: { selector: 'ul li:first-child' }
    then:
      - shouldExist: { selector: '.card' }

  - id: AC-005-2
    title: Current weather card shows humidity, wind, and UV
    narrative: |
      Given I have selected a city and weather has loaded
      When I view the current weather card
      Then I should see humidity, wind speed, and UV index
    given:
      - visit: '/demos/brownfield/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Sydney' }
      - click: { selector: 'ul li:first-child' }
    then:
      - shouldContain: { selector: '.details', text: 'UV' }

---

id: US-006
title: See hourly forecast

acceptance_criteria:
  - id: AC-006-1
    title: Hourly forecast strip is visible after city selection
    narrative: |
      Given I have selected a city and weather has loaded
      When I look below the current weather card
      Then I should see the hourly forecast section
    given:
      - visit: '/demos/brownfield/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Madrid' }
      - click: { selector: 'ul li:first-child' }
    then:
      - shouldContain: { selector: 'h3', text: "Today's Hourly" }

