id: US-013
title: View all saved locations on dashboard

acceptance_criteria:
  - id: AC-013-1
    title: Dashboard tab appears when favorites exist
    narrative: |
      Given I have at least one saved location
      When I look at the header
      Then I should see the Dashboard tab in the view toggle
    given:
      - visit: '/demos/brownfield/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Amsterdam' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
    then:
      - shouldExist: { selector: '.view-toggle' }

  - id: AC-013-2
    title: Clicking Dashboard tab shows locations grid
    narrative: |
      Given I have at least one saved location
      When I click the Dashboard tab
      Then I should see the "All Locations" heading
    given:
      - visit: '/demos/brownfield/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Amsterdam' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - click: { selector: '.view-btn:last-child' }
    then:
      - shouldContain: { selector: 'h3', text: 'All Locations' }

  - id: AC-013-3
    title: Compare button appears in dashboard when 2+ favorites exist
    narrative: |
      Given I have 2 or more saved locations and am on the dashboard view
      When I view the dashboard header
      Then I should see the Compare button
    given:
      - visit: '/demos/brownfield/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Amsterdam' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Brussels' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - click: { selector: '.view-btn:last-child' }
    then:
      - shouldExist: { selector: '.compare-btn' }
