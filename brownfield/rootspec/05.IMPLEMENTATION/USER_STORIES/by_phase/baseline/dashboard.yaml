id: US-016
title: View all saved locations in dashboard

acceptance_criteria:
  - id: AC-016-1
    title: View toggle appears when favorites exist
    narrative: |
      Given I have at least one saved location
      When I am on the app
      Then I see the Weather and Dashboard view toggle buttons
    given:
      - visit: '/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Rome' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
    then:
      - shouldExist: { selector: '.view-toggle' }
      - shouldContain: { selector: '.view-toggle', text: 'Dashboard' }

  - id: AC-016-2
    title: Dashboard view shows all locations header
    narrative: |
      Given I have saved locations and the view toggle is visible
      When I click Dashboard
      Then I see the All Locations heading
    given:
      - visit: '/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Rome' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - click: { selector: '.view-btn:last-child' }
    then:
      - shouldContain: { selector: 'h3', text: 'All Locations' }
