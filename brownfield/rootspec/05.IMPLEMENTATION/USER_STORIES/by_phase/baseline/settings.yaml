id: US-012
title: Set a default city

acceptance_criteria:
  - id: AC-012-1
    title: Default city dropdown appears in settings when favorites exist
    narrative: |
      Given I have at least one saved location
      When I open the settings panel
      Then I should see the Default Location dropdown
    given:
      - visit: '/demos/brownfield/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Vienna' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - click: { selector: 'button[class*="toggle"]' }
    then:
      - shouldExist: { selector: 'select[class*="select"]' }
