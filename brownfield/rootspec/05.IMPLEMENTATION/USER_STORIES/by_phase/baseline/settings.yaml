id: US-009
title: Change temperature unit

acceptance_criteria:
  - id: AC-009-1
    title: Settings panel opens on button click
    narrative: |
      Given I am on the app
      When I click the Settings button
      Then the settings panel expands
    given:
      - visit: '/demos/brownfield/'
    when:
      - click: { selector: 'button[class*="toggle"]' }
    then:
      - shouldExist: { selector: 'button[class*="option"]' }

  - id: AC-009-2
    title: Temperature unit buttons are visible in settings
    narrative: |
      Given the settings panel is open
      When I view the temperature setting
      Then I should see both the C and F options
    given:
      - visit: '/demos/brownfield/'
    when:
      - click: { selector: 'button[class*="toggle"]' }
    then:
      - shouldContain: { selector: 'div[class*="panel"]', text: '°C' }

