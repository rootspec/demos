id: US-002
title: Save a location to favorites

acceptance_criteria:
  - id: AC-002-1
    title: Save button appears after selecting a city not yet in favorites
    narrative: |
      Given I have searched for and selected a city
      When the weather data loads
      Then I should see the "Save Location" button
    given:
      - visit: '/demos/brownfield/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Berlin' }
      - click: { selector: 'ul li:first-child' }
    then:
      - shouldExist: { selector: '.save-btn' }

  - id: AC-002-2
    title: Saved city appears in favorites bar
    narrative: |
      Given I have selected a city and clicked Save Location
      When I look at the favorites bar
      Then I should see the city name as a chip
    given:
      - visit: '/demos/brownfield/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Berlin' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
    then:
      - shouldExist: { selector: 'button[class*="Chip"]' }

---

id: US-003
title: Switch between saved locations

acceptance_criteria:
  - id: AC-003-1
    title: Clicking a favorites chip loads that city's weather
    narrative: |
      Given I have at least one saved location
      When I click a favorites chip
      Then I should see weather data for that location
    given:
      - visit: '/demos/brownfield/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Tokyo' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - click: { selector: 'button[class*="Chip"]:first-child' }
    then:
      - shouldExist: { selector: '.card' }

---

id: US-004
title: Remove a location from favorites

acceptance_criteria:
  - id: AC-004-1
    title: Clicking the remove button on a chip removes the city
    narrative: |
      Given I have a saved location in the favorites bar
      When I click the remove button on the chip
      Then that city's chip disappears from the favorites bar
    given:
      - visit: '/demos/brownfield/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Rome' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - click: { selector: 'span[class*="RemoveBtn"]' }
    then:
      - shouldExist: { selector: '.empty' }
