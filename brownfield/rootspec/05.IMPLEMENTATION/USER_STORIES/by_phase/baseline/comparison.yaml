# =============================================================================
# USER STORY: Compare Cities
# =============================================================================
# @spec_version: 1.0.0
# @phase: baseline
# @journey: DASHBOARD_AND_COMPARE
# @systems: [VIEW_SYSTEM, WEATHER_SYSTEM, LOCATION_SYSTEM]
# @last_updated: 2026-04-14T00:00:00Z

id: US-019
title: Compare weather for multiple cities side by side

acceptance_criteria:
  - id: AC-019-1
    title: Compare button appears in dashboard when 2+ favorites exist
    narrative: |
      Given I have two or more saved locations
      When I open the dashboard view
      Then I see a Compare button
    given:
      - visit: '/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Madrid' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Lisbon' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - click: { selector: '.view-btn:last-child' }
    then:
      - shouldExist: { selector: '.compare-btn' }

  - id: AC-019-2
    title: Selecting 2 cities from compare mode triggers comparison view
    narrative: |
      Given I am in compare mode in the dashboard
      When I select two location cards
      Then the comparison view appears with both cities as columns
    given:
      - visit: '/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Madrid' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Lisbon' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - click: { selector: '.view-btn:last-child' }
      - click: { selector: '.compare-btn' }
      - click: { selector: '[data-testid="compare-card"]:first-child' }
      - click: { selector: '[data-testid="compare-card"]:last-child' }
    then:
      - shouldExist: { selector: '.comparison-view' }
      - shouldExist: { selector: '[data-testid="comparison-column"]' }

  - id: AC-019-3
    title: Back to Dashboard button returns to dashboard view
    narrative: |
      Given I am in the comparison view
      When I click Back to Dashboard
      Then I see the dashboard view again
    given:
      - visit: '/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Madrid' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Lisbon' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - click: { selector: '.view-btn:last-child' }
      - click: { selector: '.compare-btn' }
      - click: { selector: '[data-testid="compare-card"]:first-child' }
      - click: { selector: '[data-testid="compare-card"]:last-child' }
      - click: { selector: '.back-to-dashboard' }
    then:
      - shouldContain: { selector: 'h3', text: 'All Locations' }

