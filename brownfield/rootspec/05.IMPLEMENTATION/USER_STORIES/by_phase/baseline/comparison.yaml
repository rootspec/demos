# @spec_version: 1.0.0
# @phase: baseline
# @journey: COMPARISON_VIEW
# @systems: [COMPARISON_SYSTEM, WEATHER_SYSTEM]
# @last_updated: 2026-04-18T00:00:00Z

id: US-014
title: Compare two or more cities side by side

acceptance_criteria:
  - id: AC-014-1
    title: Entering compare mode shows city selection affordance
    narrative: |
      Given I have 2 or more saved locations and am on the dashboard
      When I click the Compare button
      Then I should see compare-mode cards with selection affordance
    given:
      - visit: '/demos/brownfield/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Copenhagen' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Stockholm' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - click: { selector: '.view-btn:last-child' }
      - click: { selector: '.compare-btn' }
    then:
      - shouldExist: { selector: '[data-testid="compare-card"]' }

  - id: AC-014-2
    title: Selecting 2 cities auto-transitions to comparison view
    narrative: |
      Given I am in compare mode with cards visible
      When I click 2 city cards
      Then I should see the comparison view with columns for each city
    given:
      - visit: '/demos/brownfield/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Copenhagen' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Stockholm' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - click: { selector: '.view-btn:last-child' }
      - click: { selector: '.compare-btn' }
      - click: { selector: '[data-testid="compare-card"]:nth-child(1)' }
      - click: { selector: '[data-testid="compare-card"]:nth-child(2)' }
    then:
      - shouldExist: { selector: '.comparison-view' }

  - id: AC-014-3
    title: Comparison view shows columns for each city
    narrative: |
      Given I am in the comparison view with 2 cities
      When I view the comparison layout
      Then I should see individual columns for each compared city
    given:
      - visit: '/demos/brownfield/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Copenhagen' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Stockholm' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - click: { selector: '.view-btn:last-child' }
      - click: { selector: '.compare-btn' }
      - click: { selector: '[data-testid="compare-card"]:nth-child(1)' }
      - click: { selector: '[data-testid="compare-card"]:nth-child(2)' }
    then:
      - shouldExist: { selector: '[data-testid="comparison-column"]' }

  - id: AC-014-4
    title: Back to Dashboard button returns to dashboard view
    narrative: |
      Given I am in the comparison view
      When I click "Back to Dashboard"
      Then I should return to the dashboard view
    given:
      - visit: '/demos/brownfield/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Copenhagen' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Stockholm' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - click: { selector: '.view-btn:last-child' }
      - click: { selector: '.compare-btn' }
      - click: { selector: '[data-testid="compare-card"]:nth-child(1)' }
      - click: { selector: '[data-testid="compare-card"]:nth-child(2)' }
      - click: { selector: '.back-to-dashboard' }
    then:
      - shouldContain: { selector: 'h3', text: 'All Locations' }
