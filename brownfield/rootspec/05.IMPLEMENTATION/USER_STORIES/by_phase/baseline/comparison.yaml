# =============================================================================
# USER STORY: Remove City from Comparison
# =============================================================================
# @spec_version: 1.0.0
# @phase: baseline
# @journey: DASHBOARD_AND_COMPARE
# @systems: [VIEW_SYSTEM]
# @last_updated: 2026-04-14T00:00:00Z

id: US-020
title: Remove a city from the comparison view

acceptance_criteria:
  - id: AC-020-1
    title: Each comparison column has a remove button
    narrative: |
      Given I am in the comparison view with multiple cities
      When I look at each column
      Then I see a remove button for each city
    given:
      - visit: '/'
    when:
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Madrid' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - fill: { selector: 'input[placeholder="Search for a city..."]', value: 'Lisbon' }
      - click: { selector: 'ul li:first-child' }
      - click: { selector: '.save-btn' }
      - click: { selector: '.view-btn:last-child' }
      - click: { selector: '.compare-btn' }
      - click: { selector: '[data-testid="compare-card"]:first-child' }
      - click: { selector: '[data-testid="compare-card"]:last-child' }
    then:
      - shouldExist: { selector: '[data-testid="comparison-remove"]' }
