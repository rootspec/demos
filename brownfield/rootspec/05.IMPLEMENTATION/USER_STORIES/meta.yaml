id: US-115
title: See a persistent meta banner identifying this as a RootSpec brownfield demo

acceptance_criteria:
  - id: AC-115-1
    title: Meta banner is visible on page load
    narrative: |
      Given I visit the app
      When the page loads
      Then I should see a banner identifying this as a RootSpec brownfield demo
    given: []
    when:
      - visit: "/"
    then:
      - shouldExist: { selector: ".meta-banner" }

  - id: AC-115-2
    title: Meta banner contains links to the GitHub repo
    narrative: |
      Given the meta banner is visible
      When I inspect the banner
      Then I should see links using absolute GitHub URLs pointing to brownfield content
    given: []
    when:
      - visit: "/"
    then:
      - shouldExist: { selector: ".meta-banner a[href*='github.com/rootspec/demos']" }
