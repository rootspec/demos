name: Validate & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  greenfield:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: greenfield
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: greenfield/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: greenfield
          install: false
          start: npx serve dist -l 3000
          wait-on: http://localhost:3000
          browser: chrome
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: greenfield-dist
          path: greenfield/dist

  scaffold:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scaffold
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: scaffold/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: scaffold
          install: false
          start: npx serve build -l 3001
          wait-on: http://localhost:3001
          browser: chrome
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scaffold-dist
          path: scaffold/build

  brownfield:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: brownfield
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: brownfield/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: brownfield
          install: false
          start: npx serve dist -l 3002
          wait-on: http://localhost:3002
          browser: chrome
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: brownfield-dist
          path: brownfield/dist

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [greenfield, scaffold, brownfield]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build greenfield
        working-directory: greenfield
        run: npm ci && npm run build
        env:
          ASTRO_BASE: /demos/greenfield
      - name: Build scaffold
        working-directory: scaffold
        run: npm ci && npm run build
        env:
          SVELTE_BASE: /demos/scaffold
      - name: Build brownfield
        working-directory: brownfield
        run: npm ci && npm run build
        env:
          BASE_PATH: /demos/brownfield/
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r greenfield/dist _site/greenfield || true
          cp -r scaffold/build _site/scaffold || true
          cp -r brownfield/dist _site/brownfield || true
          cat > _site/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="utf-8"><title>RootSpec Demos</title></head>
          <body>
            <h1>RootSpec Demos</h1>
            <ul>
              <li><a href="greenfield/">Greenfield: Marketing Site</a></li>
              <li><a href="scaffold/">Scaffold: RootFeed Social Feed</a></li>
              <li><a href="brownfield/">Brownfield: RootWeather Dashboard</a></li>
            </ul>
          </body>
          </html>
          HTML
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
