name: Validate & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  greenfield:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: greenfield
    steps:
      - uses: actions/checkout@v4
      - name: Check if built
        id: check
        run: |
          if [ -f scripts/dev.sh ] && [ -f package.json ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Greenfield not yet built — skipping tests"
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.ready == 'true'
        with:
          node-version: "22"
      - run: npm ci --legacy-peer-deps
        if: steps.check.outputs.ready == 'true'
      - run: chmod +x scripts/dev.sh scripts/test.sh
        if: steps.check.outputs.ready == 'true'
      - name: Run Cypress tests
        if: steps.check.outputs.ready == 'true'
        uses: cypress-io/github-action@v6
        with:
          working-directory: greenfield
          install: false
          start: bash scripts/dev.sh start
          wait-on: http://localhost:3000/demos/greenfield/
          wait-on-timeout: 30
          browser: chrome
      - run: ./scripts/dev.sh stop || true
        if: steps.check.outputs.ready == 'true'
      - name: Dump dev server log on failure
        if: failure() && steps.check.outputs.ready == 'true'
        run: cat .dev-server.log 2>/dev/null || echo "No dev-server.log found"
      - uses: actions/upload-artifact@v4
        if: always() && steps.check.outputs.ready == 'true'
        with:
          name: greenfield-dist
          path: |
            greenfield/dist
            greenfield/public
            greenfield/.dev-server.log

  scaffold:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scaffold
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: scaffold/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: scaffold
          install: false
          start: npm run preview -- --port 5173
          wait-on: http://localhost:5173
          browser: chrome
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scaffold-dist
          path: scaffold/build

  brownfield:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: brownfield
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: brownfield/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: brownfield
          install: false
          start: npm run preview -- --port 5173
          wait-on: http://localhost:5173
          browser: chrome
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: brownfield-dist
          path: brownfield/dist

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [greenfield, scaffold, brownfield]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build greenfield
        working-directory: greenfield
        run: |
          npm install --legacy-peer-deps
          if npm run build 2>/dev/null; then
            echo "Build completed"
          else
            echo "No build step — using public/ as-is"
          fi
      - name: Build scaffold
        working-directory: scaffold
        run: npm ci && npm run build
      - name: Build brownfield
        working-directory: brownfield
        run: npm ci && npm run build
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r greenfield/dist _site/greenfield 2>/dev/null || cp -r greenfield/public _site/greenfield || true
          cp -r scaffold/build _site/scaffold || true
          cp -r brownfield/dist _site/brownfield || true
          cat > _site/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="utf-8"><title>RootSpec Demos</title></head>
          <body>
            <h1>RootSpec Demos</h1>
            <ul>
              <li><a href="greenfield/">Greenfield: Marketing Site</a></li>
              <li><a href="scaffold/">Scaffold: RootFeed Social Feed</a></li>
              <li><a href="brownfield/">Brownfield: RootWeather Dashboard</a></li>
            </ul>
          </body>
          </html>
          HTML
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
