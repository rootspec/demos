name: Update RootSpec Version

on:
  repository_dispatch:
    types: [rootspec-release]
  workflow_dispatch:
    inputs:
      version:
        description: "RootSpec version to install (e.g. 6.3.0), or 'latest' for HEAD"
        required: false
        default: "latest"
      max_budget:
        description: "Max AI budget in USD (covers rs-update + follow-ups across all demos)"
        required: false
        default: "15"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
            TAG="${{ github.event.client_payload.tag }}"
          else
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Updating to RootSpec ${VERSION}"

      - name: Create update branch
        run: |
          BRANCH="rootspec/update-${{ steps.version.outputs.version }}-$(date +%Y%m%d%H%M)"
          git checkout -b "$BRANCH"
          echo "branch=${BRANCH}" >> "$GITHUB_ENV"

      - name: Update skills in all demos
        run: |
          for demo in greenfield scaffold brownfield; do
            echo "=== Updating skills in ${demo} ==="
            cd "$demo"
            npx skills add rootspec/rootspec --agent claude-code universal --skill '*' -y
            cd ..
          done

      - name: Install Claude Code
        run: curl -fsSL https://claude.ai/install.sh | bash

      - name: Run rs-update in each demo
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          MAX_BUDGET="${{ inputs.max_budget || '15' }}"
          BUDGET_PER_DEMO=$(echo "$MAX_BUDGET / 3" | bc -l | xargs printf "%.0f")

          for demo in greenfield scaffold brownfield; do
            echo "=== Running rs-update in ${demo} ==="
            cd "$demo"

            claude -p \
              --dangerously-skip-permissions \
              --max-turns 30 \
              --max-budget-usd "$BUDGET_PER_DEMO" \
              --model claude-sonnet-4-20250514 \
              "Run /rs-update. This is non-interactive — proceed without asking questions.
              After rs-update completes, run any recommended follow-up skills."

            cd ..
          done

      - name: Commit and create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          VERSION="${{ steps.version.outputs.version }}"
          git commit -m "Update RootSpec to v${VERSION}"
          git push origin "${{ env.branch }}"

          gh pr create \
            --title "Update RootSpec to v${VERSION}" \
            --body "## Summary
          - Updated RootSpec skills in all demos via \`npx skills add\`
          - Ran \`/rs-update\` to apply framework file and prerequisite changes
          - Executed any recommended follow-up actions

          Triggered by: ${{ github.event_name }}

          🤖 Generated with [Claude Code](https://claude.ai/claude-code)" \
            --label rootspec-update || true
