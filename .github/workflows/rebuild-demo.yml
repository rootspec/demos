name: Rebuild Demo

on:
  workflow_dispatch:
    inputs:
      demo:
        description: "Which demo to rebuild"
        required: true
        type: choice
        options:
          - greenfield
          - scaffold
          - brownfield
      max_budget:
        description: "Max AI budget in USD"
        required: false
        default: "10"
      model:
        description: "Claude model to use"
        required: false
        default: "claude-sonnet-4-6"
      phases:
        description: "Comma-separated phases"
        required: false
        default: "init,spec,impl,validate,review"
      rootspec_version:
        description: "RootSpec version (default: auto-detect from installed skills)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Create rebuild branch
        run: |
          BRANCH="rebuild/${{ inputs.demo }}-$(date +%Y%m%d%H%M)"
          git checkout -b "$BRANCH"
          echo "branch=${BRANCH}" >> "$GITHUB_ENV"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Reset phase ──────────────────────────────────────

      - name: "Reset: greenfield"
        if: inputs.demo == 'greenfield'
        working-directory: greenfield
        run: |
          # Keep: SEED.md, rootspec/00.*, .agents/, .claude/, .gitignore, README.md, skills-lock.json
          # Remove everything else

          # Spec files (keep 00.AXIOMS.md and 00.FRAMEWORK.md)
          rm -rf rootspec/01.* rootspec/02.* rootspec/03.* rootspec/04.SYSTEMS rootspec/05.IMPLEMENTATION
          rm -rf rootspec/CONVENTIONS rootspec/DERIVED_ARTIFACTS
          rm -f rootspec/spec-status.json rootspec/tests-status.json rootspec/stats.json
          rm -f rootspec/review-status.json

          # Source code and build artifacts
          rm -rf src/ dist/ .astro/ .next/ public/

          # Cypress / test infrastructure
          rm -rf cypress/ cypress.config.ts

          # Framework configs (agent chooses the framework)
          rm -f package.json package-lock.json tsconfig.json
          rm -f astro.config.mjs astro.config.ts vite.config.ts vite.config.js
          rm -f next.config.js next.config.ts next.config.mjs
          rm -f tailwind.config.mjs tailwind.config.js tailwind.config.ts
          rm -f postcss.config.js postcss.config.ts

          # Prerequisites (created by rs-init)
          rm -rf scripts/
          rm -f .rootspec.json
          rm -f .dev-server.pid .dev-server.log cypress-output.log

          # Orchestrator state from previous runs
          rm -rf .rootspec-orchestrator

          # Orphaned node_modules from previous build
          rm -rf node_modules

          echo "Greenfield reset to blank slate"

      - name: "Reset: scaffold"
        if: inputs.demo == 'scaffold'
        run: |
          # Restore original SvelteKit scaffold from skeleton branch
          git checkout scaffold/skeleton -- scaffold/src/

          # Remove spec files (keep framework files 00.*)
          cd scaffold
          rm -rf rootspec/01.PHILOSOPHY.md \
                 rootspec/02.TRUTHS.md \
                 rootspec/03.INTERACTIONS.md \
                 rootspec/04.SYSTEMS \
                 rootspec/05.IMPLEMENTATION \
                 rootspec/DERIVED_ARTIFACTS \
                 rootspec/spec-status.json \
                 rootspec/tests-status.json \
                 rootspec/review-status.json

          # Remove generated tests
          rm -rf cypress/e2e

          # Orchestrator state
          rm -rf .rootspec-orchestrator

          echo "Scaffold reset to skeleton state"

      # Brownfield: no reset — spec-only rebuild

      # ── Setup orchestrator ───────────────────────────────

      - name: Detect RootSpec version
        id: rs-version
        working-directory: ${{ inputs.demo }}
        run: |
          # Use explicit input if provided, otherwise read from installed skills
          if [ -n "${{ inputs.rootspec_version }}" ]; then
            VERSION="${{ inputs.rootspec_version }}"
          else
            VERSION=$(grep -oP '(?<=\*\*Version:\*\* )\S+' .agents/skills/rs-shared/00.FRAMEWORK.md 2>/dev/null || echo "")
          fi

          if [ -z "$VERSION" ]; then
            echo "ref=main" >> "$GITHUB_OUTPUT"
            echo "No version detected — using main"
          else
            echo "ref=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "Using RootSpec v${VERSION}"
          fi

      - name: Clone RootSpec framework
        run: git clone --depth 1 --branch ${{ steps.rs-version.outputs.ref }} https://github.com/rootspec/rootspec.git /tmp/rootspec

      - name: Build orchestrator
        run: cd /tmp/rootspec/orchestrator && npm install && npm run build

      - name: Install Claude Code
        run: curl -fsSL https://claude.ai/install.sh | bash

      # ── Run orchestrator ─────────────────────────────────

      - name: "Build: ${{ inputs.demo }}"
        working-directory: ${{ inputs.demo }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node /tmp/rootspec/orchestrator/dist/bin/rs-orchestrate.js \
            --project-dir "${{ github.workspace }}/${{ inputs.demo }}" \
            --rootspec-dir /tmp/rootspec \
            --budget "${{ inputs.max_budget }}" \
            --model "${{ inputs.model }}" \
            --phases "${{ inputs.phases }}" \
            2>&1 | tee /tmp/orchestrator-output.log || true

      # ── Extract results ──────────────────────────────────

      - name: Extract summary
        id: summary
        working-directory: ${{ inputs.demo }}
        run: |
          STATE=".rootspec-orchestrator/state.json"
          REVIEW="rootspec/review-status.json"
          STATS="rootspec/stats.json"

          # Overall status and cost from state.json
          STATUS="unknown"
          COST="?"
          if [ -f "$STATE" ]; then
            STATUS=$(jq -r '
              .phaseResults | to_entries |
              map(select(.value.status != "success" and .value.status != "skipped")) |
              if length == 0 then "success" else "failed" end
            ' "$STATE" 2>/dev/null || echo "unknown")
            COST=$(jq -r '.totalCostUsd // 0 | . * 100 | round / 100' "$STATE" 2>/dev/null || echo "?")
          fi

          # Quality score from stats.json (orchestrator's run entry)
          SCORE="n/a"
          if [ -f "$STATS" ]; then
            SCORE=$(jq -r '.runs[-1].qualityScore // "n/a"' "$STATS" 2>/dev/null || echo "n/a")
          fi
          # Fallback: parse from review gate message in state.json
          if [ "$SCORE" = "n/a" ] || [ "$SCORE" = "null" ]; then
            if [ -f "$STATE" ]; then
              SCORE=$(jq -r '
                .gateResults.review.checks[]? |
                select(.name == "Review completed") |
                .message | capture("Score: (?<s>[0-9]+)") | .s
              ' "$STATE" 2>/dev/null || echo "n/a")
            fi
          fi

          # Blockers and warnings from review-status.json
          BLOCKERS="0"
          WARNINGS="0"
          if [ -f "$REVIEW" ]; then
            BLOCKERS=$(jq -r '.summary.blockers // 0' "$REVIEW" 2>/dev/null || echo "0")
            WARNINGS=$(jq -r '.summary.warnings // 0' "$REVIEW" 2>/dev/null || echo "0")
          fi

          # Test pass rate from tests-status.json (stories is an object)
          TESTS="?"
          if [ -f "rootspec/tests-status.json" ]; then
            TOTAL=$(jq '[.stories | to_entries[]] | length' rootspec/tests-status.json 2>/dev/null || echo 0)
            PASSING=$(jq '[.stories | to_entries[] | select(.value.status == "pass")] | length' rootspec/tests-status.json 2>/dev/null || echo 0)
            TESTS="${PASSING}/${TOTAL}"
          fi

          # Phase breakdown table from state.json
          TABLE=""
          if [ -f "$STATE" ]; then
            TABLE=$(jq -r '
              .phaseResults | to_entries[] |
              {
                phase: .key,
                status: .value.status,
                cost: (.value.costUsd | . * 100 | round / 100),
                turns: .value.numTurns,
                time: (.value.durationMs / 1000 | round)
              } |
              "\(.phase | sub("^(?<a>.)"; (.a | ascii_upcase))) | \(.status) | $\(.cost) | \(.turns) | \(.time)s"
            ' "$STATE" 2>/dev/null || echo "")
          fi

          {
            echo "status=${STATUS}"
            echo "cost=${COST}"
            echo "score=${SCORE}"
            echo "blockers=${BLOCKERS}"
            echo "warnings=${WARNINGS}"
            echo "tests=${TESTS}"
          } >> "$GITHUB_OUTPUT"

          echo "$TABLE" > /tmp/phase-table.txt

      # ── Artifacts (before commit cleanup) ─────────────────

      - name: Upload orchestrator state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-state
          path: |
            ${{ inputs.demo }}/.rootspec-orchestrator/
            /tmp/orchestrator-output.log
          if-no-files-found: ignore

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: ${{ inputs.demo }}/cypress/screenshots/
          if-no-files-found: ignore

      # ── Commit and PR ────────────────────────────────────

      - name: Commit results
        run: |
          # Clean up artifacts that shouldn't be committed
          rm -rf ${{ inputs.demo }}/cypress/screenshots ${{ inputs.demo }}/cypress/videos
          rm -rf ${{ inputs.demo }}/.rootspec-orchestrator
          rm -f ${{ inputs.demo }}/rootspec/tests-status.json.bak

          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "rebuild(${{ inputs.demo }}): orchestrator run — ${{ steps.summary.outputs.status }} (${{ steps.summary.outputs.tests }} tests, \$${{ steps.summary.outputs.cost }})"

      - name: Push and create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin "${{ env.branch }}"

          # Read phase table
          TABLE=$(cat /tmp/phase-table.txt 2>/dev/null || echo "")

          PHASE_ROWS=""
          if [ -n "$TABLE" ]; then
            PHASE_ROWS=$(echo "$TABLE" | while IFS='|' read -r phase status cost turns time; do
              echo "| $phase | $status | $cost | $turns | $time |"
            done)
          fi

          gh pr create \
            --title "Rebuild: ${{ inputs.demo }}" \
            --body "$(cat <<EOF
          ## Summary
          - **Status**: ${{ steps.summary.outputs.status }}
          - **Quality score**: ${{ steps.summary.outputs.score }}/100 (${{ steps.summary.outputs.blockers }} blockers, ${{ steps.summary.outputs.warnings }} warnings)
          - **Tests**: ${{ steps.summary.outputs.tests }} passing
          - **Cost**: \$${{ steps.summary.outputs.cost }} / \$${{ inputs.max_budget }} budget
          - **Model**: ${{ inputs.model }}

          ## Phase breakdown
          | Phase | Status | Cost | Turns | Time |
          |-------|--------|------|-------|------|
          ${PHASE_ROWS}

          🤖 Generated with [RootSpec Orchestrator](https://github.com/rootspec/rootspec)
          EOF
          )" \
            --label rebuild,ai-generated || true

