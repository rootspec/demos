---

id: US-501
title: View parent post context in thread
requirement_id: R-501

acceptance_criteria:
  - id: AC-501-1
    title: Thread detail shows parent post when reply
    narrative: |
      Given I navigate to a post that is a reply
      When the page loads
      Then I should see the parent post above the focal post
    given:
      - visit: '/demos/scaffold/post/p9'
    when: []
    then:
      - shouldExist: { selector: '[data-test=parent-post]' }

---

id: US-502
title: Like a post from the thread detail page
requirement_id: R-502

acceptance_criteria:
  - id: AC-502-1
    title: Like button exists on thread detail
    narrative: |
      Given I navigate to a post detail page
      When the page loads
      Then I should see a like button for the focal post
    given:
      - visit: '/demos/scaffold/post/p1'
    when: []
    then:
      - shouldExist: { selector: '[data-test=like-btn]' }

  - id: AC-502-2
    title: Clicking like on thread detail marks post as liked
    narrative: |
      Given I am on a post detail page
      When I click the like button
      Then the post should be marked as liked
    given:
      - visit: '/demos/scaffold/post/p1'
    when:
      - click: { selector: '[data-test=like-btn]' }
    then:
      - shouldExist: { selector: '[data-test=like-btn][data-liked=true]' }
