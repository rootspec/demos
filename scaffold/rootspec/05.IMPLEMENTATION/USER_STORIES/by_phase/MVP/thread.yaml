---

id: US-108
title: View a post thread

acceptance_criteria:
  - id: AC-108-1
    title: Clicking a post navigates to its detail view
    narrative: |
      Given I am on the home feed
      When I click on a post
      Then I see the full post detail page
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=post-link]' }
    then:
      - shouldExist: { selector: '[data-test=post-detail]' }

  - id: AC-108-2
    title: Post detail shows author, content, and engagement
    narrative: |
      Given I navigate to a post detail page
      When the page loads
      Then I see the post content, author info, like count, and repost count
    given:
      - visit: '/demos/scaffold/post/p1'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-detail-content]' }
      - shouldExist: { selector: '[data-test=post-author-name]' }
      - shouldExist: { selector: '[data-test=post-like-count]' }

  - id: AC-108-3
    title: Post thread shows replies
    narrative: |
      Given I navigate to a post that has replies
      When the page loads
      Then I see the replies listed below the main post
    given:
      - visit: '/demos/scaffold/post/p1'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-replies]' }

  - id: AC-108-4
    title: Reply post shows parent context
    narrative: |
      Given I navigate to a post that is a reply to another post
      When the page loads
      Then I see the parent post displayed above the focal post
    given:
      - visit: '/demos/scaffold/post/p9'
    when: []
    then:
      - shouldExist: { selector: '[data-test=parent-post]' }
