# =============================================================================
# USER STORY: View Post Thread with Parent
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: POST_DETAIL
# @systems: [DATA_SYSTEM, VIEW_SYSTEM]
# @last_updated: 2026-04-14T20:45:19Z

id: US-015
title: View post thread showing parent post when viewing a reply

acceptance_criteria:
  - id: AC-015-1
    title: Reply post shows parent post above it
    narrative: |
      Given I navigate to a post that is a reply to another post
      When the page loads
      Then I should see the parent post displayed above the reply
    given:
      - visit: '/demos/scaffold/post/p2'
    when: []
    then:
      - shouldExist: { selector: '[data-test=parent-post]' }
      - shouldExist: { selector: '[data-test=post-detail]' }
