---

id: US-501
title: Toggle dark and light mode
requirement_id: R-501

acceptance_criteria:
  - id: AC-501-1
    title: Theme toggle button is visible in navigation
    narrative: |
      Given I visit the home page
      When the page loads
      Then I should see a theme toggle button in the navigation
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-501-2
    title: Clicking theme toggle switches between light and dark mode
    narrative: |
      Given I am on the home page in light mode
      When I click the theme toggle
      Then the page should switch to dark mode
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: 'html.dark' }
