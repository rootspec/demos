# =============================================================================
# US-006: View post detail and thread
# =============================================================================
id: US-006
title: View a single post with its full thread context

acceptance_criteria:
  - id: AC-006-1
    title: Post detail page shows post content and author
    narrative: |
      Given I click on a post from the home feed
      When the post detail page loads
      Then I should see the post content and author information
    given:
      - visit: '/demos/scaffold'
    when:
      - click: { selector: '[data-test=post-content]' }
    then:
      - shouldExist: { selector: '[data-test=post-content]' }
      - shouldExist: { selector: '[data-test=post-author]' }
