id: US-017
title: View post with parent context

acceptance_criteria:
  - id: AC-017-1
    title: Reply post shows parent post above it
    narrative: |
      Given I visit a post detail page for a reply post
      When the page loads
      Then I should see the parent post displayed above the reply
    given:
      - visit: '/demos/scaffold/post/p5'
    when: []
    then:
      - shouldExist: { selector: '[data-test=parent-post]' }
