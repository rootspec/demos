# =============================================================================
# USER STORY: View Post Detail with Replies
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: POST_DETAIL
# @systems: [DATA_SYSTEM, VIEW_SYSTEM]
# @last_updated: 2026-04-14T20:45:19Z

id: US-006
title: View post detail showing full content and replies

acceptance_criteria:
  - id: AC-006-1
    title: Post detail page shows post content and author
    narrative: |
      Given I navigate to a post detail page
      When the page loads
      Then I should see the post content and author information
    given:
      - visit: '/demos/scaffold/post/p1'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-detail]' }
      - shouldExist: { selector: '[data-test=post-author]' }

  - id: AC-006-2
    title: Post detail page shows replies when they exist
    narrative: |
      Given I navigate to a post that has replies
      When the page loads
      Then I should see the replies section with reply content
    given:
      - visit: '/demos/scaffold/post/p1'
    when: []
    then:
      - shouldExist: { selector: '[data-test=replies-section]' }
      - shouldExist: { selector: '[data-test=reply-item]' }

