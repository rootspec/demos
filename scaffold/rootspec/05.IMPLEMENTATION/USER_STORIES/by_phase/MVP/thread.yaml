id: US-004
title: View a single post with its replies

acceptance_criteria:
  - id: AC-004-1
    title: Post detail page shows the post content and author
    narrative: |
      Given I navigate to a post detail page
      When the page loads
      Then I see the post content and author information
    given:
      - visit: '/post/p1'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-content]' }
      - shouldExist: { selector: '[data-test=post-author]' }

  - id: AC-004-2
    title: Invalid post ID shows not-found message
    narrative: |
      Given I navigate to a post that does not exist
      When the page loads
      Then I see a not-found message
    given:
      - visit: '/post/nonexistent-id'
    when: []
    then:
      - shouldContain: { selector: 'body', text: 'Post not found' }
