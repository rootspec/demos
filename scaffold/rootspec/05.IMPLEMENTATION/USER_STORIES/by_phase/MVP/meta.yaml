id: US-005
title: Toggle between dark and light theme

acceptance_criteria:
  - id: AC-005-1
    title: Theme toggle button is visible in the navigation bar
    narrative: |
      Given I visit the home page
      When I look at the navigation bar
      Then I see a theme toggle button
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-005-2
    title: Clicking the theme toggle switches the active theme
    narrative: |
      Given I visit the home page
      When I click the theme toggle button
      Then the page theme changes
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }
