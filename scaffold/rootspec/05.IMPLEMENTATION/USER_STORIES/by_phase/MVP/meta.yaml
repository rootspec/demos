# =============================================================================
# USER STORY: See meta-banner with RootSpec links
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FIRST_TIME_DEVELOPER_VISIT
# @systems: [VIEW_SYSTEM]
# @last_updated: 2026-04-14T00:00:00Z

id: US-013
title: See meta-banner with RootSpec links

acceptance_criteria:
  - id: AC-013-1
    title: Meta-banner is visible on home page
    narrative: |
      Given I visit the home feed
      When the page loads
      Then I should see the meta-banner explaining this is a RootSpec scaffold demo
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }
      - shouldContain: { selector: '[data-test=meta-banner]', text: 'RootSpec' }

  - id: AC-013-2
    title: Meta-banner contains scaffold commit link
    narrative: |
      Given I visit the home feed
      When the page loads
      Then I should see a link to view the scaffold commit
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner-scaffold-link]' }

  - id: AC-013-3
    title: Meta-banner contains spec link
    narrative: |
      Given I visit the home feed
      When the page loads
      Then I should see a link to view the spec
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner-spec-link]' }

  - id: AC-013-4
    title: Meta-banner contains seed link
    narrative: |
      Given I visit the home feed
      When the page loads
      Then I should see a link to view the seed
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner-seed-link]' }

