# =============================================================================
# USER STORY: Toggle dark/light theme
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: THEME
# @systems: [VIEW_SYSTEM]
# @last_updated: 2026-04-14T18:52:50Z

id: US-010
title: Toggle dark/light theme

acceptance_criteria:
  - id: AC-010-1
    title: Theme toggle button is accessible in the nav
    narrative: |
      Given I am on any page
      When the page loads
      Then I should see a theme toggle button in the navigation
    given:
      - visit: '/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-010-2
    title: Clicking theme toggle switches the theme
    narrative: |
      Given I am on the home page
      When I click the theme toggle button
      Then the page theme should change
    given:
      - visit: '/scaffold/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

