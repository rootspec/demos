# =============================================================================
# USER STORY: Toggle Dark/Light Theme
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: META
# @systems: [META_SYSTEM]
# @last_updated: 2026-04-03T00:00:00Z

id: US-112
title: Toggle dark/light theme

acceptance_criteria:
  - id: AC-112-1
    title: Theme toggle switches between dark and light
    narrative: |
      Given I am on any page
      When I click the theme toggle
      Then the page should switch to the opposite theme
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-test=theme-indicator]' }
