---

id: US-401
title: See meta banner on every page
requirement_id: R-401

acceptance_criteria:
  - id: AC-401-1
    title: Meta banner is visible on the home page
    narrative: |
      Given I visit the home page
      When the page loads
      Then I should see the meta banner explaining this is a RootSpec demo
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-401-2
    title: Meta banner is visible on the explore page
    narrative: |
      Given I visit the explore page
      When the page loads
      Then I should see the meta banner
    given:
      - visit: '/demos/scaffold/explore'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-401-3
    title: Meta banner is visible on the search page
    narrative: |
      Given I visit the search page
      When the page loads
      Then I should see the meta banner
    given:
      - visit: '/demos/scaffold/search'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

---

id: US-402
title: Navigate to seed and spec from banner
requirement_id: R-402

acceptance_criteria:
  - id: AC-402-1
    title: Meta banner contains seed link
    narrative: |
      Given I am on any page
      When I look at the meta banner
      Then I should see a link to view the seed
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=seed-link]' }

  - id: AC-402-2
    title: Meta banner contains spec link
    narrative: |
      Given I am on any page
      When I look at the meta banner
      Then I should see a link to view the spec
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=spec-link]' }

  - id: AC-402-3
    title: Meta banner contains scaffold commit link
    narrative: |
      Given I am on any page
