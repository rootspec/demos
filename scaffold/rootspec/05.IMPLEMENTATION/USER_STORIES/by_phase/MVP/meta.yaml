# =============================================================================
# US-011: Toggle dark/light theme
# =============================================================================
id: US-011
title: Toggle between dark and light mode using the theme button in the nav

acceptance_criteria:
  - id: AC-011-1
    title: Meta banner is present on every page
    narrative: |
      Given I visit the home page
      When the page loads
      Then I should see the meta banner with links to the seed and spec
    given:
      - visit: '/demos/scaffold'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }
      - shouldExist: { selector: '[data-test=seed-link]' }
      - shouldExist: { selector: '[data-test=spec-link]' }
      - shouldExist: { selector: '[data-test=scaffold-link]' }

  - id: AC-011-2
    title: Theme toggle button is present in navigation
    narrative: |
      Given I visit the home page
      When the page loads
      Then I should see a theme toggle button in the navigation
    given:
      - visit: '/demos/scaffold'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-011-3
    title: Clicking theme toggle switches the active class on html element
    narrative: |
      Given I am on the home page
      When I click the theme toggle button
      Then the html element should have the dark class applied
    given:
      - visit: '/demos/scaffold'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: 'html.dark' }
