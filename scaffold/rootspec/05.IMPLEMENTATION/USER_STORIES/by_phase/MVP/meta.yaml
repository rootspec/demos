---

id: US-113
title: Toggle dark/light theme

acceptance_criteria:
  - id: AC-113-1
    title: Theme toggle button is visible in the header
    narrative: |
      Given I visit any page
      When the page loads
      Then I see a theme toggle button in the navigation
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-113-2
    title: Clicking the theme toggle switches the active theme
    narrative: |
      Given I am on the home feed
      When I click the theme toggle
      Then the page applies the opposite color scheme
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

