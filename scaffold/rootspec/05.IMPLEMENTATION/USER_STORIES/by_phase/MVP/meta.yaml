# =============================================================================
# USER STORY: Toggle Dark/Light Theme
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: SETTINGS
# @systems: [THEME_SYSTEM, VIEW_SYSTEM]
# @last_updated: 2026-04-14T20:45:19Z

id: US-012
title: Toggle between dark and light theme

acceptance_criteria:
  - id: AC-012-1
    title: Theme toggle button switches the theme
    narrative: |
      Given I am on any page
      When I click the theme toggle button
      Then the page theme should switch between light and dark
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-012-2
    title: Dark mode applies dark class to document
    narrative: |
      Given I am on the home page in light mode
      When I click the theme toggle
      Then the html element should have the dark class applied
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: 'html.dark' }

