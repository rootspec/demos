# =============================================================================
# USER STORY: View home feed with posts
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: HOME_FEED
# @systems: [FEED_SYSTEM, DATA_SYSTEM, VIEW_SYSTEM]
# @last_updated: 2026-04-14T18:52:50Z

id: US-001
title: View home feed with posts

acceptance_criteria:
  - id: AC-001-1
    title: Home feed shows posts with author info
    narrative: |
      Given I navigate to the home page
      When the page loads
      Then I should see a list of posts with author names and content
    given:
      - visit: '/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-card]' }
      - shouldExist: { selector: '[data-test=post-author]' }
      - shouldExist: { selector: '[data-test=post-content]' }

  - id: AC-001-2
    title: Meta banner is visible on home page
    narrative: |
      Given I navigate to the home page
      When the page loads
      Then I should see the RootSpec demo meta banner
    given:
      - visit: '/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

