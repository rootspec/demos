---

id: US-001
title: See the meta banner on the home page

acceptance_criteria:
  - id: AC-001-1
    title: Meta banner is visible on home page
    narrative: |
      Given I visit the home page
      When the page loads
      Then I see the meta banner explaining RootFeed is a RootSpec scaffold demo
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-001-2
    title: Meta banner contains link to scaffold commit
    narrative: |
      Given I visit the home page
      When I look at the meta banner
      Then I see a link to view the scaffold commit
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=banner-scaffold-link]' }

  - id: AC-001-3
    title: Meta banner contains link to the spec
    narrative: |
      Given I visit the home page
      When I look at the meta banner
      Then I see a link to view the spec
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=banner-spec-link]' }

  - id: AC-001-4
    title: Meta banner contains link to the seed
    narrative: |
      Given I visit the home page
      When I look at the meta banner
      Then I see a link to view the seed
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=banner-seed-link]' }

