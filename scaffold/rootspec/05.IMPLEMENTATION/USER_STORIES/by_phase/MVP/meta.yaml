# =============================================================================
# USER STORY: Toggle Dark/Light Theme
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: META
# @systems: [META_SYSTEM]
# @last_updated: 2026-04-14T00:00:00Z

id: US-010
title: Toggle between dark and light theme

acceptance_criteria:
  - id: AC-010-1
    title: Theme toggle button exists in the navigation
    narrative: |
      Given I am on any page
      When the page loads
      Then I see a theme toggle button in the navigation
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-010-2
    title: Clicking theme toggle switches the theme class
    narrative: |
      Given I am on the home page in light mode
      When I click the theme toggle
      Then the dark class is applied to the HTML element
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: 'html.dark' }

