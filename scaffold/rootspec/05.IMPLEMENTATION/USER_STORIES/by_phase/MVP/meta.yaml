---

id: US-401
title: See meta banner on every page
requirement_id: R-401

acceptance_criteria:
  - id: AC-401-1
    title: Meta banner is visible on home page
    narrative: |
      Given I visit the home page
      When the page loads
      Then I should see the demo meta banner
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

  - id: AC-401-2
    title: Meta banner contains link to spec
    narrative: |
      Given I am viewing the meta banner
      When I look for links
      Then I should see a link to view the spec
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner-spec-link]' }

  - id: AC-401-3
    title: Meta banner is visible on explore page
    narrative: |
      Given I navigate to the explore page
      When the page loads
      Then I should see the demo meta banner
    given:
      - visit: '/demos/scaffold/explore'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }

---

id: US-402
title: Toggle dark and light theme
requirement_id: R-402

acceptance_criteria:
  - id: AC-402-1
    title: Theme toggle button is visible in the nav
    narrative: |
      Given I am on any page
      When the page loads
      Then I should see a theme toggle button
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-402-2
    title: Clicking theme toggle changes the theme
    narrative: |
      Given I am on the home page
      When I click the theme toggle
      Then the page theme should change
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: 'html[data-theme]' }
