# =============================================================================
# USER STORY: Search posts by keyword
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: SEARCH
# @systems: [DISCOVERY_SYSTEM, DATA_SYSTEM]
# @last_updated: 2026-04-14T00:00:00Z

id: US-011
title: Search posts by keyword

acceptance_criteria:
  - id: AC-011-1
    title: Typing in search box shows matching posts
    narrative: |
      Given I visit the search page
      When I type a keyword into the search box
      Then I should see posts containing that keyword
    given:
      - visit: '/demos/scaffold/search'
    when:
      - fill: { selector: '[data-test=search-input]', value: 'CSS' }
    then:
      - shouldExist: { selector: '[data-test=search-result]' }

  - id: AC-011-2
    title: Search results link to post detail
    narrative: |
      Given I have typed a search query with results
      When the results appear
      Then each result should be a link to the post detail page
    given:
      - visit: '/demos/scaffold/search'
    when:
      - fill: { selector: '[data-test=search-input]', value: 'CSS' }
    then:
      - shouldExist: { selector: '[data-test=search-result] a' }

---

