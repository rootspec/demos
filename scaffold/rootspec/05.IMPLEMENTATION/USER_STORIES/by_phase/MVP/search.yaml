id: US-008
title: Search posts by keyword

acceptance_criteria:
  - id: AC-008-1
    title: Search input is shown on the search page
    narrative: |
      Given I navigate to the search page
      When the page loads
      Then I should see a search input field
    given:
      - visit: '/scaffold/search'
    when: []
    then:
      - shouldExist: { selector: '[data-test=search-input]' }

  - id: AC-008-2
    title: Typing a query shows matching posts
    narrative: |
      Given I am on the search page
      When I type a keyword that exists in post content
      Then I should see matching posts in the results
    given:
      - visit: '/scaffold/search'
    when:
      - fill: { selector: '[data-test=search-input]', value: 'security' }
    then:
      - shouldExist: { selector: '[data-test=search-result]' }

  - id: AC-008-3
    title: No results state shown when query has no matches
    narrative: |
      Given I am on the search page
      When I type a query that matches no posts
      Then I should see a no results message
    given:
      - visit: '/scaffold/search'
    when:
      - fill: { selector: '[data-test=search-input]', value: 'zzzzunmatchablequery9999' }
    then:
      - shouldExist: { selector: '[data-test=search-empty]' }
