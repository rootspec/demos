# =============================================================================
# US-009: Search posts by keyword
# =============================================================================
id: US-009
title: Search for posts using a keyword and see results update live

acceptance_criteria:
  - id: AC-009-1
    title: Search input is present on search page
    narrative: |
      Given I navigate to the search page
      When the page loads
      Then I should see a search input field
    given:
      - visit: '/demos/scaffold/search'
    when: []
    then:
      - shouldExist: { selector: '[data-test=search-input]' }

  - id: AC-009-2
    title: Typing a keyword shows matching posts
    narrative: |
      Given I am on the search page
      When I type a keyword that matches post content
      Then I should see matching post results
    given:
      - visit: '/demos/scaffold/search'
    when:
      - fill: { selector: '[data-test=search-input]', value: 'rust' }
    then:
      - shouldExist: { selector: '[data-test=search-result]' }

  - id: AC-009-3
    title: Searching with no matches shows empty state message
    narrative: |
      Given I am on the search page
      When I type a query that has no matching posts
      Then I should see a no results message
    given:
      - visit: '/demos/scaffold/search'
    when:
      - fill: { selector: '[data-test=search-input]', value: 'xyzzy12345notaword' }
    then:
      - shouldExist: { selector: '[data-test=search-empty]' }
