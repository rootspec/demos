---

id: US-109
title: Search posts by keyword

acceptance_criteria:
  - id: AC-109-1
    title: Search page has a text input
    narrative: |
      Given I visit the search page
      When the page loads
      Then I see a search input field
    given:
      - visit: '/demos/scaffold/search'
    when: []
    then:
      - shouldExist: { selector: '[data-test=search-input]' }

  - id: AC-109-2
    title: Typing a query shows matching posts
    narrative: |
      Given I am on the search page
      When I type a keyword that exists in a post
      Then matching posts appear in the results
    given:
      - visit: '/demos/scaffold/search'
    when:
      - fill: { selector: '[data-test=search-input]', value: 'kubernetes' }
    then:
      - shouldExist: { selector: '[data-test=search-result]' }

  - id: AC-109-3
    title: No results message shown for unmatched query
    narrative: |
      Given I am on the search page
      When I type a query that matches no posts
      Then a no results message is shown
    given:
      - visit: '/demos/scaffold/search'
    when:
      - fill: { selector: '[data-test=search-input]', value: 'xyzzy-no-match-9999' }
    then:
      - shouldExist: { selector: '[data-test=search-empty]' }

  - id: AC-109-4
    title: Empty query shows no results
    narrative: |
      Given I am on the search page
      When the input is empty
      Then no results are shown
    given:
      - visit: '/demos/scaffold/search'
    when: []
    then:
      - shouldExist: { selector: '[data-test=search-empty-default]' }
