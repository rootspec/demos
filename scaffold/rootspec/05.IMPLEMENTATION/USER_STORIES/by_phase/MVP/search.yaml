# =============================================================================
# USER STORY: Toggle dark/light theme
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: INTERACTIVE_EXPLORATION
# @systems: [THEME_SYSTEM, VIEW_SYSTEM]
# @last_updated: 2026-04-14T00:00:00Z

id: US-012
title: Toggle dark/light theme

acceptance_criteria:
  - id: AC-012-1
    title: Theme toggle button is present in nav
    narrative: |
      Given I visit the home feed
      When the page loads
      Then I should see a theme toggle button in the navigation
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=theme-toggle]' }

  - id: AC-012-2
    title: Clicking theme toggle switches the theme
    narrative: |
      Given I visit the home feed
      When I click the theme toggle button
      Then the page should switch to the other theme
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=theme-toggle]' }
    then:
      - shouldExist: { selector: 'html[data-theme]' }
