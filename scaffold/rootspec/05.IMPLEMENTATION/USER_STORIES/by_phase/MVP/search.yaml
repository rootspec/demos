---

id: US-050
title: Search posts by keyword

acceptance_criteria:
  - id: AC-050-1
    title: Search page has a text input
    narrative: |
      Given I visit the search page
      When the page loads
      Then I see a search input field
    given:
      - visit: '/demos/scaffold/search'
    when: []
    then:
      - shouldExist: { selector: '[data-test=search-input]' }

  - id: AC-050-2
    title: Typing a keyword shows matching posts
    narrative: |
      Given I visit the search page
      When I type a keyword that exists in post content
      Then I see matching posts in the results
    given:
      - visit: '/demos/scaffold/search'
    when:
      - fill: { selector: '[data-test=search-input]', value: 'the' }
    then:
      - shouldExist: { selector: '[data-test=search-result]' }

  - id: AC-050-3
    title: Typing a keyword with no matches shows an empty state message
    narrative: |
      Given I visit the search page
      When I type a keyword that matches no posts
      Then I see an empty state message
    given:
      - visit: '/demos/scaffold/search'
    when:
      - fill: { selector: '[data-test=search-input]', value: 'xyzzy_no_match_12345' }
    then:
      - shouldExist: { selector: '[data-test=search-empty]' }

  - id: AC-050-4
    title: Empty search input shows no results
    narrative: |
      Given I visit the search page with no query entered
      When the page loads
      Then no result cards are shown
    given:
      - visit: '/demos/scaffold/search'
    when: []
    then:
      - shouldExist: { selector: '[data-test=search-input]' }
