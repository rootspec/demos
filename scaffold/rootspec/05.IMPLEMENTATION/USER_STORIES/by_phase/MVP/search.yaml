# USER STORY: Search with no results shows message
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: SEARCH
# @systems: [DISCOVERY_SYSTEM]
# @last_updated: 2026-04-14T00:00:00Z

id: US-018
title: Search with no results shows message

acceptance_criteria:
  - id: AC-018-1
    title: No-results message appears for unmatched query
    narrative: |
      Given I visit the search page
      When I type a query that matches no posts
      Then I should see a no-results message
    given:
      - visit: '/demos/scaffold/search'
    when:
      - fill: { selector: '[data-test=search-input]', value: 'zxqwerty12345notarealword' }
    then:
      - shouldExist: { selector: '[data-test=search-no-results]' }

