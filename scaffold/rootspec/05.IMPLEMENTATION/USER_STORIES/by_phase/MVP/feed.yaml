---

id: US-101
title: View the home feed

acceptance_criteria:
  - id: AC-101-1
    title: Home feed displays posts
    narrative: |
      Given I visit the home feed
      When the page loads
      Then I see a list of posts with author names and content
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-item]' }

  - id: AC-101-2
    title: Posts show author handle and display name
    narrative: |
      Given I visit the home feed
      When the page loads
      Then each post shows the author display name and handle
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-author-name]' }
      - shouldExist: { selector: '[data-test=post-author-handle]' }

  - id: AC-101-3
    title: Posts show engagement counts
    narrative: |
      Given I visit the home feed
      When the page loads
      Then each post shows like and repost counts
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-like-count]' }
      - shouldExist: { selector: '[data-test=post-repost-count]' }

---

id: US-102
title: Like a post

acceptance_criteria:
  - id: AC-102-1
    title: Like button toggles liked state
    narrative: |
      Given I am on the home feed
      When I click the like button on a post
      Then the like button shows as active
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=like-button]' }
    then:
      - shouldExist: { selector: '[data-test=like-button][data-liked=true]' }

  - id: AC-102-2
    title: Like count increments when liked
    narrative: |
      Given I am on the home feed and a post has a known like count
      When I click the like button
      Then the like count increases by one
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=like-button]' }
    then:
      - shouldExist: { selector: '[data-test=post-like-count]' }

  - id: AC-102-3
    title: Like toggles off when clicked again
    narrative: |
      Given I have liked a post
      When I click the like button again
      Then the like button returns to the inactive state
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=like-button]' }
      - click: { selector: '[data-test=like-button]' }
    then:
      - shouldExist: { selector: '[data-test=like-button][data-liked=false]' }

