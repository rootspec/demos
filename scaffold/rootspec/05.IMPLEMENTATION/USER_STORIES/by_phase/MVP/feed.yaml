# =============================================================================
# USER STORY: Compose and submit a new post
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: INTERACTIVE_EXPLORATION
# @systems: [FEED_SYSTEM]
# @last_updated: 2026-04-14T00:00:00Z

id: US-005
title: Compose and submit a new post

acceptance_criteria:
  - id: AC-005-1
    title: Post composer is accessible on home feed
    narrative: |
      Given I visit the home feed
      When the page loads
      Then I should see a way to compose a new post
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=composer]' }

  - id: AC-005-2
    title: Submitting a post adds it to the feed
    narrative: |
      Given I visit the home feed
      When I type a post and submit it
      Then the new post should appear in the feed
    given:
      - visit: '/demos/scaffold/'
    when:
      - fill: { selector: '[data-test=composer-input]', value: 'Hello from the composer' }
      - click: { selector: '[data-test=composer-submit]' }
    then:
      - shouldContain: { selector: '[data-test=post-item]', text: 'Hello from the composer' }
