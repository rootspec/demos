---

id: US-010
title: See a list of posts on the home feed

acceptance_criteria:
  - id: AC-010-1
    title: Home feed displays posts
    narrative: |
      Given I visit the home page
      When the page loads
      Then I see a list of posts in the feed
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-card]' }

  - id: AC-010-2
    title: Posts show author display name and handle
    narrative: |
      Given I visit the home page
      When I look at a post card
      Then I see the author display name and handle
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-author-name]' }
      - shouldExist: { selector: '[data-test=post-author-handle]' }

  - id: AC-010-3
    title: Posts show like and repost counts
    narrative: |
      Given I visit the home page
      When I look at a post card
      Then I see like count and repost count
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-like-count]' }
      - shouldExist: { selector: '[data-test=post-repost-count]' }

