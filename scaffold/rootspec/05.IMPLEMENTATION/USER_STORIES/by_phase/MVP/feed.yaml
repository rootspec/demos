# =============================================================================
# USER STORY: Like a Post
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: POST_ENGAGEMENT
# @systems: [FEED_SYSTEM]
# @last_updated: 2026-04-14T20:45:19Z

id: US-002
title: Like and unlike a post

acceptance_criteria:
  - id: AC-002-1
    title: Like button toggles liked state
    narrative: |
      Given I am on the home feed
      When I click the like button on a post
      Then the like button should show an active state
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=like-btn]' }
    then:
      - shouldExist: { selector: '[data-test=like-btn][data-liked=true]' }

  - id: AC-002-2
    title: Like count updates on toggle
    narrative: |
      Given I have liked a post
      When I click the like button again
      Then the like button should return to inactive state
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=like-btn]' }
      - click: { selector: '[data-test=like-btn]' }
    then:
      - shouldExist: { selector: '[data-test=like-btn][data-liked=false]' }

