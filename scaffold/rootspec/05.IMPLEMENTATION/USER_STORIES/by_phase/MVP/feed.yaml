id: US-105
title: Compose and post a new message

acceptance_criteria:
  - id: AC-105-1
    title: Compose button opens the composer
    narrative: |
      Given I am on the home feed
      When I click the compose button
      Then the post composer appears
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=compose-button]' }
    then:
      - shouldExist: { selector: '[data-test=post-composer]' }

  - id: AC-105-2
    title: Submitting a post adds it to the feed
    narrative: |
      Given the post composer is open
      When I type content and submit
      Then the new post appears at the top of the feed
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=compose-button]' }
      - fill: { selector: '[data-test=composer-input]', value: 'Hello from the composer' }
      - click: { selector: '[data-test=composer-submit]' }
    then:
      - shouldContain: { selector: '[data-test=post-item]', text: 'Hello from the composer' }
