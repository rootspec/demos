id: US-003
title: Load more posts

acceptance_criteria:
  - id: AC-003-1
    title: Load more button is visible when more posts exist
    narrative: |
      Given I am on the home feed with more posts than the initial page size
      When the page loads
      Then I should see a load more button
    given:
      - visit: '/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=load-more]' }

  - id: AC-003-2
    title: Clicking load more shows additional posts
    narrative: |
      Given I am on the home feed showing the initial set of posts
      When I click the load more button
      Then I should see more posts in the feed
    given:
      - visit: '/scaffold/'
    when:
      - click: { selector: '[data-test=load-more]' }
    then:
      - shouldExist: { selector: '[data-test=post-card]' }

