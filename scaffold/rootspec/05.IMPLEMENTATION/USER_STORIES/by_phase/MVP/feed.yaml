id: US-012
title: Like a post to toggle like state

acceptance_criteria:
  - id: AC-012-1
    title: Like button is visible on each post
    narrative: |
      Given I visit the home page
      When I look at a post card
      Then I see a like button
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=like-btn]' }

  - id: AC-012-2
    title: Clicking like toggles the liked state
    narrative: |
      Given I visit the home page
      When I click the like button on a post
      Then the like button shows active state
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=like-btn]' }
    then:
      - shouldExist: { selector: '[data-test=like-btn][data-liked=true]' }

