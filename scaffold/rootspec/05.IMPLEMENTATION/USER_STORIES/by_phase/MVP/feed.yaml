# =============================================================================
# US-001: View home feed
# =============================================================================
id: US-001
title: View home feed with posts and author info

acceptance_criteria:
  - id: AC-001-1
    title: Home feed shows posts with author and content
    narrative: |
      Given I visit the home page
      When the page loads
      Then I should see post cards with author names and post content
    given:
      - visit: '/demos/scaffold'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-card]' }
      - shouldExist: { selector: '[data-test=post-author]' }
      - shouldExist: { selector: '[data-test=post-content]' }

  - id: AC-001-2
    title: Posts show timestamp and engagement counts
    narrative: |
      Given I visit the home page
      When the page loads
      Then I should see timestamps and like counts on post cards
    given:
      - visit: '/demos/scaffold'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-timestamp]' }
      - shouldExist: { selector: '[data-test=like-count]' }
      - shouldExist: { selector: '[data-test=repost-count]' }

