id: US-014
title: Compose and publish a new post in the feed

acceptance_criteria:
  - id: AC-014-1
    title: Compose button is visible on home feed
    narrative: |
      Given I visit the home page
      When the page loads
      Then I see a button to compose a new post
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=compose-btn]' }

  - id: AC-014-2
    title: Clicking compose reveals the composer input
    narrative: |
      Given I visit the home page
      When I click the compose button
      Then I see a text input for writing a post
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=compose-btn]' }
    then:
      - shouldExist: { selector: '[data-test=composer-input]' }

  - id: AC-014-3
    title: Submitting a composed post adds it to the feed
    narrative: |
      Given I have opened the composer and typed a message
      When I submit the post
      Then my new post appears at the top of the feed
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=compose-btn]' }
      - fill: { selector: '[data-test=composer-input]', value: 'Hello from the composer!' }
      - click: { selector: '[data-test=composer-submit]' }
    then:
      - shouldContain: { selector: '[data-test=post-card]', text: 'Hello from the composer!' }
