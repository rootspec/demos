# =============================================================================
# USER STORY: Compose a new post
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: HOME_FEED
# @systems: [FEED_SYSTEM, VIEW_SYSTEM]
# @last_updated: 2026-04-14T18:52:50Z

id: US-004
title: Compose a new post

acceptance_criteria:
  - id: AC-004-1
    title: Compose button opens the post composer
    narrative: |
      Given I am on the home feed
      When I click the compose button
      Then I should see a post composer input area
    given:
      - visit: '/scaffold/'
    when:
      - click: { selector: '[data-test=compose-button]' }
    then:
      - shouldExist: { selector: '[data-test=post-composer]' }

  - id: AC-004-2
    title: Submitting a new post adds it to the feed
    narrative: |
      Given I have opened the post composer and typed a message
      When I submit the post
      Then the new post should appear at the top of the feed
    given:
      - visit: '/scaffold/'
      - click: { selector: '[data-test=compose-button]' }
    when:
      - fill: { selector: '[data-test=composer-input]', value: 'Hello from the test composer' }
      - click: { selector: '[data-test=composer-submit]' }
    then:
      - shouldContain: { selector: '[data-test=post-card]', text: 'Hello from the test composer' }
