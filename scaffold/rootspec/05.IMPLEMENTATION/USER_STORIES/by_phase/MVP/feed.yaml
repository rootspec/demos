# =============================================================================
# USER STORY: View Home Feed
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FEED_BROWSING
# @systems: [FEED_SYSTEM, DATA_SYSTEM]
# @last_updated: 2026-04-14T20:45:19Z

id: US-001
title: View home feed with posts and author info

acceptance_criteria:
  - id: AC-001-1
    title: Home feed shows posts with author info
    narrative: |
      Given I visit the home feed
      When the page loads
      Then I should see a list of posts with author names and post content
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-card]' }
      - shouldExist: { selector: '[data-test=post-author]' }
      - shouldExist: { selector: '[data-test=post-content]' }

  - id: AC-001-2
    title: Posts show engagement counts
    narrative: |
      Given I visit the home feed
      When the page loads
      Then I should see like and repost counts on posts
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=like-count]' }
      - shouldExist: { selector: '[data-test=repost-count]' }

