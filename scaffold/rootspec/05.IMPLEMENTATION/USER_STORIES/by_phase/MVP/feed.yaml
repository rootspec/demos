# =============================================================================
# USER STORY: Like and unlike a post
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: HOME_FEED
# @systems: [FEED_SYSTEM, VIEW_SYSTEM]
# @last_updated: 2026-04-14T18:52:50Z

id: US-002
title: Like and unlike a post

acceptance_criteria:
  - id: AC-002-1
    title: Like button exists on post cards
    narrative: |
      Given I am on the home feed
      When the page loads
      Then I should see a like button on each post card
    given:
      - visit: '/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=like-button]' }

  - id: AC-002-2
    title: Clicking like button toggles liked state
    narrative: |
      Given I am on the home feed
      When I click the like button on a post
      Then the like button should reflect the liked state
    given:
      - visit: '/scaffold/'
    when:
      - click: { selector: '[data-test=like-button]' }
    then:
      - shouldExist: { selector: '[data-test=like-button][data-liked=true]' }

