# =============================================================================
# USER STORY: Compose and Publish a Post
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: POST_COMPOSITION
# @systems: [FEED_SYSTEM]
# @last_updated: 2026-04-14T20:45:19Z

id: US-005
title: Compose and publish a new post

acceptance_criteria:
  - id: AC-005-1
    title: Composer allows typing and submitting a post
    narrative: |
      Given I am on the home feed
      When I type in the composer and submit
      Then the new post should appear at the top of the feed
    given:
      - visit: '/demos/scaffold/'
    when:
      - fill: { selector: '[data-test=composer-input]', value: 'Hello from the composer!' }
      - click: { selector: '[data-test=composer-submit]' }
    then:
      - shouldContain: { selector: '[data-test=post-card]', text: 'Hello from the composer!' }

  - id: AC-005-2
    title: Submit button is disabled when composer is empty
    narrative: |
      Given I am on the home feed with an empty composer
      When the page loads
      Then the submit button should be disabled
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=composer-submit][disabled]' }
