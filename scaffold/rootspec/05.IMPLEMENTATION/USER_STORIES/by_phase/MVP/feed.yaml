id: US-102
title: Like a post
requirement_id: R-102

acceptance_criteria:
  - id: AC-102-1
    title: Like button toggles and updates count
    narrative: |
      Given I am on the home page
      When I click the like button on a post
      Then the like count should increase by 1
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=like-button]' }
    then:
      - shouldExist: { selector: '[data-test=like-button].active' }

