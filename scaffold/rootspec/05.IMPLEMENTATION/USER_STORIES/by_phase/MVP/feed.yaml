# =============================================================================
# USER STORY: Load More Posts
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FEED_BROWSING
# @systems: [FEED_SYSTEM]
# @last_updated: 2026-04-03T00:00:00Z

id: US-104
title: Load more posts

acceptance_criteria:
  - id: AC-104-1
    title: Paginate the feed with load more
    narrative: |
      Given I am viewing the home feed with limited posts shown
      When I click the load more button
      Then additional posts should appear below the existing ones
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=load-more]' }
    then:
      - shouldExist: { selector: '[data-test=post-card]' }
