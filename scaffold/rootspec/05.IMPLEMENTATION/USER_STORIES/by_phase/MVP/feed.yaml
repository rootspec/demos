# =============================================================================
# US-002: Like a post
# =============================================================================
id: US-002
title: Like a post on the home feed

acceptance_criteria:
  - id: AC-002-1
    title: Like button toggles active state
    narrative: |
      Given I am on the home page
      When I click the like button on a post
      Then the like button should have the active class
    given:
      - visit: '/demos/scaffold'
    when:
      - click: { selector: '[data-test=like-button]' }
    then:
      - shouldExist: { selector: '[data-test=like-button].active' }

