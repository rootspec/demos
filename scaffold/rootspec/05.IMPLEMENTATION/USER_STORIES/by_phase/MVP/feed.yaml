id: US-104
title: Compose a new post
requirement_id: R-104

acceptance_criteria:
  - id: AC-104-1
    title: Composer is visible on home page
    narrative: |
      Given I visit the home page
      When the page loads
      Then I should see the post composer
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=composer]' }
      - shouldExist: { selector: '[data-test=composer-input]' }

  - id: AC-104-2
    title: Submitting a post adds it to the feed
    narrative: |
      Given I am on the home page
      When I type a post and click the Post button
      Then the new post should appear in the feed
    given:
      - visit: '/demos/scaffold/'
    when:
      - fill: { selector: '[data-test=composer-input]', value: 'Hello from the composer test' }
      - click: { selector: '[data-test=composer-submit]' }
    then:
      - shouldContain: { selector: '[data-test=post-content]', text: 'Hello from the composer test' }

  - id: AC-104-3
    title: Submitting an empty post shows an error
    narrative: |
      Given I am on the home page
      When I click the Post button without typing anything
      Then I should see an error message
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=composer-submit]' }
    then:
      - shouldExist: { selector: '[data-test=composer-error]' }

