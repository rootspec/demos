id: US-011
title: Load more posts by clicking "Load more"

acceptance_criteria:
  - id: AC-011-1
    title: Load more button is visible when more posts exist
    narrative: |
      Given I visit the home page
      When more posts exist beyond the initial page
      Then I see a Load more button
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=load-more-btn]' }

  - id: AC-011-2
    title: Clicking Load more shows additional posts
    narrative: |
      Given I visit the home page and see the Load more button
      When I click Load more
      Then more post cards appear in the feed
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=load-more-btn]' }
    then:
      - shouldExist: { selector: '[data-test=post-card]' }

