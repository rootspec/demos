---

id: US-101
title: View home feed
requirement_id: R-101

acceptance_criteria:
  - id: AC-101-1
    title: Home feed displays posts
    narrative: |
      Given I visit the home page
      When the page loads
      Then I should see a list of posts
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-card]' }

  - id: AC-101-2
    title: Post card shows author handle
    narrative: |
      Given I am on the home feed
      When I look at a post card
      Then I should see the author's handle
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-author-handle]' }

  - id: AC-101-3
    title: Post card links to thread detail
    narrative: |
      Given I am on the home feed
      When I see a post
      Then I should see a link to the post's detail page
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-content-link]' }

