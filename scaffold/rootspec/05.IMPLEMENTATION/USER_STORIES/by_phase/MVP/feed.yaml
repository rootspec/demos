# =============================================================================
# USER STORY: View Home Feed
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FEED_BROWSING
# @systems: [FEED_SYSTEM, META_SYSTEM]
# @last_updated: 2026-04-14T00:00:00Z

id: US-001
title: View the home feed with posts and author info

acceptance_criteria:
  - id: AC-001-1
    title: Home feed shows posts with author info and engagement counts
    narrative: |
      Given I visit the home page
      When the page loads
      Then I see a list of posts with author names, handles, and engagement counts
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-card]' }
      - shouldExist: { selector: '[data-test=post-author]' }
      - shouldExist: { selector: '[data-test=post-content]' }
      - shouldExist: { selector: '[data-test=like-count]' }

  - id: AC-001-2
    title: Meta banner is visible on home page
    narrative: |
      Given I visit the home page
      When the page loads
      Then I see the meta banner explaining the demo origin
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=meta-banner]' }
      - shouldExist: { selector: '[data-test=seed-link]' }
      - shouldExist: { selector: '[data-test=spec-link]' }

