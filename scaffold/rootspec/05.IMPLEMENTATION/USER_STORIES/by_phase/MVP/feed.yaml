# =============================================================================
# USER STORY: Compose a New Post
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FEED_BROWSING
# @systems: [FEED_SYSTEM]
# @last_updated: 2026-04-03T00:00:00Z

id: US-103
title: Compose a new post

acceptance_criteria:
  - id: AC-103-1
    title: Create a post that appears in the feed
    narrative: |
      Given I am on the home page
      When I type content in the composer and submit
      Then the new post should appear at the top of the feed
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=composer-input]', value: 'Hello from RootFeed!' }
      - click: { selector: '[data-test=composer-submit]' }
    then:
      - shouldContain: { selector: '[data-test=post-card]:first-child [data-test=post-content]', text: 'Hello from RootFeed!' }

  - id: AC-103-2
    title: Empty posts are rejected
    narrative: |
      Given I am on the home page
      When I try to submit a post with only whitespace
      Then the post should not be created
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=composer-input]', value: '   ' }
      - click: { selector: '[data-test=composer-submit]' }
    then:
      - shouldExist: { selector: '[data-test=composer-error]' }

