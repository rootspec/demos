# =============================================================================
# USER STORY: Browse the Home Feed
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FEED_BROWSING
# @systems: [FEED_SYSTEM]
# @last_updated: 2026-04-03T00:00:00Z

id: US-101
title: Browse the home feed

acceptance_criteria:
  - id: AC-101-1
    title: Feed displays posts in reverse chronological order
    narrative: |
      Given I am visiting the home page
      When the page loads
      Then I should see posts with author info, content, and timestamps
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-card]' }
      - shouldExist: { selector: '[data-test=post-author]' }
      - shouldExist: { selector: '[data-test=post-content]' }
      - shouldExist: { selector: '[data-test=post-timestamp]' }

  - id: AC-101-2
    title: Posts show engagement counts
    narrative: |
      Given I am viewing the home feed
      When I look at a post
      Then I should see like and repost counts
    given:
      - visit: '/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=like-count]' }
      - shouldExist: { selector: '[data-test=repost-count]' }

