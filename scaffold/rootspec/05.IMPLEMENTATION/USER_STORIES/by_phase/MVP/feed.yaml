# USER STORY: Load more posts in feed
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: INTERACTIVE_EXPLORATION
# @systems: [FEED_SYSTEM]
# @last_updated: 2026-04-14T00:00:00Z

id: US-002
title: Load more posts in feed

acceptance_criteria:
  - id: AC-002-1
    title: Load more button is visible
    narrative: |
      Given I visit the home feed with more than 10 posts in mock data
      When the page loads
      Then I should see a load more button
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=load-more]' }

  - id: AC-002-2
    title: Clicking load more shows additional posts
    narrative: |
      Given I visit the home feed
      When I click the load more button
      Then I should see more posts in the feed
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=load-more]' }
    then:
      - shouldExist: { selector: '[data-test=post-item]' }

