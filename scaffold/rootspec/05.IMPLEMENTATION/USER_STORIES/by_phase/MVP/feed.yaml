---

id: US-101
title: View home feed with posts
requirement_id: R-101

acceptance_criteria:
  - id: AC-101-1
    title: Home feed shows posts with author and content
    narrative: |
      Given I visit the home page
      When the page loads
      Then I should see posts with author names and post content
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-card]' }
      - shouldExist: { selector: '[data-test=post-author]' }
      - shouldExist: { selector: '[data-test=post-content]' }

  - id: AC-101-2
    title: Home feed shows post timestamps
    narrative: |
      Given I visit the home page
      When the page loads
      Then I should see relative timestamps on posts
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-timestamp]' }

  - id: AC-101-3
    title: Home feed shows like counts
    narrative: |
      Given I visit the home page
      When the page loads
      Then I should see like counts on posts
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=like-count]' }

