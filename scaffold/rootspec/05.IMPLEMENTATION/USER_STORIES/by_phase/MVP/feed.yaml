id: US-102
title: Load more posts
requirement_id: R-102

acceptance_criteria:
  - id: AC-102-1
    title: Load More button is visible when posts remain
    narrative: |
      Given I am on the home feed
      When the page loads with more posts than the initial page size
      Then I should see a Load More button
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=load-more-btn]' }

  - id: AC-102-2
    title: Clicking Load More shows additional posts
    narrative: |
      Given I am on the home feed with a Load More button visible
      When I click Load More
      Then more posts should appear in the feed
    given:
      - visit: '/demos/scaffold/'
    when:
      - click: { selector: '[data-test=load-more-btn]' }
    then:
      - shouldExist: { selector: '[data-test=post-card]' }

