# =============================================================================
# USER STORY: Like and Bookmark Posts
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FEED_BROWSING
# @systems: [FEED_SYSTEM]
# @last_updated: 2026-04-14T00:00:00Z

id: US-002
title: Like and bookmark posts on the home feed

acceptance_criteria:
  - id: AC-002-1
    title: Like button toggles visual state and updates count
    narrative: |
      Given I am viewing the home feed
      When I click the like button on a post
      Then the like button becomes active and the count increases by 1
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=post-card]:first-child [data-test=like-button]' }
    then:
      - shouldExist: { selector: '[data-test=post-card]:first-child [data-test=like-button].active' }

  - id: AC-002-2
    title: Bookmark button toggles visual state
    narrative: |
      Given I am viewing the home feed
      When I click the bookmark button on a post
      Then the bookmark button becomes active
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=post-card]:first-child [data-test=bookmark-button]' }
    then:
      - shouldExist: { selector: '[data-test=post-card]:first-child [data-test=bookmark-button].active' }

---
# =============================================================================
# USER STORY: Compose a New Post
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FEED_BROWSING
# @systems: [FEED_SYSTEM]
# @last_updated: 2026-04-14T00:00:00Z

id: US-003
title: Compose and submit a new post from the home feed

acceptance_criteria:
  - id: AC-003-1
    title: Valid post submission adds post to feed
    narrative: |
      Given I am viewing the home feed
      When I write a post in the composer and submit
      Then the post appears at the top of the feed
    given:
      - visit: '/'
    when:
      - fill: { selector: '[data-test=composer-input]', value: 'Hello from RootFeed test' }
      - click: { selector: '[data-test=composer-submit]' }
    then:
      - shouldContain: { selector: '[data-test=post-card]:first-child [data-test=post-content]', text: 'Hello from RootFeed test' }

  - id: AC-003-2
    title: Empty post submission shows validation error
    narrative: |
      Given I am viewing the home feed
      When I try to submit the composer with empty content
      Then I see a validation error and no post is created
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=composer-submit]' }
    then:
      - shouldExist: { selector: '[data-test=composer-error]' }
