# =============================================================================
# USER STORY: View home feed with posts and authors
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FIRST_TIME_DEVELOPER_VISIT
# @systems: [FEED_SYSTEM, DATA_SYSTEM]
# @last_updated: 2026-04-14T00:00:00Z

id: US-001
title: View home feed with posts and authors

acceptance_criteria:
  - id: AC-001-1
    title: Feed displays posts
    narrative: |
      Given I visit the home feed
      When the page loads
      Then I should see a list of posts
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-item]' }

  - id: AC-001-2
    title: Posts show author display name
    narrative: |
      Given I visit the home feed
      When the page loads
      Then each post should show the author display name
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-author]' }

  - id: AC-001-3
    title: Posts show like count
    narrative: |
      Given I visit the home feed
      When the page loads
      Then each post should show a like count
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-like-count]' }

