# =============================================================================
# US-004: Compose and publish a post
# =============================================================================
id: US-004
title: Compose a new post that appears in the feed

acceptance_criteria:
  - id: AC-004-1
    title: Composer is present on home page
    narrative: |
      Given I visit the home page
      When the page loads
      Then I should see the composer textarea and submit button
    given:
      - visit: '/demos/scaffold'
    when: []
    then:
      - shouldExist: { selector: '[data-test=composer]' }
      - shouldExist: { selector: '[data-test=composer-input]' }
      - shouldExist: { selector: '[data-test=composer-submit]' }

  - id: AC-004-2
    title: Composing a post adds it to the feed
    narrative: |
      Given I am on the home page
      When I type a post and click submit
      Then the new post content should appear in the feed
    given:
      - visit: '/demos/scaffold'
    when:
      - fill: { selector: '[data-test=composer-input]', value: 'Hello from the composer' }
      - click: { selector: '[data-test=composer-submit]' }
    then:
      - shouldContain: { selector: '[data-test=post-content]', text: 'Hello from the composer' }

  - id: AC-004-3
    title: Submitting empty post shows error
    narrative: |
      Given I am on the home page and the composer is empty
      When I click the submit button without typing anything
      Then I should see an error message
    given:
      - visit: '/demos/scaffold'
    when:
      - click: { selector: '[data-test=composer-submit]' }
    then:
      - shouldExist: { selector: '[data-test=composer-error]' }

