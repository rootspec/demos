# =============================================================================
# USER STORY: View user profile
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FIRST_TIME_DEVELOPER_VISIT
# @systems: [PROFILE_SYSTEM, DATA_SYSTEM]
# @last_updated: 2026-04-14T00:00:00Z

id: US-007
title: View user profile

acceptance_criteria:
  - id: AC-007-1
    title: Profile page shows user display name
    narrative: |
      Given I visit a user profile page
      When the page loads
      Then I should see the user display name
    given:
      - visit: '/demos/scaffold/profile/devguru'
    when: []
    then:
      - shouldExist: { selector: '[data-test=profile-display-name]' }

  - id: AC-007-2
    title: Profile page shows user bio
    narrative: |
      Given I visit a user profile page
      When the page loads
      Then I should see the user bio
    given:
      - visit: '/demos/scaffold/profile/devguru'
    when: []
    then:
      - shouldExist: { selector: '[data-test=profile-bio]' }

  - id: AC-007-3
    title: Profile page shows user posts
    narrative: |
      Given I visit a user profile page
      When the page loads
      Then I should see a list of posts by that user
    given:
      - visit: '/demos/scaffold/profile/devguru'
    when: []
    then:
      - shouldExist: { selector: '[data-test=profile-post-item]' }

  - id: AC-007-4
    title: Profile page shows follower count
    narrative: |
      Given I visit a user profile page
      When the page loads
      Then I should see the follower count
    given:
      - visit: '/demos/scaffold/profile/devguru'
    when: []
    then:
      - shouldExist: { selector: '[data-test=profile-follower-count]' }

