# =============================================================================
# USER STORY: Follow and unfollow a user
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: INTERACTIVE_EXPLORATION
# @systems: [PROFILE_SYSTEM]
# @last_updated: 2026-04-14T00:00:00Z

id: US-008
title: Follow and unfollow a user

acceptance_criteria:
  - id: AC-008-1
    title: Follow button is present on profile page
    narrative: |
      Given I visit a user profile page
      When the page loads
      Then I should see a follow button
    given:
      - visit: '/demos/scaffold/profile/devguru'
    when: []
    then:
      - shouldExist: { selector: '[data-test=follow-button]' }

  - id: AC-008-2
    title: Clicking follow changes button to Unfollow
    narrative: |
      Given I visit a user profile page
      When I click the follow button
      Then the button should change to show Unfollow
    given:
      - visit: '/demos/scaffold/profile/devguru'
    when:
      - click: { selector: '[data-test=follow-button]' }
    then:
      - shouldContain: { selector: '[data-test=follow-button]', text: 'Unfollow' }

  - id: AC-008-3
    title: Clicking unfollow returns button to Follow
    narrative: |
      Given I have clicked follow on a profile
      When I click the button again
      Then the button should return to showing Follow
    given:
      - visit: '/demos/scaffold/profile/devguru'
    when:
      - click: { selector: '[data-test=follow-button]' }
      - click: { selector: '[data-test=follow-button]' }
    then:
      - shouldContain: { selector: '[data-test=follow-button]', text: 'Follow' }
