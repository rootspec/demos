# =============================================================================
# USER STORY: Follow and Unfollow a User
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: PROFILE
# @systems: [PROFILE_SYSTEM]
# @last_updated: 2026-04-14T20:45:19Z

id: US-008
title: Follow and unfollow a user from their profile

acceptance_criteria:
  - id: AC-008-1
    title: Follow button follows a user
    narrative: |
      Given I am viewing a user profile I am not following
      When I click the follow button
      Then the button should change to show I am following
    given:
      - visit: '/demos/scaffold/profile/alice'
    when:
      - click: { selector: '[data-test=follow-btn]' }
    then:
      - shouldExist: { selector: '[data-test=follow-btn][data-following=true]' }

  - id: AC-008-2
    title: Unfollow button unfollows a user
    narrative: |
      Given I am viewing a user I am now following
      When I click the follow button again
      Then the button should return to the unfollow state
    given:
      - visit: '/demos/scaffold/profile/alice'
    when:
      - click: { selector: '[data-test=follow-btn]' }
      - click: { selector: '[data-test=follow-btn]' }
    then:
      - shouldExist: { selector: '[data-test=follow-btn][data-following=false]' }

