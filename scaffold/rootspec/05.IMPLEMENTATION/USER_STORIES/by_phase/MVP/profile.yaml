# =============================================================================
# US-007: View a user profile
# =============================================================================
id: US-007
title: View a user profile with bio, counts, and posts

acceptance_criteria:
  - id: AC-007-1
    title: Profile page shows user info and posts
    narrative: |
      Given I click on an author name from the home feed
      When the profile page loads
      Then I should see the user display name, handle, bio, and their posts
    given:
      - visit: '/demos/scaffold'
    when:
      - click: { selector: '[data-test=post-author]' }
    then:
      - shouldExist: { selector: '[data-test=user-display-name]' }
      - shouldExist: { selector: '[data-test=user-handle]' }
      - shouldExist: { selector: '[data-test=user-bio]' }

  - id: AC-007-2
    title: Profile page shows follower counts
    narrative: |
      Given I navigate to a user profile page
      When the page loads
      Then I should see follower and following counts
    given:
      - visit: '/demos/scaffold/profile/alice.dev'
    when: []
    then:
      - shouldExist: { selector: '[data-test=follower-count]' }
      - shouldExist: { selector: '[data-test=following-count]' }

---

# =============================================================================
# US-008: Follow and unfollow a user
# =============================================================================
id: US-008
title: Follow and unfollow a user from their profile page

acceptance_criteria:
  - id: AC-008-1
    title: Follow button is present on profile pages
    narrative: |
      Given I navigate to a user profile page
      When the page loads
      Then I should see a follow button
    given:
      - visit: '/demos/scaffold/profile/bobwrites'
    when: []
    then:
      - shouldExist: { selector: '[data-test=follow-button]' }

  - id: AC-008-2
    title: Clicking follow updates button to Following state
    narrative: |
      Given I am on a user profile page
      When I click the follow button
      Then the button should display Following
    given:
      - visit: '/demos/scaffold/profile/bobwrites'
    when:
      - click: { selector: '[data-test=follow-button]' }
    then:
      - shouldContain: { selector: '[data-test=follow-button]', text: 'Following' }
