    title: Author name on post card links to profile page
    narrative: |
      Given I am on the home feed
      When I see a post card
      Then the author name should be a link to the author profile
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-author-link]' }
