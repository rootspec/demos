---

id: US-106
title: Navigate to a user profile

acceptance_criteria:
  - id: AC-106-1
    title: Clicking an author name navigates to their profile
    narrative: |
      Given I am on the home feed
      When I click an author display name
      Then I see that user's profile page
    given:
      - visit: '/'
    when:
      - click: { selector: '[data-test=post-author-name]' }
    then:
      - shouldExist: { selector: '[data-test=profile-display-name]' }

  - id: AC-106-2
    title: Profile page shows user bio and follow counts
    narrative: |
      Given I navigate to a user profile
      When the page loads
      Then I see the user's bio, follower count, and following count
    given:
      - visit: '/profile/alice.dev'
    when: []
    then:
      - shouldExist: { selector: '[data-test=profile-bio]' }
      - shouldExist: { selector: '[data-test=profile-follower-count]' }
      - shouldExist: { selector: '[data-test=profile-following-count]' }

  - id: AC-106-3
    title: Profile page shows user posts
    narrative: |
      Given I navigate to a user profile
      When the page loads
      Then I see posts authored by that user
    given:
      - visit: '/profile/alice.dev'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-item]' }

---

id: US-107
title: Follow and unfollow a user

acceptance_criteria:
  - id: AC-107-1
    title: Follow button appears on profile pages
    narrative: |
      Given I am on a user's profile page
      When the page loads
      Then I see a follow button
    given:
      - visit: '/profile/alice.dev'
    when: []
    then:
      - shouldExist: { selector: '[data-test=follow-button]' }

  - id: AC-107-2
    title: Clicking follow changes button to unfollow
    narrative: |
      Given I am on a user's profile page
      When I click the follow button
      Then the button changes to show unfollow
    given:
      - visit: '/profile/alice.dev'
    when:
      - click: { selector: '[data-test=follow-button]' }
    then:
      - shouldContain: { selector: '[data-test=follow-button]', text: 'Unfollow' }

  - id: AC-107-3
    title: Following a user increments their follower count
    narrative: |
      Given I am on a user's profile page
      When I click the follow button
      Then the follower count increases
    given:
      - visit: '/profile/alice.dev'
    when:
      - click: { selector: '[data-test=follow-button]' }
    then:
      - shouldExist: { selector: '[data-test=profile-follower-count]' }

  - id: AC-107-4
    title: Clicking unfollow returns button to follow state
    narrative: |
      Given I have followed a user
      When I click the unfollow button
      Then the button returns to the follow state
    given:
      - visit: '/profile/alice.dev'
    when:
      - click: { selector: '[data-test=follow-button]' }
      - click: { selector: '[data-test=follow-button]' }
    then:
      - shouldContain: { selector: '[data-test=follow-button]', text: 'Follow' }
