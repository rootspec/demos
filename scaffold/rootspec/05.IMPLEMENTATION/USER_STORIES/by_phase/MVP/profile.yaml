---

id: US-201
title: View user profile
requirement_id: R-201

acceptance_criteria:
  - id: AC-201-1
    title: Profile page shows display name
    narrative: |
      Given I navigate to a user profile
      When the page loads
      Then I should see the user's display name
    given:
      - visit: '/demos/scaffold/profile/alice.dev'
    when: []
    then:
      - shouldExist: { selector: '[data-test=profile-display-name]' }

  - id: AC-201-2
    title: Profile page shows user handle
    narrative: |
      Given I navigate to a user profile
      When the page loads
      Then I should see the user's handle
    given:
      - visit: '/demos/scaffold/profile/alice.dev'
    when: []
    then:
      - shouldContain: { selector: '[data-test=profile-handle]', text: '@alice.dev' }

  - id: AC-201-3
    title: Profile page shows user bio
    narrative: |
      Given I navigate to a user profile
      When the page loads
      Then I should see the user's bio
    given:
      - visit: '/demos/scaffold/profile/alice.dev'
    when: []
    then:
      - shouldExist: { selector: '[data-test=profile-bio]' }

  - id: AC-201-4
    title: Profile page shows user posts
    narrative: |
      Given I navigate to a user profile
      When the page loads
      Then I should see the user's posts
    given:
      - visit: '/demos/scaffold/profile/alice.dev'
    when: []
    then:
      - shouldExist: { selector: '[data-test=profile-posts]' }

---

id: US-202
title: Follow a user
requirement_id: R-202

acceptance_criteria:
  - id: AC-202-1
    title: Follow button is visible on profile page
    narrative: |
      Given I navigate to a user profile
      When the page loads
      Then I should see a follow button
    given:
      - visit: '/demos/scaffold/profile/alice.dev'
    when: []
    then:
      - shouldExist: { selector: '[data-test=follow-btn]' }

  - id: AC-202-2
    title: Clicking follow changes button to unfollow
    narrative: |
      Given I am on a user profile that I am not following
      When I click the follow button
      Then the button should change to indicate I am following
    given:
      - visit: '/demos/scaffold/profile/alice.dev'
    when:
      - click: { selector: '[data-test=follow-btn]' }
    then:
      - shouldExist: { selector: '[data-test=follow-btn][data-following=true]' }
