---

id: US-030
title: View a user's profile page

acceptance_criteria:
  - id: AC-030-1
    title: Profile page shows display name and handle
    narrative: |
      Given I navigate to a user profile page
      When the page loads
      Then I see the user display name and handle
    given:
      - visit: '/demos/scaffold/profile/alice.dev'
    when: []
    then:
      - shouldContain: { selector: '[data-test=profile-name]', text: 'Alice Chen' }
      - shouldExist: { selector: '[data-test=profile-handle]' }

  - id: AC-030-2
    title: Profile page shows bio
    narrative: |
      Given I navigate to a user profile page
      When the page loads
      Then I see the user bio text
    given:
      - visit: '/demos/scaffold/profile/alice.dev'
    when: []
    then:
      - shouldExist: { selector: '[data-test=profile-bio]' }

  - id: AC-030-3
    title: Profile page shows follower and following counts
    narrative: |
      Given I navigate to a user profile page
      When the page loads
      Then I see follower count and following count
    given:
      - visit: '/demos/scaffold/profile/alice.dev'
    when: []
    then:
      - shouldExist: { selector: '[data-test=profile-follower-count]' }
      - shouldExist: { selector: '[data-test=profile-following-count]' }

  - id: AC-030-4
    title: Profile page shows a list of the user's posts
    narrative: |
      Given I navigate to a user profile page
      When the page loads
      Then I see at least one post by that user
    given:
      - visit: '/demos/scaffold/profile/alice.dev'
    when: []
    then:
      - shouldExist: { selector: '[data-test=profile-post]' }

---

id: US-031
title: Follow and unfollow a user from their profile

acceptance_criteria:
  - id: AC-031-1
    title: Follow button is visible on profile page
    narrative: |
      Given I navigate to a user profile page
      When the page loads
      Then I see a Follow button
    given:
      - visit: '/demos/scaffold/profile/alice.dev'
    when: []
    then:
      - shouldExist: { selector: '[data-test=follow-btn]' }

  - id: AC-031-2
    title: Clicking Follow changes button to Unfollow
    narrative: |
      Given I am on a user profile page
      When I click the Follow button
      Then the button changes to Unfollow
    given:
      - visit: '/demos/scaffold/profile/alice.dev'
    when:
      - click: { selector: '[data-test=follow-btn]' }
    then:
      - shouldContain: { selector: '[data-test=follow-btn]', text: 'Unfollow' }

  - id: AC-031-3
    title: Clicking Unfollow changes button back to Follow
    narrative: |
      Given I have followed a user on their profile page
      When I click Unfollow
      Then the button changes back to Follow
    given:
      - visit: '/demos/scaffold/profile/alice.dev'
    when:
      - click: { selector: '[data-test=follow-btn]' }
      - click: { selector: '[data-test=follow-btn]' }
    then:
      - shouldContain: { selector: '[data-test=follow-btn]', text: 'Follow' }

