# =============================================================================
# USER STORY: View a User Profile
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FEED_BROWSING
# @systems: [PROFILE_SYSTEM]
# @last_updated: 2026-04-03T00:00:00Z

id: US-105
title: View a user profile

acceptance_criteria:
  - id: AC-105-1
    title: Profile displays user info and posts
    narrative: |
      Given I navigate to a user profile page
      When the page loads
      Then I should see their display name, bio, avatar, follower and following counts, and their posts
    given:
      - visit: '/profile/alice'
    when: []
    then:
      - shouldExist: { selector: '[data-test=profile-display-name]' }
      - shouldExist: { selector: '[data-test=profile-bio]' }
      - shouldExist: { selector: '[data-test=profile-avatar]' }
      - shouldExist: { selector: '[data-test=follower-count]' }
      - shouldExist: { selector: '[data-test=following-count]' }
      - shouldExist: { selector: '[data-test=post-card]' }

  - id: AC-105-2
    title: Unknown profile shows not found
    narrative: |
      Given I navigate to a profile that does not exist
      When the page loads
      Then I should see a user not found message
    given:
      - visit: '/profile/nonexistent-user-xyz'
    when: []
    then:
      - shouldExist: { selector: '[data-test=user-not-found]' }

---
# =============================================================================
# USER STORY: Follow and Unfollow Users
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FEED_BROWSING
# @systems: [PROFILE_SYSTEM]
# @last_updated: 2026-04-03T00:00:00Z

id: US-106
title: Follow and unfollow users

acceptance_criteria:
  - id: AC-106-1
    title: Toggle follow on a profile
    narrative: |
      Given I am viewing a user profile
      When I click the follow button
      Then the button should change to indicate I am following and the follower count should increase
    given:
      - visit: '/profile/alice'
    when:
      - click: { selector: '[data-test=follow-button]' }
    then:
      - shouldExist: { selector: '[data-test=follow-button].following' }
