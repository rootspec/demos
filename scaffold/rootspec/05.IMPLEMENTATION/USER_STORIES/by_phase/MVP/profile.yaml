# =============================================================================
# USER STORY: View User Profile
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: PROFILE
# @systems: [PROFILE_SYSTEM, DATA_SYSTEM]
# @last_updated: 2026-04-14T20:45:19Z

id: US-007
title: View user profile with bio and post history

acceptance_criteria:
  - id: AC-007-1
    title: Profile page shows user info and posts
    narrative: |
      Given I navigate to a user profile page
      When the page loads
      Then I should see the user display name, handle, bio, follower counts, and their posts
    given:
      - visit: '/demos/scaffold/profile/alice'
    when: []
    then:
      - shouldExist: { selector: '[data-test=profile-name]' }
      - shouldExist: { selector: '[data-test=profile-handle]' }
      - shouldExist: { selector: '[data-test=profile-bio]' }
      - shouldExist: { selector: '[data-test=follower-count]' }
      - shouldExist: { selector: '[data-test=post-card]' }

