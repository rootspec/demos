id: US-032
title: Navigate to a user profile from a post card

acceptance_criteria:
  - id: AC-032-1
    title: Author name in post card links to profile
    narrative: |
      Given I visit the home feed
      When I see a post card with an author name
      Then there is a link to that author's profile
    given:
      - visit: '/demos/scaffold/'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-author-link]' }
