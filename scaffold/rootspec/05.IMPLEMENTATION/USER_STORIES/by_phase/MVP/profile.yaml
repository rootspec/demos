---

id: US-201
title: View a user profile
requirement_id: R-201

acceptance_criteria:
  - id: AC-201-1
    title: Profile page shows user display name and handle
    narrative: |
      Given I visit a user profile page
      When the page loads
      Then I should see the user's display name and handle
    given:
      - visit: '/demos/scaffold/profile/alice.dev'
    when: []
    then:
      - shouldExist: { selector: '[data-test=profile-name]' }
      - shouldExist: { selector: '[data-test=profile-handle]' }

  - id: AC-201-2
    title: Profile page shows user posts
    narrative: |
      Given I visit a user profile page
      When the page loads
      Then I should see posts by that user
    given:
      - visit: '/demos/scaffold/profile/alice.dev'
    when: []
    then:
      - shouldExist: { selector: '[data-test=post-card]' }

  - id: AC-201-3
    title: Unknown profile shows not found message
    narrative: |
      Given I visit a profile page for a nonexistent handle
      When the page loads
      Then I should see a not found message
    given:
      - visit: '/demos/scaffold/profile/doesnotexist'
    when: []
    then:
      - shouldExist: { selector: '[data-test=profile-not-found]' }

---

id: US-202
title: Follow a user
requirement_id: R-202

acceptance_criteria:
  - id: AC-202-1
    title: Follow button appears on profile and toggles to following state
    narrative: |
      Given I visit a user profile page
      When I click the follow button
      Then the button should show following state
    given:
      - visit: '/demos/scaffold/profile/alice.dev'
    when:
      - click: { selector: '[data-test=follow-button]' }
    then:
      - shouldContain: { selector: '[data-test=follow-button]', text: 'Following' }

---

id: US-203
title: Unfollow a user
requirement_id: R-203

acceptance_criteria:
  - id: AC-203-1
    title: Clicking following button unfollows the user
    narrative: |
      Given I am following a user on their profile page
      When I click the following button
      Then the button should revert to follow state
    given:
      - visit: '/demos/scaffold/profile/alice.dev'
    when:
      - click: { selector: '[data-test=follow-button]' }
      - click: { selector: '[data-test=follow-button]' }
    then:
      - shouldContain: { selector: '[data-test=follow-button]', text: 'Follow' }
