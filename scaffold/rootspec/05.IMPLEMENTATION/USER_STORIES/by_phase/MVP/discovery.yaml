---

id: US-304
title: Filter explore by tag
requirement_id: R-304

acceptance_criteria:
  - id: AC-304-1
    title: Clicking a tag filters the explore posts
    narrative: |
      Given I am on the explore page
      When I click a tag chip
      Then the posts section should filter to that tag
    given:
      - visit: '/demos/scaffold/explore'
    when:
      - click: { selector: '[data-test=tag-chip]' }
    then:
      - shouldExist: { selector: '[data-test=active-tag]' }

---

id: US-305
title: Navigate from explore to profile
requirement_id: R-305

acceptance_criteria:
  - id: AC-305-1
    title: Clicking a suggested user navigates to their profile
    narrative: |
      Given I am on the explore page
      When I click on a suggested user
      Then I should be on that user's profile page
    given:
      - visit: '/demos/scaffold/explore'
    when:
      - click: { selector: '[data-test=suggested-user-link]' }
    then:
      - shouldExist: { selector: '[data-test=profile-name]' }
