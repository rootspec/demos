# =============================================================================
# USER STORY: Search Posts
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: DISCOVERY
# @systems: [DISCOVERY_SYSTEM]
# @last_updated: 2026-04-03T00:00:00Z

id: US-108
title: Search posts

acceptance_criteria:
  - id: AC-108-1
    title: Search filters posts by keyword
    narrative: |
      Given I am on the search page
      When I type a keyword in the search input
      Then I should see posts matching that keyword
    given:
      - visit: '/search'
    when:
      - fill: { selector: '[data-test=search-input]', value: 'svelte' }
    then:
      - shouldExist: { selector: '[data-test=search-results] [data-test=post-card]' }

  - id: AC-108-2
    title: Empty search results show message
    narrative: |
      Given I am on the search page
      When I search for a term with no matches
      Then I should see an empty results message
    given:
      - visit: '/search'
    when:
      - fill: { selector: '[data-test=search-input]', value: 'xyznonexistent123' }
    then:
      - shouldExist: { selector: '[data-test=no-results]' }

