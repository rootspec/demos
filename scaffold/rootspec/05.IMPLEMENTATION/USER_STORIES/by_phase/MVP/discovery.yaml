id: US-303
title: Filter explore by tag
requirement_id: R-303

acceptance_criteria:
  - id: AC-303-1
    title: Clicking a tag filters the post list
    narrative: |
      Given I am on the explore page with trending tags visible
      When I click a tag chip
      Then the tag should appear highlighted as active
    given:
      - visit: '/demos/scaffold/explore'
    when:
      - click: { selector: '[data-test=tag-chip]' }
    then:
      - shouldExist: { selector: '[data-test=tag-chip][data-active=true]' }
