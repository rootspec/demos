# =============================================================================
# USER STORY: Filter Posts by Tag
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: DISCOVERY
# @systems: [DISCOVERY_SYSTEM]
# @last_updated: 2026-04-03T00:00:00Z

id: US-110
title: Filter posts by tag

acceptance_criteria:
  - id: AC-110-1
    title: Clicking a tag filters posts
    narrative: |
      Given I am on the explore page
      When I click on a trending tag
      Then I should see only posts with that tag
    given:
      - visit: '/explore'
    when:
      - click: { selector: '[data-test=trending-tags] [data-test=tag]:first-child' }
    then:
      - shouldExist: { selector: '[data-test=filtered-posts] [data-test=post-card]' }
