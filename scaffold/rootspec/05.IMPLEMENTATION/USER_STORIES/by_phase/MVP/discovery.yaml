# =============================================================================
# USER STORY: Filter posts by tag on explore page
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: INTERACTIVE_EXPLORATION
# @systems: [DISCOVERY_SYSTEM]
# @last_updated: 2026-04-14T00:00:00Z

id: US-010
title: Filter posts by tag on explore page

acceptance_criteria:
  - id: AC-010-1
    title: Clicking a tag filters the posts section
    narrative: |
      Given I visit the explore page
      When I click a tag chip
      Then the posts section should show only posts with that tag
    given:
      - visit: '/demos/scaffold/explore'
    when:
      - click: { selector: '[data-test=tag-chip]' }
    then:
      - shouldExist: { selector: '[data-test=tag-chip][data-active=true]' }
      - shouldExist: { selector: '[data-test=explore-post-item]' }

---

# =============================================================================
# USER STORY: Tag filter deselect returns all posts
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: INTERACTIVE_EXPLORATION
# @systems: [DISCOVERY_SYSTEM]
# @last_updated: 2026-04-14T00:00:00Z

id: US-020
title: Tag filter deselect returns all posts

acceptance_criteria:
  - id: AC-020-1
    title: Clicking active tag deselects it and shows all posts
    narrative: |
      Given I have clicked a tag on the explore page
      When I click the same tag again
      Then all posts should be shown and no tag should be active
    given:
      - visit: '/demos/scaffold/explore'
    when:
      - click: { selector: '[data-test=tag-chip]' }
      - click: { selector: '[data-test=tag-chip][data-active=true]' }
    then:
      - shouldExist: { selector: '[data-test=explore-post-item]' }
