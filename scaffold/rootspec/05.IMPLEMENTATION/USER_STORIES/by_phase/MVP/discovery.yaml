---

id: US-110
title: Explore trending tags

acceptance_criteria:
  - id: AC-110-1
    title: Explore page displays trending tags
    narrative: |
      Given I visit the explore page
      When the page loads
      Then I see a list of trending tags
    given:
      - visit: '/demos/scaffold/explore'
    when: []
    then:
      - shouldExist: { selector: '[data-test=tag-chip]' }

  - id: AC-110-2
    title: Tags show their post count
    narrative: |
      Given I visit the explore page
      When the page loads
      Then each tag chip shows how many posts use that tag
    given:
      - visit: '/demos/scaffold/explore'
    when: []
    then:
      - shouldExist: { selector: '[data-test=tag-post-count]' }

---

id: US-111
title: Filter explore posts by tag

acceptance_criteria:
  - id: AC-111-1
    title: Clicking a tag filters the visible posts
    narrative: |
      Given I am on the explore page
      When I click a tag chip
      Then only posts with that tag are shown
    given:
      - visit: '/demos/scaffold/explore'
    when:
      - click: { selector: '[data-test=tag-chip]' }
    then:
      - shouldExist: { selector: '[data-test=filtered-posts]' }

  - id: AC-111-2
    title: Active tag is visually indicated
    narrative: |
      Given I am on the explore page
      When I click a tag chip
      Then that tag chip is styled as active
    given:
      - visit: '/demos/scaffold/explore'
    when:
      - click: { selector: '[data-test=tag-chip]' }
    then:
      - shouldExist: { selector: '[data-test=tag-chip][data-active=true]' }

  - id: AC-111-3
    title: Clicking active tag clears the filter
    narrative: |
      Given I have an active tag filter on the explore page
      When I click the active tag again
      Then all posts are shown and no tag is active
    given:
      - visit: '/demos/scaffold/explore'
    when:
      - click: { selector: '[data-test=tag-chip]' }
      - click: { selector: '[data-test=tag-chip][data-active=true]' }
    then:
      - shouldExist: { selector: '[data-test=popular-posts]' }

---

id: US-112
title: Follow a user from the explore page

acceptance_criteria:
  - id: AC-112-1
    title: Explore page shows suggested users with follow buttons
    narrative: |
      Given I visit the explore page
      When the page loads
      Then I see a list of users each with a follow button
    given:
      - visit: '/demos/scaffold/explore'
    when: []
    then:
      - shouldExist: { selector: '[data-test=suggested-user]' }
      - shouldExist: { selector: '[data-test=follow-button]' }

  - id: AC-112-2
    title: Following a user from explore updates the button
    narrative: |
      Given I am on the explore page
      When I click the follow button for a user
      Then the button changes to show unfollow
    given:
      - visit: '/demos/scaffold/explore'
    when:
      - click: { selector: '[data-test=follow-button]' }
    then:
      - shouldContain: { selector: '[data-test=follow-button]', text: 'Unfollow' }
