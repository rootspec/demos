id: US-010
title: Browse explore page with trending tags and suggested users

acceptance_criteria:
  - id: AC-010-1
    title: Explore page shows trending tags
    narrative: |
      Given I navigate to the explore page
      When the page loads
      Then I should see a list of trending tags
    given:
      - visit: '/demos/scaffold/explore'
    when: []
    then:
      - shouldExist: { selector: '[data-test=trending-tags]' }
      - shouldExist: { selector: '[data-test=tag-item]' }

  - id: AC-010-2
    title: Explore page shows suggested users
    narrative: |
      Given I navigate to the explore page
      When the page loads
      Then I should see a list of suggested users with their display names and bios
    given:
      - visit: '/demos/scaffold/explore'
    when: []
    then:
      - shouldExist: { selector: '[data-test=suggested-users]' }
      - shouldExist: { selector: '[data-test=user-item]' }

---
# =============================================================================
# USER STORY: Filter Posts by Tag on Explore
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: DISCOVERY
# @systems: [DISCOVERY_SYSTEM]
# @last_updated: 2026-04-14T20:45:19Z

id: US-011
title: Filter explore posts by clicking a tag

acceptance_criteria:
  - id: AC-011-1
    title: Clicking a tag filters the posts list
    narrative: |
      Given I am on the explore page
      When I click a tag
      Then the tag should appear as active and filtered posts should be shown
    given:
      - visit: '/demos/scaffold/explore'
    when:
      - click: { selector: '[data-test=tag-item]' }
    then:
      - shouldExist: { selector: '[data-test=tag-item][data-active=true]' }
      - shouldExist: { selector: '[data-test=filtered-posts]' }

  - id: AC-011-2
    title: Clicking the active tag deselects it
    narrative: |
      Given I have clicked a tag on the explore page
      When I click the same tag again
      Then the tag should no longer be active
    given:
      - visit: '/demos/scaffold/explore'
    when:
      - click: { selector: '[data-test=tag-item]' }
      - click: { selector: '[data-test=tag-item][data-active=true]' }
    then:
      - shouldExist: { selector: '[data-test=tag-item][data-active=false]' }
