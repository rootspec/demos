# =============================================================================
# USER STORY: Explore trending tags and people
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: FIRST_TIME_DEVELOPER_VISIT
# @systems: [DISCOVERY_SYSTEM, DATA_SYSTEM]
# @last_updated: 2026-04-14T00:00:00Z

id: US-009
title: Explore trending tags and people

acceptance_criteria:
  - id: AC-009-1
    title: Explore page shows trending tags
    narrative: |
      Given I visit the explore page
      When the page loads
      Then I should see a list of trending tags
    given:
      - visit: '/demos/scaffold/explore'
    when: []
    then:
      - shouldExist: { selector: '[data-test=trending-tags]' }
      - shouldExist: { selector: '[data-test=tag-chip]' }

  - id: AC-009-2
    title: Explore page shows suggested people
    narrative: |
      Given I visit the explore page
      When the page loads
      Then I should see a list of suggested people to follow
    given:
      - visit: '/demos/scaffold/explore'
    when: []
    then:
      - shouldExist: { selector: '[data-test=suggested-people]' }
      - shouldExist: { selector: '[data-test=user-card]' }

