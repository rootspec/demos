# =============================================================================
# US-010: Explore trending tags and filter posts
# =============================================================================
id: US-010
title: Browse trending tags on the Explore page and filter posts by tag

acceptance_criteria:
  - id: AC-010-1
    title: Explore page shows trending tags
    narrative: |
      Given I navigate to the Explore page
      When the page loads
      Then I should see a list of trending tag chips
    given:
      - visit: '/demos/scaffold/explore'
    when: []
    then:
      - shouldExist: { selector: '[data-test=tag-chip]' }

  - id: AC-010-2
    title: Clicking a tag filters the posts shown
    narrative: |
      Given I am on the Explore page
      When I click a tag chip
      Then I should see filtered posts and the tag should appear selected
    given:
      - visit: '/demos/scaffold/explore'
    when:
      - click: { selector: '[data-test=tag-chip]' }
    then:
      - shouldExist: { selector: '[data-test=tag-chip].selected' }
      - shouldExist: { selector: '[data-test=filtered-posts]' }

  - id: AC-010-3
    title: Explore page shows suggested users
    narrative: |
      Given I navigate to the Explore page
      When the page loads
      Then I should see a list of users in the People section
    given:
      - visit: '/demos/scaffold/explore'
    when: []
    then:
      - shouldExist: { selector: '[data-test=suggested-user]' }
