# =============================================================================
# USER STORY: Explore Trending Tags
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: DISCOVERY
# @systems: [DISCOVERY_SYSTEM]
# @last_updated: 2026-04-14T00:00:00Z

id: US-008
title: Browse trending tags and suggested users on the explore page

acceptance_criteria:
  - id: AC-008-1
    title: Explore page shows trending tags and user list
    narrative: |
      Given I navigate to the explore page
      When the page loads
      Then I see a list of trending tags and a list of suggested users
    given:
      - visit: '/explore'
    when: []
    then:
      - shouldExist: { selector: 'body' }
      - shouldContain: { selector: 'body', text: 'Trending' }
      - shouldContain: { selector: 'body', text: 'People' }

---
# =============================================================================
# USER STORY: Filter Posts by Tag
# =============================================================================
# @spec_version: 1.0.0
# @phase: MVP
# @journey: DISCOVERY
# @systems: [DISCOVERY_SYSTEM]
# @last_updated: 2026-04-14T00:00:00Z

id: US-009
title: Click a tag on the explore page to filter posts

acceptance_criteria:
  - id: AC-009-1
    title: Clicking a tag filters the visible posts to that tag
    narrative: |
      Given I am on the explore page
      When I click on a trending tag
      Then I see only posts tagged with that tag
    given:
      - visit: '/explore'
    when:
      - click: { selector: '[data-test=tag-chip]:first-child' }
    then:
      - shouldExist: { selector: '[data-test=tag-chip]:first-child.active' }
