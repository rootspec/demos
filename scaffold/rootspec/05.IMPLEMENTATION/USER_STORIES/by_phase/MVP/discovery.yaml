---

id: US-301
title: Search posts by keyword
requirement_id: R-301

acceptance_criteria:
  - id: AC-301-1
    title: Typing in search input shows matching posts
    narrative: |
      Given I am on the search page
      When I type a keyword that matches post content
      Then I should see matching posts in the results
    given:
      - visit: '/demos/scaffold/search'
    when:
      - fill: { selector: '[data-test=search-input]', value: 'TypeScript' }
    then:
      - shouldExist: { selector: '[data-test=search-result]' }

  - id: AC-301-2
    title: Search input is visible on search page
    narrative: |
      Given I visit the search page
      When the page loads
      Then I should see a search input field
    given:
      - visit: '/demos/scaffold/search'
    when: []
    then:
      - shouldExist: { selector: '[data-test=search-input]' }

---

id: US-302
title: Search empty state
requirement_id: R-302

acceptance_criteria:
  - id: AC-302-1
    title: Searching with no matches shows empty state message
    narrative: |
      Given I am on the search page
      When I type a query that matches no posts
      Then I should see a no results message
    given:
      - visit: '/demos/scaffold/search'
    when:
      - fill: { selector: '[data-test=search-input]', value: 'xyzzy_no_match_12345' }
    then:
      - shouldExist: { selector: '[data-test=search-empty]' }

