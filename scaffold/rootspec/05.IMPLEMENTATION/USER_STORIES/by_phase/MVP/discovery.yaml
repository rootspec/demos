---

id: US-060
title: View trending tags on the explore page

acceptance_criteria:
  - id: AC-060-1
    title: Explore page shows a list of trending tags
    narrative: |
      Given I visit the explore page
      When the page loads
      Then I see a list of trending tags
    given:
      - visit: '/demos/scaffold/explore'
    when: []
    then:
      - shouldExist: { selector: '[data-test=tag-chip]' }

  - id: AC-060-2
    title: Tags show their post count
    narrative: |
      Given I visit the explore page
      When I look at the tag list
      Then each tag shows the number of posts with that tag
    given:
      - visit: '/demos/scaffold/explore'
    when: []
    then:
      - shouldExist: { selector: '[data-test=tag-post-count]' }

---

id: US-061
title: Filter posts by tag on the explore page

acceptance_criteria:
  - id: AC-061-1
    title: Clicking a tag filters the post list
    narrative: |
      Given I visit the explore page
      When I click on a tag chip
      Then the post list below shows only posts with that tag
    given:
      - visit: '/demos/scaffold/explore'
    when:
      - click: { selector: '[data-test=tag-chip]' }
    then:
      - shouldExist: { selector: '[data-test=explore-post]' }
      - shouldExist: { selector: '[data-test=tag-chip][data-active=true]' }

  - id: AC-061-2
    title: Clicking the active tag again clears the filter
    narrative: |
      Given I have selected a tag filter on the explore page
      When I click the active tag again
      Then the filter is cleared and all posts are shown
    given:
      - visit: '/demos/scaffold/explore'
    when:
      - click: { selector: '[data-test=tag-chip]' }
      - click: { selector: '[data-test=tag-chip][data-active=true]' }
    then:
      - shouldExist: { selector: '[data-test=explore-post]' }

