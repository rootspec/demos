id: US-009
title: Explore trending tags and filter posts

acceptance_criteria:
  - id: AC-009-1
    title: Explore page shows trending tags
    narrative: |
      Given I navigate to the explore page
      When the page loads
      Then I should see a list of trending tags
    given:
      - visit: '/scaffold/explore'
    when: []
    then:
      - shouldExist: { selector: '[data-test=trending-tags]' }
      - shouldExist: { selector: '[data-test=tag-chip]' }

  - id: AC-009-2
    title: Explore page shows suggested users
    narrative: |
      Given I navigate to the explore page
      When the page loads
      Then I should see suggested users to follow
    given:
      - visit: '/scaffold/explore'
    when: []
    then:
      - shouldExist: { selector: '[data-test=suggested-users]' }
      - shouldExist: { selector: '[data-test=user-card]' }

  - id: AC-009-3
    title: Clicking a tag chip filters popular posts
    narrative: |
      Given I am on the explore page
      When I click a trending tag chip
      Then the popular posts section should show only posts with that tag
    given:
      - visit: '/scaffold/explore'
    when:
      - click: { selector: '[data-test=tag-chip]' }
    then:
      - shouldExist: { selector: '[data-test=tag-chip][data-active=true]' }
      - shouldExist: { selector: '[data-test=popular-posts]' }
