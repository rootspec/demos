# -----------------------------------------------------------------------------
# Search
# -----------------------------------------------------------------------------

search:
  debounce_duration: 300
  # @unit: milliseconds
  # @rationale: 300ms debounce is standard for search-as-you-type — fast enough
  #   to feel responsive, slow enough to avoid excessive filtering on every keystroke
  # @constraints: min=100, max=500, type=integer
  # @spec_source: 04.SYSTEMS/DISCOVERY_SYSTEM.md

# -----------------------------------------------------------------------------
# Explore
# -----------------------------------------------------------------------------

explore:
  trending_tags_count: 10
  # @rationale: Show top 10 tags — enough to give a sense of activity without
  #   overwhelming the explore page
  # @constraints: min=5, max=20, type=integer
  # @spec_source: 04.SYSTEMS/DISCOVERY_SYSTEM.md

  suggested_users_count: 5
  # @rationale: Small set of suggestions — demo has 8-10 users total, showing
  #   half feels like a curated recommendation
  # @constraints: min=3, max=10, type=integer
  # @spec_source: 04.SYSTEMS/DISCOVERY_SYSTEM.md

  popular_posts_count: 5
  # @rationale: Top 5 posts by engagement — enough to showcase without duplicating
  #   the main feed experience
  # @constraints: min=3, max=10, type=integer
  # @spec_source: 04.SYSTEMS/DISCOVERY_SYSTEM.md
