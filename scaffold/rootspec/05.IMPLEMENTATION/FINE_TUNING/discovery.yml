min_search_query_length:
  value: 1
  # @unit: characters
  # @rationale: Any single character input triggers filtering. No artificial minimum since the dataset is small and results are fast.
  # @constraint: min=1, max=3

max_active_tags:
  value: 1
  # @unit: tags
  # @rationale: Single tag filter keeps the UI simple. Multi-tag filtering adds complexity without meaningful benefit for this demo.
  # @constraint: inviolable=true

explore_popular_posts_count:
  value: 10
  # @unit: posts
  # @rationale: Shows enough variety to make explore feel alive without requiring pagination on this surface.
  # @constraint: min=5, max=20
