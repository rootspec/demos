search_min_query_length:
  value: 1
  # @unit: characters
  # @rationale: Results appear from the first character; reinforces instant-feel; empty string shows no results
  # @constraint: min=1, max=3

explore_popular_posts_count:
  value: 10
  # @unit: posts
  # @rationale: Enough to demonstrate the popularity ordering without scrolling endlessly; same as feed page size
  # @constraint: min=5, max=20

explore_suggested_users_count:
  value: 8
  # @unit: users
  # @rationale: Shows all mock users; gives a sense of community without artificial truncation
  # @constraint: min=3, max=10
