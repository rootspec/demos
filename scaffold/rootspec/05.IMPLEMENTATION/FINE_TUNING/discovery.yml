search:
  min_query_length:
    value: 1
    # @unit: characters
    # @rationale: Show results immediately on first keypress; no debounce needed for static data
    # @constraint: min=1, max=3, type=integer

explore:
  suggested_users_count:
    value: 8
    # @unit: users
    # @rationale: Show all users from mock data (8 users in dataset)
    # @constraint: min=3, max=10, type=integer

  tag_sort:
    value: "postCount_desc"
    # @rationale: Most active tags shown first for better discoverability
    # @alternatives: ["alphabetical", "postCount_asc"]
