search_min_query_length:
  value: 1
  # @unit: characters
  # @rationale: Results appear immediately on any keystroke; no minimum query length required — keeps the interaction fluid
  # @constraint: min=1, max=3

explore_max_suggested_users:
  value: 8
  # @unit: users
  # @rationale: Shows a representative set of users without requiring scroll on the explore page
  # @constraint: min=4, max=10

explore_max_trending_tags:
  value: 15
  # @unit: tags
  # @rationale: All tags from the dataset fit comfortably in a wrapped flex row; no pagination needed
  # @constraint: min=5, max=20
