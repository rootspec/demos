search:
  min_query_length:
    value: 1
    # @unit: characters
    # @rationale: Show results as soon as any character is typed; empty box shows nothing

  debounce_ms:
    value: 0
    # @unit: milliseconds
    # @rationale: Mock data is synchronous and client-side; no debounce needed for JSON filtering

explore:
  max_suggested_users:
    value: 10
    # @unit: users
    # @rationale: Show all users from mock data (8-10); no truncation needed at this scale

  popular_posts_sort:
    value: "likeCount"
    # @rationale: Most liked posts surface first when no tag filter is active; matches social media convention
