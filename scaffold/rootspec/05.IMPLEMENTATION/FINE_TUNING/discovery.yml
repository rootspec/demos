# -----------------------------------------------------------------------------
# Search
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/DISCOVERY_SYSTEM.md

search:
  min_query_length: 2
  # @rationale: Single character queries produce too many results and feel
  #   accidental. 2 characters is the minimum meaningful query for content search.
  # @constraints: min=1, max=5, type=integer
  # @impact: [DISCOVERY_SYSTEM]

# -----------------------------------------------------------------------------
# Explore
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/DISCOVERY_SYSTEM.md

explore:
  popular_post_count: 10
  # @rationale: Show top 10 posts by like count. Enough variety to feel curated,
  #   not so many that "popular" loses meaning with only 30 mock posts.
  # @constraints: min=5, max=30, type=integer
  # @impact: [DISCOVERY_SYSTEM]

# -----------------------------------------------------------------------------
# View / Layout
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/VIEW_SYSTEM.md

layout:
  content_max_width: 672
  # @rationale: 672px (Tailwind max-w-2xl) matches the scaffold's existing layout.
  #   Comfortable reading width for a single-column social feed on desktop.
  # @unit: px
  # @constraints: min=480, max=960, type=integer
  # @impact: [VIEW_SYSTEM]
