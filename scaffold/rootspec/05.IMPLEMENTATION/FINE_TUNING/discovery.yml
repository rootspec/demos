# -----------------------------------------------------------------------------
# Tag Display
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/DISCOVERY_SYSTEM.md

tags:
  sort_by: post_count_desc
  # @rationale: Highest-volume tags first gives a realistic sense of community
  #   trending. Alphabetical would feel arbitrary for a "Trending Tags" section.
  # @alternatives: [alphabetical, post_count_desc, post_count_asc]

  max_displayed: 0
  # @rationale: 0 = show all tags. The demo has 10-15 tags which fits
  #   comfortably on the page without overflow.
  # @note: If tag count grows, cap at 15 for visual clarity
  # @constraints: min=0, max=50, type=integer

# -----------------------------------------------------------------------------
# User Suggestions
# -----------------------------------------------------------------------------

users:
  max_displayed: 0
  # @rationale: 0 = show all users (8-10 in demo data). All mock users are
  #   relevant suggested follows — no ranking or cap needed.
  # @note: A real app would cap at 5-10 with "View more" expansion
  # @constraints: min=0, max=100, type=integer
