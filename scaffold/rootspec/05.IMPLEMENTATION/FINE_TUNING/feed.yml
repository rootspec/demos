# -----------------------------------------------------------------------------
# Feed Pagination
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/FEED_SYSTEM.md

pagination:
  page_size: 10
  # @rationale: 10 posts per page is a common social feed default. Enough to fill a
  #   screen without overwhelming the initial load. Load More is visible immediately
  #   for the 30-post mock dataset.
  # @constraints: min=5, max=50, type=integer
  # @impact: [FEED_SYSTEM]

# -----------------------------------------------------------------------------
# Post Composer
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/FEED_SYSTEM.md

composer:
  max_post_length: 300
  # @rationale: Bluesky uses 300 characters. Keeps posts focused, matches the
  #   Bluesky-like inspiration, and prevents the composer from growing too large.
  # @constraints: min=100, max=500, type=integer
  # @impact: [FEED_SYSTEM, VIEW_SYSTEM]

  min_post_length: 1
  # @rationale: Empty posts are rejected but whitespace-only is also invalid
  #   (handled by trim validation in the composer logic).
  # @constraints: min=1, max=10, type=integer
