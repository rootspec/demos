pagination:
  initial_count:
    value: 10
    # @unit: posts
    # @rationale: Shows enough content to scan without overwhelming; matches common social feed conventions
    # @constraint: min=5, max=20, type=integer

  page_size:
    value: 10
    # @unit: posts
    # @rationale: Consistent load-more increment matches the initial count for predictable behavior
    # @constraint: min=5, max=20, type=integer

explore:
  popular_posts_count:
    value: 5
    # @unit: posts
    # @rationale: Curated top-N keeps the explore page scannable; too many posts defeats the purpose of "popular"
    # @constraint: min=3, max=10, type=integer
