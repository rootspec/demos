initial_post_count:
  value: 10
  # @unit: posts
  # @rationale: Shows enough content to feel like a real feed without overwhelming the page on first load
  # @constraint: min=5, max=20

page_size:
  value: 10
  # @unit: posts
  # @rationale: Consistent with initial_post_count; each "load more" doubles the visible set incrementally
  # @constraint: min=5, max=20

post_max_chars:
  value: 300
  # @unit: characters
  # @rationale: Mirrors Bluesky's character limit; keeps the demo familiar to developers evaluating the spec
  # @constraint: min=140, max=500
