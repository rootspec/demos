initial_page_size:
  value: 10
  # @unit: posts
  # @rationale: Shows enough content to feel like a real feed without overwhelming; standard for social feed demos
  # @constraint: min=5, max=20

page_increment:
  value: 10
  # @unit: posts
  # @rationale: Matches initial page size for consistent mental model; user always gets the same batch

max_post_length:
  value: 300
  # @unit: characters
  # @rationale: Long enough for substantive thoughts, short enough to stay microblog-like; similar to Bluesky's limit
  # @constraint: min=140, max=500
