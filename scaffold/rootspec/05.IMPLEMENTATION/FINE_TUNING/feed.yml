pagination:
  initial_count:
    value: 10
    # @unit: posts
    # @rationale: Shows enough content to convey a real feed without overwhelming; matches common social app defaults
    # @constraint: min=5, max=20

  load_more_increment:
    value: 10
    # @unit: posts
    # @rationale: Consistent with initial count; predictable UX pattern
    # @constraint: min=5, max=20

composer:
  max_length:
    value: 280
    # @unit: characters
    # @rationale: Matches Bluesky/Twitter convention; well-understood by target audience
    # @constraint: min=140, max=500

  min_length:
    value: 1
    # @unit: characters
    # @rationale: Empty posts should not be created; any non-whitespace content is valid
