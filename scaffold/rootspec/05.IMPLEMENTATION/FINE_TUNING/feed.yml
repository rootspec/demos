pagination:
  initial_count:
    value: 10
    # @unit: posts
    # @rationale: Shows enough posts to scan without overwhelming initial render
    # @constraint: min=5, max=20, type=integer

  load_more_increment:
    value: 10
    # @unit: posts
    # @rationale: Consistent batch size; same as initial for predictable rhythm
    # @constraint: min=5, max=20, type=integer

composer:
  max_character_count:
    value: 300
    # @unit: characters
    # @rationale: Short-form microblogging convention; keeps posts scannable
    # @constraint: min=140, max=500, type=integer
