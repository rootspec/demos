# -----------------------------------------------------------------------------
# Post Composition Constraints
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/FEED_SYSTEM.md

composer:
  max_post_length: 300
  # @rationale: Bluesky uses 300; Twitter uses 280. 300 is familiar to developers
  #   evaluating social feed demos and encourages concise content without
  #   feeling restrictive for a tech-community persona
  # @reference: Bluesky character limit (2024)
  # @alternatives: [280, 300, 500]
  # @constraints: min=50, max=1000, type=integer

# -----------------------------------------------------------------------------
# Feed Display
# -----------------------------------------------------------------------------
# @spec_source: 04.SYSTEMS/FEED_SYSTEM.md

feed:
  posts_per_page: 0
  # @rationale: 0 = no pagination (all posts shown). The demo has 30-40 posts
  #   which is manageable without pagination. Implementing pagination adds
  #   complexity that would obscure the scaffold teaching purpose.
  # @note: If post count grows beyond 50, consider implementing pagination
  # @constraints: min=0, max=100, type=integer

# -----------------------------------------------------------------------------
# Engagement Display
# -----------------------------------------------------------------------------

engagement:
  like_animation_duration_ms: 150
  # @rationale: Brief enough to feel snappy, long enough to register. Follows
  #   standard micro-interaction timing for toggle feedback.
  # @constraints: min=50, max=500, type=integer
