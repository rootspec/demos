initial_posts_count:
  value: 10
  # @unit: posts
  # @rationale: Shows enough content to demonstrate the feed without overwhelming. Matches typical social feed initial load.
  # @constraint: min=5, max=20

load_more_count:
  value: 10
  # @unit: posts
  # @rationale: Consistent with initial load count for predictable pagination experience.
  # @constraint: min=5, max=20

max_post_length:
  value: 300
  # @unit: characters
  # @rationale: Long enough for meaningful tech discussion, short enough to keep the feed readable. Matches Bluesky's limit.
  # @constraint: min=140, max=500
